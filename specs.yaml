      - IN_PROGRESS
      - WAITING
      - NEEDS_ATTENTION
      - FAILED
      - SUCCEEDED
      - CANCELING
      - CANCELED

  MonthName:
    type: string
    description: Name enum
    enum: &MonthName
      - JANUARY
      - FEBRUARY
      - MARCH
      - APRIL
      - MAY
      - JUNE
      - JULY
      - AUGUST
      - SEPTEMBER
      - OCTOBER
      - NOVEMBER
      - DECEMBER

  Month:
    type: object
    properties:
      name:
        type: string
        description: Name of the month of the year.
        enum: *MonthName
    description: Month resource properties
    required:
      - name

  Preference:
    type: string
    description: Preference enum
    enum: &Preference
      - NO_PREFERENCE
      - CUSTOM_PREFERENCE

  PatchingMode:
    type: string
    description: PatchingMode enum
    enum: &PatchingMode
      - ROLLING
      - NONROLLING

  MaintenanceWindow:
    type: object
    properties:
      preference:
        type: string
        description: The maintenance window scheduling preference.
        enum: *Preference
      months:
        type: array
        items:
          $ref: '#/definitions/Month'
        description: Months during the year when maintenance should be performed.
      weeksOfMonth:
        type: array
        items:
          type: integer
        description: >-
          Weeks during the month when maintenance should be performed. Weeks
          start on the 1st, 8th, 15th, and 22nd days of the month, and have a
          duration of 7 days. Weeks start and end based on calendar dates, not
          days of the week. For example, to allow maintenance during the 2nd
          week of the month (from the 8th day to the 14th day of the month),
          use the value 2. Maintenance cannot be scheduled for the fifth week
          of months that contain more than 28 days. Note that this parameter
          works in conjunction with the  daysOfWeek and hoursOfDay parameters
          to allow you to specify specific days of the week and hours that
          maintenance will be performed.
      daysOfWeek:
        type: array
        items:
          $ref: '#/definitions/DayOfWeek'
        description: Days during the week when maintenance should be performed.
      hoursOfDay:
        type: array
        items:
          type: integer
        description: >-
          The window of hours during the day when maintenance should be
          performed. The window is a 4 hour slot. Valid values are - 0 -
          represents time slot 0:00 - 3:59 UTC - 4 - represents time slot 4:00
          - 7:59 UTC - 8 - represents time slot 8:00 - 11:59 UTC - 12 -
          represents time slot 12:00 - 15:59 UTC - 16 - represents time slot
          16:00 - 19:59 UTC - 20 - represents time slot 20:00 - 23:59 UTC
      leadTimeInWeeks:
        type: integer
        description: >-
          Lead time window allows user to set a lead time to prepare for a
          down time. The lead time is in weeks and valid value is between 1 to
          4.
      patchingMode:
        type: string
        enum: *PatchingMode
        description: Cloud Exadata infrastructure node patching method.
      customActionTimeoutInMins:
        type: integer
        description: >-
          Determines the amount of time the system will wait before the start
          of each database server patching operation. Custom action timeout is
          in minutes and valid value is between 15 to 120 (inclusive).
        minimum: 0
        maximum: 120
      isCustomActionTimeoutEnabled:
        type: boolean
        description: >-
          If true, enables the configuration of a custom action timeout (waiting period) between
          database server patching operations.
      isMonthlyPatchingEnabled:
        type: boolean
        description: Is Monthly Patching Enabled
    description: MaintenanceWindow resource properties

  GoldenGateResourceLock:
    description: |
      Resource locks are used to prevent certain APIs from being called for the resource.
      A full lock prevents both updating the resource and deleting the resource. A delete
      lock prevents deleting the resource.
    type: object
    required:
      - type
    properties:
      type:
        description: Type of the lock.
        type: string
        enum:
          - FULL
          - DELETE
      compartmentId:
        description: The compartment ID of the lock.
        type: string
      relatedResourceId:
        description: |
          The id of the resource that is locking this resource. Indicates that deleting this resource will remove the lock.
        type: string
      message:
        description: |
          A message added by the creator of the lock. This is typically used to give an
          indication of why the resource is locked.
        type: string
      timeCreated:
        description: When the lock was created.
        type: string
        format: date-time

  # GoldenGateDeployments (Deployments) Definitions

  GoldenGateDeploymentCategory:
    type: string
    description: |
      The deployment category defines the broad separation of the deployment type into three categories. 
      Currently the separation is 'DATA_REPLICATION', 'STREAM_ANALYTICS' and 'DATA_TRANSFORMS'.
    enum: &GoldenGateDeploymentCategory
      - DATA_REPLICATION
      - DATA_TRANSFORMS

  GoldenGateDeploymentLifecycleState:
    type: string
    description: |
      Possible lifecycle states.
    enum: &GoldenGateDeploymentLifecycleState
