            minLength: 0
            maxLength: 2000

  # https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/Connection/
  GoldenGateConnection:
    type: object
    description: GoldenGate Connection resource model.
    allOf:
      - $ref: '#/definitions/ResourceBase'
      - type: object
        properties:
          properties:
            $ref: '#/definitions/GoldenGateConnectionProperties'
          odbNetworkId:
            description: |
              odbNetwork Id - This is a reference to the odbNetwork resource maintained
              by GCP.
            type: string
          subnetId:
            description: |
              subnet Id - This is a reference to the subnet in the odbNetwork resource where the GoldenGate Connection will be created.
            type: string
          gcpOracleZoneId:
            type: string
            description: The OCID of the zone with which the Exadata VM cluster on Exascale Infrastructure is associated.
            minLength: 1
            maxLength: 255
          ociUrl:
            type: string
            description: HTTPS link to OCI resources exposed to Customer via UI.

  # https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/Connection/
  GoldenGateConnectionProperties:
    type: object
    description: Summary of the GoldenGate Connection.
    discriminator: connectionType
    required:
      - connectionType
      - id
      - displayName
      - compartmentId
      - lifecycleState
      - timeCreated
      - timeUpdated
    properties:
      connectionType:
        type: string
        # $ref: '#/definitions/GoldenGateConnectionTechnologyType'
        # Use String instead of enum to support new value in future
        # Source of True is ListGoldenGateConnectionsTypes api.
        description: |
          The connection type.
      id:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the connection being
          referenced.
        type: string
        minLength: 1
        maxLength: 255
      displayName:
        description: |
          An object's Display Name.
        type: string
        minLength: 1
        maxLength: 255
      description:
        description: |
          Metadata about this specific object.
        type: string
        minLength: 0
        maxLength: 400
        x-default-description: 'null'
      compartmentId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the compartment being referenced.
        type: string
        minLength: 1
        maxLength: 255
      clusterPlacementGroupId:
        type: string
        description: The OCID of the cluster placement group of the Exadata Infrastructure or Db System.
        minLength: 1
        maxLength: 255
      systemTags:
        x-default-description: 'null' # deployments, deploymentBackups, deploymentUpgrades, connections, databaseRegistrations
        type: object
        additionalProperties:
          type: object
          additionalProperties:
            type: object
        description: |
          The system tags associated with this resource, if any. The system tags are set by Oracle
          Cloud Infrastructure services. Each key is predefined and scoped to namespaces.  For more
          information, see [Resource Tags](https://docs.cloud.oracle.com/iaas/Content/General/Concepts/resourcetags.htm).
          Example: `{orcl-cloud: {free-tier-retain: true}}`
      lifecycleState:
        type: string
        description: |
          Possible lifecycle states for connection.
        enum: *GoldenGateConnectionLifecycleState
      lifecycleDetails:
        description: |
          Describes the object's current state in detail. For example, it can be used to provide
          actionable information for a resource in a Failed state.
        type: string
        minLength: 1
        maxLength: 255
      timeCreated:
        description: |
          The time the resource was created. The format is defined by
          [RFC3339](https://tools.ietf.org/html/rfc3339), such as `2016-08-25T21:10:29.600Z`.
        type: string
        format: date-time
      timeUpdated:
        description: |
          The time the resource was last updated. The format is defined by
          [RFC3339](https://tools.ietf.org/html/rfc3339), such as `2016-08-25T21:10:29.600Z`.
        type: string
        format: date-time
      vaultId:
        description: |
          Refers to the customer's vault OCID.
          If provided, it references a vault where GoldenGate can manage secrets. Customers must add policies to permit GoldenGate
          to manage secrets contained within this vault.
        type: string
        minLength: 0
        maxLength: 255
      keyId:
        description: |
          Refers to the customer's master key OCID.
          If provided, it references a key to manage secrets. Customers must add policies to permit GoldenGate to use this key.
        type: string
        minLength: 0
        maxLength: 255
      ingressIps:
        description: |
          List of ingress IP addresses from where the GoldenGate deployment connects to this connection's privateIp.
          Customers may optionally set up ingress security rules to restrict traffic from these IP addresses.
        type: array
        items:
          $ref: '#/definitions/GoldenGateIngressIpDetails'
      nsgIds:
        description: |
          An array of Network Security Group OCIDs used to define network access for either Deployments or Connections.
        type: array
        items:
          type: string
          minLength: 1
          maxLength: 255
        maxItems: 5
      subnetId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the target subnet of the dedicated connection.
        type: string
        minLength: 0
        maxLength: 255
      routingMethod:
        type: string
        description: |
          Controls the network traffic direction to the target:
          SHARED_DEPLOYMENT_ENDPOINT: Network traffic flows from the assigned deployment's private endpoint through the deployment's subnet.
          DEDICATED_ENDPOINT: A dedicated private endpoint is created in the target VCN subnet for the connection. The subnetId is required when DEDICATED_ENDPOINT networking is selected.
        x-default-description: 'null'
        enum:
          - SHARED_DEPLOYMENT_ENDPOINT
          - DEDICATED_ENDPOINT
      securityAttributes:
        type: object
        description: |
          Security attributes for this resource. Each key is predefined and scoped to a namespace. For more information, see Resource Tags.
          Example: {"Oracle-ZPR": {"MaxEgressCount": {"value": "42", "mode": "enforce"}}}
      doesUseSecretIds:
        description: |
          Indicates that sensitive attributes are provided via Secrets.
        type: boolean
        default: false
      subscriptionId:
        type: string
        description: The OCID of the subscription with which resource needs to be associated with.
        minLength: 1
        maxLength: 255
      locks:
        description: List of DbSystems.
        type: array
        items:
          $ref: "#/definitions/GoldenGateResourceLock"
      freeformTags:
        type: object
        description: Free-form tags for this resource. Each tag is a simple key-value pair with no predefined name, type, or namespace.
      definedTags:
        type: object
        description: Defined tags for this resource. Each key is predefined and scoped to a namespace.

  # https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/datatypes/OracleConnection
  GoldenGateOracleConnectionProperties:
    description: Represents the metadata of a Oracle connection.
    type: object
    allOf:
      - $ref: '#/definitions/GoldenGateConnectionProperties'
      - discriminator: 'ORACLE'
        required:
          - username
        properties:
          technologyType:
            type: string
            description: |
              The technology type of OracleConnection.
          username:
            type: string
            description: |
              The username Oracle GoldenGate uses to connect the associated system of the given technology. 
              This username must already exist and be available by the system/application to be connected to 
              and must conform to the case sensitivty requirments defined in it.
            minLength: 0
            maxLength: 255
          authenticationMode:
            type: string
            description: |
              Authentication mode. It can be provided at creation of Oracle Autonomous Database Serverless connections, 
              when a databaseId is provided. The default value is MTLS.
            enum:
              - TLS
              - MTLS
            default: MTLS
          connectionString:
            type: string
            description: |
              Connect descriptor or Easy Connect Naming method used to connect to a database.
            minLength: 1
            maxLength: 2000
          databaseId:
            type: string
            description: |
              The OCID of the database being referenced.
            minLength: 0
            maxLength: 255
          gcpOracleDatabaseId:
            type: string
            description: |
              database instance id of database in Oralce Database @ Google Cloud. 
              If gcpOracleDatabaseId is provided, connectionString must be empty.
            minLength: 0
            maxLength: 255
          sessionMode:
            type: string
            description: |
              The mode of the database connection session to be established by the data client. 
              'REDIRECT' - for a RAC database, 'DIRECT' - for a non-RAC database. 
              Connection to a RAC database involves a redirection received from the SCAN listeners to the database node to connect to. 
              By default the mode would be DIRECT.
            enum:
              - DIRECT
              - REDIRECT
            default: DIRECT

  # https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/datatypes/GoldenGateConnection
  GoldenGateGoldenGateConnectionProperties:
    description: Represents the metadata of a GoldenGate connection.
    type: object
    allOf:
      - $ref: '#/definitions/GoldenGateConnectionProperties'
      - discriminator: 'GOLDENGATE'
        properties:
          technologyType:
            type: string
            description: |
              The technology type of GoldenGateConnection.
          deploymentId:
            type: string
            description: |
              The OCID of the deployment being referenced.
            minLength: 1
            maxLength: 255
          gcpOracleGoldenGateDeploymentId:
            type: string
            description: |
              Fully qualified resource ID for the resource. Deployment id in Oracle Database @ Google Cloud. 
              If gcpOracleGoldenGateDeploymentId is provided, host and port must be empty.
            minLength: 1
            maxLength: 255
          host:
            type: string
            description: |
              Host and port separated by colon. Example: "server.example.com:1234" For multiple hosts, provide a comma 
              separated list. Example: "server1.example.com:1000,server1.example.com:2000"
            minLength: 1
            maxLength: 800
          port:
            type: integer
            description: |
              The port of an endpoint usually specified for a connection.
            minimum: 0
          username:
            type: string
            description: |
              The username credential existing in the Oracle GoldenGate used to be connected to.
            minLength: 0
            maxLength: 255

