  GoldenGateOggDeployment:
    description: |
      Deployment Data for an OggDeployment
    type: object
    required:
      - deploymentName
      - adminUsername
    properties:
      deploymentName:
        description: |
          The name given to the GoldenGate service deployment.
          The name must be 1 to 32 characters long, must contain only alphanumeric characters and must start with a letter.
        type: "string"
        minLength: 1
        maxLength: 32
        pattern: "^[A-Za-z][A-Za-z0-9-_.]*$"
      adminUsername:
        description: |
          The GoldenGate deployment console username.
        type: string
        minLength: 0
        maxLength: 512
        example: "oggadmin"
      oggVersion:
        description: |
          Version of OGG
        type: string
        minLength: 1
      certificate:
        description: |
          The base64 encoded content of the PEM file containing the SSL certificate.
        type: string
        minLength: 0
        maxLength: 65536
      credentialStore:
        type: string
        description: |
          The type of credential store for OGG.
        enum:
          - GOLDENGATE
          - IAM
        default: GOLDENGATE
      identityDomainId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the Identity Domain when IAM credential store is used.
        type: string
        minLength: 1
        maxLength: 255
      passwordSecretId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the Secret where the deployment password is stored.
        type: string
        minLength: 1
        maxLength: 255
      groupToRolesMapping:
        $ref: "#/definitions/GoldenGateGroupToRolesMappingDetails"

  GoldenGateCreateOggDeploymentDetails:
    description: |
      Deployment Data for creating an OggDeployment
    type: object
    required:
      - deploymentName
      - adminUsername
      - adminPassword
    properties:
      deploymentName:
        description: |
          The name given to the GoldenGate service deployment.
          The name must be 1 to 32 characters long, must contain only alphanumeric characters and must start with a letter.
        type: "string"
        minLength: 1
        maxLength: 32
        pattern: "^[A-Za-z][A-Za-z0-9-_.]*$"
      adminUsername:
        description: |
          The GoldenGate deployment console username.
        type: string
        minLength: 0
        maxLength: 512
        example: "oggadmin"
      adminPassword:
        description: |
          The password associated with the GoldenGate deployment console username.
          The password must be 8 to 30 characters long and must contain at least 1 uppercase, 1 lowercase, 1 numeric,
          and 1 special character. Special characters such as '$', '^', or '?' are not allowed.
        type: string
        format: password
        minLength: 1
        maxLength: 30
        #        pattern: "(?=^.{8,30}$)(?=(.*[0-9]))(?=(.*[A-Z]))(?=(.*[a-z]))(?=(.*[-!@%&*.#_]))(?!(.*[$^?]))^.*"
        example: "secret-A1"
      oggVersion:
        description: |
          Version of OGG
        type: string
        minLength: 1

  GoldenGateCredentialStore:
    type: string
    description: |
      The type of credential store for OGG.
    enum:
      - GOLDENGATE
      - IAM

  GoldenGateGroupToRolesMappingDetails:
    description: |
      Defines the IDP Groups to GoldenGate roles mapping. This field is used only for IAM deployment and does not have any impact on non-IAM deployments.
      For IAM deployment, when user does not specify this mapping, then it has null value and default mapping is used.
      User belonging to each group can only perform the actions according to the role the respective group is mapped to.
    type: object
    required:
      - securityGroupId
    properties:
      securityGroupId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the IDP group which will be mapped to goldengate role securityGroup.
          It grants administration of security related objects and invoke security related service requests. This role has full privileges.
        type: string
        minLength: 1
        maxLength: 255
      administratorGroupId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the IDP group which will be mapped to goldengate role administratorGroup.
          It grants full access to the user, including the ability to alter general, non-security related operational parameters
          and profiles of the server.
        type: string
        minLength: 0
        maxLength: 255
      operatorGroupId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the IDP group which will be mapped to goldengate role operatorGroup.
          It allows users to perform only operational actions, like starting and stopping resources.
          Operators cannot alter the operational parameters or profiles of the MA server.
        type: string
        minLength: 0
        maxLength: 255
      userGroupId:
        description: |
          The [OCID](/Content/General/Concepts/identifiers.htm) of the IDP group which will be mapped to goldengate role userGroup.
          It allows information-only service requests, which do not alter or affect the operation of either the MA.
          Examples of query and read-only information include performance metric information and resource status and monitoring information
        type: string
        minLength: 0
        maxLength: 255

  GoldenGateMaintenanceWindow:
    description: |
      Defines the maintenance window, when automatic actions can be performed.
    type: object
    required:
      - day
      - startHour
    properties:
      day:
        type: string
        description: |
          Days of the week.
        enum: *DayOfWeekName
      startHour:
        description: |
          Start hour for maintenance period. Hour is in UTC.
        type: integer
        minimum: 0
        maximum: 23

