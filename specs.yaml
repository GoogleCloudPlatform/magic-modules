  GoldenGateDatabricksConnectionPropertiesCreateOrUpdate:
    description: The information about a new Databricks connection.
    type: object
    allOf:
      - $ref: '#/definitions/GoldenGateConnectionPropertiesCreateOrUpdate'
      - discriminator: 'DATABRICKS'
        required:
          - technologyType
          - authenticationType
          - connectionUrl
        properties:
          technologyType:
            type: string
            description: |
              The technology type of DatabricksConnection.
          authenticationType:
            type: string
            description: |
              Used authentication mechanism to access Databricks.
              Required fields by authentication types:
              - PERSONAL_ACCESS_TOKEN: username is always 'token', user must enter password
              - OAUTH_M2M: user must enter clientId and clientSecret
            enum:
              - PERSONAL_ACCESS_TOKEN
              - OAUTH_M2M
          connectionUrl:
            type: string
            description: |
              Connection URL.
              e.g.: 'jdbc:databricks://adb-33934.4.azuredatabricks.net:443/default;transportMode=http;ssl=1;httpPath=sql/protocolv1/o/3393########44/0##3-7-hlrb'
            minLength: 1
            maxLength: 2000
          password:
            type: string
            description: |
              The password used to connect to Databricks.
              Only applicable for authenticationType == PERSONAL_ACCESS_TOKEN.
            minLength: 0
            maxLength: 255
          clientId:
            type: string
            description: |
              OAuth client id, only applicable for authenticationType == OAUTH_M2M
            minLength: 1
            maxLength: 255
          clientSecret:
            type: string
            description: |
              OAuth client secret, only applicable for authenticationType == OAUTH_M2M
            minLength: 0
            maxLength: 255
          storageCredentialName:
            type: string
            description: |
              Optional. External storage credential name to access files on object storage such as ADLS Gen2, S3 or GCS.
            minLength: 0
            maxLength: 255

