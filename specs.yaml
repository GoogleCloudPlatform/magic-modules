  #https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/datatypes/CreateConnectionDetails
  GoldenGateConnectionPropertiesCreateOrUpdate:
    description: |
      The information about a new Connection.
    type: object
    discriminator: connectionType
    required:
      - connectionType
      - displayName
    properties:
      connectionType:
        type: string
        description: |
          The connection type.
      displayName:
        description: |
          An object's Display Name.
        type: string
        minLength: 1
        maxLength: 255
      description:
        description: |
          Metadata about this specific object.
        type: string
        minLength: 0
        maxLength: 400
        x-default-description: 'null'
      routingMethod:
        type: string
        description: |
          Controls the network traffic direction to the target:
          SHARED_DEPLOYMENT_ENDPOINT: Network traffic flows from the assigned deployment's private endpoint through the deployment's subnet.
          DEDICATED_ENDPOINT: A dedicated private endpoint is created in the target VCN subnet for the connection. The subnetId is required when DEDICATED_ENDPOINT networking is selected.
        x-default-description: 'null'
        enum:
          - SHARED_DEPLOYMENT_ENDPOINT
          - DEDICATED_ENDPOINT
        default: SHARED_DEPLOYMENT_ENDPOINT

  # https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/datatypes/CreateOracleConnectionDetails
  GoldenGateOracleConnectionPropertiesCreateOrUpdate:
    description: The information about a new Oracle connection.
    type: object
    allOf:
      - $ref: '#/definitions/GoldenGateConnectionPropertiesCreateOrUpdate'
      - discriminator: 'ORACLE'
        required:
          - username
          - technologyType
        properties:
          technologyType:
            type: string
            description: |
              The technology type of OracleConnection.
          username:
            type: string
            description: |
              The username Oracle GoldenGate uses to connect the associated system of the given technology. 
              This username must already exist and be available by the system/application to be connected to 
              and must conform to the case sensitivty requirments defined in it.
            minLength: 0
            maxLength: 255
          authenticationMode:
            type: string
            description: |
              Authentication mode. It can be provided at creation of Oracle Autonomous Database Serverless connections, 
              when a databaseId is provided. The default value is MTLS.
            enum:
              - TLS
              - MTLS
            default: MTLS
          gcpOracleDatabaseId:
            type: string
            description: |
              database instance id of database in Oralce Database @ Google Cloud. 
              If gcpOracleDatabaseId is provided, connectionString must be empty.
            minLength: 0
            maxLength: 255
          connectionString:
            type: string
            description: |
              Connect descriptor or Easy Connect Naming method used to connect to a database. 
              Support both OCI native database and and Oracle Database @ Google Cloud.
            minLength: 1
            maxLength: 2000
          password:
            type: string
            description: |
              The password Oracle GoldenGate uses to connect the associated system of the given technology. 
              It must conform to the specific security requirements including length, case sensitivity, and so on.
            minLength: 0
            maxLength: 255
          sessionMode:
            type: string
            description: |
              The mode of the database connection session to be established by the data client. 
              'REDIRECT' - for a RAC database, 'DIRECT' - for a non-RAC database. 
              Connection to a RAC database involves a redirection received from the SCAN listeners to the database node to connect to. 
              By default the mode would be DIRECT.
            enum:
              - DIRECT
              - REDIRECT
            default: DIRECT
          wallet:
            type: string
            description: |
              The wallet contents Oracle GoldenGate uses to make connections to a database. 
              This attribute is expected to be base64 encoded.
            minLength: 0
            maxLength: 51200

  # https://docs.oracle.com/en-us/iaas/api/#/en/goldengate/20200407/datatypes/CreateGoldenGateConnectionDetails
