      - UPDATING
      - ACTIVE
      - INACTIVE
      - DELETING
      - DELETED
      - FAILED
      - NEEDS_ATTENTION
      - IN_PROGRESS
      - CANCELING
      - CANCELED
      - SUCCEEDED
      - WAITING

