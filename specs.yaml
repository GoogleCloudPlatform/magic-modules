      - BACKUP_RESTORE
      - COPY_BACKUP
      - MANUAL_BACKUP
      - PLACEMENT
      - DISASTER_RECOVERY
      - SCHEDULE_MANUAL_BACKUP
      - MULTICLOUD

  GoldenGateDeploymentLifecycleSubState:
    type: string
    description: |
