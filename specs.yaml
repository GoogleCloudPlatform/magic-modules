        type: string
      message:
        description: A human-readable error message.
        type: string

  ExtendedError:
    type: object
    description: |
      Extended OCI error message object model to support templated messages with argument placeholders.
    allOf:
      - $ref: '#/definitions/Error'
      - type: object
        properties:
          originalMessageTemplate:
            type: string
            description: |
              The message template used to build the rendered message, using messageArguments.
          messageArguments:
            type: object
            description: |
              Map with arguments to be replaced in the message template. Key represents the placeholder within the template '{key}' and value is the value to set in the placeholder spot.
            additionalProperties:
              type: string

  ErrorBase:
    type: object
    description: Error information.
    required:
      - code
      - message
    properties:
      code:
        description: A short error code that defines the error, meant for programmatic parsing.
        type: string
      message:
        description: A human-readable error message.
        type: string

  SortOrder:
    type: string
    description: |
      The sort order to use, either ascending (`ASC`) or descending (`DESC`). The `displayName`
      sort order is case sensitive.
    enum: &SORTORDER
      - ASC
      - DESC

  LicenseModel:
    type: string
    description: LicenseModel enum
    enum: &LicenseModel
      - LICENSE_INCLUDED
      - BRING_YOUR_OWN_LICENSE

  DayOfWeekName:
    type: string
    description: DayOfWeekName enum
    enum: &DayOfWeekName
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      - SUNDAY

  DayOfWeekUpdate:
    description: DayOfWeek resource properties
