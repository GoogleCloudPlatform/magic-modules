# =============================================================================
# Anchors used to reference common headers, properties, ...etc...
# =============================================================================
x-anchors:
  # This is being included in the 'x-anchors:' section.
  # For that reason, it is important that x-headers and x-properties are indented
  # exactly two spaces.

  # =============================================================================
  # Anchors used to reference common headers, properties, ...etc...
  # =============================================================================
  x-headers:
    etag: &ref-etag
      description: |
        For optimistic concurrency control. See `if-match`.
      type: string
    opc-work-request-id: &ref-opc-work-request-id
      # NOTE: link "GetWorkRequest" in the description to the relevant API docs. Your Technical Content writer can provide the URL.
      description: |
        The [OCID](/iaas/Content/General/Concepts/identifiers.htm) of the asynchronous work request.
        Use GetWorkRequest with this ID to track the status of the request.
      type: string
    opc-next-page: &ref-opc-next-page
      description: |
        For list pagination. When this header appears in the response, additional pages of results remain. For
        important details about how pagination works, see [List Pagination](/iaas/Content/API/Concepts/usingapi.htm#nine).
      type: string
    opc-request-id: &ref-opc-request-id
      description: |
        Unique Oracle-assigned identifier for the request. If you need to contact
        Oracle about a particular request, please provide the request ID.
      type: string
    retry-after: &ref-retry-after
      type: integer
      description: A decimal number representing the number of seconds the client should wait before polling this endpoint again.
    opc-retry-token: &ref-opc-retry-token
      type: integer
      description: A decimal number representing the number of seconds the client should wait before polling this endpoint again.
    location: &ref-location
      description: |
        Unique identifier for the asynchronous work. You can use this to query its status.
      type: string


