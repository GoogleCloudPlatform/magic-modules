    enum: &GoldenGateDeploymentType
      - DATABASE_ORACLE
      - BIGDATA
      - DATA_TRANSFORMS
      - DATABASE_MICROSOFT_SQLSERVER
      - DATABASE_MYSQL
      - DATABASE_POSTGRESQL
      - DATABASE_DB2ZOS
      - DATABASE_DB2I

  GoldenGateMaintenanceActionType:
