        properties:
          technologyType:
            type: string
            description: |
              The technology type of OracleConnection.
          username:
            type: string
            description: |
              The username Oracle GoldenGate uses to connect the associated system of the given technology. 
              This username must already exist and be available by the system/application to be connected to 
              and must conform to the case sensitivty requirments defined in it.
            minLength: 0
            maxLength: 255
          authenticationMode:
            type: string
            description: |
              Authentication mode. It can be provided at creation of Oracle Autonomous Database Serverless connections, 
              when a databaseId is provided. The default value is MTLS.
            enum:
              - TLS
              - MTLS
            default: MTLS
          connectionString:
            type: string
            description: |
              Connect descriptor or Easy Connect Naming method used to connect to a database. 
              Support both native OCI database and Oralce Database @ Google Cloud database.
            minLength: 1
            maxLength: 2000
          databaseId:
            type: string
            description: |
              The OCID of the database being referenced.
            minLength: 0
            maxLength: 255
          gcpOracleDatabaseId:
            type: string
            description: |
              database instance id of database in Oralce Database @ Google Cloud. 
              If gcpOracleDatabaseId is provided, connectionString must be empty.
            minLength: 0
            maxLength: 255
          sessionMode:
            type: string
            description: |
              The mode of the database connection session to be established by the data client. 
              'REDIRECT' - for a RAC database, 'DIRECT' - for a non-RAC database. 
              Connection to a RAC database involves a redirection received from the SCAN listeners to the database node to connect to. 
              By default the mode would be DIRECT.
            enum:
              - DIRECT
              - REDIRECT
            default: DIRECT

