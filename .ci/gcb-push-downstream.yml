---
steps:
    # The GCB / GH integration doesn't satisfy our use case perfectly.
    # It doesn't check out the repo itself - it only gives us the actual code.
    # So we need to handle that access ourselves - which means deleting the code
    # and cloning the repo to the present directory.  We need to use
    # 'sh' to evaluate the '*' arguments, which otherwise would be
    # passed literally to 'rm'.
    - name: 'alpine'
      args:
          - sh
          - -c
          - rm -rf ./* ./.* || true
    - name: 'gcr.io/cloud-builders/git'
      id: clone
      args:
          - clone
          - https://github.com/GoogleCloudPlatform/magic-modules
          - .

    - name: 'gcr.io/cloud-builders/git'
      id: checkout
      args:
          - checkout
          - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/build-environment'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      id: build-magician-binary
      waitFor: ["checkout"]

    # TPG
    - name: 'gcr.io/graphite-docker-images/go-plus'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      id: tpg-sync
      waitFor: ["build-magician-binary"]
      args:
          - 'wait-for-commit'
          - 'tpg-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TPGB
    - name: 'gcr.io/graphite-docker-images/go-plus'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      id: tpgb-sync
      waitFor: ["build-magician-binary"]
      args:
          - 'wait-for-commit'
          - 'tpgb-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TGC
    - name: 'gcr.io/graphite-docker-images/go-plus'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      id: tgc-sync
      waitFor: ["build-magician-binary"]
      args:
          - 'wait-for-commit'
          - 'tgc-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TF-OICS
    - name: 'gcr.io/graphite-docker-images/go-plus'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      id: tf-oics-sync
      waitFor: ["build-magician-binary"]
      args:
          - 'wait-for-commit'
          - 'tf-oics-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TPG
    - name: 'gcr.io/graphite-docker-images/build-environment'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      id: tpg-push
      waitFor: ["tpg-sync", "tpgb-sync", "tgc-sync", "tf-oics-sync"]
      env:
        - BASE_BRANCH=$BRANCH_NAME
      args:
          - 'generate-downstream'
          - 'downstream'
          - 'terraform'
          - 'ga'
          - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/go-plus'
      waitFor: ["tpg-push"]
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      args:
          - 'sync-branch'
          - 'tpg-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TPGB
    - name: 'gcr.io/graphite-docker-images/build-environment'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      id: tpgb-push
      waitFor: ["tpg-sync", "tpgb-sync", "tgc-sync", "tf-oics-sync"]
      env:
        - BASE_BRANCH=$BRANCH_NAME
      args:
          - 'generate-downstream'
          - 'downstream'
          - 'terraform'
          - 'beta'
          - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/go-plus'
      waitFor: ["tpgb-push"]
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      args:
          - 'sync-branch'
          - 'tpgb-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TGC
    - name: 'gcr.io/graphite-docker-images/build-environment'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      id: tgc-push
      waitFor: ["tpgb-push"]
      env:
        - BASE_BRANCH=$BRANCH_NAME
      args:
          - 'generate-downstream'
          - 'downstream'
          - 'terraform-google-conversion'
          - 'beta'
          - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/go-plus'
      waitFor: ["tgc-push"]
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      args:
          - 'sync-branch'
          - 'tgc-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    # TF-OICS
    - name: 'gcr.io/graphite-docker-images/build-environment'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      id: tf-oics-push
      waitFor: ["tpg-sync", "tpgb-sync", "tgc-sync", "tf-oics-sync"]
      env:
        - BASE_BRANCH=$BRANCH_NAME
      args:
          - 'generate-downstream'
          - 'downstream'
          - 'tf-oics'
          - 'beta'
          - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/go-plus'
      waitFor: ["tf-oics-push"]
      secretEnv: ["GITHUB_TOKEN_CLASSIC"]
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      args:
          - 'sync-branch'
          - 'tf-oics-sync'
          - $BRANCH_NAME
          - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/go-plus'
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      secretEnv: ["GITHUB_TOKEN_CLASSIC", "GOOGLE_PROJECT"]
      id: vcr-merge
      waitFor: ["tpg-push", "tpgb-push", "tgc-push", "tf-oics-push"]
      env:
        - BASE_BRANCH=$BRANCH_NAME
      args:
        - "vcr-merge"
        - $COMMIT_SHA

    - name: 'gcr.io/graphite-docker-images/go-plus'
      id: magician-delete-branches
      waitFor: ["vcr-merge"]
      entrypoint: '/workspace/.ci/scripts/go-plus/magician/exec.sh'
      secretEnv:
        - "GITHUB_TOKEN_CLASSIC"
      args:
        - "delete-branches"
        - $COMMIT_SHA
        - $BRANCH_NAME


# set extremely long 1 day timeout, in order to ensure that any jams / backlogs can be cleared.
timeout: 86400s
options:
    machineType: 'N1_HIGHCPU_32'


logsBucket: 'gs://cloudbuild-downstream-builder-logs'
availableSecrets:
  secretManager:
    - versionName: projects/673497134629/secrets/github-classic--repo-workflow/versions/latest
      env: GITHUB_TOKEN_CLASSIC
    - versionName: projects/673497134629/secrets/ci-test-project/versions/latest
      env: GOOGLE_PROJECT
