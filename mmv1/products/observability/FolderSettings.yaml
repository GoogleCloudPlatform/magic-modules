---
name: FolderSettings
description: Manages Cloud Observability settings for a folder.
min_version: beta
base_url: folders/{{folder}}/locations/{{location}}/settings
self_link: folders/{{folder}}/locations/{{location}}/settings
create_url: folders/{{folder}}/locations/{{location}}/settings
create_verb: PATCH
update_url: folders/{{folder}}/locations/{{location}}/settings
update_verb: PATCH
exclude_delete: true
autogen_async: true
update_mask: true
custom_code:
  pre_create: templates/terraform/pre_create/observability_folder_settings.go.tmpl
import_format:
  - folders/{{folder}}/locations/{{location}}/settings
async:
  include_project: true
  operation:
    timeouts:
      insert_minutes: 10
      update_minutes: 10
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true
samples:
  - name: observability_folder_settings_basic
    external_providers:
      - time
    primary_resource_id: primary
    steps:
      - name: observability_folder_settings_basic
        config_path: templates/terraform/samples/services/observability/observability_folder_settings_basic.tf.tmpl
        resource_id_vars:
          folder_name: tf-test-folder
          kms_key_name: example-key
          location: us
        test_env_vars:
          org_id: ORG_ID
        test_vars_overrides:
          kms_key_name: kms.BootstrapKMSKeyInLocation(t, "us").CryptoKey.Name
          location: '"us" + randomSuffix'
  - name: observability_folder_settings_basic_global
    external_providers:
      - time
    primary_resource_id: primary_global
    steps:
      - name: observability_folder_settings_basic_global
        config_path: templates/terraform/samples/services/observability/observability_folder_settings_basic_global.tf.tmpl
        resource_id_vars:
          location: global
        test_env_vars:
          org_id: ORG_ID
        test_vars_overrides:
          location: '"global" + randomSuffix'
parameters:
  - name: location
    type: String
    description: The location of the settings.
    url_param_only: true
    required: true
    immutable: true
  - name: folder
    type: String
    description: The folder ID.
    url_param_only: true
    required: true
    immutable: true
properties:
  - name: defaultStorageLocation
    type: String
    description: The default storage location for new resources, e.g. buckets. Only valid for global location.
  - name: kmsKeyName
    type: String
    description: The default Cloud KMS key to use for new resources. Only valid for regional locations.
  - name: name
    type: String
    description: The resource name of the settings.
    output: true
  - name: serviceAccountId
    type: String
    description: The service account used by Cloud Observability for this folder.
    output: true
