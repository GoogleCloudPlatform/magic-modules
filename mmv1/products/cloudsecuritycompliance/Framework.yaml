---
name: Framework
description: Frameworks allow you to monitor and enforce compliance and security requirements. Manage compliance by assigning built-in or custom frameworks to resources.
references:
  api: "https://docs.cloud.google.com/security-command-center/docs/reference/cloudsecuritycompliance/rest/v1/organizations.locations.frameworks"
base_url: '{{parent}}/locations/{{location}}/frameworks'
update_mask: true
self_link: '{{parent}}/locations/{{location}}/frameworks/{{framework_id}}'
create_url: '{{parent}}/locations/{{location}}/frameworks?frameworkId={{framework_id}}'
update_verb: PATCH
id_format: '{{parent}}/locations/{{location}}/frameworks/{{framework_id}}'
import_format:
  - 'organizations/{{%organization}}/locations/{{location}}/frameworks/{{framework_id}}'
  - "{{%parent}}/locations/{{location}}/frameworks/{{framework_id}}"
examples:
  - name: "cloudsecuritycompliance_framework_org_basic"
    primary_resource_id: "example"
    vars:
      framework_name: "example-framework"
    test_env_vars:
      org_id: "ORG_ID"
  - name: "cloudsecuritycompliance_framework_project_basic"
    primary_resource_id: "example"
    vars:
      framework_name: "example-framework"
    test_env_vars:
      project_number: "PROJECT_NUMBER"
  - name: "cloudsecuritycompliance_framework_org_basic_backward"
    primary_resource_id: "example"
    vars:
      framework_name: "example-framework"
    test_env_vars:
      org_id: "ORG_ID"
autogen_status: RnJhbWV3b3Jr
custom_code:
  custom_identity:
    - parent
  encoder: "templates/terraform/encoders/cloudsecuritycompliance_framework.go.tmpl"
  pre_create: "templates/terraform/pre_create/cloudsecuritycompliance_pre_create.go.tmpl"
  pre_read: "templates/terraform/pre_read/cloudsecuritycompliance_pre_read.go.tmpl"
  pre_update: "templates/terraform/pre_update/cloudsecuritycompliance_pre_update.go.tmpl"
  pre_delete: "templates/terraform/pre_delete/cloudsecuritycompliance_pre_delete.go.tmpl"
  post_import: "templates/terraform/post_import/cloudsecuritycompliance_post_import.go.tmpl"
  custom_import: "templates/terraform/custom_import/cloudsecuritycompliance_framework.go.tmpl"
parameters:
  - name: parent
    type: String
    description: |
      The parent resource in which to create the resource.
      Must be in one of the following formats:
      * `projects/{{project}}`
      * `organizations/{{organization}}`
    immutable: true
    default_from_api: true
    url_param_only: true
    exactly_one_of:
      - parent
      - organization
  - name: organization
    type: String
    description: |
      Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
    default_from_api: true
    deprecation_message: "Use `parent` instead."
    exactly_one_of:
      - parent
      - organization
  - name: location
    type: String
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
    required: true
  - name: frameworkId
    type: String
    description: |-
      ID of the framework.
      This is not the full name of the framework.
      This is the last part of the full name of the framework.
    immutable: true
    url_param_only: true
    required: true
properties:
  - name: category
    type: Array
    description: The category of the framework.
    item_type:
      type: String
    output: true
  - name: cloudControlDetails
    type: Array
    description: |-
      The details of the cloud controls directly added without any grouping in
      the framework.
    item_type:
      type: NestedObject
      properties:
        - name: majorRevisionId
          type: String
          description: Major revision of cloudcontrol
          required: true
        - name: name
          type: String
          description: |-
            The name of the CloudControl in the format:
            "{parent}/locations/{location}/cloudControls/{cloud-control}"
          required: true
        - name: parameters
          type: Array
          description: |-
            Parameters is a key-value pair that is required by the CloudControl. The
            specification of these parameters will be present in cloudcontrol.Eg: {
            "name": "location","value": "us-west-1"}.
          item_type:
            type: NestedObject
            properties:
              - name: name
                type: String
                description: The name of the parameter.
                required: true
              - name: parameterValue
                type: NestedObject
                description: Possible parameter value types.
                required: true
                properties:
                  - name: boolValue
                    type: Boolean
                    description: Represents a boolean value.
                  - name: numberValue
                    type: Double
                    description: Represents a double value.
                  - name: stringListValue
                    type: NestedObject
                    description: A list of strings.
                    properties:
                      - name: values
                        type: Array
                        description: The strings in the list.
                        required: true
                        item_type:
                          type: String
                  - name: stringValue
                    type: String
                    description: Represents a string value.
                  - name: oneofValue
                    type: NestedObject
                    description: Sub-parameter values.
                    properties:
                      - name: name
                        type: String
                        description: The name of the parameter.
                      - name: parameterValue
                        type: NestedObject
                        description: The value of the parameter.
                        properties:
                          - name: boolValue
                            type: Boolean
                            description: Represents a boolean value.
                          - name: numberValue
                            type: Double
                            description: Represents a double value.
                          - name: stringListValue
                            type: NestedObject
                            description: A list of strings.
                            properties:
                              - name: values
                                type: Array
                                description: The strings in the list.
                                required: true
                                item_type:
                                  type: String
                          - name: stringValue
                            type: String
                            description: Represents a string value.
  - name: description
    type: String
    description: The description of the framework. The maximum length is 2000 characters.
  - name: displayName
    type: String
    description: Display name of the framework. The maximum length is 200 characters.
  - name: majorRevisionId
    type: String
    description: Major revision of the framework incremented in ascending order.
    output: true
  - name: name
    type: String
    description: |-
      Identifier. The name of the framework.
      Format:
      {parent}/locations/{location}/frameworks/{framework_id}
    output: true
  - name: supportedCloudProviders
    type: Array
    description: cloud providers supported
    output: true
    item_type:
      type: String
  - name: supportedEnforcementModes
    type: Array
    description: The supported enforcement modes of the framework.
    output: true
    item_type:
      type: String
  - name: supportedTargetResourceTypes
    type: Array
    description: target resource types supported by the Framework.
    output: true
    item_type:
      type: String
  - name: type
    type: String
    description: |-
      The type of the framework. The default is TYPE_CUSTOM.
      Possible values:
      BUILT_IN
      CUSTOM
    output: true
