---
name: Artifact
description: Instance of an Artifact on Vertex AI.
base_url: projects/{{project}}/locations/{{location}}/metadataStores/{{metadatastore}}/artifacts
self_link: projects/{{project}}/locations/{{location}}/metadataStores/{{metadatastore}}/artifacts/{{artifact_id}}
create_url: projects/{{project}}/locations/{{location}}/metadataStores/{{metadatastore}}/artifacts?artifactId={{artifact_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/metadataStores/{{metadatastore}}/artifacts/{{artifact_id}}
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - delete
  result:
    resource_inside_response: true
samples:
  - name: "vertex_ai_artifact"
    primary_resource_id: "artifact"
    steps:
      - name: "vertex_ai_artifact_basic"
        resource_id_vars:
          artifactId: "artifact"
          storeName: "store"
      - name: "vertex_ai_artifact_update"
        resource_id_vars:
          artifactId: "artifact"
          storeName: "store"
        vars:
          description: "An updated artifact description"
          display_name: "Updated Display Name"
parameters:
  - name: location
    type: String
    description: The location of the Artifact.
    immutable: true
    url_param_only: true
    default_from_api: true
    required: true
  - name: metadatastore
    type: String
    required: true
    description: The metadata store of the Artifact.
    immutable: true
    url_param_only: true
  - name: artifactId
    type: String
    required: true
    description: |-
      The {artifact} portion of the resource name with the format:
      `projects/{project}/locations/{location}/metadataStores/{metadatastore}/artifacts/{artifact}`.
      If not provided, the Artifact's ID will be a UUID generated by the service.
      Must be 4-128 characters in length. Valid characters are `/a-z-/`.
      Must be unique across all Artifacts in the parent MetadataStore.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: Timestamp when this Artifact was created.
    output: true
  - name: description
    type: String
    description: Description of the Artifact
  - name: displayName
    type: String
    description: |-
      User provided display name of the Artifact.
      May be up to 128 Unicode characters.
  - name: labels
    type: KeyValueLabels
    description: |-
      The labels with user-defined metadata to organize your Artifacts.
  - name: metadata
    type: KeyValuePairs
    description: |-
      Properties of the Artifact.
  - name: name
    type: String
    description: The resource name of the Artifact.
    immutable: true
    output: true
  - name: schemaTitle
    type: String
    description: |-
      The title of the schema describing the metadata.
  - name: schemaVersion
    type: String
    description: |-
      The version of the schema in schema_name to use.
  - name: state
    type: Enum
    description: |-
      The state of this Artifact. This is a property of the Artifact, and does
      not imply or capture any ongoing process. This property is managed by
      clients (such as Vertex AI Pipelines), and the system does not prescribe
      or check the validity of state transitions.
    enum_values:
      - 'PENDING'
      - 'LIVE'
  - name: updateTime
    type: String
    description: Timestamp when this Artifact was last updated.
    output: true
  - name: uri
    type: String
    description: |-
      The uniform resource identifier of the artifact file.
      May be empty if there is no actual artifact file.
