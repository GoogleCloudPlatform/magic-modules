---
name: 'ReasoningEngine'
description: |-
  ReasoningEngine provides a customizable runtime for models to determine which actions to take and in which order.
references:
  guides:
    'Develop and deploy agents on Vertex AI Agent Engine': 'https://cloud.google.com/vertex-ai/generative-ai/docs/agent-engine/quickstart'
  api: 'https://cloud.google.com/vertex-ai/docs/reference/rest/v1/projects.locations.reasoningEngines/'
docs:
base_url: 'projects/{{project}}/locations/{{region}}/reasoningEngines'
self_link: 'projects/{{project}}/locations/{{region}}/reasoningEngines/{{name}}'
create_url: 'projects/{{project}}/locations/{{region}}/reasoningEngines'
update_verb: 'PATCH'
update_mask: true
deletion_policy_custom_docs: true
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 60
async:
  actions: ['create', 'delete', 'update']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true
samples:
  - name: 'vertex_ai_reasoning_engine_deletion_policy'
    primary_resource_id: 'reasoning_engine'
    exclude_basic_doc: true
    steps:
      - name: 'vertex_ai_reasoning_engine_deletion_policy'
        resource_id_vars:
          name: 'reasoning-engine'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_basic'
    primary_resource_id: 'reasoning_engine'
    exclude_basic_doc: true
    steps:
      - name: 'vertex_ai_reasoning_engine_basic'
        resource_id_vars:
          name: 'reasoning-engine'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_source_based_deployment'
    primary_resource_id: 'reasoning_engine'
    steps:
      - name: 'vertex_ai_reasoning_engine_source_based_deployment'
        resource_id_vars:
          name: 'reasoning-engine'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_developer_connect_source'
    primary_resource_id: 'reasoning_engine'
    steps:
      - name: 'vertex_ai_reasoning_engine_developer_connect_source'
        resource_id_vars:
          name: 'reasoning-engine'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_image_spec'
    primary_resource_id: 'reasoning_engine'
    steps:
      - name: 'vertex_ai_reasoning_engine_image_spec'
        resource_id_vars:
          name: 'reasoning-engine'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_byoc'
    skip_func: acctest.SkipTestUntil(t, "2026-05-15") # requires valid image in Artifact Registry, give time for things to settle
    skip_vcr: true # multiple IAM members
    primary_resource_id: 'reasoning_engine'
    steps:
      - name: 'vertex_ai_reasoning_engine_byoc'
        resource_id_vars:
          name: 'reasoning-engine'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_psc_interface'
    primary_resource_id: 'reasoning_engine'
    external_providers: ["time"]
    bootstrap_iam:
      - member: "serviceAccount:service-{project_number}@gcp-sa-aiplatform.iam.gserviceaccount.com"
        role: "roles/compute.networkAdmin"
      - member: "serviceAccount:service-{project_number}@gcp-sa-aiplatform.iam.gserviceaccount.com"
        role: "roles/dns.peer"
      - member: "serviceAccount:service-{project_number}@gcp-sa-aiplatform-re.iam.gserviceaccount.com"
        role: "roles/viewer"
    exclude_test: true
    steps:
      - name: 'vertex_ai_reasoning_engine_psc_interface'
        resource_id_vars:
          name: 'reasoning-engine'
          bucket_name: 'reasoning-engine'
          network_name: 'network'
          network_attachment_name: 'network-attachment'
          subnetwork_name: 'subnetwork'
        test_vars_overrides:
          # for backward compatible
          network_name: '"network" + randomSuffix'
          # for backward compatible
          subnetwork_name: '"subnetwork" + randomSuffix'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_full'
    primary_resource_id: 'reasoning_engine'
    bootstrap_iam:
      - member: "serviceAccount:service-{project_number}@gcp-sa-aiplatform.iam.gserviceaccount.com"
        role: "roles/cloudkms.cryptoKeyEncrypterDecrypter"
    external_providers: ["time"]
    steps:
      - name: 'vertex_ai_reasoning_engine_full'
        resource_id_vars:
          name: 'reasoning-engine'
          bucket_name: 'reasoning-engine'
          kms_key_name: 'example-key'
          secret_name: 'secret'
          service_account_id: 'sa'
        test_vars_overrides:
          'kms_key_name': 'kms.BootstrapKMSKeyWithPurposeInLocationAndName(t, "ENCRYPT_DECRYPT", "us-central1", "tf-bootstrap-re-key1").CryptoKey.Name'
          # for backward compatible
          secret_name: '"secret" + randomSuffix'
          # for backward compatible
          service_account_id: '"sa" + randomSuffix'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_context_spec'
    primary_resource_id: 'reasoning_engine'
    min_version: beta
    steps:
      - name: 'vertex_ai_reasoning_engine_context_spec'
        min_version: beta
        resource_id_vars:
          name: 're-ctx-spec'
        ignore_read_extra:
          - 'deletion_policy'
  - name: 'vertex_ai_reasoning_engine_granular_ttl'
    primary_resource_id: 'reasoning_engine'
    min_version: beta
    steps:
      - name: 'vertex_ai_reasoning_engine_granular_ttl'
        min_version: beta
        resource_id_vars:
          name: 're-gran-ttl'
        ignore_read_extra:
          - 'deletion_policy'
custom_code:
  pre_delete: 'templates/terraform/pre_delete/reasoning_engine_deletion_policy.go.tmpl'
  post_update: 'templates/terraform/post_update/sleep_10s.go.tmpl'
  pre_update: 'templates/terraform/pre_update/vertex_ai_reasoning_engine.go.tmpl'
virtual_fields:
  - name: 'deletion_policy'
    description: |
      Optional. The deletion policy for the reasoning engine.
      Setting this to FORCE allows the reasoning engine to be deleted regardless of child undeleted resources.

      When a 'terraform destroy' or 'terraform apply' would delete the resource,
      the command will fail if this field is set to "PREVENT" in Terraform state.
      When set to "ABANDON", the command will remove the resource from Terraform
      management without updating or deleting the resource in the API.
      When set to "DELETE", deleting the resource is permitted.
    type: String
    exclude: true
iam_policy:
  method_name_separator: ':'
  fetch_iam_policy_verb: 'POST'
  parent_resource_attribute: 'reasoning_engine'
  sample_config_body: 'templates/terraform/iam/example_config_body/vertex_ai_reasoning_engine.tf.tmpl'
  import_format:
    - 'projects/{{project}}/locations/{{region}}/reasoningEngines/{{name}}'
parameters:
  - name: 'region'
    type: String
    description: The region of the reasoning engine. eg us-central1
    url_param_only: true
    immutable: true
properties:
  - name: 'name'
    type: String
    description: |-
      The generated name of the ReasoningEngine, in the format
      projects/{project}/locations/{location}/reasoningEngines/{reasoningEngine}
    output: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
  - name: 'displayName'
    type: String
    description: The display name of the ReasoningEngine.
    required: true
  - name: 'description'
    type: String
    description: The description of the ReasoningEngine.
  - name: 'labels'
    type: KeyValueLabels
    description: |
      The labels associated with this ReasoningEngine. You can use these to
      organize and group your ReasoningEngines.
  - name: 'createTime'
    type: String
    description: |-
      The timestamp of when the Index was created in RFC3339 UTC "Zulu" format,
      with nanosecond resolution and up to nine fractional digits.
    output: true
  - name: 'updateTime'
    type: String
    description: |-
      The timestamp of when the Index was last updated in RFC3339 UTC "Zulu"
      format, with nanosecond resolution and up to nine fractional digits.
    output: true
  - name: 'encryptionSpec'
    type: NestedObject
    description: |-
      Optional. Customer-managed encryption key spec for a ReasoningEngine.
      If set, this ReasoningEngine and all sub-resources of this ReasoningEngine
      will be secured by this key.
    immutable: true
    properties:
      - name: 'kmsKeyName'
        type: String
        description: |-
          Required. The Cloud KMS resource identifier of the customer managed
          encryption key used to protect a resource. Has the form:
          projects/my-project/locations/my-region/keyRings/my-kr/cryptoKeys/my-key.
          The key needs to be in the same region as where the compute resource
          is created.
        required: true
  - name: 'spec'
    type: NestedObject
    default_from_api: true
    description: |-
      Optional. Configurations of the ReasoningEngine.
    properties:
      - name: 'agentFramework'
        type: String
        description: |
          Optional. The OSS agent framework used to develop the agent.
      - name: 'classMethods'
        type: String
        description: |
          Optional. Declarations for object class methods in OpenAPI
          specification format.

          **Note**: When deploying via Terraform, this field must be populated manually.
          Otherwise, client SDKs (like `agent_engines.get()`) will not be able to discover the methods, and calls to the engine (or A2A integrations) will fail.

          Depending on the template/framework used (`agent_framework`), the required class methods and their parameters differ:

          **Warning**: The configuration snippets below are illustrative, may not be exhaustive, and could stop working over time. For the most up-to-date method lists and schemas, please consult the respective SDK source code:
          * For Google ADK: See [ADK Python SDK cli_deploy.py](https://github.com/google/adk-python/blob/68a780306e3bdd648a882ef34c0abf8e5148353e/src/google/adk/cli/cli_deploy.py#L109).
          * For Langchain: See [Vertex AI Python SDK langchain.py](https://github.com/googleapis/python-aiplatform/blob/c8a38a085931b01f4d6071f0ab7a64cb42851829/agentplatform/agent_engines/templates/langchain.py#L642-L717).

          ### 1. Langchain Template
          * `query` (api_mode = "sync" or empty)
          * `stream_query` (api_mode = "stream")

          Example for Langchain:
          ```hcl
          class_methods = jsonencode([
            {
              name        = "query"
              api_mode    = "sync"
              description = "Queries the reasoning engine"
              parameters  = {
                type       = "object"
                required   = ["input"]
                properties = {
                  input = {
                    type        = "string"
                    description = "The input prompt"
                  }
                }
              }
            },
            {
              name        = "stream_query"
              api_mode    = "stream"
              description = "Streams queries from the reasoning engine"
              parameters  = {
                type       = "object"
                required   = ["input"]
                properties = {
                  input = {
                    type        = "string"
                    description = "The input prompt"
                  }
                }
              }
            }
          ])
          ```

          ### 2. Google ADK Template (Standard - No A2A)
          For standard Google ADK (Agent Development Kit) deployments, you must define the following 11 methods:

          Example for Standard ADK:
          ```hcl
          class_methods = jsonencode([
            {
              name        = "get_session"
              api_mode    = ""
              description = "Retrieve session by ID"
              parameters  = {
                type     = "object"
                required = ["user_id", "session_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                }
              }
            },
            {
              name        = "async_get_session"
              api_mode    = "async"
              description = "Retrieve session asynchronously by ID"
              parameters  = {
                type     = "object"
                required = ["user_id", "session_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                }
              }
            },
            {
              name        = "list_sessions"
              api_mode    = ""
              description = "List all sessions for a user"
              parameters  = {
                type     = "object"
                required = ["user_id"]
                properties = {
                  user_id = { type = "string" }
                }
              }
            },
            {
              name        = "async_list_sessions"
              api_mode    = "async"
              description = "List all sessions for a user asynchronously"
              parameters  = {
                type     = "object"
                required = ["user_id"]
                properties = {
                  user_id = { type = "string" }
                }
              }
            },
            {
              name        = "create_session"
              api_mode    = ""
              description = "Create a new session"
              parameters  = {
                type     = "object"
                required = ["user_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                  state      = { type = "object" }
                }
              }
            },
            {
              name        = "async_create_session"
              api_mode    = "async"
              description = "Create a new session asynchronously"
              parameters  = {
                type     = "object"
                required = ["user_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                  state      = { type = "object" }
                }
              }
            },
            {
              name        = "delete_session"
              api_mode    = ""
              description = "Delete session by ID"
              parameters  = {
                type     = "object"
                required = ["user_id", "session_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                }
              }
            },
            {
              name        = "async_delete_session"
              api_mode    = "async"
              description = "Delete session asynchronously by ID"
              parameters  = {
                type     = "object"
                required = ["user_id", "session_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                }
              }
            },
            {
              name        = "stream_query"
              api_mode    = "stream"
              description = "Stream queries from the agent"
              parameters  = {
                type     = "object"
                required = ["message", "user_id"]
                properties = {
                  message    = { description = "Message string or object" }
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                  run_config = { type = "object" }
                }
              }
            },
            {
              name        = "async_stream_query"
              api_mode    = "async_stream"
              description = "Stream queries asynchronously from the agent"
              parameters  = {
                type     = "object"
                required = ["message", "user_id"]
                properties = {
                  message        = { description = "Message string or object" }
                  user_id        = { type = "string" }
                  session_id     = { type = "string" }
                  session_events = { type = "array", items = { type = "object" } }
                  run_config     = { type = "object" }
                }
              }
            },
            {
              name        = "streaming_agent_run_with_events"
              api_mode    = "async_stream"
              description = "Stream agent run with events asynchronously"
              parameters  = {
                type     = "object"
                required = ["request_json"]
                properties = {
                  request_json = { type = "string" }
                }
              }
            }
          ])
          ```

          ### 3. Google ADK Template (A2A-Enabled)
          If the agent integrates with the Gemini Enterprise Agent Registry (A2A), you must inject the `a2a_agent_card` JSON metadata as a string **specifically inside the `async_create_session` method definition**:

          Example for A2A-Enabled ADK:
          ```hcl
          locals {
            # Construct the A2A endpoint URL
            a2a_url = "https://us-central1-aiplatform.googleapis.com/v1/projects/my-project/locations/us-central1/reasoningEngines/my-agent/a2a"

            agent_card = {
              name                 = "my-agent"
              description          = "A2A Agent"
              version              = "1.0.0"
              preferred_transport  = "HTTP_JSON"
              supported_interfaces = [{ url = local.a2a_url, protocol_binding = "HTTP_JSON" }]
              capabilities         = { streaming = true }
            }
          }

          # In class_methods, append "a2a_agent_card" key ONLY to the "async_create_session" method:
          class_methods = jsonencode([
            # ... other 10 standard methods (same as Standard ADK) ...
            {
              name        = "async_create_session"
              api_mode    = "async"
              description = "Create a new session asynchronously"
              parameters  = {
                type     = "object"
                required = ["user_id"]
                properties = {
                  user_id    = { type = "string" }
                  session_id = { type = "string" }
                  state      = { type = "object" }
                }
              }
              # Inject the serialized Agent Card here
              a2a_agent_card = jsonencode(local.agent_card)
            }
          ])
          ```
        state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
        custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
        validation:
          function: 'validation.StringIsJSON'
      - name: 'deploymentSpec'
        type: NestedObject
        default_from_api: true
        description: |-
          Optional. The specification of a Reasoning Engine deployment.
        properties:
          - name: 'env'
            type: Array
            description: |-
              Optional. Environment variables to be set with the Reasoning
              Engine deployment.
            is_set: true
            custom_flatten: 'templates/terraform/custom_flatten/vertex_ai_reasoning_engine_env.go.tmpl'
            item_type:
              type: NestedObject
              properties:
                - name: 'name'
                  type: String
                  description: |-
                    The name of the environment variable. Must be a valid
                    C identifier.
                  required: true
                - name: 'value'
                  type: String
                  description: |-
                    Variables that reference a $(VAR_NAME) are expanded using
                    the previous defined environment variables in the container
                    and any service environment variables. If a variable cannot
                    be resolved, the reference in the input string will be
                    unchanged. The $(VAR_NAME) syntax can be escaped with a
                    double $$, ie: $$(VAR_NAME). Escaped references will never
                    be expanded, regardless of whether the variable exists
                    or not.
                  required: true
          - name: 'secretEnv'
            type: Array
            description: |-
              Optional. Environment variables where the value is a secret in
              Cloud Secret Manager. To use this feature, add 'Secret Manager
              Secret Accessor' role (roles/secretmanager.secretAccessor) to AI
              Platform Reasoning Engine service Agent.
            is_set: true
            item_type:
              type: NestedObject
              properties:
                - name: 'name'
                  type: String
                  description: |-
                    The name of the environment variable. Must be a valid C
                    identifier.
                  required: true
                - name: 'secretRef'
                  type: NestedObject
                  description: |-
                    Reference to a secret stored in the Cloud Secret Manager
                    that will provide the value for this environment variable.
                  required: true
                  properties:
                    - name: 'secret'
                      type: String
                      description: |-
                        The name of the secret in Cloud Secret Manager.
                        Format: {secret_name}.
                      required: true
                    - name: 'version'
                      type: String
                      description: |-
                        The Cloud Secret Manager secret version. Can be 'latest'
                        for the latest version, an integer for a specific
                        version, or a version alias.
          - name: 'pscInterfaceConfig'
            type: NestedObject
            description: |-
              Optional. Configuration for PSC-Interface.
            properties:
              - name: 'networkAttachment'
                type: String
                description: |-
                  Optional. The name of the Compute Engine network attachment
                  to attach to the resource within the region and user project.
                  To specify this field, you must have already created a network attachment.
                  This field is only used for resources using PSC-Interface.
              - name: 'dnsPeeringConfigs'
                type: 'Array'
                description: |
                  Optional. DNS peering configurations.
                  When specified, Vertex AI will attempt to configure DNS
                  peering zones in the tenant project VPC to resolve the
                  specified domains using the target network's Cloud DNS.
                  The user must grant the dns.peer role to the Vertex AI
                  service Agent on the target project.
                item_type:
                  type: NestedObject
                  properties:
                    - name: 'domain'
                      type: String
                      description: |
                        Required. The DNS name suffix of the zone being peered
                        to, e.g., "my-internal-domain.corp.".
                        Must end with a dot.
                      required: true
                    - name: 'targetProject'
                      type: String
                      description: |
                        Required. The project id hosting the Cloud DNS managed
                        zone that contains the 'domain'.
                        The Vertex AI service Agent requires the dns.peer role
                        on this project.
                      required: true
                    - name: 'targetNetwork'
                      type: String
                      description: |
                        Required. The VPC network name in the targetProject
                        where the DNS zone specified by 'domain' is visible.
                      required: true
          - name: 'resourceLimits'
            type: KeyValuePairs
            default_from_api: true
            description: |-
              Optional. Resource limits for each container.
              Only 'cpu' and 'memory' keys are supported.

              Defaults to {"cpu": "4", "memory": "4Gi"}.

              The only supported values for CPU are '1', '2', '4', '6' and '8'.
              For more information, go to
              https://cloud.google.com/run/docs/configuring/cpu.

              The only supported values for memory are '1Gi', '2Gi', ... '32 Gi'.
              For more information, go to
              https://cloud.google.com/run/docs/configuring/memory-limits.
          - name: 'minInstances'
            type: 'Integer'
            description: |
              Optional. The minimum number of application instances that will be
              kept running at all times. Defaults to 1. Range: [0, 10].
            default_from_api: true
          - name: 'maxInstances'
            type: 'Integer'
            description: |
              Optional. The maximum number of application instances that can be
              launched to handle increased traffic. Defaults to 100.
              Range: [1, 1000]. If VPC-SC or PSC-I is enabled, the acceptable
              range is [1, 100].
            default_from_api: true
          - name: 'containerConcurrency'
            type: 'Integer'
            description: |
              Optional. Concurrency for each container and agent server.
              Recommended value: 2 * cpu + 1. Defaults to 9.
            default_from_api: true
          - name: 'agentServerMode'
            type: Enum
            min_version: 'beta'
            description: |-
              Optional. The agent server mode specifies what features are used when deploy the agent to agent engine.
              Possible values:
              * `STABLE`: Stable agent server mode.
              * `EXPERIMENTAL`: Experimental agent server mode.
            enum_values:
              - 'STABLE'
              - 'EXPERIMENTAL'
          - name: 'agentGatewayConfig'
            type: NestedObject
            min_version: 'beta'
            description: |-
              Optional. Agent Gateway configuration for a Reasoning Engine deployment.
            properties:
              - name: 'clientToAgentConfig'
                type: NestedObject
                description: |-
                  Optional. Configuration for traffic targeting the Reasoning Engine.
                properties:
                  - name: 'agentGateway'
                    type: String
                    required: true
                    description: |-
                      Required. The resource name of the Agent Gateway to use for inbound traffic.
              - name: 'agentToAnywhereConfig'
                type: NestedObject
                description: |-
                  Optional. Configuration for traffic originating from the Reasoning Engine.
                properties:
                  - name: 'agentGateway'
                    type: String
                    required: true
                    description: |-
                      Required. The resource name of the Agent Gateway for outbound traffic.
          - name: 'keepAliveProbe'
            type: NestedObject
            min_version: 'beta'
            description: |-
              Optional. Specifies the configuration for keep-alive probe.
            properties:
              - name: 'httpGet'
                type: NestedObject
                description: |-
                  Specifies the HTTP GET configuration for the probe.
                properties:
                  - name: 'path'
                    type: String
                    required: true
                    description: |-
                      Required. Specifies the path of the HTTP GET request (e.g., `"/is_busy"`).
                  - name: 'port'
                    type: Integer
                    description: |-
                      Optional. Specifies the port number on the container to which the request is sent.
              - name: 'maxSeconds'
                type: Integer
                description: |-
                  Optional. Specifies the maximum duration (in seconds) to keep the instance alive via this probe. Can be a maximum of 3600 seconds (1 hour).
          - name: 'dedicatedIngressEndpointEnabled'
            type: Boolean
            min_version: 'beta'
            description: |-
              Optional. Whether to enable dedicated ingress endpoint for the deployment. If true, the deployment will be accessible via a dedicated endpoint. This is required to enable GKE V2 runtime.
      - name: 'packageSpec'
        type: NestedObject
        description: |-
          Optional. User provided package spec of the ReasoningEngine.
          Ignored when users directly specify a deployment image through
          deploymentSpec.first_party_image_override, but keeping the
          field_behavior to avoid introducing breaking changes.
        properties:
          - name: 'dependencyFilesGcsUri'
            type: String
            description: |
              Optional. The Cloud Storage URI of the dependency files in tar.gz
              format.
          - name: 'pickleObjectGcsUri'
            type: String
            description: |
              Optional. The Cloud Storage URI of the pickled python object.
          - name: 'pythonVersion'
            type: String
            description: |
              Optional. The Python version. Currently support 3.8, 3.9, 3.10,
              3.11, 3.12, 3.13. If not specified, default value is 3.10.
          - name: 'requirementsGcsUri'
            type: String
            description: |
              Optional. The Cloud Storage URI of the requirements.txtfile
      - name: 'containerSpec'
        type: NestedObject
        conflicts:
          - 'spec.0.source_code_spec'
        description: |-
          Deploy from a container image with a defined entrypoint and commands.
        properties:
          - name: 'imageUri'
            type: String
            required: true
            description: |-
              The Artifact Registry Docker image URI (e.g.,
              `us-central1-docker.pkg.dev/my-project/my-repo/my-image:tag`) of the
              container image that is to be run on each worker replica.
      - name: 'sourceCodeSpec'
        type: NestedObject
        conflicts:
          - 'spec.0.container_spec'
        description: |-
          Specification for deploying from source code.
        properties:
          - name: 'inlineSource'
            type: NestedObject
            description: Source code is provided directly in the request.
            ignore_read: true
            properties:
              - name: 'sourceArchive'
                type: String
                description: |
                  Required. Input only.
                  The application source code archive, provided as a compressed
                  tarball (.tar.gz) file. A base64-encoded string.
                ignore_read: true
          - name: 'imageSpec'
            type: NestedObject
            allow_empty_object: true
            send_empty_value: true
            conflicts:
              - 'spec.0.source_code_spec.0.python_spec'
            description: |-
              Configuration for building an image with custom config file.
            properties:
              - name: 'buildArgs'
                type: KeyValuePairs
                send_empty_value: true
                description: |
                  Build arguments to be used. They will be passed through --build-arg flags.
          - name: 'pythonSpec'
            type: NestedObject
            conflicts:
              - 'spec.0.source_code_spec.0.image_spec'
            description: |-
              Specification for running a Python application from source.
            properties:
              - name: 'entrypointModule'
                type: String
                description: |
                  Optional. The Python module to load as the entrypoint,
                  specified as a fully qualified module name. For example:
                  path.to.agent. If not specified, defaults to "agent".
                  The project root will be added to Python sys.path, allowing
                  imports to be specified relative to the root.
              - name: 'entrypointObject'
                type: String
                description: |
                  Optional. The name of the callable object within the
                  entrypointModule to use as the application If not specified,
                  defaults to "root_agent".
              - name: 'requirementsFile'
                type: String
                description: |
                  Optional. The path to the requirements file, relative to the
                  source root. If not specified, defaults to "requirements.txt".
              - name: 'version'
                type: String
                description: |
                  Optional. The version of Python to use. Support version
                  includes 3.9, 3.10, 3.11, 3.12, 3.13. If not specified,
                  default value is 3.10.
          - name: 'developerConnectSource'
            type: NestedObject
            description: |-
              Specification for source code to be fetched from a Git repository managed through the Developer Connect service.
            properties:
              - name: 'config'
                type: NestedObject
                required: true
                description: |-
                  The Developer Connect configuration that defines the specific repository, revision, and directory to use as the source code root.
                properties:
                  - name: 'gitRepositoryLink'
                    type: String
                    required: true
                    description: |
                      The Developer Connect Git repository link, formatted as projects/*/locations/*/connections/*/gitRepositoryLink/*.
                  - name: 'dir'
                    type: String
                    required: true
                    description: |
                      Directory, relative to the source root, in which to run the build.
                  - name: 'revision'
                    type: String
                    required: true
                    description: |
                      The revision to fetch from the Git repository such as a branch, a tag, a commit SHA, or any Git ref.
          - name: 'agentConfigSource'
            type: NestedObject
            min_version: 'beta'
            description: |-
              Optional. Specification for the deploying from agent config.
            properties:
              - name: 'adkConfig'
                type: NestedObject
                description: |-
                  Required. Configuration for the Agent Development Kit (ADK).
                properties:
                  - name: 'jsonConfig'
                    type: String
                    required: true
                    description: |-
                      Required. The value of the ADK config in JSON format.
                    state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
                    custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
                    custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
                    validation:
                      function: 'validation.StringIsJSON'
              - name: 'inlineSource'
                type: NestedObject
                description: |-
                  Optional. Any additional files needed to interpret the config.
                properties:
                  - name: 'sourceArchive'
                    type: String
                    required: true
                    description: |-
                      Required. Input only. The application source code archive, provided as a compressed tarball (.tar.gz) file.
      - name: 'serviceAccount'
        type: String
        description: |-
          Optional. The service account that the Reasoning Engine artifact runs
          as. It should have "roles/storage.objectViewer" for reading the user
          project's Cloud Storage and "roles/aiplatform.user" for using Vertex
          extensions. If not specified, the Vertex AI Reasoning Engine service
          Agent in the project will be used.
      - name: 'identityType'
        type: Enum
        description: |-
          Optional. The identity type to use for the Reasoning Engine.
          If not specified, the `service_account` field will be used if set,
          otherwise the default Vertex AI Reasoning Engine Service Agent in the project will be used.
          Possible values:
          * `SERVICE_ACCOUNT`: Use a custom service account if the `service_account` field is set, otherwise use the default Vertex AI Reasoning Engine Service Agent in the project.
          * `AGENT_IDENTITY`: Use Agent Identity. The `service_account` field must not be set.
        enum_values:
          - 'SERVICE_ACCOUNT'
          - 'AGENT_IDENTITY'
      - name: 'effectiveIdentity'
        type: String
        description: |-
          The identity to use for the Reasoning Engine.
        output: true
      - name: 'exampleStore'
        type: String
        min_version: 'beta'
        description: |-
          Optional. The resource name of the linked ExampleStore.
      - name: 'agentCard'
        type: String
        min_version: 'beta'
        description: |-
          Optional. The A2A Agent Card for the agent (if available).
        state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
        custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
        validation:
          function: 'validation.StringIsJSON'
      - name: 'buildSpec'
        type: NestedObject
        min_version: 'beta'
        description: |-
          Optional. Configuration for building container image.
        properties:
          - name: 'workerPool'
            type: String
            description: |-
              Optional. The resource name of the Cloud Build WorkerPool to use for the build.
  - name: 'contextSpec'
    min_version: 'beta'
    type: NestedObject
    default_from_api: true
    description: |-
      Optional. Configuration for how Agent Engine sub-resources should manage context.
    properties:
      - name: 'memoryBankConfig'
        type: NestedObject
        default_from_api: true
        description: |-
          Specification for a Memory Bank, which manages memories for the Agent Engine.
        properties:
          - name: 'generationConfig'
            type: NestedObject
            description: |-
              Configuration for how to generate memories for the Memory Bank.
            properties:
              - name: 'model'
                type: String
                description: |-
                  The model used to generate memories. Format: projects/{project}/locations/{location}/publishers/google/models/{model}.
                required: true
          - name: 'similaritySearchConfig'
            type: NestedObject
            description: |-
              Configuration for how to perform similarity search on memories.
            properties:
              - name: 'embeddingModel'
                type: String
                description: |-
                  The model used to generate embeddings to lookup similar memories. Format: projects/{project}/locations/{location}/publishers/google/models/{model}.
                required: true
          - name: 'ttlConfig'
            type: NestedObject
            description: |-
              Configuration for automatic TTL ("time-to-live") of the memories in the Memory Bank.
            properties:
              - name: 'defaultTtl'
                type: String
                exactly_one_of:
                  - defaultTtl
                  - granularTtlConfig
                description: |-
                  The default TTL duration of the memories in the Memory Bank.
              - name: 'granularTtlConfig'
                type: NestedObject
                description: |-
                  The granular TTL configuration of the memories in the Memory Bank.
                properties:
                  - name: 'createTtl'
                    type: String
                    description: |-
                      The TTL duration for memories uploaded via CreateMemory.
                  - name: 'generateCreatedTtl'
                    type: String
                    description: |-
                      The TTL duration for memories newly generated via GenerateMemories.
                  - name: 'generateUpdatedTtl'
                    type: String
                    description: |-
                      The TTL duration for memories updated via GenerateMemories.
              - name: 'memoryRevisionDefaultTtl'
                type: String
                description: |-
                  The default TTL duration of the memory revisions in the Memory Bank.
          - name: 'disableMemoryRevisions'
            type: Boolean
            description: |-
              If true, no memory revisions will be created for any requests to the Memory Bank.
          - name: 'customizationConfigs'
            type: Array
            description: |-
              Optional. Customization configs for how Agent Engine sub-resources manage context at different scope levels.
            item_type:
              type: NestedObject
              properties:
                - name: 'scopeKeys'
                  type: Array
                  description: |-
                    Optional. List of scope keys that this customization config applies to.
                  item_type:
                    type: String
                - name: 'memoryTopics'
                  type: Array
                  description: |-
                    Optional. List of topics that the memory should be associated with.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: 'managedMemoryTopic'
                        type: NestedObject
                        # Note: exactly_one_of within array elements is not enforced client-side by MM; relies on backend API server validation.
                        exactly_one_of:
                          - managedMemoryTopic
                          - customMemoryTopic
                        description: |-
                          Optional. Managed memory topic.
                        properties:
                          - name: 'managedTopicEnum'
                            type: String
                            description: |-
                              Managed topic enum (e.g. USER_PREFERENCES, EXPLICIT_INSTRUCTIONS).
                      - name: 'customMemoryTopic'
                        type: NestedObject
                        description: |-
                          Optional. Custom memory topic.
                        properties:
                          - name: 'label'
                            type: String
                            description: |-
                              Label of custom memory topic.
                          - name: 'description'
                            type: String
                            description: |-
                              Description of custom memory topic.
                - name: 'consolidationConfig'
                  type: NestedObject
                  description: |-
                    Optional. Configuration for how many memory revisions Memory Bank considers when consolidating each memory candidate.
                  properties:
                    - name: 'revisionsPerCandidateCount'
                      type: Integer
                      description: |-
                        Number of revisions to consider per candidate count.
                - name: 'enableThirdPersonMemories'
                  type: Boolean
                  description: |-
                    Optional. Generate memories in the third person if set to true.
          - name: 'structuredMemoryConfigs'
            type: Array
            description: |-
              Optional. Structured memory configurations for Agent Engine sub-resources.
            item_type:
              type: NestedObject
              properties:
                - name: 'scopeKeys'
                  type: Array
                  description: |-
                    Optional. List of scope keys that this structured memory config applies to.
                  item_type:
                    type: String
                - name: 'schemaConfigs'
                  type: Array
                  description: |-
                    Optional. List of schema configs that this structured memory config applies to.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: 'id'
                        type: String
                        description: |-
                          Required. Unique ID identifying the memory schema.
                        required: true
                      - name: 'memorySchema'
                        type: String
                        api_name: 'schema'
                        description: |-
                          Optional. The memory schema defined as an OpenAPI Schema Object JSON string.
                        state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
                        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
                        custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
                        validation:
                          function: 'validation.StringIsJSON'
      - name: 'exampleStoreConfig'
        type: NestedObject
        min_version: 'beta'
        description: |-
          Optional. Specification for an Example Store, which manages few-shot examples for the Agent Engine.
        properties:
          - name: 'similaritySearchConfig'
            type: NestedObject
            description: |-
              Optional. Configuration for how to perform similarity search on examples.
            properties:
              - name: 'embeddingModel'
                type: String
                required: true
                description: |-
                  Required. The Gemini model used to generate embeddings to lookup similar examples.
  - name: 'trafficConfig'
    type: NestedObject
    min_version: 'beta'
    default_from_api: true
    description: |-
      Optional. Traffic distribution configuration for the Reasoning Engine.
    properties:
      - name: 'trafficSplitManual'
        type: NestedObject
        description: |-
          Optional. Manual traffic distribution configuration, where the user specifies the
          Runtime Revision IDs and the percentage of traffic to send to each.
        properties:
          - name: 'targets'
            type: Array
            description: |-
              Optional. A list of traffic targets for the Runtimes Revisions. The sum of
              percentages must equal to 100.
            item_type:
              type: NestedObject
              properties:
                - name: 'runtimeRevisionName'
                  type: String
                  description: |-
                    Required. The Runtime Revision name to which to send this portion of traffic.
                  required: true
                - name: 'percent'
                  type: Integer
                  description: |-
                    Required. Specifies percent of the traffic to this Runtime Revision.
                  required: true
      - name: 'trafficSplitAlwaysLatest'
        type: NestedObject
        description: |-
          Optional. Traffic distribution configuration, where all traffic is sent to the
          latest Runtime Revision.
        properties: []
        send_empty_value: true
        allow_empty_object: true
  - name: 'url'
    type: String
    min_version: 'beta'
    description: |-
      Output only. The URL of the reasoning engine.
    output: true
