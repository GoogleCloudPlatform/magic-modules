---
name: 'RagCorpus'
description: |
  A RagCorpus is a RagFile container and a project can have multiple RagCorpora.
references:
  guides:
    'Official Documentation': 'https://cloud.google.com/vertex-ai/docs'
  api: 'https://cloud.google.com/vertex-ai/docs/reference/rest/v1/projects.locations.ragCorpora'
docs:
base_url: 'projects/{{project}}/locations/{{region}}/ragCorpora'
self_link: 'projects/{{project}}/locations/{{region}}/ragCorpora/{{name}}'
update_verb: 'PATCH'
update_mask: true
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
async:
  actions: ['create', 'delete', 'update']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true
custom_code:
  test_constants: 'templates/terraform/test_constants/import_kms.go.tmpl'
examples:
  - name: 'vertex_ai_rag_corpus_basic'
    primary_resource_id: 'rag_corpus'
    vars:
      display_name: 'rc-basic'
  - name: 'vertex_ai_rag_corpus_full'
    primary_resource_id: 'rag_corpus'
    vars:
      display_name: 'rc-full'
      kms_key_name: 'kms-name'
    test_vars_overrides:
      'kms_key_name': 'kms.BootstrapKMSKeyInLocation(t, "us-west1").CryptoKey.Name'
parameters:
  - name: 'region'
    type: String
    description: |
      The region of the rag corpus. eg us-central1
    url_param_only: true
    immutable: true
    default_from_api: true
properties:
  - name: 'name'
    type: String
    description: |
      Output only. The resource name of the RagCorpus.
    output: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
  - name: 'displayName'
    type: String
    description: |
      Required. The display name of the RagCorpus. The name can be up to 128 characters long and can consist of any UTF-8 characters.
    required: true
  - name: 'description'
    type: String
    description: |
      Optional. The description of the RagCorpus.
  - name: 'createTime'
    type: String
    description: |
      Output only. Timestamp when this RagCorpus was created.
    output: true
  - name: 'updateTime'
    type: String
    description: |
      Output only. Timestamp when this RagCorpus was last updated.
    output: true
  - name: 'ragFilesCount'
    type: Integer
    description: |
      Output only. Number of RagFiles in the RagCorpus.
    output: true
  - name: 'corpusStatus'
    type: NestedObject
    description: |
      Output only. RagCorpus state.
    output: true
    properties:
      - name: 'state'
        type: String
        description: |
          Output only. RagCorpus life state.
        output: true
      - name: 'errorStatus'
        type: String
        description: |
          Output only. Error message if the RagCorpus is in an error state.
        output: true
  - name: 'encryptionSpec'
    type: NestedObject
    description: |
      Optional. Immutable. The CMEK key spec for the RagCorpus. Only applicable to RagManagedDb option for Vector DB.
    immutable: true
    properties:
      - name: 'kmsKeyName'
        type: String
        description: |
          Required. The Cloud KMS resource identifier of the customer managed encryption key used to protect a resource.
        required: true
        immutable: true
  - name: 'vectorDbConfig'
    type: NestedObject
    description: |
      Optional. Immutable. The config for the Vector DBs.
    immutable: true
    default_from_api: true
    conflicts:
      - 'vertexAiSearchConfig'
    properties:
      - name: 'apiAuth'
        type: NestedObject
        description: |
          Authentication config for the chosen Vector DB.
        properties:
          - name: 'apiKeyConfig'
            type: NestedObject
            description: |
              The API secret.
            properties:
              - name: 'apiKeySecretVersion'
                type: String
                description: |
                  Required. The SecretManager secret version resource name storing API key. e.g. projects/{project}/secrets/{secret}/versions/{version}
              - name: 'apiKeyString'
                type: String
                description: |
                  The API key string.
      - name: 'ragEmbeddingModelConfig'
        type: NestedObject
        description: |
          Optional. Immutable. The embedding model config of the Vector DB.
        immutable: true
        properties:
          - name: 'vertexPredictionEndpoint'
            type: NestedObject
            description: |
              The Vertex AI Prediction Endpoint that either refers to a publisher model or an endpoint that is hosting a 1P fine-tuned text embedding model.
            properties:
              - name: 'endpoint'
                type: String
                description: |
                  Required. The endpoint resource name.
                required: true
              - name: 'model'
                type: String
                description: |
                  Output only. The resource name of the model that is deployed on the endpoint.
                output: true
              - name: 'modelVersionId'
                type: String
                description: |
                  Output only. version id of the model that is deployed on the endpoint.
                output: true
      - name: 'ragManagedDb'
        type: NestedObject
        description: |
          The config for the default RAG-managed Vector DB.
        allow_empty_object: true
        send_empty_value: true
        exactly_one_of:
          - 'vector_db_config.0.rag_managed_db'
          - 'vector_db_config.0.pinecone'
          - 'vector_db_config.0.vertex_vector_search'
          - 'vector_db_config.0.weaviate'
          - 'vector_db_config.0.vertex_feature_store'
          - 'vector_db_config.0.rag_managed_vertex_vector_search'
        properties:
          - name: 'knn'
            type: NestedObject
            description: |
              Performs a KNN search on RagCorpus. Default choice if not specified.
            allow_empty_object: true
            send_empty_value: true
            properties: []
          - name: 'ann'
            type: NestedObject
            description: |
              Performs an ANN search on RagCorpus.
            properties:
              - name: 'treeDepth'
                type: Integer
                description: |
                  The depth of the tree-based structure. Only depth values of 2 and 3 are supported.
              - name: 'leafCount'
                type: Integer
                description: |
                  Number of leaf nodes in the tree-based structure.
      - name: 'pinecone'
        type: NestedObject
        description: |
          The config for the Pinecone.
        exactly_one_of:
          - 'vector_db_config.0.rag_managed_db'
          - 'vector_db_config.0.pinecone'
          - 'vector_db_config.0.vertex_vector_search'
          - 'vector_db_config.0.weaviate'
          - 'vector_db_config.0.vertex_feature_store'
          - 'vector_db_config.0.rag_managed_vertex_vector_search'
        properties:
          - name: 'indexName'
            type: String
            description: |
              Pinecone index name.
      - name: 'vertexVectorSearch'
        type: NestedObject
        description: |
          The config for the Vertex Vector Search.
        exactly_one_of:
          - 'vector_db_config.0.rag_managed_db'
          - 'vector_db_config.0.pinecone'
          - 'vector_db_config.0.vertex_vector_search'
          - 'vector_db_config.0.weaviate'
          - 'vector_db_config.0.vertex_feature_store'
          - 'vector_db_config.0.rag_managed_vertex_vector_search'
        properties:
          - name: 'indexEndpoint'
            type: String
            description: |
              The resource name of the Index Endpoint. Format: projects/{project}/locations/{location}/indexEndpoints/{indexEndpoint}
          - name: 'index'
            type: String
            description: |
              The resource name of the Index. Format: projects/{project}/locations/{location}/indexes/{index}
      - name: 'weaviate'
        type: NestedObject
        min_version: 'beta'
        description: |
          The config for the Weaviate.
        exactly_one_of:
          - 'vector_db_config.0.rag_managed_db'
          - 'vector_db_config.0.pinecone'
          - 'vector_db_config.0.vertex_vector_search'
          - 'vector_db_config.0.weaviate'
          - 'vector_db_config.0.vertex_feature_store'
          - 'vector_db_config.0.rag_managed_vertex_vector_search'
        properties:
          - name: 'httpEndpoint'
            type: String
            description: |
              Weaviate DB instance HTTP endpoint. e.g. 34.56.78.90:8080
          - name: 'collectionName'
            type: String
            description: |
              The corresponding collection this corpus maps to.
      - name: 'vertexFeatureStore'
        type: NestedObject
        min_version: 'beta'
        description: |
          The config for the Vertex feature Store.
        exactly_one_of:
          - 'vector_db_config.0.rag_managed_db'
          - 'vector_db_config.0.pinecone'
          - 'vector_db_config.0.vertex_vector_search'
          - 'vector_db_config.0.weaviate'
          - 'vector_db_config.0.vertex_feature_store'
          - 'vector_db_config.0.rag_managed_vertex_vector_search'
        properties:
          - name: 'featureViewResourceName'
            type: String
            description: |
              The resource name of the FeatureView. Format: projects/{project}/locations/{location}/featureOnlineStores/{featureOnlineStore}/featureViews/{featureView}
      - name: 'ragManagedVertexVectorSearch'
        type: NestedObject
        min_version: 'beta'
        description: |
          The config for the RAG-managed Vertex Vector Search 2.0.
        exactly_one_of:
          - 'vector_db_config.0.rag_managed_db'
          - 'vector_db_config.0.pinecone'
          - 'vector_db_config.0.vertex_vector_search'
          - 'vector_db_config.0.weaviate'
          - 'vector_db_config.0.vertex_feature_store'
          - 'vector_db_config.0.rag_managed_vertex_vector_search'
        properties:
          - name: 'collectionName'
            type: String
            description: |
              Output only. The resource name of the Vector Search 2.0 Collection that RAG Created for the corpus.
            output: true
  - name: 'vertexAiSearchConfig'
    type: NestedObject
    description: |
      Optional. Immutable. The config for the Vertex AI Search.
    immutable: true
    conflicts:
      - 'vectorDbConfig'
    properties:
      - name: 'servingConfig'
        type: String
        description: |
          Vertex AI Search Serving Config resource full name.
