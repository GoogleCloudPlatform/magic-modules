---
name: 'MonitoredAgent'
min_version: 'beta'
description: |-
  Enables anomaly detection monitoring on an agent discovered by Agent Anomaly
  Detection (AAD). Agents are auto-discovered when they emit traces via ADK;
  this resource controls whether anomaly detection is active on a given agent.
  Creating this resource calls EnableMonitoredAgent; destroying it calls
  DisableMonitoredAgent.

  ~> **Note:** The monitored agent must already be discovered by AAD (via the
  background sync job) before it can be enabled. If `terraform apply` fails
  with NOT_FOUND, wait a few minutes for discovery and retry. An active
  AgentAnomalyDetectionScope must also exist in the same region.
references:
  guides:
    'Agent Anomaly Detection': 'https://cloud.google.com/vertex-ai/generative-ai/docs/agent-engine/'
  api: 'https://cloud.google.com/vertex-ai/docs/reference/rest/v1beta1/projects.locations.monitoredAgents'
base_url: 'https://aiplatform.{{region}}.rep.googleapis.com/v1beta1/projects/{{project}}/locations/{{region}}/monitoredAgents'
self_link: 'https://aiplatform.{{region}}.rep.googleapis.com/v1beta1/projects/{{project}}/locations/{{region}}/monitoredAgents/{{monitored_agent_id}}'
id_format: 'projects/{{project}}/locations/{{region}}/monitoredAgents/{{monitored_agent_id}}'
import_format:
  - 'projects/{{project}}/locations/{{region}}/monitoredAgents/{{monitored_agent_id}}'
# Create = Enable (POST :enable), not a standard Create.
create_url: 'https://aiplatform.{{region}}.rep.googleapis.com/v1beta1/projects/{{project}}/locations/{{region}}/monitoredAgents/{{monitored_agent_id}}:enable'
# Delete = Disable (POST :disable), not a standard DELETE.
delete_url: 'https://aiplatform.{{region}}.rep.googleapis.com/v1beta1/projects/{{project}}/locations/{{region}}/monitoredAgents/{{monitored_agent_id}}:disable'
delete_verb: 'POST'
# No public Update RPC; Enable/Disable only toggle state.
immutable: true
timeouts:
  insert_minutes: 3
  delete_minutes: 3
async:
  actions: ['create', 'delete']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true
# Retry on NOT_FOUND during Enable — the agent may not be discovered yet
# by the background sync job. Same pattern as Dataplex EntryLink.
error_retry_predicates:
  - 'transport_tpg.IsMonitoredAgentNotFoundRetryableError'
custom_code:
  # If Get returns a DISABLED agent, treat as "doesn't exist" in TF state.
  decoder: templates/terraform/decoders/vertex_ai_monitored_agent.go.tmpl
  # Skip DisableMonitoredAgent call when disable_on_destroy is false.
  pre_delete: templates/terraform/pre_delete/vertex_ai_monitored_agent.go.tmpl
virtual_fields:
  - name: 'disable_on_destroy'
    description: |-
      If set to true (the default), disabling the monitored agent on destroy.
      If set to false, only removes the resource from Terraform state without
      calling DisableMonitoredAgent.
    type: Boolean
    default_value: true
examples:
  - name: 'vertex_ai_monitored_agent_basic'
    primary_resource_id: 'agent'
    min_version: 'beta'
    vars:
      scope_id: 'aad-scope'
      log_bucket_id: 'aad-log-bucket'
      observability_bucket_id: 'aad-obs-bucket'
parameters:
  - name: 'region'
    type: String
    description: The region of the MonitoredAgent, e.g. us-central1.
    url_param_only: true
    required: true
    immutable: true
  - name: 'monitoredAgentId'
    type: String
    description: |-
      The ID of the MonitoredAgent, which is the final component of its
      resource name.
    url_param_only: true
    required: true
    immutable: true
properties:
  - name: 'name'
    type: String
    description: |-
      The resource name of the MonitoredAgent, in the format
      projects/{{project}}/locations/{{location}}/monitoredAgents/{{monitored_agent}}
    output: true
  - name: 'displayName'
    type: String
    description: The display name of the MonitoredAgent.
    output: true
  - name: 'agentResource'
    type: NestedObject
    description: The configuration for the agent being monitored.
    output: true
    properties:
      - name: 'agentType'
        type: Enum
        description: The type of the agent.
        output: true
        enum_values:
          - 'AGENT_TYPE_UNSPECIFIED'
          - 'REASONING_ENGINE'
      - name: 'agent'
        type: String
        description: |-
          The full resource name of the agent. For REASONING_ENGINE, format:
          projects/{{project}}/locations/{{location}}/reasoningEngines/{{agent}}
        output: true
      - name: 'location'
        type: String
        description: The Google Cloud location (region) of the agent resource.
        output: true
  - name: 'state'
    type: Enum
    description: The current enablement state of the agent.
    output: true
    enum_values:
      - 'ENABLEMENT_STATE_UNSPECIFIED'
      - 'ACTIVE'
      - 'ENABLING'
      - 'DISABLED'
  - name: 'statusMessage'
    type: String
    description: A brief message explaining the current state.
    output: true
  - name: 'createTime'
    type: String
    description: The time the MonitoredAgent was created.
    output: true
  - name: 'updateTime'
    type: String
    description: The time the MonitoredAgent was last updated.
    output: true
