---
name: 'SemanticGovernancePolicyEngine'
description: |
  A SemanticGovernancePolicyEngine (SGPE) is the managed, runtime evaluation
  infrastructure for Semantic Governance Policies (SGP): the natural-language
  constraints that govern an AI agent's tool calls. It is a project-level,
  regional singleton, so each project has at most one engine per region.

  Provisioning the engine sets up managed Private Service Connect (PSC)
  networking in your VPC and a policy decision point that the Agent Gateway
  consults at runtime to allow or deny an agent's proposed tool calls. The
  Semantic Governance Policies themselves, and the Agent Gateway integration
  that routes agent traffic through the engine, are configured separately and
  are not managed by this resource.

  Reading an uninitialized or deprovisioned engine returns the singleton
  with state INACTIVE rather than reporting it as absent.
references:
  guides:
    'Semantic governance overview': 'https://docs.cloud.google.com/gemini-enterprise-agent-platform/govern/policies/semantic-governance-overview'
docs:
id_format: 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine'
base_url: 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine'
self_link: 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine'
create_url: 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine'
# Singleton resource: AIP-156 prescribes upsert via PATCH with no parent
# Create RPC.
create_verb: 'PATCH'
update_url: 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine'
update_verb: 'PATCH'
# No standard Delete; tear-down is the :deprovision custom method (POST,
# empty body), polled via the async block below.
delete_url: 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine:deprovision'
delete_verb: 'POST'
import_format:
  - 'projects/{{project}}/locations/{{region}}/semanticGovernancePolicyEngine'
timeouts:
  insert_minutes: 60
  update_minutes: 60
  delete_minutes: 60
async:
  actions: ['create', 'update', 'delete']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true
custom_diff:
  - 'sgpeGatewayConfigDuplicateNameCheck'
custom_code:
  constants: 'templates/terraform/constants/semantic_governance_policy_engine.go.tmpl'
  post_read: 'templates/terraform/post_read/vertex_ai_semantic_governance_policy_engine.go.tmpl'
samples:
  - name: 'vertex_ai_semantic_governance_policy_engine_basic'
    primary_resource_id: 'sgpe'
    # The generator's standard CheckDestroy expects GET to return an error
    # (404) after delete, but SGPE is an AIP-156 singleton whose GET returns
    # 200 with state INACTIVE after deprovision -- so the example-derived
    # test would fail at CheckDestroy even after a successful deprovision.
    # Acceptance coverage is instead provided by the handwritten lifecycle
    # test (resource_vertex_ai_semantic_governance_policy_engine_test.go),
    # which CI still runs because it is a new TestAcc function in the diff.
    exclude_test: true
    steps:
      - name: 'vertex_ai_semantic_governance_policy_engine_basic'
  - name: 'vertex_ai_semantic_governance_policy_engine_full'
    primary_resource_id: 'sgpe'
    exclude_test: true # same singleton reason as _basic; covered by handwritten lifecycle test
  - name: 'vertex_ai_semantic_governance_policy_engine_multi_gateway'
    primary_resource_id: 'sgpe'
    exclude_test: true # same singleton reason as _basic; covered by handwritten lifecycle test
parameters:
  - name: 'region'
    type: String
    description: |
      The region of the SemanticGovernancePolicyEngine, e.g. 'us-central1'.
    url_param_only: true
    immutable: true
    default_from_api: true
properties:
  - name: 'name'
    type: String
    description: |
      The resource name of the SemanticGovernancePolicyEngine, in the form
      'projects/{project}/locations/{region}/semanticGovernancePolicyEngine'.
    output: true
  - name: 'createTime'
    type: String
    description: |
      The time the SemanticGovernancePolicyEngine was created, in RFC3339
      UTC "Zulu" format.
    output: true
  - name: 'updateTime'
    type: String
    description: |
      The time the SemanticGovernancePolicyEngine was last updated, in
      RFC3339 UTC "Zulu" format.
    output: true
  - name: 'pscServiceAttachment'
    type: String
    description: |
      The Private Service Connect service attachment URI for the SGPE's
      managed endpoint.
    output: true
  - name: 'ipAddress'
    type: String
    description: |
      The IP address allocated for the SGPE's managed PSC endpoint.
    output: true
  - name: 'pscForwardingRule'
    type: String
    description: |
      The Private Service Connect forwarding rule URI for the SGPE's
      managed endpoint.
    output: true
  - name: 'state'
    type: String
    description: |
      The current state of the SemanticGovernancePolicyEngine. One of:
      STATE_UNSPECIFIED, PROVISIONING, ACTIVE, FAILED, DEPROVISIONING,
      INACTIVE. `FAILED` indicates provisioning did not succeed; recover by
      destroying the resource (deprovision) or re-applying (re-provision).
    output: true
  - name: 'gatewayConfig'
    api_name: 'gatewayConfigs'
    type: Map
    description: |
      Private Service Connect networking for one or more gateways on
      this engine, keyed by user-defined `name`. Each block provisions
      a gateway; changing inputs updates in place; removing a block
      deprovisions the gateway. Up to 5 gateways per engine. Duplicate
      names are rejected at plan time.
    key_name: 'name'
    value_type:
      type: NestedObject
      properties:
        - name: 'network'
          type: String
          description: |
            The fully-qualified network URI for this gateway, e.g.
            `projects/{project}/global/networks/{network}`.
        - name: 'subnetwork'
          type: String
          description: |
            The fully-qualified subnetwork URI for this gateway, e.g.
            `projects/{project}/regions/{region}/subnetworks/{subnetwork}`.
        - name: 'dnsZoneName'
          type: String
          description: |
            The DNS managed-zone name for this gateway's PSC endpoint.
            Must exist and be attached to the gateway's VPC at provision
            time; the backend writes a per-region A record into it.
        - name: 'state'
          type: String
          description: |
            The current state of this gateway. One of: STATE_UNSPECIFIED,
            PROVISIONING, ACTIVE, DEPROVISIONING, INACTIVE, FAILED.
            A FAILED gateway is surfaced here without a provider error
            (the engine as a whole may still be ACTIVE).
          output: true
        - name: 'ipAddress'
          type: String
          description: |
            The IP address allocated for this gateway's PSC endpoint.
            Populated by the backend after ACTIVE; empty until then.
          output: true
        - name: 'pscEndpoint'
          type: String
          description: |
            The PSC endpoint URI for this gateway.
          output: true
        - name: 'dnsRecord'
          type: String
          description: |
            The DNS A-record the backend wrote into `dns_zone_name` for
            this gateway. Populated by the backend after ACTIVE; empty
            until then.
          output: true
