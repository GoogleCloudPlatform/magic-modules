---
# Reference design doc: go/lima-terraform
name: Configuration
description: Configuration resource for License Manager
base_url: projects/{{project}}/locations/{{location}}/configurations
self_link: projects/{{project}}/locations/{{location}}/configurations/{{configuration_id}}
create_url: projects/{{project}}/locations/{{location}}/configurations?configurationId={{configuration_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/configurations/{{configuration_id}}
examples:
  - name: licensemanager_configuration_basic
    primary_resource_id: "example-configuration"
    vars:
      configuration_id: "example-configuration"
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - update
    - delete
  result:
    resource_inside_response: true
autogen_status: Q29uZmlndXJhdGlvbg==
autogen_async: true
custom_code:
  encoder: 'templates/terraform/encoders/licensemanager_configuration.go.tmpl'
  post_read: 'templates/terraform/post_read/licensemanager_configuration.go.tmpl'
  pre_update: 'templates/terraform/pre_update/licensemanager_configuration.go.tmpl'
  post_update: 'templates/terraform/post_update/licensemanager_configuration.go.tmpl'
parameters:
  - name: location
    type: String
    required: true
    description: The region where the configuration should be created. This region must be the same where the licensed software will run.
    immutable: true
    url_param_only: true
  - name: configurationId
    type: String
    required: true
    description: Id of the object.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: '[Output only] Create time stamp'
    output: true
  - name: name
    type: String
    description: Identifier. name of resource
    output: true
  - name: state
    type: String
    description: |-
      State of the configuration.
    output: true
  - name: updateTime
    type: String
    description: '[Output only] Update time stamp'
    output: true
  - name: labels
    type: KeyValueLabels
    description: Labels as key value pairs
  - name: product
    type: String
    required: true
    immutable: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
    description: Name of the product for which you are setting the license configuration. For supported products see https://docs.cloud.google.com/compute/docs/instances/windows/license-manager#supported-license-products. Available values: Office2021ProfessionalPlus
  # ignore_read is set because the count is returned nested inside currentBillingInfo
  # (userCountBilling/packCountBilling). Populated via post_read custom code.
  - name: licenseCount
    type: Integer
    required: true
    ignore_read: true
    update_mask_fields:
      - 'currentBillingInfo'
      - 'nextBillingInfo'
    description: Number of units to bill for. When licensing a product that is billed per-user, this means number of users. When licensing a product that is billed per-pack (e.g. SQL Server), this means the number of packs.
  # ignore_read is set because active is a virtual boolean attribute derived from the API's
  # 'state' field (STATE_ACTIVE vs STATE_SUSPENDED). Populated via post_read custom code.
  - name: active
    type: Boolean
    default_value: true
    ignore_read: true
    description: Whether the configuration is active. We suggest you deactivate a configuration instead of deleting it, and allow License Manager to manage deletion of the configuration.
