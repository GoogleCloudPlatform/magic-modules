---
name: RuntimeProjectAttachment
api_variant_patterns:
  - 'projects/{project}/locations/{location}/runtimeProjectAttachments/{runtimeProjectAttachment}'
description: |-
  Runtime project attachment represents an attachment from the runtime project to the host project. API Hub looks for deployments in the attached runtime projects and creates corresponding resources in API Hub for the discovered deployments.
base_url: projects/{{project}}/locations/{{location}}/runtimeProjectAttachments
immutable: true
self_link: projects/{{project}}/locations/{{location}}/runtimeProjectAttachments/{{runtime_project_attachment_id}}
create_url: projects/{{project}}/locations/{{location}}/runtimeProjectAttachments?runtimeProjectAttachmentId={{runtime_project_attachment_id}}
id_format: projects/{{project}}/locations/{{location}}/runtimeProjectAttachments/{{runtime_project_attachment_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/runtimeProjectAttachments/{{runtime_project_attachment_id}}
examples:
  - name: apihub_runtime_project_attachment_basic
    primary_resource_id: apihub_runtime_project_attachment
    vars:
      project_id: 'ah-proj'
    test_env_vars:
      org_id: 'ORG_ID'
      billing_account: 'BILLING_ACCT'
    external_providers: ["time"]
autogen_status: UnVudGltZVByb2plY3RBdHRhY2htZW50
parameters:
  - name: location
    type: String
    description: Part of `parent`. See documentation of `projectsId`.
    immutable: true
    url_param_only: true
    required: true
  - name: runtimeProjectAttachmentId
    type: String
    description: |-
      The ID to use for the Runtime Project Attachment, which will become the
      final component of the Runtime Project Attachment's name. The ID must be the same
      as the project ID of the Google cloud project specified in the
      runtime_project_attachment.runtime_project field.
    immutable: true
    url_param_only: true
    required: true
properties:
  - name: name
    type: String
    description: |-
      Identifier. The resource name of a runtime project attachment.
      Format: "projects/{project}/locations/{location}/runtimeProjectAttachments/{runtime_project_attachment_id}"
    output: true
  - name: runtimeProject
    type: String
    description: |-
      Required. Immutable. Google cloud project name in the format: "projects/abc" or "projects/123".
      As input, project name with either project id or number are accepted.
      As output, this field will contain project number.
    immutable: true
    required: true
    diff_suppress_func: 'tpgresource.ProjectNumberDiffSuppress'
  - name: createTime
    type: String
    description: Output only. Create time.
    output: true
