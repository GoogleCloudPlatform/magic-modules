---
name: 'Snapshot'
description: |
  A named resource representing a snapshot of a subscription's backlog.
references:
  guides:
    'Replay Overview': 'https://cloud.google.com/pubsub/docs/replay-overview'
  api: 'https://cloud.google.com/pubsub/docs/reference/rest/v1/projects.snapshots'
base_url: 'projects/{{project}}/snapshots'
create_verb: 'PUT'
update_url: 'projects/{{project}}/snapshots/{{name}}'
update_verb: 'PATCH'
update_mask: true
id_format: 'projects/{{project}}/snapshots/{{name}}'
include_in_tgc_next: true
custom_code:
  encoder: 'templates/terraform/encoders/no_send_name.go.tmpl'
  tgc_ignore_terraform_encoder: true
examples:
  - name: 'pubsub_snapshot_basic'
    primary_resource_id: 'example'
    vars:
      topic_name: 'example-topic'
      subscription_name: 'example-subscription'
      snapshot_name: 'example-snapshot'
properties:
  - name: 'name'
    type: String
    description: 'The name of the snapshot.'
    required: true
    immutable: true
    diff_suppress_func: 'tpgresource.CompareSelfLinkOrResourceName'
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
    custom_expand: 'templates/terraform/custom_expand/resource_from_self_link.go.tmpl'
  - name: 'subscription'
    type: ResourceRef
    description: |
      The subscription whose backlog the snapshot retains. Specifically, the created snapshot is guaranteed to retain:
      (a) The existing backlog on the subscription. More precisely, this is defined as the messages in the subscription's backlog that are unacknowledged upon the successful completion of the snapshots.create request; as well as:
      (b) Any messages published to the subscription's topic following the successful completion of the snapshots.create request.
      
      Format is projects/{project}/subscriptions/{sub}.
    required: true
    immutable: true
    resource: 'Subscription'
    imports: 'name'
    ignore_read: true
    diff_suppress_func: 'tpgresource.CompareSelfLinkOrResourceName'
    custom_expand: 'templates/terraform/custom_expand/pubsub_snapshot_subscription.go.tmpl'
  - name: 'topic'
    type: ResourceRef
    description: |
      The name of the topic from which this snapshot is retaining messages.
    output: true
    resource: 'Topic'
    imports: 'name'
    diff_suppress_func: 'tpgresource.CompareSelfLinkOrResourceName'
  - name: 'expireTime'
    type: String
    description: |
      The snapshot is guaranteed to exist up until this time. A newly-created snapshot expires no later than 7 days from the time of its creation.
      Its exact lifetime is determined at creation by the existing backlog in the source subscription. Specifically, the lifetime of the snapshot is 7 days - (age of oldest unacked message in the subscription).
      For example, consider a subscription whose oldest unacked message is 3 days old. If a snapshot is created from this subscription, the snapshot -- which will always capture this 3-day-old backlog as long as the snapshot exists -- will expire in 4 days.
      The service will refuse to create a snapshot that would expire in less than 1 hour after creation.
      A timestamp in RFC3339 UTC "Zulu" format, with nanosecond resolution and up to nine fractional digits. Examples: "2014-10-02T15:01:23Z" and "2014-10-02T15:01:23.045123456Z".
    output: true
  - name: 'labels'
    type: KeyValueLabels
    description: |
      A set of key/value label pairs to assign to this Snapshot.
