---
name: Field
description: |
  Represents a single field in the database.
  Fields are grouped by their "Collection Group", which represent all collections
  in the database with the same id.
references:
  guides:
    Official Documentation: https://cloud.google.com/firestore/docs/query-data/indexing
  api: https://cloud.google.com/firestore/docs/reference/rest/v1/projects.databases.collectionGroups.fields
docs:
  warning: |
    This resource creates a Firestore Single Field override on a project that
     already has a Firestore database. If you haven't already created it, you may
    create a `google_firestore_database` resource with `location_id` set to your
    chosen location.
base_url: projects/{{project}}/databases/{{database}}/collectionGroups/{{collection}}/fields
immutable: false
self_link: '{{name}}'
create_url: projects/{{project}}/databases/{{database}}/collectionGroups/{{collection}}/fields/{{field}}
update_mask: true
create_verb: PATCH
update_verb: PATCH
import_format:
  - '{{name}}'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
# Sweeper skipped as this resource has customized deletion.
exclude_sweeper: true
async:
  type: OpAsync
  operation:
    base_url: '{{op_id}}'
  actions: [create, delete, update]
  result:
    resource_inside_response: true
error_retry_predicates:
  - transport_tpg.FirestoreField409RetryUnderlyingDataChanged
autogen_async: true
custom_code:
  custom_create: templates/terraform/custom_create/firestore_field.go.tmpl
  custom_update: templates/terraform/custom_update/firestore_field.go.tmpl
  encoder: templates/terraform/encoders/firestore_field.go.tmpl
  custom_delete: templates/terraform/custom_delete/firestore_field_delete.go.tmpl
  custom_import: templates/terraform/custom_import/firestore_field.go.tmpl
  test_check_destroy: templates/terraform/custom_check_destroy/firestore_field.go.tmpl
samples:
  - name: firestore_field_basic
    primary_resource_id: basic
    steps:
      - name: firestore_field_basic
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_timestamp_enterprise
    primary_resource_id: timestamp-enterprise
    steps:
      - name: firestore_field_timestamp_enterprise
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_timestamp_with_ttl_offset_enterprise
    primary_resource_id: timestamp-with-offset-enterprise
    steps:
      - name: firestore_field_timestamp_with_ttl_offset_enterprise
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_timestamp
    primary_resource_id: timestamp
    steps:
      - name: firestore_field_timestamp
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_timestamp_with_ttl_offset
    primary_resource_id: timestamp-with-offset
    steps:
      - name: firestore_field_timestamp_with_ttl_offset
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_match_override
    primary_resource_id: match_override
    steps:
      - name: firestore_field_match_override
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_wildcard
    primary_resource_id: wildcard
    steps:
      - name: firestore_field_wildcard
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
  - name: firestore_field_skip_wait
    primary_resource_id: skip_wait
    steps:
      - name: firestore_field_skip_wait
        ignore_read_extra:
          - skip_wait
        resource_id_vars:
          database_id: database-id
          delete_protection_state: DELETE_PROTECTION_ENABLED
        test_env_vars:
          project_id: PROJECT_NAME
        test_vars_overrides:
          delete_protection_state: '"DELETE_PROTECTION_DISABLED"'
virtual_fields:
  - name: skip_wait
    type: Boolean
    default_value: false
    description: Whether to skip waiting for the field operation to complete.
    ignore_read: true
parameters:
properties:
  - name: database
    type: String
    description: |
      The Firestore database id. Defaults to `"(default)"`.
    url_param_only: true
    immutable: true
    default_value: (default)
  - name: collection
    type: String
    description: |
      The id of the collection group to configure.
    url_param_only: true
    required: true
    immutable: true
  - name: field
    type: String
    description: |
      The id of the field to configure.
    url_param_only: true
    required: true
    immutable: true
  - name: name
    type: String
    description: |
      The name of this field. Format:
      `projects/{{project}}/databases/{{database}}/collectionGroups/{{collection}}/fields/{{field}}`
    output: true
  - name: indexConfig
    type: NestedObject
    description: |
      The single field index configuration for this field.
      Creating an index configuration for this field will override any inherited configuration with the
      indexes specified. Configuring the index configuration with an empty block disables all indexes on
      the field.
    send_empty_value: true
    custom_flatten: templates/terraform/custom_flatten/firestore_field_index_config.go.tmpl
    custom_expand: templates/terraform/custom_expand/firestore_field_index_config.go.tmpl
    properties:
      - name: indexes
        type: Array
        description: The indexes to configure on the field. Order or array contains must be specified.
        is_set: true
        item_type:
          type: NestedObject
          properties:
            - name: queryScope
              type: Enum
              description: |
                The scope at which a query is run. Collection scoped queries require you specify
                the collection at query time. Collection group scope allows queries across all
                collections with the same id.
              default_value: COLLECTION
              enum_values:
                - COLLECTION
                - COLLECTION_GROUP
            - name: order
              type: Enum
              description: |
                Indicates that this field supports ordering by the specified order or comparing using =, <, <=, >, >=, !=.
                Only one of `order` and `arrayConfig` can be specified.
              exactly_one_of:
                - order
                - arrayConfig
              enum_values:
                - ASCENDING
                - DESCENDING
            - name: arrayConfig
              type: Enum
              description: |
                Indicates that this field supports operations on arrayValues. Only one of `order` and `arrayConfig` can
                be specified.
              exactly_one_of:
                - order
                - arrayConfig
              enum_values:
                - CONTAINS
  - name: ttlConfig
    type: NestedObject
    description: |
      The TTL configuration for this Field. If set to an empty (i.e. `ttl_config {}`) or non-empty block, a TTL policy is configured based on the field. If unset, a TTL policy is not configured (or will be disabled upon updating the resource).
    send_empty_value: true
    custom_expand: templates/terraform/custom_expand/firestore_field_ttl_config.go.tmpl
    properties:
      - name: state
        type: Enum
        description: |
          The state of TTL (time-to-live) configuration for documents that have this Field set.
        output: true
        enum_values:
          - CREATING
          - ACTIVE
          - NEEDS_REPAIR
      - name: expirationOffset
        type: String
        description: |
          The offset, relative to the timestamp value from the field, used to determine the document's expiration time. Formatted as the number of seconds followed by 's'. For example, "60s" represents an offset of one minute. The number of seconds must be between 1 and 2147483647 inclusive. To configure no offset, omit this field.
        immutable: true
        default_from_api: true
