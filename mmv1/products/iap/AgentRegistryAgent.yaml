name: AgentRegistryAgent
description: |
  Only used to generate IAM resources
docs:
base_url: projects/{{project}}/locations/{{location}}/iap_web/agentRegistry/agents/{{agentId}}
self_link: projects/{{project}}/locations/{{location}}/iap_web/agentRegistry/agents/{{agentId}}
iam_policy:
  method_name_separator: ':'
  parent_resource_type: google_project_service
  parent_is_resource_id: true
  fetch_iam_policy_verb: POST
  allowed_iam_role: roles/iap.egressor
  parent_resource_attribute: agent_id
  sample_config_body: templates/terraform/iam/example_config_body/iap_agent_registry_agent.tf.tmpl
  iam_conditions_request_type: REQUEST_BODY
# This resource is only used to generate IAM resources. They do not correspond to real
# GCP resources, and should not be used to generate anything other than IAM support.
exclude_resource: true
id_format: projects/{{project}}/locations/{{location}}/iap_web/agentRegistry/agents/{{agentId}}
import_format:
  - projects/{{project}}/locations/{{location}}/iap_web/agentRegistry/agents/{{agentId}}
  - '{{agentId}}'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
exclude_tgc: true
samples:
  - name: project
    primary_resource_id: project_service
    steps:
      - name: project
        config_path: templates/terraform/samples/services/iap/iap_existing_project_agent.tf.tmpl
        test_env_vars:
          project: PROJECT_NAME
parameters:
  - name: location
    type: String
    required: true
    description: The location of the resource.
properties:
  - name: agentId
    type: String
    description: The ID of the Agent.
    required: true
