---
name: 'LocationWeb'
min_version: 'beta'
description: |
  Only used to generate IAM resources
# This resource is only used to generate IAM resources. They do not correspond to real
# GCP resources, and should not be used to generate anything other than IAM support.
exclude_resource: true
docs:
id_format: 'projects/{{project}}/locations/{{location}}'
base_url: 'projects/{{project}}/locations/{{location}}/iap_web'
self_link: 'projects/{{project}}/locations/{{location}}/iap_web'
import_format:
  - 'projects/{{project}}/locations/{{location}}/iap_web'
  - 'projects/{{project}}/locations/{{location}}'
  - '{{location}}'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
iam_policy:
  method_name_separator: ':'
  parent_resource_type: 'google_project_service'
  fetch_iam_policy_verb: 'POST'
  allowed_iam_role: 'roles/iap.egressor'
  parent_resource_attribute: 'location'
  parent_is_resource_id: true
  iam_conditions_request_type: 'REQUEST_BODY'
  example_config_body: 'templates/terraform/iam/example_config_body/iap_project_location.tf.tmpl'
exclude_tgc: true
examples:
  - name: 'iap_project_beta'
    primary_resource_id: 'project_service'
    test_env_vars:
      org_id: 'ORG_ID'
    external_providers: ["time"]
parameters:
  - name: 'location'
    type: String
    required: true
    description: The location of the resource.
properties:
  - name: 'name'
    type: String
    description: Dummy property.
    required: true
