---
name: Asset
description: |
  Only used to generate IAM resources
docs:
base_url: projects/{{project}}/locations/{{location}}/lakes/{{lake}}/zones/{{dataplex_zone}}/assets/{{name}}
self_link: projects/{{project}}/locations/{{location}}/lakes/{{lake}}/zones/{{dataplex_zone}}/assets/{{name}}
iam_policy:
  method_name_separator: ':'
  parent_resource_attribute: asset
  import_format:
    - projects/{{project}}/locations/{{location}}/lakes/{{lake}}/zones/{{dataplex_zone}}/assets/{{name}}
    - '{{name}}'
exclude_resource: true
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
custom_code:
samples:
  - name: dataplex_asset_primary
    primary_resource_id: example
    steps:
      - name: dataplex_asset_primary
        test_env_vars:
          project_name: PROJECT_NAME
parameters:
properties:
  - name: name
    type: String
    description: |
      Dummy property.
    output: true
