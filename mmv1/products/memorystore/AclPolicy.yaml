---
name: AclPolicy
description: Description
base_url: projects/{{project}}/locations/{{location}}/aclPolicies
self_link: projects/{{project}}/locations/{{location}}/aclPolicies/{{acl_policy_id}}
create_url: projects/{{project}}/locations/{{location}}/aclPolicies?aclPolicyId={{acl_policy_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/aclPolicies/{{acl_policy_id}}
async:
  actions: ['create', 'delete', 'update']
  operation:
    base_url: '{{op_id}}'
  actions:
    - update
    - delete
  result:
    resource_inside_response: true
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: aclPolicyId
    type: String
    required: true
    description: |-
      The logical name of the ACL policy in the customer project
      with the following restrictions:

      * Must contain only lowercase letters, numbers, and hyphens.
      * Must start with a letter.
      * Must be between 1-63 characters.
      * Must end with a number or a letter.
      * Must be unique within the customer project / location
    immutable: true
    url_param_only: true
properties:
  - name: etag
    type: String
    description: Etag of the ACL policy.
    output: true
  - name: name
    type: String
    description: Identifier. Full resource path of the ACL policy.
    output: true
  - name: rules
    type: Array
    required: true
    description: The ACL rules within the ACL policy.
    item_type:
      type: NestedObject
      properties:
        - name: rule
          type: String
          required: true
          description: |-
            The rule to be applied to the username. Ex: "on >password123 ~* +@all"
            The format of the rule is defined by Valkey OSS:
            https://valkey.io/topics/acl/
        - name: username
          type: String
          required: true
          description: |-
            Specifies the IAM user or service account to be added to the ACL policy.
            This username will be directly set on the Valkey OSS.
  - name: state
    type: String
    description: |-
      The state of the ACL policy.
      Possible values:
      ACTIVE
      UPDATING
      DELETING
    output: true
  - name: version
    type: String
    description: 'Deprecated: Used in drift resolution.'
    output: true