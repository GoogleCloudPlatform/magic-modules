---
name: 'OrganizationConsumerPolicy'
api_resource_type_kind: ConsumerPolicy
description: |
  Consumer Policy is a set of rules that define what services or service groups
  can be used for a cloud resource hierarchy. This resource manages the consumer
  policy for an organization as part of Hierarchical Service Activation.
min_version: 'beta'
references:
  guides:
    'Hierarchical Service Activation Overview': 'https://cloud.google.com/service-usage/docs/hierarchical-service-activation/overview'
    'Manage service enablement': 'https://cloud.google.com/service-usage/docs/hierarchical-service-activation/manage-enablement'
  api: 'https://cloud.google.com/service-usage/docs/reference/rest/v2beta/consumerPolicies'
base_url: 'organizations/{{organization}}/consumerPolicies'
self_link: 'organizations/{{organization}}/consumerPolicies/default'
create_url: 'organizations/{{organization}}/consumerPolicies/default'
create_verb: 'PATCH'
update_url: 'organizations/{{organization}}/consumerPolicies/default'
update_verb: 'PATCH'
delete_verb: 'PATCH'
id_format: 'organizations/{{organization}}/consumerPolicies/default'
import_format:
  - 'organizations/{{organization}}/consumerPolicies/default'
autogen_async: true
async:
  actions: ['create', 'update', 'delete']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true
  include_project: true
exclude_sweeper: true
custom_code:
  pre_create: 'templates/terraform/pre_create/organization_consumer_policy_force.go.tmpl'
  pre_update: 'templates/terraform/pre_update/organization_consumer_policy.go.tmpl'
  pre_delete: 'templates/terraform/pre_delete/organization_consumer_policy.go.tmpl'
  test_check_destroy: 'templates/terraform/custom_check_destroy/organization_consumer_policy.go.tmpl'
examples:
  - name: 'service_usage_organization_consumer_policy_basic'
    primary_resource_id: 'default'
    min_version: 'beta'
    skip_test: true
    vars: {}
    test_env_vars:
      org_id: 'ORG_TARGET'
    ignore_read_extra:
      - 'enable_rules.0.services'
virtual_fields:
  - name: 'deletion_policy'
    description: |
      The deletion policy for the consumer policy. Setting the policy to "FORCE" will
      pass the force parameter to the API, which allows updates and deletions that may
      result in the deletion of resources from affected services or loss of API access
      for clients.
      Possible values: DELETE, FORCE
    type: String
    default_value: "DELETE"
parameters:
  - name: 'organization'
    type: String
    description: |
      The organization ID for the consumer policy.
    url_param_only: true
    required: true
    immutable: true
properties:
  - name: 'name'
    type: String
    description: |
      Output only. The resource name of the policy.
      Format: `organizations/{organization}/consumerPolicies/default`
    output: true
  - name: 'etag'
    type: Fingerprint
    description: |
      An opaque tag indicating the current version of the policy, used for concurrency control.
    output: true
  - name: 'createTime'
    type: Time
    description: |
      Output only. The time the policy was created.
    output: true
  - name: 'updateTime'
    type: Time
    description: |
      Output only. The time the policy was last updated.
    output: true
  - name: 'enableRules'
    type: Array
    description: |
      Enable rules define usable services and service groups.
    item_type:
      type: NestedObject
      properties:
        - name: 'services'
          type: Array
          description: |
            The names of the services that are enabled.
            Example: `services/storage.googleapis.com`
          custom_flatten: 'templates/terraform/custom_flatten/consumer_policy_enable_rules_services.go.tmpl'
          item_type:
            type: String
