name: SipTrunk
description: |
  SipTrunk is the resource that represents a SIP trunk to connect to the Google Telephony Platform SIP trunking service.
references:
  api: https://cloud.google.com/dialogflow/es/docs/reference/rest/v2/projects.locations.sipTrunks
base_url: projects/{{project}}/locations/{{location}}/sipTrunks
self_link: '{{name}}'
create_url: projects/{{project}}/locations/{{location}}/sipTrunks
update_mask: true
update_verb: PATCH
id_format: '{{name}}'
import_format:
  - '{{name}}'
custom_code:
  pre_create: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_read: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_update: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_delete: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  custom_import: templates/terraform/custom_import/self_link_as_name_set_project_and_location.go.tmpl
samples:
  - name: dialogflow_sip_trunk_basic
    primary_resource_id: basic_trunk
    steps:
      - name: dialogflow_sip_trunk_basic
        resource_id_vars:
          trunk_name: basic-trunk
parameters:
  - name: location
    type: String
    url_param_only: true
    description: |
      The location of the SIP trunk.
    required: true
    immutable: true
properties:
  - type: String
    name: name
    description: |
      Identifier. The unique identifier of the SIP trunk.
    output: true
  - type: Array
    name: expectedHostname
    description: |
      Required. The expected hostnames in the peer certificate from the partner that is used for TLS authentication.
    required: true
    item_type:
      type: String
  - type: String
    name: displayName
    description: |
      Optional. Human-readable alias for this trunk.
  - type: Array
    name: connections
    description: |
      Output only. The connections of the SIP trunk.
    output: true
    item_type:
      type: NestedObject
      properties:
        - type: String
          name: connectionId
          description: |
            Output only. The unique identifier of the connection.
          output: true
        - type: String
          name: state
          description: |
            Output only. The state of the connection.
          output: true
        - type: String
          name: updateTime
          description: |
            Output only. The last update time of the connection.
          output: true
        - type: NestedObject
          name: errorDetails
          description: |
            Output only. The error details of the connection.
          output: true
          properties:
            - type: String
              name: code
              description: |
                Output only. The error code.
              output: true
            - type: String
              name: message
              description: |
                Output only. The error message.
              output: true
