---
name: Generator
description: |
  LLM generator.
references:
  guides:
    Official Documentation: https://cloud.google.com/agent-assist/docs
  api: https://cloud.google.com/dialogflow/es/docs/reference/rest/v2beta1/projects.locations.generators
base_url: projects/{{project}}/locations/{{location}}/generators
self_link: '{{name}}'
create_url: projects/{{project}}/locations/{{location}}/generators?generatorId={{generator_id}}
update_mask: true
update_verb: PATCH
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
custom_code:
  pre_create: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  post_create: templates/terraform/post_create/set_computed_name.tmpl
  pre_read: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_update: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  pre_delete: templates/terraform/pre_create/dialogflow_set_endpoint.go.tmpl
  custom_import: templates/terraform/custom_import/self_link_as_name_set_project_and_location.go.tmpl
samples:
  - name: dialogflow_generator_basic
    primary_resource_id: summarization_basic_generator
    steps:
      - name: dialogflow_generator_basic
        resource_id_vars:
          profile_name: dialogflow-profile
  - name: dialogflow_generator_agent_coaching
    primary_resource_id: agent_coaching_generator
    steps:
      - name: dialogflow_generator_agent_coaching
parameters:
  - name: location
    type: String
    required: true
    url_param_only: true
    description: |
      desc
  - name: generatorId
    type: String
    default_from_api: true
    custom_flatten: templates/terraform/custom_flatten/id_from_name.tmpl
    description: |
      Optional. The ID to use for the generator, which will become the final component of the generator's resource name.
properties:
  - name: name
    type: String
    description: |
      The resource name of the generator.
    output: true
  - name: description
    type: String
    description: |
      Optional. Human readable description of the generator.
  - name: summarizationContext
    type: NestedObject
    exactly_one_of:
      - summarization_context
      - free_form_context
      - agent_coaching_context
      - translation_context
      - agent_feedback_context
      - customer_message_generation_context
    description: |
      Input of prebuilt Summarization feature.
    properties:
      - name: summarizationSections
        type: Array
        description: |
          Optional. List of sections. Note it contains both predefined section sand customer defined sections.
        item_type:
          type: NestedObject
          properties:
            - name: key
              type: String
              description: |
                Optional. Name of the section, for example, "situation".
            - name: definition
              type: String
              description: |
                Optional. Definition of the section, for example, "what the customer needs help with or has question about."
            - name: type
              type: Enum
              description: |
                Optional. Type of the summarization section.
              enum_values:
                - SITUATION
                - ACTION
                - RESOLUTION
                - REASON_FOR_CANCELLATION
                - CUSTOMER_SATISFACTION
                - ENTITIES
                - CUSTOMER_DEFINED
                - SITUATION_CONCISE
                - ACTION_CONCISE
      - name: fewShotExamples
        type: Array
        description: |
          Optional. List of few shot examples.
        item_type:
          type: NestedObject
          properties:
            - name: conversationContext
              type: NestedObject
              description: |
                Optional. Conversation transcripts.
              properties:
                - name: messageEntries
                  type: Array
                  description: Optional. List of message transcripts in the conversation.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: role
                        type: Enum
                        description: |
                          Optional. Participant role of the message.
                        enum_values:
                          - HUMAN_AGENT
                          - AUTOMATED_AGENT
                          - END_USER
                      - name: text
                        type: String
                        description: |
                          Optional. Transcript content of the message.
                      - name: languageCode
                        type: String
                        description: |
                          Optional. The language of the text.
                      - name: createTime
                        type: String
                        description: |
                          Optional. Create time of the message entry.
            - name: extraInfo
              type: KeyValuePairs
              description: |
                Optional. Key is the placeholder field name in input, value is the value of the placeholder. E.g. instruction contains "@price", and ingested data has <"price", "10">
            - name: output
              type: NestedObject
              required: true
              description: |
                Required. Example output of the model.
              properties:
                - name: summarySuggestion
                  type: NestedObject
                  description: |
                    Optional. Suggested summary.
                  properties:
                    - name: summarySections
                      type: Array
                      required: true
                      description: |
                        Required. All the parts of generated summary.
                      item_type:
                        type: NestedObject
                        properties:
                          - name: section
                            type: String
                            required: true
                            description: |
                              Required. Name of the section.
                          - name: summary
                            type: String
                            required: true
                            description: |
                              Required. Summary text for the section.
            - name: summarizationSectionList
              type: NestedObject
              description: |
                Summarization sections.
              properties:
                - name: summarizationSections
                  type: Array
                  description: |
                    Optional. Summarization sections.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: key
                        type: String
                        description: |
                          Optional. Name of the section, for example, "situation".
                      - name: definition
                        type: String
                        description: |
                          Optional. Definition of the section, for example, "what the customer needs help with or has question about."
                      - name: type
                        type: Enum
                        description: |
                          Optional. Type of the summarization section.
                        enum_values:
                          - SITUATION
                          - ACTION
                          - RESOLUTION
                          - REASON_FOR_CANCELLATION
                          - CUSTOMER_SATISFACTION
                          - ENTITIES
                          - CUSTOMER_DEFINED
                          - SITUATION_CONCISE
                          - ACTION_CONCISE
      - name: version
        type: String
        default_from_api: true
        description: |
          Optional. Version of the feature. If not set, default to latest version. Current candidates are ["1.0"].
      - name: outputLanguageCode
        type: String
        description: |
          Optional. The target language of the generated summary. The language code for conversation will be used if this field is empty. Supported 2.0 and later versions.
  - name: freeFormContext
    type: NestedObject
    exactly_one_of:
      - summarization_context
      - free_form_context
      - agent_coaching_context
      - translation_context
      - agent_feedback_context
      - customer_message_generation_context
    description: |
      Free form text input to LLM.
    properties:
      - name: text
        type: String
        description: |
          Optional. Free form text input to LLM.
  - name: agentCoachingContext
    type: NestedObject
    exactly_one_of:
      - summarization_context
      - free_form_context
      - agent_coaching_context
      - translation_context
      - agent_feedback_context
      - customer_message_generation_context
    description: |
      Agent coaching context.
    properties:
      - name: overarchingGuidance
        type: String
        description: |
          Optional. The overarching guidance for the agent coaching. This should be set only for v1.5 and later versions.
      - name: version
        type: String
        description: |
          Optional. Version of the feature. If not set, default to latest version. Current candidates are ["2.5"].
      - name: outputLanguageCode
        type: String
        description: |
          Optional. Output language code.
      - name: searchConfig
        type: NestedObject
        description: |
          Optional. Search configuration for agent coaching. This is used for general articles search.
        properties:
          - name: searchEngine
            type: String
            description: |
              Required. The search engine to use for the agent coaching articles/instructions. Format: `projects/{project}/locations/global/collections/default_collection/engines/{engine_id}`
          - name: datastores
            type: Array
            description: |
              Optional. The datastore ids linked to the search engine.
            item_type:
              type: String
      - name: instructions
        type: Array
        description: |
          Optional. Customized instructions for agent coaching.
        item_type:
          type: NestedObject
          properties:
            - name: displayName
              type: String
              description: |
                Optional. Display name for the instruction.
            - name: displayDetails
              type: String
              description: |
                Optional. The detailed description of this instruction.
            - name: condition
              type: String
              description: |
                Optional. The condition of the instruction.
            - name: agentAction
              type: String
              description: |
                Optional. The action that human agent should take.
            - name: systemAction
              type: String
              description: |
                Optional. The action that system should take.
            - name: triggeringEvent
              type: Enum
              description: |
                Optional. The trigger event of the instruction.
              enum_values:
                - END_OF_UTTERANCE
                - MANUAL_CALL
                - CUSTOMER_MESSAGE
                - AGENT_MESSAGE
  - name: translationContext
    type: NestedObject
    exactly_one_of:
      - summarization_context
      - free_form_context
      - agent_coaching_context
      - translation_context
      - agent_feedback_context
      - customer_message_generation_context
    description: |
      Translation context.
    properties:
      - name: agentLanguageCode
        type: String
        required: true
        description: |
          Required. The language code used by the agent. At least one of agent_language_code and customer_language_code must be English (en-US).
      - name: customerLanguageCode
        type: String
        required: true
        description: |
          Required. The language code used by the customer. At least one of agent_language_code and customer_language_code must be English (en-US).
      - name: version
        type: String
        description: |
          Optional. Version of the feature. If not set, default to latest version. Current candidates are ["1.0"].
      - name: translationCustomization
        type: NestedObject
        description: |
          Optional. Customized translation for specific glossaries and sentences.
        properties:
          - name: glossaryTerms
            type: Array
            description: |
              Optional. Translation of a specific glossary in both agent and customer languages.
            item_type:
              type: NestedObject
              properties:
                - name: agentLanguageGlossary
                  type: String
                  required: true
                  description: |
                    Required. The glossary in agent language.
                - name: customerLanguageGlossary
                  type: String
                  required: true
                  description: |
                    Required. The glossary in customer language.
          - name: sentenceTranslations
            type: Array
            description: |
              Optional. Translation of a specific sentence in both agent and customer languages.
            item_type:
              type: NestedObject
              properties:
                - name: agentLanguageSentence
                  type: String
                  required: true
                  description: |
                    Required. The sentence in agent language.
                - name: customerLanguageSentence
                  type: String
                  required: true
                  description: |
                    Required. The sentence in customer language.
  - name: agentFeedbackContext
    type: NestedObject
    exactly_one_of:
      - summarization_context
      - free_form_context
      - agent_coaching_context
      - translation_context
      - agent_feedback_context
      - customer_message_generation_context
    description: |
      Agent feedback context.
    properties:
      - name: version
        type: String
        description: |
          Optional. Version of the feature. If not set, default to latest version. Current candidates are ["1.0"].
      - name: instructions
        type: Array
        description: |
          Optional. Instructions to generate feedback from.
        item_type:
          type: NestedObject
          properties:
            - name: displayName
              type: String
              description: |
                Optional. Display name for the instruction.
            - name: displayDetails
              type: String
              description: |
                Optional. The detailed description of this instruction.
            - name: condition
              type: String
              description: |
                Optional. The condition of the instruction.
            - name: agentAction
              type: String
              description: |
                Optional. The action that human agent should take.
            - name: systemAction
              type: String
              description: |
                Optional. The action that system should take.
            - name: triggeringEvent
              type: Enum
              description: |
                Optional. The trigger event of the instruction.
              enum_values:
                - END_OF_UTTERANCE
                - MANUAL_CALL
                - CUSTOMER_MESSAGE
                - AGENT_MESSAGE
  - name: customerMessageGenerationContext
    type: NestedObject
    exactly_one_of:
      - summarization_context
      - free_form_context
      - agent_coaching_context
      - translation_context
      - agent_feedback_context
      - customer_message_generation_context
    description: |
      Customer message generation context.
    properties:
      - name: version
        type: String
        description: |
          Optional. Version of the feature. If not set, default to latest version. Current candidates are ["1.0"].
      - name: customization
        type: NestedObject
        description: |
          Optional. Customizations for customer message generation.
        properties:
          - name: scenario
            type: String
            description: |
              Optional. Scenario for generating customer messages.
  - name: inferenceParameter
    type: NestedObject
    description: |
      Optional. Inference parameters for this generator.
    properties:
      - name: maxOutputTokens
        type: Integer
        description: |
          Optional. Maximum number of the output tokens for the generator.
      - name: temperature
        type: Double
        description: |
          Optional. Controls the randomness of LLM predictions. Low temperature = less random. High temperature = more random. If unset (or 0), uses a default value of 0.
      - name: topK
        type: Integer
        description: |
          Optional. Top-k changes how the model selects tokens for output. A top-k of 1 means the selected token is the most probable among all tokens in the model's vocabulary (also called greedy decoding), while a top-k of 3 means that the next token is selected from among the 3 most probable tokens (using temperature). For each token selection step, the top K tokens with the highest probabilities are sampled. Then tokens are further filtered based on topP with the final token selected using temperature sampling. Specify a lower value for less random responses and a higher value for more random responses. Acceptable value is [1, 40], default to 40.
      - name: topP
        type: Double
        description: |
          Optional. Top-p changes how the model selects tokens for output. Tokens are selected from most K (see topK parameter) probable to least until the sum of their probabilities equals the top-p value. For example, if tokens A, B, and C have a probability of 0.3, 0.2, and 0.1 and the top-p value is 0.5, then the model will select either A or B as the next token (using temperature) and doesn't consider C. The default top-p value is 0.95. Specify a lower value for less random responses and a higher value for more random responses. Acceptable value is [0.0, 1.0], default to 0.95.
  - name: triggerEvent
    type: Enum
    description: |
      Optional. The trigger event of the generator. It defines when the generator is triggered in a conversation.
    enum_values:
      - END_OF_UTTERANCE
      - MANUAL_CALL
      - CUSTOMER_MESSAGE
      - AGENT_MESSAGE
      - TOOL_CALL_COMPLETION
  - name: publishedModel
    type: String
    exactly_one_of:
      - published_model
      - tuned_model
    description: |
      Optional. The published Large Language Model name. * To use the latest model version, specify the model name without version number. Example: text-bison * To use a stable model version, specify the version number as well. Example: text-bison@002.
  - name: tunedModel
    type: String
    exactly_one_of:
      - published_model
      - tuned_model
    description: |
      Optional. Tuned Large Language Model endpoint from Vertex. Format: `projects/<Project Id>/locations/<Location Id>/endpoints/<Endpoint Id>`.
