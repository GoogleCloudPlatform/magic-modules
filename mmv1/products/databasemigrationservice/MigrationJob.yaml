---
name: MigrationJob
description: A migration job definition.
references:
  guides:
    Database Migration: https://cloud.google.com/database-migration/docs/
  api: https://cloud.google.com/database-migration/docs/reference/rest/v1/projects.locations.migrationJobs/create
base_url: projects/{{project}}/locations/{{location}}/migrationJobs
self_link: projects/{{project}}/locations/{{location}}/migrationJobs/{{migration_job_id}}
create_url: projects/{{project}}/locations/{{location}}/migrationJobs?migrationJobId={{migration_job_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/migrationJobs/{{migration_job_id}}
timeouts:
  insert_minutes: 60
  update_minutes: 60
  delete_minutes: 60
async:
  operation:
    timeouts:
      insert_minutes: 60
      update_minutes: 60
      delete_minutes: 60
    base_url: '{{op_id}}'
autogen_async: true
include_in_tgc_next: true
examples:
  - name: database_migration_service_migration_job_mysql_to_mysql
    primary_resource_id: mysqltomysql
    vars:
      destination_cp: destination-cp
      destination_csql: destination-csql
      migration_id: my-migrationid
      source_cp: source-cp
      source_csql: source-csql
      source_sqldb_cert: cert
      source_sqldb_pass: password
      source_sqldb_user: username
    test_vars_overrides:
      # for backward compatible
      source_sqldb_cert: '"cert" + randomSuffix'
      # for backward compatible
      source_sqldb_pass: '"password" + randomSuffix'
      # for backward compatible
      source_sqldb_user: '"username" + randomSuffix'
  - name: database_migration_service_migration_job_postgres_to_postgres
    primary_resource_id: psqltopsql
    vars:
      destination_cp: destination-cp
      destination_csql: destination-csql
      migration_id: my-migrationid
      source_cp: source-cp
      source_csql: source-csql
      source_sqldb_cert: cert
      source_sqldb_pass: password
      source_sqldb_user: username
    test_vars_overrides:
      # for backward compatible
      source_sqldb_cert: '"cert" + randomSuffix'
      # for backward compatible
      source_sqldb_pass: '"password" + randomSuffix'
      # for backward compatible
      source_sqldb_user: '"username" + randomSuffix'
  - name: database_migration_service_migration_job_postgres_to_postgres_objects
    primary_resource_id: psqltopsqlobjects
    vars:
      destination_cp: destination-cp
      destination_csql: destination-csql
      migration_id: my-migrationid
      source_cp: source-cp
      source_csql: source-csql
      source_sqldb_cert: cert
      source_sqldb_pass: password
      source_sqldb_user: username
    test_vars_overrides:
      # for backward compatible
      source_sqldb_cert: '"cert" + randomSuffix'
      # for backward compatible
      source_sqldb_pass: '"password" + randomSuffix'
      # for backward compatible
      source_sqldb_user: '"username" + randomSuffix'
  - name: database_migration_service_migration_job_postgres_to_alloydb
    primary_resource_id: psqltoalloydb
    vars:
      destination_alloydb: destination-alloydb
      destination_cp: destination-cp
      migration_id: my-migrationid
      source_cp: source-cp
      source_csql: source-csql
      source_sqldb_cert: cert
      source_sqldb_pass: password
      source_sqldb_user: username
    test_vars_overrides:
      # for backward compatible
      source_sqldb_cert: '"cert" + randomSuffix'
      # for backward compatible
      source_sqldb_pass: '"password" + randomSuffix'
      # for backward compatible
      source_sqldb_user: '"username" + randomSuffix'
parameters:
  - name: migrationJobId
    type: String
    required: true
    description: |
      The ID of the migration job.
    immutable: true
    url_param_only: true
  - name: location
    type: String
    description: |
      The location where the migration job should reside.
    immutable: true
    url_param_only: true
properties:
  - name: name
    type: String
    description: |
      The name of this migration job resource in the form of projects/{project}/locations/{location}/migrationJobs/{migrationJob}.
    output: true
  - name: displayName
    type: String
    description: |
      The migration job display name.
  - name: createTime
    type: Time
    description: |
      Output only. The timestamp when the resource was created. A timestamp in RFC3339 UTC 'Zulu' format, accurate to nanoseconds. Example: '2014-10-02T15:01:23.045123456Z'.
    output: true
  - name: labels
    type: KeyValueLabels
    description: |
      The resource labels for migration job to use to annotate any related underlying resources such as Compute Engine VMs.
  - name: state
    type: Enum
    description: |
      The current migration job state.
    output: true
    enum_values:
      - DRAFT
      - NOT_STARTED
      - RUNNING
      - COMPLETED
      - STOPPED
      - FAILED
  - name: phase
    type: Enum
    description: |
      The current migration job phase.
    output: true
    enum_values:
      - FULL_DUMP
      - CDC
      - PROMOTE_IN_PROGRESS
      - WAITING_FOR_SOURCE_WRITES_TO_STOP
      - PREPARING_THE_DUMP
      - READY_FOR_PROMOTE
  - name: error
    type: NestedObject
    description: |
      Output only. The error details in case of state FAILED.
    output: true
    properties:
      - name: code
        type: Integer
        description: |
          The status code, which should be an enum value of google.rpc.Code.
        output: true
      - name: message
        type: String
        description: |
          Human readable message indicating details about the current status.
        output: true
      - name: details
        type: Array
        description: |
          A list of messages that carry the error details.
        output: true
        custom_flatten: templates/terraform/custom_flatten/dms_migration_job_error_details.tmpl
        item_type:
          type: KeyValuePairs
  - name: type
    type: Enum
    required: true
    description: |
      The type of the migration job.
    immutable: true
    enum_values:
      - ONE_TIME
      - CONTINUOUS
  - name: source
    type: String
    required: true
    description: |
      The name of the source connection profile resource in the form of projects/{project}/locations/{location}/connectionProfiles/{sourceConnectionProfile}.
    immutable: true
  - name: destination
    type: String
    required: true
    description: |
      The name of the destination connection profile resource in the form of projects/{project}/locations/{location}/connectionProfiles/{destinationConnectionProfile}.
    immutable: true
  - name: dumpFlags
    type: NestedObject
    description: |
      The initial dump flags.
    properties:
      - name: dumpFlags
        type: Array
        description: |
          A list of dump flags
        item_type:
          type: NestedObject
          properties:
            - name: name
              type: String
              description: |
                The name of the flag
            - name: value
              type: String
              description: |
                The vale of the flag
  - name: performanceConfig
    type: NestedObject
    description: |
      Data dump parallelism settings used by the migration.
    properties:
      - name: dumpParallelLevel
        type: Enum
        description: |
          Initial dump parallelism level.
        enum_values:
          - MIN
          - OPTIMAL
          - MAX
  - name: postgresHomogeneousConfig
    type: NestedObject
    description: |
      PostgreSQL to PostgreSQL configuration.
    properties:
      - name: isNativeLogical
        type: Boolean
        required: true
        description: |
          Whether the migration uses native logical replication.
      - name: maxAdditionalSubscriptions
        type: Integer
        description: |
          Maximum number of additional subscriptions to use for the migration job.
  - name: dumpPath
    type: String
    description: |
      The path to the dump file in Google Cloud Storage,
      in the format: (gs://[BUCKET_NAME]/[OBJECT_NAME]).
      This field and the "dump_flags" field are mutually exclusive.
  - name: dumpType
    type: Enum
    description: |
      The type of the data dump. Supported for MySQL to CloudSQL for MySQL
      migrations only.
    enum_values:
      - LOGICAL
      - PHYSICAL
  - name: staticIpConnectivity
    type: NestedObject
    description: |
      If set to an empty object (`{}`), the source database will allow incoming
      connections from the public IP of the destination database.
      You can retrieve the public IP of the Cloud SQL instance from the
      Cloud SQL console or using Cloud SQL APIs.
    send_empty_value: true
    allow_empty_object: true
    conflicts:
      - reverseSshConnectivity
      - vpcPeeringConnectivity
    properties: []
  - name: reverseSshConnectivity
    type: NestedObject
    description: |
      The details of the VPC network that the source database is located in.
    conflicts:
      - staticIpConnectivity
      - vpcPeeringConnectivity
    properties:
      - name: vmIp
        type: String
        description: |
          The IP of the virtual machine (Compute Engine) used as the bastion server
          for the SSH tunnel.
      - name: vmPort
        type: Integer
        description: |
          The forwarding port of the virtual machine (Compute Engine) used as the
          bastion server for the SSH tunnel.
      - name: vm
        type: String
        description: |
          The name of the virtual machine (Compute Engine) used as the bastion server
          for the SSH tunnel.
      - name: vpc
        type: String
        description: |
          The name of the VPC to peer with the Cloud SQL private network.
  - name: vpcPeeringConnectivity
    type: NestedObject
    description: |
      The details of the VPC network that the source database is located in.
    conflicts:
      - staticIpConnectivity
      - reverseSshConnectivity
    properties:
      - name: vpc
        type: String
        description: |
          The name of the VPC network to peer with the Cloud SQL private network.
  - name: objectsConfig
    type: NestedObject
    description: |
      The objects that need to be migrated. If unset, the default is to migrate
      all objects available on the source.
    immutable: true
    default_from_api: true
    properties:
      - name: sourceObjectsConfig
        type: NestedObject
        description: |
          Configuration for the source objects to be migrated.
        immutable: true
        default_from_api: true
        properties:
          - name: objectsSelectionType
            type: Enum
            description: |
              The objects selection type of the migration job. When set to
              `SPECIFIED_OBJECTS`, only the objects listed in `objectConfigs` are
              migrated. When set to `ALL_OBJECTS`, all objects available on the
              source are migrated.
            immutable: true
            default_from_api: true
            enum_values:
              - ALL_OBJECTS
              - SPECIFIED_OBJECTS
          - name: objectConfigs
            type: Array
            description: |
              The list of objects to migrate. Should only be set when
              `objectsSelectionType` is `SPECIFIED_OBJECTS`.
            immutable: true
            item_type:
              type: NestedObject
              properties:
                - name: objectIdentifier
                  type: NestedObject
                  description: |
                    The identifier of the migration job object.
                  immutable: true
                  properties:
                    - name: type
                      type: Enum
                      required: true
                      description: |
                        The category of the migration job object: `DATABASE`,
                        `SCHEMA`, or `TABLE`.
                      immutable: true
                      enum_values:
                        - DATABASE
                        - SCHEMA
                        - TABLE
                    - name: database
                      type: String
                      description: |
                        The database name. Required only if the object uses
                        a database name as part of its unique identifier.
                      immutable: true
                    - name: schema
                      type: String
                      description: |
                        The schema name. Required only if the object uses
                        a schema name as part of its unique identifier.
                      immutable: true
                    - name: table
                      type: String
                      description: |
                        The table name. Required only if the object is a level
                        below database or schema.
                      immutable: true
