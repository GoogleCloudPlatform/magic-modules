---
name: Config
description: |
  Config is a singleton resource used to configure the default Dataform settings for a specified location.
references:
  guides:
    Official Documentation: https://cloud.google.com/dataform/docs/
  api: https://cloud.google.com/dataform/reference/rest/v1beta1/projects.locations
base_url: projects/{{project}}/locations/{{region}}/config
min_version: beta
self_link: projects/{{project}}/locations/{{region}}/config
update_mask: true
create_verb: PATCH
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{region}}/config
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
exclude_delete: true
custom_code:
  test_check_destroy: templates/terraform/custom_check_destroy/skip_delete_during_test.go.tmpl
samples:
  - name: dataform_config_with_kms_key
    external_providers:
      - time
    min_version: beta
    primary_resource_id: config
    steps:
      - name: dataform_config_with_kms_key
        resource_id_vars:
          crypto_key_name: example-crypto-key-name
          key_ring_name: example-key-ring
          project_name: project-1
        test_env_vars:
          billing_account: BILLING_ACCT
          org_id: ORG_ID
        min_version: beta
  - name: dataform_config_without_kms_key
    external_providers:
      - time
    min_version: beta
    primary_resource_id: config
    steps:
      - name: dataform_config_without_kms_key
        resource_id_vars:
          project_name: project-1
        test_env_vars:
          billing_account: BILLING_ACCT
          org_id: ORG_ID
        min_version: beta
parameters:
  - name: region
    type: String
    required: true
    min_version: beta
    description: A reference to the region
    immutable: true
    url_param_only: true
properties:
  - name: defaultKmsKeyName
    type: String
    min_version: beta
    description: |
      Optional. A reference to the customer-managed encryption key (CMEK) that will be used by default to encrypt user data.
