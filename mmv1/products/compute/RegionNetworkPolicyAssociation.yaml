---
name: 'RegionNetworkPolicyAssociation'
api_resource_type_kind: NetworkPolicy
api_resource_field: 'associations'
kind: 'compute#networkPolicyAssociation'
description: "Represents an association of a Compute Region Network Policy with a target."
docs:
id_format: 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}/associations/{{name}}'
base_url: 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}'
self_link: 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}/getAssociation?name={{name}}'
create_url: 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}/addAssociation'
delete_url: 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}/removeAssociation?name={{name}}'
delete_verb: 'POST'
update_url: 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}/addAssociation?replaceExistingAssociation=true'
update_verb: 'POST'
import_format:
  - 'projects/{{project}}/regions/{{region}}/networkPolicies/{{network_policy}}/associations/{{name}}'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
parameters:
  - name: 'networkPolicy'
    type: ResourceRef
    description: The network policy of the resource.
    required: true
    resource: 'RegionNetworkPolicy'
    imports: 'name'
properties:
  - name: 'name'
    type: String
    description: The name for an association.
    required: true
    immutable: true
  - name: 'attachmentTarget'
    type: String
    description: The target that the network policy is attached to.
    required: true
    immutable: true
