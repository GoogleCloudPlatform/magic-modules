---
name: 'RegionInstantSnapshot'
api_variant_patterns:
  - 'projects/{project}/regions/{region}/instantSnapshots/{regionInstantSnapshot}'
kind: 'compute#instantSnapshot'
description: |
  Represents an instant snapshot resource.

  An instant snapshot is an in-place backup of a disk that can be used to rapidly create a new disk in minutes.

  Instant snapshots capture data at a specific point in time. They are optimized for rapidly restoring captured
  data to a new disk. Use instant snapshots to quickly recover data in cases where the zone and disk are still intact
  but the data on the disk has been lost or corrupted
references:
  guides:
    'Official Documentation': 'https://cloud.google.com/compute/docs/disks/instant-snapshots'
  api: 'https://cloud.google.com/compute/docs/reference/rest/v1/regionInstantSnapshots'
docs:
base_url: 'projects/{{project}}/regions/{{region}}/instantSnapshots'
has_self_link: true
immutable: true
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
async:
  actions: ['create', 'delete', 'update']
  type: 'OpAsync'
  result:
    resource_inside_response: false
collection_url_key: 'items'
iam_policy:
  parent_resource_attribute: 'name'
  iam_conditions_request_type: 'QUERY_PARAM'
  allowed_iam_role: 'roles/compute.storageAdmin'
  import_format:
    - 'projects/{{project}}/regions/{{region}}/instantSnapshots/{{name}}'
sweeper:
  url_substitutions:
    - region: "us-central1"
include_in_tgc_next: true
examples:
  - name: 'region_instant_snapshot_basic'
    primary_resource_id: 'default'
    vars:
      instance_name: 'instant-snapshot'
      disk_name: 'example-disk'
parameters:
  - name: 'sourceDisk'
    type: ResourceRef
    description: |
      The source disk used to create this instant snapshot. You can provide this as a partial or full URL to the resource.
    required: true
    immutable: true
    diff_suppress_func: 'tpgresource.CompareSelfLinkOrResourceName'
    custom_expand: 'templates/terraform/custom_expand/resourceref_with_validation.go.tmpl'
    resource: 'RegionDisk'
    imports: 'name'
  - name: 'region'
    type: ResourceRef
    description: 'A reference to the region where the disk is located.'
    default_from_api: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
    custom_expand: 'templates/terraform/custom_expand/resourceref_with_validation.go.tmpl'
    resource: 'Region'
    imports: 'name'
properties:
  - name: 'creationTimestamp'
    type: Time
    description: 'Creation timestamp in RFC3339 text format.'
    output: true
  - name: 'name'
    type: String
    description: |
      Name of the resource; provided by the client when the resource is
      created. The name must be 1-63 characters long, and comply with
      RFC1035. Specifically, the name must be 1-63 characters long and match
      the regular expression `[a-z]([-a-z0-9]*[a-z0-9])?` which means the
      first character must be a lowercase letter, and all following
      characters must be a dash, lowercase letter, or digit, except the last
      character, which cannot be a dash.
    required: true
    immutable: true
  - name: 'description'
    type: String
    description: 'An optional description of this resource.'
  - name: 'sourceDiskId'
    type: String
    description: 'The ID value of the disk used to create this InstantSnapshot.'
    output: true
  - name: 'diskSizeGb'
    type: Integer
    description: 'Size of the snapshot, specified in GB.'
    output: true
  - name: 'labels'
    type: KeyValueLabels
    description: Labels to apply to this InstantSnapshot.
    update_url: 'projects/{{project}}/regions/{{region}}/instantSnapshots/{{name}}/setLabels'
    update_verb: 'POST'
  - name: 'labelFingerprint'
    type: Fingerprint
    description: |
      The fingerprint used for optimistic locking of this resource. Used
      internally during updates.
    output: true
    update_url: 'projects/{{project}}/regions/{{region}}/instantSnapshots/{{name}}/setLabels'
    update_verb: 'POST'
  - name: 'params'
    type: NestedObject
    ignore_read: true
    immutable: true
    description: |
     Additional params passed with the request, but not persisted as part of resource payload
    properties:
      - name: 'resourceManagerTags'
        type: KeyValuePairs
        description: |
          Resource manager tags to be bound to the instant snapshot. Tag keys and values have the
          same definition as resource manager tags. Keys must be in the format tagKeys/{tag_key_id},
          and values are in the format tagValues/456.
        api_name: resourceManagerTags
        ignore_read: true
  - name: 'status'
    type: String
    description: 'The status of the instant snapshot.'
    output: true
  - name: 'architecture'
    type: String
    description: 'The architecture of the instant snapshot.'
    output: true
  - name: 'resourceStatus'
    type: NestedObject
    description: 'Resource status for the instant snapshot.'
    output: true
    properties:
      - name: 'storageSizeBytes'
        type: Integer
        description: 'The size of the storage used by the instant snapshot.'
        output: true
  - name: 'sourceInstantSnapshotGroup'
    type: String
    description: 'URL of the source instant snapshot group.'
    output: true
  - name: 'sourceInstantSnapshotGroupId'
    type: String
    description: 'The unique ID of the source instant snapshot group.'
    output: true
