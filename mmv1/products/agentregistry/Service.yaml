---
name: Service
description: |
  Service manages a service in a management boundary
base_url: projects/{{project}}/locations/{{location}}/services
self_link: projects/{{project}}/locations/{{location}}/services/{{service_id}}
create_url: projects/{{project}}/locations/{{location}}/services?serviceId={{service_id}}
update_mask: true
update_verb: PATCH
id_format: projects/{{project}}/locations/{{location}}/services/{{service_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/services/{{service_id}}
async:
  type: OpAsync
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - delete
    - update
  result:
    resource_inside_response: false
autogen_async: true
samples:
  - name: agent_registry_service_basic
    primary_resource_id: default
    steps:
      - name: agent_registry_service_basic
        resource_id_vars:
          service: service
  - name: agent_registry_service_mcp_server
    primary_resource_id: default
    steps:
      - name: agent_registry_service_mcp_server
        resource_id_vars:
          service: service
parameters:
  - name: location
    type: String
    description: |
      The location of the resource.
    required: true
    url_param_only: true
  - name: serviceId
    type: String
    description: |
      The name of the Service.
    required: true
    url_param_only: true
properties:
  - name: name
    type: String
    description: |
      The resource name of the Service.
    output: true
  - name: displayName
    type: String
    description: |
      User-defined display name for the Service. Can have a maximum length of 63 characters.
  - name: description
    type: String
    description: |
      The description of the Service.
  - name: interfaces
    type: Array
    description: |
      The connection details for the Service.
    item_type:
      type: NestedObject
      properties:
        - name: url
          type: String
          required: true
          description: |
            The destination URL.
        - name: protocolBinding
          type: Enum
          required: true
          enum_values:
            - JSONRPC
            - GRPC
            - HTTP_JSON
          description: |
            The protocol binding of the interface.
  - name: agentSpec
    type: NestedObject
    exactly_one_of:
      - agent_spec
      - mcp_server_spec
      - endpoint_spec
    description: |
      The spec of the Agent. When set, the type of the Service is Agent.
    properties:
      - name: type
        type: Enum
        required: true
        enum_values:
          - NO_SPEC
          - A2A_AGENT_CARD
        description: |
          The type of the Agent spec content.
      - name: content
        type: String
        state_func: func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }
        custom_expand: templates/terraform/custom_expand/json_schema.tmpl
        custom_flatten: templates/terraform/custom_flatten/json_schema.tmpl
        validation:
          function: validation.StringIsJSON
        description: |
          The content of the Agent spec in the JSON format. This payload is validated against the schema for the specified type.
  - name: mcpServerSpec
    type: NestedObject
    exactly_one_of:
      - agent_spec
      - mcp_server_spec
      - endpoint_spec
    description: |
      The spec of the MCP Server. When set, the type of the Service is MCP Server.
    properties:
      - name: type
        type: Enum
        required: true
        enum_values:
          - NO_SPEC
          - TOOL_SPEC
        description: |
          The type of the MCP Server spec content.
      - name: content
        type: String
        state_func: func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }
        custom_expand: templates/terraform/custom_expand/json_schema.tmpl
        custom_flatten: templates/terraform/custom_flatten/json_schema.tmpl
        validation:
          function: validation.StringIsJSON
        description: |
          The content of the MCP Server spec. This payload is validated against the schema for the specified type.
  - name: endpointSpec
    type: NestedObject
    exactly_one_of:
      - agent_spec
      - mcp_server_spec
      - endpoint_spec
    description: |
      The spec of the Endpoint. When set, the type of the Service is Endpoint.
    properties:
      - name: type
        type: Enum
        required: true
        enum_values:
          - NO_SPEC
        description: |
          The type of the Endpoint spec content.
  - name: registryResource
    type: String
    description: |
      The resource name of the resulting Agent, MCP Server, or Endpoint.
    output: true
  - name: createTime
    type: Time
    description: |
      The timestamp when the resource was created.
    output: true
  - name: updateTime
    type: Time
    description: |
      The timestamp when the resource was updated.
    output: true
