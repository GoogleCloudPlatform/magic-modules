---
name: Binding
description: |
  Represents a user-defined Binding.
base_url: projects/{{project}}/locations/{{location}}/bindings
self_link: projects/{{project}}/locations/{{location}}/bindings/{{binding_id}}
create_url: projects/{{project}}/locations/{{location}}/bindings?bindingId={{binding_id}}
update_mask: true
update_verb: PATCH
id_format: projects/{{project}}/locations/{{location}}/bindings/{{binding_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/bindings/{{binding_id}}
async:
  type: OpAsync
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - delete
    - update
  result:
    resource_inside_response: false
autogen_async: true
samples:
  - name: agent_registry_binding_basic
    primary_resource_id: default
    skip_func: acctest.SkipTestUntil(t, "2026-09-30") # Wait for google_iam_connectors_connector to graduate from tpg-nightly
    steps:
      - name: agent_registry_binding_basic
        resource_id_vars:
          binding: ar-binding
        test_env_vars:
          project: PROJECT_NAME
parameters:
  - name: location
    type: String
    description: |
      The location of the resource.
    required: true
    url_param_only: true
  - name: bindingId
    type: String
    description: |
      The name of the Binding.
    required: true
    url_param_only: true
properties:
  - name: name
    type: String
    description: |
      The resource name of the Binding.
    output: true
  - name: displayName
    type: String
    description: |
      User-defined display name for the Binding.
  - name: description
    type: String
    description: |
      The description of the Binding.
  - name: source
    type: NestedObject
    required: true
    description: |
      The source of the Binding.
    properties:
      - name: identifier
        type: String
        required: true
        description: |
          The identifier of the source Agent. Format: `urn:agent:{publisher}:{namespace}:{name}`
  - name: target
    type: NestedObject
    required: true
    description: |
      The target of the Binding.
    properties:
      - name: identifier
        type: String
        required: true
        description: |
          The identifier of the target Agent, MCP Server, or Endpoint. Format:
          * `urn:agent:{publisher}:{namespace}:{name}`
          * `urn:mcp:{publisher}:{namespace}:{name}`
          * `urn:endpoint:{publisher}:{namespace}:{name}`
  - name: authProviderBinding
    type: NestedObject
    required: true
    description: |
      The auth provider of the Binding.
    properties:
      - name: authProvider
        type: String
        required: true
        description: |
          The resource name of the target auth provider.
      - name: scopes
        type: Array
        description: |
          The list of OAuth2 scopes of the auth provider.
        item_type:
          type: String
      - name: continueUri
        type: String
        description: |
          The continue URI of the auth provider.
  - name: createTime
    type: Time
    description: |
      The timestamp when the resource was created.
    output: true
  - name: updateTime
    type: Time
    description: |
      The timestamp when the resource was updated.
    output: true
