  - name: performanceData
    type: NestedObject
    description: Performance data for an asset.
    properties:
      - name: dailyResourceUsageAggregations
        type: Array
        description: |-
          Daily resource usage aggregations.
          Contains all of the data available for an asset, up to the last 420 days.
          Aggregations are sorted from oldest to most recent.
        item_type:
          type: NestedObject
          properties:
            - name: cpu
              type: NestedObject
              description: Statistical aggregation of CPU usage.
              properties:
                - name: utilizationPercentage
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
            - name: date
              type: NestedObject
              description: |-
                Represents a whole or partial calendar date, such as a birthday. The time of
                day and time zone are either specified elsewhere or are insignificant. The
                date is relative to the Gregorian Calendar. This can represent one of the
                following:

                * A full date, with non-zero year, month, and day values.
                * A month and day, with a zero year (for example, an anniversary).
                * A year on its own, with a zero month and a zero day.
                * A year and month, with a zero day (for example, a credit card expiration
                date).

                Related types:

                * google.type.TimeOfDay
                * google.type.DateTime
                * google.protobuf.Timestamp
              properties:
                - name: day
                  type: Integer
                  description: |-
                    Day of a month. Must be from 1 to 31 and valid for the year and month, or 0
                    to specify a year by itself or a year and month where the day isn't
                    significant.
                - name: month
                  type: Integer
                  description: |-
                    Month of a year. Must be from 1 to 12, or 0 to specify a year without a
                    month and day.
                - name: year
                  type: Integer
                  description: |-
                    Year of the date. Must be from 1 to 9999, or 0 to specify a date without
                    a year.
            - name: disk
              type: NestedObject
              description: Statistical aggregation of disk usage.
              properties:
                - name: iops
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
                - name: readIops
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
                - name: writeIops
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
            - name: memory
              type: NestedObject
              description: Statistical aggregation of memory usage.
              properties:
                - name: utilizationPercentage
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
            - name: network
              type: NestedObject
              description: Statistical aggregation of network usage.
              properties:
                - name: egressBps
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
                - name: ingressBps
                  type: NestedObject
                  description: Statistical aggregation of samples for a single resource usage.
                  properties:
                    - name: average
                      type: Double
                      description: Average usage value.
                    - name: median
                      type: Double
                      description: Median usage value.
                    - name: ninteyFifthPercentile
                      type: Double
                      description: 95th percentile usage value.
                    - name: peak
                      type: Double
                      description: Peak usage value.
