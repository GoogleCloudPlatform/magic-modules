            - name: displayName
              output: true
              type: String
              description: Display Name for the Group.
            - name: overlappingAssetCount
              output: true
              type: String
              description: This field is deprecated, do not rely on it having a value.
            - name: preferenceSetFindings
              output: true
              type: Array
              description: Findings for each of the PreferenceSets for this group.
              item_type:
                type: NestedObject
                properties:
                  - name: computeEngineFinding
                    output: true
                    type: NestedObject
                    description: A set of findings that applies to assets destined for Compute Engine.
                    properties:
                      - name: allocatedAssetCount
                        output: true
                        type: String
                        description: Count of assets which were allocated.
                      - name: allocatedDiskTypes
                        output: true
                        type: Array
                        description: Set of disk types allocated to assets.
                        item_type:
                          type: String
                      - name: allocatedRegions
                        output: true
                        type: Array
                        description: Set of regions in which the assets were allocated.
                        item_type:
                          type: String
                      - name: machineSeriesAllocations
                        output: true
                        type: Array
                        description: Distribution of assets based on the Machine Series.
                        item_type:
                          type: NestedObject
                          properties:
                            - name: allocatedAssetCount
                              output: true
                              type: String
                              description: Count of assets allocated to this machine series.
                            - name: machineSeries
                              output: true
                              type: NestedObject
                              description: |-
                                A machine series, for a target product
                                (e.g. Compute Engine, Google Cloud VMware Engine).
                              properties:
                                - name: code
                                  output: true
                                  type: String
                                  description: |-
                                    Code to identify a machine series.
                                    Consult this for more details on the available series for Compute Engine:
                                    https://cloud.google.com/compute/docs/machine-resource#machine_type_comparison
                                    Consult this for more details on the available series for Google Cloud
                                    VMware Engine:
                                    https://cloud.google.com/vmware-engine/pricing
                  - name: description
                    output: true
                    type: String
                    description: Description for the Preference Set.
                  - name: displayName
                    output: true
                    type: String
                    description: Display Name of the Preference Set
                  - name: machinePreferences
                    output: true
                    type: NestedObject
                    description: |-
                      VirtualMachinePreferences enables you to create sets of assumptions, for
                      example, a geographical location and pricing track, for your migrated virtual
                      machines. The set of preferences influence recommendations for migrating
                      virtual machine assets.
                    properties:
                      - name: commitmentPlan
                        output: true
                        type: String
                        description: |-
                          Possible values:
                          COMMITMENT_PLAN_NONE
                          COMMITMENT_PLAN_ONE_YEAR
                          COMMITMENT_PLAN_THREE_YEARS
                      - name: computeEnginePreferences
                        output: true
                        type: NestedObject
                        description: The user preferences relating to Compute Engine target platform.
                        properties:
                          - name: licenseType
                            output: true
                            type: String
                            description: |-
                              Possible values:
                              LICENSE_TYPE_DEFAULT
                              LICENSE_TYPE_BRING_YOUR_OWN_LICENSE
                          - name: machinePreferences
                            output: true
                            type: NestedObject
                            description: |-
                              The type of machines to consider when calculating virtual machine migration
                              insights and recommendations.
                              Not all machine types are available in all zones and regions.
                            properties:
                              - name: allowedMachineSeries
                                output: true
                                type: Array
                                description: |-
                                  Compute Engine machine series to consider for insights and recommendations.
                                  If empty, no restriction is applied on the machine series.
                                item_type:
                                  type: NestedObject
                                  properties:
                                    - name: code
                                      output: true
                                      type: String
                                      description: |-
                                        Code to identify a machine series.
                                        Consult this for more details on the available series for Compute Engine:
                                        https://cloud.google.com/compute/docs/machine-resource#machine_type_comparison
                                        Consult this for more details on the available series for Google Cloud
                                        VMware Engine:
                                        https://cloud.google.com/vmware-engine/pricing
                          - name: persistentDiskType
                            output: true
                            type: String
                            description: |-
                              Possible values:
                              PERSISTENT_DISK_TYPE_STANDARD
                              PERSISTENT_DISK_TYPE_BALANCED
                              PERSISTENT_DISK_TYPE_SSD
                      - name: regionPreferences
                        output: true
                        type: NestedObject
                        description: The user preferences relating to target regions.
                        properties:
                          - name: preferredRegions
                            output: true
                            type: Array
                            description: |-
                              A list of preferred regions,
                              ordered by the most preferred region first.
                              Set only valid Google Cloud region names.
                              See https://cloud.google.com/compute/docs/regions-zones
                              for available regions.
                            item_type:
                              type: String
                      - name: sizingOptimizationStrategy
                        output: true
                        type: String
                        description: |-
                          Possible values:
                          SIZING_OPTIMIZATION_STRATEGY_SAME_AS_SOURCE
                          SIZING_OPTIMIZATION_STRATEGY_MODERATE
                          SIZING_OPTIMIZATION_STRATEGY_AGGRESSIVE
                      - name: soleTenancyPreferences
                        output: true
                        type: NestedObject
                        description: Preferences concerning Sole Tenancy nodes and VMs.
                        properties:
                          - name: commitmentPlan
                            output: true
                            type: String
                            description: |-
                              Commitment plan to consider when calculating costs for virtual machine
                              insights and recommendations.
                              If you are unsure which value to set, a 3 year commitment plan is often a
                              good value to start with.
                              Possible values:
                              ON_DEMAND
                              COMMITMENT_1_YEAR
                              COMMITMENT_3_YEAR
                          - name: cpuOvercommitRatio
                            output: true
                            type: Double
                            description: |-
                              CPU overcommit ratio.
                              Acceptable values are between 1.0 and 2.0 inclusive.
                          - name: hostMaintenancePolicy
                            output: true
                            type: String
                            description: |-
                              Sole Tenancy nodes maintenance policy.
                              Possible values:
                              HOST_MAINTENANCE_POLICY_DEFAULT
                              HOST_MAINTENANCE_POLICY_RESTART_IN_PLACE
                              HOST_MAINTENANCE_POLICY_MIGRATE_WITHIN_NODE_GROUP
                          - name: nodeTypes
                            output: true
                            type: Array
                            description: |-
                              A list of sole tenant node types.
                              An empty list means that all possible node types will be considered.
                            item_type:
                              type: NestedObject
                              properties:
                                - name: nodeName
                                  output: true
                                  type: String
                                  description: |-
                                    Name of the Sole Tenant node. Consult
                                    https://cloud.google.com/compute/docs/nodes/sole-tenant-nodes
                      - name: targetProduct
                        output: true
                        type: String
                        description: |-
                          Possible values:
                          COMPUTE_MIGRATION_TARGET_PRODUCT_COMPUTE_ENGINE
                          COMPUTE_MIGRATION_TARGET_PRODUCT_VMWARE_ENGINE
                          COMPUTE_MIGRATION_TARGET_PRODUCT_SOLE_TENANCY
                      - name: vmwareEnginePreferences
                        output: true
                        type: NestedObject
                        description: The user preferences relating to Google Cloud VMware Engine target platform.
                        properties:
                          - name: commitmentPlan
                            output: true
                            type: String
                            description: |-
                              Commitment plan to consider when calculating costs for virtual machine
                              insights and recommendations.
                              If you are unsure which value to set, a 3 year commitment plan is often a
                              good value to start with.
                              Possible values:
                              ON_DEMAND
                              COMMITMENT_1_YEAR_MONTHLY_PAYMENTS
                              COMMITMENT_3_YEAR_MONTHLY_PAYMENTS
                              COMMITMENT_1_YEAR_UPFRONT_PAYMENT
                              COMMITMENT_3_YEAR_UPFRONT_PAYMENT
                          - name: cpuOvercommitRatio
                            output: true
                            type: Double
                            description: |-
                              CPU overcommit ratio.
                              Acceptable values are between 1.0 and 8.0, with 0.1 increment.
                          - name: memoryOvercommitRatio
                            output: true
                            type: Double
                            description: |-
                              Memory overcommit ratio.
                              Acceptable values are 1.0, 1.25, 1.5, 1.75 and 2.0.
                          - name: storageDeduplicationCompressionRatio
                            output: true
                            type: Double
                            description: |-
                              The Deduplication and Compression ratio is based on the logical (Used
                              Before) space required to store data before applying deduplication and
                              compression, in relation to the physical (Used After) space required after
                              applying deduplication and compression. Specifically, the ratio is the Used
                              Before space divided by the Used After space. For example, if the Used
                              Before space is 3 GB, but the physical Used After space is 1 GB, the
                              deduplication and compression ratio is 3x. Acceptable values are
                              between 1.0 and 4.0.
                  - name: monthlyCostCompute
                    output: true
