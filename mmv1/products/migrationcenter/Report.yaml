                      description: Count of items in the bucket.
                    - name: lowerBound
                      output: true
                      type: String
                      description: Lower bound - inclusive.
                    - name: upperBound
                      output: true
                      type: String
                      description: Upper bound - exclusive.
          - name: memoryUtilizationChart
            output: true
            type: NestedObject
            description: |-
              Utilization Chart is a specific type of visualization which displays
              a metric classified into "Used" and "Free" buckets.
            properties:
              - name: free
                output: true
                type: String
                description: Aggregate value which falls into the "Free" bucket.
              - name: used
                output: true
                type: String
                description: Aggregate value which falls into the "Used" bucket.
          - name: operatingSystem
            output: true
            type: NestedObject
            description: Describes a collection of data points rendered as a Chart.
            properties:
              - name: dataPoints
                output: true
                type: Array
                description: |-
                  Each data point in the chart is represented as a name-value pair
