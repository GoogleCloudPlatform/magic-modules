---
name: Report
description: Report represents an analytical assessment report summarizing infrastructure size, costs, and target suggestions.
base_url: projects/{{project}}/locations/{{location}}/reportConfigs/{{report_config}}/reports
immutable: true
self_link: projects/{{project}}/locations/{{location}}/reportConfigs/{{report_config}}/reports/{{report_id}}
create_url: projects/{{project}}/locations/{{location}}/reportConfigs/{{report_config}}/reports?reportId={{report_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/reportConfigs/{{report_config}}/reports/{{report_id}}
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - delete
  result:
    resource_inside_response: true
autogen_status: UmVwb3J0
autogen_async: true
samples:
  - name: 'migration_center_report_basic'
    primary_resource_id: 'default'
    steps:
      - name: 'migration_center_report_basic'
        resource_id_vars:
          report_id: 'report-test'
          report_config_id: 'report-config-test'
          pref_set_id: 'pref-set-test'
          group_id: 'group-test'
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: report_config
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: reportId
    type: String
    required: true
    description: |-
      User specified id for the report. It will become the last component
      of the report name. The id must be unique within the project, must
      conform with RFC-1034, is restricted to lower-cased letters, and has a
      maximum length of 63 characters. The id must match the regular expression:
      [a-z]([a-z0-9-]{0,61}[a-z0-9])?.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: Creation timestamp.
    output: true
  - name: description
    type: String
    description: Free-text description.
  - name: displayName
    type: String
    description: User-friendly display name. Maximum length is 63 characters.
  - name: name
    type: String
    description: Name of resource.
    output: true
  - name: state
    type: String
    description: |-
      Report creation state.
      Possible values:
      PENDING
      SUCCEEDED
      FAILED
    output: true
  - name: summary
    type: NestedObject
    output: true
    description: |-
      Describes the Summary view of a Report, which contains aggregated values
      for all the groups and preference sets included in this Report.
    properties:
      - name: allAssetsStats
        output: true
        type: NestedObject
        description: Aggregate statistics for a collection of assets.
        properties:
          - name: coreCountHistogram
            output: true
            type: NestedObject
            description: |-
              A Histogram Chart shows a distribution of values into buckets, showing
              a count of values which fall into a bucket.
            properties:
              - name: buckets
                output: true
                type: Array
                description: |-
                  Buckets in the histogram.
                  There will be `n+1` buckets matching `n` lower bounds in the request.
                  The first bucket will be from -infinity to the first bound.
                  Subsequent buckets will be between one bound and the next.
                  The final bucket will be from the final bound to infinity.
                item_type:
                  type: NestedObject
                  properties:
                    - name: count
                      output: true
                      type: String
                      description: Count of items in the bucket.
                    - name: lowerBound
                      output: true
                      type: String
                      description: Lower bound - inclusive.
                    - name: upperBound
                      output: true
                      type: String
                      description: Upper bound - exclusive.
          - name: memoryBytesHistogram
            output: true
            type: NestedObject
            description: |-
              A Histogram Chart shows a distribution of values into buckets, showing
              a count of values which fall into a bucket.
            properties:
              - name: buckets
