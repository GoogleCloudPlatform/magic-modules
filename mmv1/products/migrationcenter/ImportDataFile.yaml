---
name: ImportDataFile
description: ImportDataFile represents a user-uploaded data payload file containing infrastructure discovery data.
base_url: projects/{{project}}/locations/{{location}}/importJobs/{{import_job}}/importDataFiles
immutable: true
self_link: projects/{{project}}/locations/{{location}}/importJobs/{{import_job}}/importDataFiles/{{import_data_file_id}}
create_url: projects/{{project}}/locations/{{location}}/importJobs/{{import_job}}/importDataFiles?importDataFileId={{import_data_file_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/importJobs/{{import_job}}/importDataFiles/{{import_data_file_id}}
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - delete
  result:
    resource_inside_response: true
autogen_status: SW1wb3J0RGF0YUZpbGU=
autogen_async: true
examples:
  - name: 'migration_center_import_data_file_basic'
    primary_resource_id: 'default'
    vars:
      import_data_file_id: 'import-data-file-test'
      import_job_id: 'import-job-test'
      source_id: 'source-test'
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: import_job
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: importDataFileId
    type: String
    required: true
    description: The ID of the new data file.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: The timestamp when the file was created.
    output: true
  - name: displayName
    type: String
    description: User-friendly display name. Maximum length is 63 characters.
  - name: format
    type: String
    required: true
    description: |-
      Possible values:
      IMPORT_JOB_FORMAT_RVTOOLS_XLSX
      IMPORT_JOB_FORMAT_RVTOOLS_CSV
      IMPORT_JOB_FORMAT_EXPORTED_AWS_CSV
      IMPORT_JOB_FORMAT_EXPORTED_AZURE_CSV
      IMPORT_JOB_FORMAT_STRATOZONE_CSV
      IMPORT_JOB_FORMAT_DATABASE_ZIP
  - name: name
    type: String
    description: The name of the file.
    output: true
  - name: state
    type: String
    description: |-
      The state of the import data file.
      Possible values:
      CREATING
      ACTIVE
    output: true
  - name: uploadFileInfo
    type: NestedObject
    output: true
    description: A resource that contains a URI to which a data file can be uploaded.
    properties:
      - name: headers
        type: KeyValuePairs
        description: The headers that were used to sign the URI.
        output: true
      - name: signedUri
        type: String
        description: Upload URI for the file.
        output: true
      - name: uriExpirationTime
        type: String
        description: Expiration time of the upload URI.
        output: true
