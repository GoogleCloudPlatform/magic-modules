---
name: Settings
description: Settings represents the global or regional settings configuration for a Migration Center project.
base_url: projects/{{project}}/locations/{{location}}/settings
self_link: projects/{{project}}/locations/{{location}}/settings
create_url: projects/{{project}}/locations/{{location}}/settings?updateMask=*
update_mask: true
create_verb: PATCH
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/settings
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - update
  result:
    resource_inside_response: true
exclude_delete: true
autogen_status: U2V0dGluZ3M=
autogen_async: true
examples:
  - name: 'migration_center_settings_basic'
    primary_resource_id: 'default'
    vars:
      pref_set_id: 'pref-set-test'
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
properties:
  - name: disableCloudLogging
    type: Boolean
    description: |-
      Disable Cloud Logging for the Migration Center API.
      Users are billed for the logs.
  - name: name
    type: String
    description: The name of the resource.
    output: true
  - name: preferenceSet
    type: String
    description: The preference set used by default for a project.
