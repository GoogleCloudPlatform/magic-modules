---
name: ImportJob
description: Description
base_url: projects/{{project}}/locations/{{location}}/importJobs
self_link: projects/{{project}}/locations/{{location}}/importJobs/{{import_job_id}}
create_url: projects/{{project}}/locations/{{location}}/importJobs?importJobId={{import_job_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/importJobs/{{import_job_id}}
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - update
    - delete
  result:
    resource_inside_response: true
autogen_status: SW1wb3J0Sm9i
autogen_async: true
examples:
  - name: 'migration_center_import_job_basic'
    primary_resource_id: 'default'
    vars:
      import_job_id: 'import-job-test'
      source_id: 'source-test'
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: importJobId
    type: String
    required: true
    description: ID of the import job.
    immutable: true
    url_param_only: true
properties:
  - name: assetSource
    type: String
    required: true
    description: Reference to a source.
  - name: completeTime
    type: String
    description: The timestamp when the import job was completed.
    output: true
  - name: createTime
    type: String
    description: The timestamp when the import job was created.
    output: true
  - name: displayName
    type: String
    description: User-friendly display name. Maximum length is 256 characters.
  - name: executionReport
    type: NestedObject
    description: A resource that reports result of the import job execution.
    properties:
      - name: executionErrors
        type: NestedObject
        description: A resource that aggregates errors across import job files.
        properties:
          - name: fileValidations
            type: Array
            description: List of errors found in files.
            item_type:
              type: NestedObject
              properties:
                - name: fileErrors
                  type: Array
                  description: List of file level errors.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: errorDetails
                        type: String
                        description: The error information.
                      - name: severity
                        type: String
                        description: |-
                          The severity of the error.
                          Possible values:
                          ERROR
                          WARNING
                          INFO
                - name: fileName
                  type: String
                  description: The name of the file.
                - name: partialReport
                  type: Boolean
                  description: |-
                    Flag indicating that processing was aborted due to maximum number of
                    errors.
                - name: rowErrors
                  type: Array
                  description: Partial list of rows that encountered validation error.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: archiveError
                        type: NestedObject
                        description: Error details for an archive file.
                        properties:
                          - name: csvError
                            type: NestedObject
                            description: Error details for a CSV file.
                            properties:
                              - name: rowNumber
                                type: Integer
                                description: The row number where the error was detected.
                          - name: filePath
                            type: String
                            description: The file path inside the archive where the error was detected.
                            output: true
                      - name: assetTitle
                        type: String
                        description: The asset title.
                        output: true
                      - name: csvError
                        type: NestedObject
                        description: Error details for a CSV file.
                        properties:
                          - name: rowNumber
                            type: Integer
                            description: The row number where the error was detected.
                      - name: errors
                        type: Array
                        description: The list of errors detected in the row.
                        item_type:
                          type: NestedObject
                          properties:
                            - name: errorDetails
                              type: String
                              description: The error information.
                            - name: severity
                              type: String
                              description: |-
                                The severity of the error.
                                Possible values:
                                ERROR
                                WARNING
                                INFO
                      - name: rowNumber
                        type: Integer
                        description: The row number where the error was detected.
                      - name: vmName
                        type: String
                        description: The name of the VM in the row.
                      - name: vmUuid
                        type: String
                        description: The VM UUID.
                      - name: xlsxError
                        type: NestedObject
                        description: Error details for an XLSX file.
                        properties:
                          - name: rowNumber
                            type: Integer
                            description: The row number where the error was detected.
                          - name: sheet
                            type: String
                            description: The name of the sheet where the error was detected.
          - name: jobErrors
            type: Array
            description: List of job level errors.
            item_type:
              type: NestedObject
              properties:
                - name: errorDetails
                  type: String
                  description: The error information.
                - name: severity
                  type: String
                  description: |-
                    The severity of the error.
                    Possible values:
                    ERROR
                    WARNING
                    INFO
      - name: framesReported
        type: Integer
        description: Total number of asset frames reported for the import job.
      - name: totalRowsCount
        type: Integer
        description: Total number of rows in the import job.
        output: true
  - name: labels
    type: KeyValueLabels
    description: Labels as key value pairs.
  - name: name
    type: String
    description: The full name of the import job.
    output: true
  - name: state
    type: String
    description: |-
      The state of the import job.
      Possible values:
      IMPORT_JOB_STATE_PENDING
      IMPORT_JOB_STATE_RUNNING
      IMPORT_JOB_STATE_COMPLETED
      IMPORT_JOB_STATE_FAILED
      IMPORT_JOB_STATE_VALIDATING
      IMPORT_JOB_STATE_FAILED_VALIDATION
      IMPORT_JOB_STATE_READY
    output: true
  - name: updateTime
    type: String
    description: The timestamp when the import job was last updated.
    output: true
  - name: validationReport
    type: NestedObject
    description: A resource that aggregates errors across import job files.
    properties:
      - name: fileValidations
        type: Array
        description: List of errors found in files.
        item_type:
          type: NestedObject
          properties:
            - name: fileErrors
              type: Array
              description: List of file level errors.
              item_type:
                type: NestedObject
                properties:
                  - name: errorDetails
                    type: String
                    description: The error information.
                  - name: severity
                    type: String
                    description: |-
                      The severity of the error.
                      Possible values:
                      ERROR
                      WARNING
                      INFO
            - name: fileName
              type: String
              description: The name of the file.
            - name: partialReport
              type: Boolean
              description: |-
                Flag indicating that processing was aborted due to maximum number of
                errors.
            - name: rowErrors
              type: Array
              description: Partial list of rows that encountered validation error.
              item_type:
                type: NestedObject
                properties:
                  - name: archiveError
                    type: NestedObject
                    description: Error details for an archive file.
                    properties:
                      - name: csvError
                        type: NestedObject
                        description: Error details for a CSV file.
                        properties:
                          - name: rowNumber
                            type: Integer
                            description: The row number where the error was detected.
                      - name: filePath
                        type: String
                        description: The file path inside the archive where the error was detected.
                        output: true
                  - name: assetTitle
                    type: String
                    description: The asset title.
                    output: true
                  - name: csvError
                    type: NestedObject
                    description: Error details for a CSV file.
                    properties:
                      - name: rowNumber
                        type: Integer
                        description: The row number where the error was detected.
                  - name: errors
                    type: Array
                    description: The list of errors detected in the row.
                    item_type:
                      type: NestedObject
                      properties:
                        - name: errorDetails
                          type: String
                          description: The error information.
                        - name: severity
                          type: String
                          description: |-
                            The severity of the error.
                            Possible values:
                            ERROR
                            WARNING
                            INFO
                  - name: rowNumber
                    type: Integer
                    description: The row number where the error was detected.
                  - name: vmName
                    type: String
                    description: The name of the VM in the row.
                  - name: vmUuid
                    type: String
                    description: The VM UUID.
                  - name: xlsxError
                    type: NestedObject
                    description: Error details for an XLSX file.
                    properties:
                      - name: rowNumber
                        type: Integer
                        description: The row number where the error was detected.
                      - name: sheet
                        type: String
                        description: The name of the sheet where the error was detected.
      - name: jobErrors
        type: Array
        description: List of job level errors.
        item_type:
          type: NestedObject
          properties:
            - name: errorDetails
              type: String
              description: The error information.
            - name: severity
              type: String
              description: |-
                The severity of the error.
                Possible values:
                ERROR
                WARNING
                INFO
