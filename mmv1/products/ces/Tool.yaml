  - name: connectorTool
    type: NestedObject
    description: A ConnectorTool allows connections to different integrations.
    output: true
    properties:
      - name: connection
        type: String
        description: |-
          The full resource name of the referenced Integration Connectors Connection. Format: projects/{project}/locations/{location}/connections/{connection}
        output: true
      - name: action
        type: NestedObject
        description: Action for the tool to use.
        output: true
        properties:
          - name: inputFields
            type: Array
            description: Entity fields to use as inputs for the operation.
            output: true
            item_type:
              type: String
          - name: outputFields
            type: Array
            description: Entity fields to return from the operation.
            output: true
            item_type:
              type: String
          - name: connectionActionId
            type: String
            description: ID of a Connection action for the tool to use.
            output: true
          - name: entityOperation
            type: NestedObject
            description: Entity operation configuration for the tool to use.
            output: true
            properties:
              - name: entityId
                type: String
                description: ID of the entity.
                output: true
              - name: operation
                type: String
                description: |-
                  Operation to perform on the entity.
                  Possible values:
                  OPERATION_TYPE_UNSPECIFIED
                  LIST
                  GET
                  CREATE
                  UPDATE
                  DELETE
                output: true
      - name: authConfig
        type: String
        description: |-
          Configures how authentication is handled in Integration Connectors. By default, an admin authentication is passed in the Integration Connectors API requests. You can override it with a different end-user authentication config. Note: The Connection must have authentication override enabled in order to specify an EUC configuration here - otherwise, the ConnectorTool creation will fail. See https://cloud.google.com/application-integration/docs/configure-connectors-task#configure-authentication-override for details. Represents a JSON object.
        output: true
        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
      - name: name
        type: String
        description: The name of the tool that can be used by the Agent to decide whether to call this ConnectorTool.
        output: true
      - name: description
        type: String
        description: The description of the tool that can be used by the Agent to decide whether to call this ConnectorTool.
        output: true
  - name: createTime
    type: String
    description: Timestamp when the tool was created.
    output: true
  - name: dataStoreTool
    type: NestedObject
    description: |-
      Tool to retrieve from Vertex AI Search datastore or engine for grounding.
      Accepts either a datastore or an engine, but not both.
      See Vertex AI Search:
      https://cloud.google.com/generative-ai-app-builder/docs/enterprise-search-introduction.
    properties:
      - name: boostSpecs
        type: Array
        description: Boost specification to boost certain documents.
        item_type:
          type: NestedObject
          properties:
            - name: dataStores
              type: Array
              description: |-
                The Data Store where the boosting configuration is applied. Full resource
                name of DataStore, such as
                projects/{project}/locations/{location}/collections/{collection}/dataStores/{dataStore}.
              required: true
              item_type:
                type: String
            - name: spec
              type: Array
              description: A list of boosting specifications.
              required: true
              item_type:
                type: NestedObject
                properties:
                  - name: conditionBoostSpecs
                    type: Array
                    description: A list of boosting specifications.
                    required: true
                    item_type:
                      type: NestedObject
                      properties:
                        - name: boost
                          type: Double
                          description: |-
                            Strength of the boost, which should be in [-1, 1]. Negative boost means
                            demotion. Default is 0.0.
                            Setting to 1.0 gives the suggestions a big promotion. However, it does
                            not necessarily mean that the top result will be a boosted suggestion.
                            Setting to -1.0 gives the suggestions a big demotion. However, other
                            suggestions that are relevant might still be shown.
                            Setting to 0.0 means no boost applied. The boosting condition is
                            ignored.
                        - name: boostControlSpec
                          type: NestedObject
                          description: |-
                            Specification for custom ranking based on customer specified attribute
                            value. It provides more controls for customized ranking than the simple
                            (condition, boost) combination above.
                          properties:
                            - name: attributeType
                              type: String
                              description: |-
                                The attribute type to be used to determine the boost amount. The
                                attribute value can be derived from the field value of the specified
                                field_name. In the case of numerical it is straightforward i.e.
                                attribute_value = numerical_field_value. In the case of freshness
                                however, attribute_value = (time.now() - datetime_field_value).
                                Possible values:
                                NUMERICAL
                                FRESHNESS
                            - name: controlPoints
                              type: Array
                              description: |-
                                The control points used to define the curve. The monotonic function
                                (defined through the interpolation_type above) passes through the
                                control points listed here.
                              item_type:
                                type: NestedObject
                                properties:
                                  - name: attributeValue
                                    type: String
                                    description: |-
                                      Can be one of:
                                      1. The numerical field value.
                                      2. The duration spec for freshness:
                                      The value must be formatted as an XSD `dayTimeDuration` value (a
                                      restricted subset of an ISO 8601 duration value). The pattern for
                                      this is: `nDnM]`.
                                  - name: boostAmount
                                    type: Double
                                    description: |-
                                      The value between -1 to 1 by which to boost the score if the
                                      attribute_value evaluates to the value specified above.
                            - name: fieldName
                              type: String
                              description: |-
                                The name of the field whose value will be used to determine the
                                boost amount.
                            - name: interpolationType
                              type: String
                              description: |-
                                The interpolation type to be applied to connect the control points
                                listed below.
                                Possible values:
                                LINEAR
                        - name: condition
                          type: String
                          description: |-
                            An expression which specifies a boost condition. The syntax is the same
                            as filter expression syntax. Currently, the only supported condition is
                            a list of BCP-47 lang codes.
                            Example: To boost suggestions in languages en or fr:
                            (lang_code: ANY("en", "fr"))
                          required: true
      - name: dataStoreSource
        type: NestedObject
        description: Optional. Search within a single specific DataStore.
        conflicts:
          - engineSource
        properties:
          - name: filter
            type: String
            description: |-
              Optional. Filter specification for the DataStore.
              See: https://cloud.google.com/generative-ai-app-builder/docs/filter-search-metadata
          - name: dataStore
            type: NestedObject
            description: Optional. The data store.
            properties:
              - name: connectorConfig
                type: NestedObject
                description: The connector config for the data store connection.
                output: true
                properties:
                  - name: collection
                    type: String
                    description: Resource name of the collection the data store belongs to.
                    output: true
                  - name: collectionDisplayName
                    type: String
                    description: Display name of the collection the data store belongs to.
                    output: true
                  - name: dataSource
                    type: String
                    description: |-
                      The name of the data source.
                      Example: `salesforce`, `jira`, `confluence`, `bigquery`.
                    output: true
              - name: createTime
                type: String
                description: Timestamp when the data store was created.
                output: true
              - name: displayName
                type: String
                description: The display name of the data store.
                output: true
              - name: documentProcessingMode
                type: String
                description: |-
                  The document processing mode for the data store connection.
                  Only set for PUBLIC_WEB and UNSTRUCTURED data stores.
                  Possible values:
                  DOCUMENTS
                  CHUNKS
                output: true
              - name: name
                type: String
                description: |-
                  Full resource name of the DataStore.
                  Format: projects/{project}/locations/{location}/collections/{collection}/dataStores/{dataStore}
                required: true
              - name: type
                type: String
                description: |-
                  The type of the data store. This field is readonly and populated by the
                  server.
                  Possible values:
                  PUBLIC_WEB
                  UNSTRUCTURED
                  FAQ
                  CONNECTOR
                output: true
      - name: description
        type: String
        description: The tool description.
      - name: engineSource
        type: NestedObject
        description: |-
          Configuration for searching within an Engine, potentially targeting
          specific DataStores.
        conflicts:
          - dataStoreSource
        properties:
          - name: dataStoreSources
            type: Array
            description: |-
              Use to target specific DataStores within the Engine.
              If empty, the search applies to all DataStores associated with the
              Engine.
            item_type:
              type: NestedObject
              properties:
                - name: dataStore
                  type: NestedObject
                  description: A DataStore resource in Vertex AI Search.
                  properties:
                    - name: connectorConfig
                      type: NestedObject
                      description: The connector config for the data store connection.
                      output: true
                      properties:
                        - name: collection
                          type: String
                          description: Resource name of the collection the data store belongs to.
                          output: true
                        - name: collectionDisplayName
                          type: String
                          description: Display name of the collection the data store belongs to.
                          output: true
                        - name: dataSource
                          type: String
                          description: |-
                            The name of the data source.
                            Example: `salesforce`, `jira`, `confluence`, `bigquery`.
                          output: true
                    - name: createTime
                      type: String
                      description: Timestamp when the data store was created.
                      output: true
                    - name: displayName
                      type: String
                      description: The display name of the data store.
                      output: true
                    - name: documentProcessingMode
                      type: String
                      description: |-
                        The document processing mode for the data store connection.
                        Only set for PUBLIC_WEB and UNSTRUCTURED data stores.
                        Possible values:
                        DOCUMENTS
                        CHUNKS
                      output: true
                    - name: name
                      type: String
                      description: |-
                        Full resource name of the DataStore.
                        Format:
                        `projects/{project}/locations/{location}/collections/{collection}/dataStores/{dataStore}`
                      required: true
                    - name: type
                      type: String
                      description: |-
                        The type of the data store. This field is readonly and populated by the
                        server.
                        Possible values:
                        PUBLIC_WEB
                        UNSTRUCTURED
                        FAQ
                        CONNECTOR
                      output: true
                - name: filter
                  type: String
                  description: |-
                    Filter specification for the DataStore.
                    See:
                    https://cloud.google.com/generative-ai-app-builder/docs/filter-search-metadata
          - name: engine
            type: String
            description: |-
              Full resource name of the Engine.
              Format:
              `projects/{project}/locations/{location}/collections/{collection}/engines/{engine}`
            required: true
          - name: filter
            type: String
            description: |-
              A filter applied to the search across the Engine. Not relevant and not
              used if 'data_store_sources' is provided.
              See:
              https://cloud.google.com/generative-ai-app-builder/docs/filter-search-metadata
      - name: filterParameterBehavior
        type: Enum
        description: |-
          Optional. The filter parameter behavior.
          Possible values:
          FILTER_PARAMETER_BEHAVIOR_UNSPECIFIED
          ALWAYS_INCLUDE
          NEVER_INCLUDE
        enum_values:
          - 'FILTER_PARAMETER_BEHAVIOR_UNSPECIFIED'
          - 'ALWAYS_INCLUDE'
          - 'NEVER_INCLUDE'
      - name: maxResults
        type: Integer
        description: |-
          Number of search results to return per query.
          The default value is 10. The maximum allowed value is 10.
        deprecation_message: '`max_results` is deprecated and will be removed in a future release.'
      - name: modalityConfigs
        type: Array
        description: The modality configs for the data store.
        item_type:
          type: NestedObject
          properties:
            - name: groundingConfig
              type: NestedObject
              description: Grounding configuration.
              properties:
                - name: disabled
                  type: Boolean
                  description: Whether grounding is disabled.
                - name: groundingLevel
                  type: Double
                  description: |-
                    The groundedness threshold of the answer based on the retrieved sources.
                    The value has a configurable range of [1, 5]. The level is used to
                    threshold the groundedness of the answer, meaning that all responses with
                    a groundedness score below the threshold will fall back to returning
                    relevant snippets only.
                    For example, a level of 3 means that the groundedness score must be
                    3 or higher for the response to be returned.
            - name: modalityType
              type: String
              description: |-
                The modality type.
                Possible values:
                TEXT
                AUDIO
              required: true
            - name: rewriterConfig
              type: NestedObject
              description: Rewriter configuration.
              properties:
                - name: disabled
                  type: Boolean
                  description: Whether the rewriter is disabled.
                - name: modelSettings
                  type: NestedObject
                  description: Model settings contains various configurations for the LLM model.
                  required: true
                  properties:
                    - name: model
                      type: String
                      description: |-
                        The LLM model that the agent should use.
                        If not set, the agent will inherit the model from its parent agent.
                    - name: temperature
                      type: Double
                      description: |-
                        If set, this temperature will be used for the LLM model. Temperature
                        controls the randomness of the model's responses. Lower temperatures
                        produce responses that are more predictable. Higher temperatures produce
                        responses that are more creative.
                - name: prompt
                  type: String
                  description: The prompt definition. If not set, default prompt will be used.
            - name: summarizationConfig
              type: NestedObject
              description: Summarization configuration.
              properties:
                - name: disabled
                  type: Boolean
                  description: Whether summarization is disabled.
                - name: modelSettings
                  type: NestedObject
                  description: Model settings contains various configurations for the LLM model.
                  properties:
                    - name: model
                      type: String
                      description: |-
                        The LLM model that the agent should use.
                        If not set, the agent will inherit the model from its parent agent.
                    - name: temperature
                      type: Double
                      description: |-
                        If set, this temperature will be used for the LLM model. Temperature
                        controls the randomness of the model's responses. Lower temperatures
                        produce responses that are more predictable. Higher temperatures produce
                        responses that are more creative.
                - name: prompt
                  type: String
                  description: The prompt definition. If not set, default prompt will be used.
      - name: name
        type: String
        description: The data store tool name.
        required: true
  - name: displayName
    type: String
    description: |-
      The display name of the tool, derived based on the tool's type. For
      example, display name of a ClientFunction is derived
      from its `name` property.
    output: true
  - name: etag
    type: String
    description: |-
      Etag used to ensure the object hasn't changed during a read-modify-write
      operation. If the etag is empty, the update will overwrite any concurrent
      changes.
    output: true
  - name: executionType
    type: String
    description: |-
      Possible values:
      SYNCHRONOUS
      ASYNCHRONOUS
  - name: fileSearchTool
    type: NestedObject
    description: |-
      The file search tool allows the agent to search across the files uploaded by the
      app/agent developer.
    properties:
      - name: corpusType
        type: Enum
        description: |-
          Optional. The type of the corpus. Default is FULLY_MANAGED.
          Possible values:
          CORPUS_TYPE_UNSPECIFIED
          USER_OWNED
          FULLY_MANAGED
        enum_values:
          - 'CORPUS_TYPE_UNSPECIFIED'
          - 'USER_OWNED'
          - 'FULLY_MANAGED'
      - name: name
        type: String
        description: Required. The tool name.
        required: true
      - name: description
        type: String
        description: Optional. The tool description.
      - name: fileCorpus
        type: String
        description: |-
          Optional. The corpus where files are stored.
          Format: projects/{project}/locations/{location}/ragCorpora/{rag_corpus}
  - name: generatedSummary
    type: String
    description: |-
      If the tool is generated by the LLM assistant, this field contains a
      descriptive summary of the generation.
    output: true
  - name: googleSearchTool
    type: NestedObject
    description: |-
      Represents a tool to perform Google web searches for grounding.
      See
      https://cloud.google.com/vertex-ai/generative-ai/docs/grounding/grounding-with-google-search.
    properties:
      - name: contextUrls
        type: Array
        description: |-
          Content will be fetched directly from these URLs for context and grounding.
          More details: https://cloud.google.com/vertex-ai/generative-ai/docs/url-context.
          Example: "https://example.com/path.html". A maximum of 20 URLs are allowed.
        item_type:
          type: String
      - name: description
        type: String
        description: Description of the tool's purpose.
      - name: excludeDomains
        type: Array
        description: |-
          List of domains to be excluded from the search results.
          Example: "example.com".
          A maximum of 2000 domains can be excluded.
        item_type:
          type: String
      - name: name
        type: String
        description: The name of the tool.
        required: true
      - name: preferredDomains
        type: Array
        description: |-
          Specifies domain names to guide the search.
          The model will be instructed to prioritize these domains
          when formulating queries for google search.
          This is a best-effort hint and these domains may or may
          not be exclusively reflected in the final search results.
          Example: "example.com", "another.site".
          A maximum of 20 domains can be specified.
        item_type:
          type: String
      - name: promptConfig
        type: NestedObject
        description: |-
          Optional. Prompt instructions passed to planner on how the search results should be
          processed for text and voice.
        properties:
          - name: textPrompt
            type: String
            description: |-
              Optional. Defines the prompt used for the system instructions when interacting with the
              agent in chat conversations. If not set, default prompt will be used.
          - name: voicePrompt
            type: String
            description: |-
              Optional. Defines the prompt used for the system instructions when interacting with the
              agent in voice conversations. If not set, default prompt will be used.
  - name: mcpTool
    type: NestedObject
    description: An MCP tool.
    output: true
    properties:
      - name: name
        type: String
        description: The name of the MCP tool.
        output: true
      - name: nameOverride
        type: String
        description: The name override of the MCP tool. This is populated if the name was overridden by a Toolset override.
        output: true
      - name: description
        type: String
        description: The description of the MCP tool.
        output: true
      - name: inputSchema
        type: String
        description: The schema of the input arguments of the MCP tool. Represents a JSON object.
        output: true
        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
      - name: outputSchema
        type: String
        description: The schema of the output arguments of the MCP tool. Represents a JSON object.
        output: true
        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
      - name: serverAddress
        type: String
        description: |-
          The server address of the MCP server, e.g., "https://example.com/mcp/". If the server is built with the MCP SDK, the url should be suffixed with "/mcp/". Only Streamable HTTP transport based servers are supported. This is the same as the serverAddress in the McpToolset.
        output: true
      - name: apiAuthentication
        type: NestedObject
        description: Authentication information required to access tools and execute a tool against the MCP server. For API key auth, the API key can only be sent in the request header; sending it via query parameters is not supported.
        output: true
        properties:
          - name: apiKeyConfig
            type: NestedObject
            description: Configurations for authentication with API key.
            output: true
            properties:
              - name: apiKeySecretVersion
                type: String
                description: |-
                  The name of the SecretManager secret version resource storing the API key.
                  Format: `projects/{project}/secrets/{secret}/versions/{version}`
                  Note: You should grant `roles/secretmanager.secretAccessor` role to the CES
                  service agent
                  `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                output: true
              - name: keyName
                type: String
                description: |-
                  The parameter name or the header name of the API key.
                  E.g., If the API request is "https://example.com/act?X-Api-Key=", "X-Api-Key" would be the parameter name.
                output: true
              - name: requestLocation
                type: String
                description: |-
                  Key location in the request. For API key auth on MCP toolsets,
                  the API key can only be sent in the request header.
                  Possible values:
                  HEADER
                output: true
          - name: bearerTokenConfig
            type: NestedObject
            description: Configurations for authentication with a bearer token.
            output: true
            properties:
              - name: token
                type: String
                description: The bearer token. Must be in the format $context.variables.<name_of_variable>.
                output: true
          - name: oauthConfig
            type: NestedObject
            description: Configurations for authentication with OAuth.
            output: true
            properties:
              - name: clientId
                type: String
                description: The client ID from the OAuth provider.
                output: true
              - name: clientSecretVersion
                type: String
                description: |-
                  The name of the SecretManager secret version resource storing the
                  client secret.
                  Format: `projects/{project}/secrets/{secret}/versions/{version}`
                  Note: You should grant `roles/secretmanager.secretAccessor` role to the CES
                  service agent
                  `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                output: true
              - name: oauthGrantType
                type: String
                description: |-
                  OAuth grant types.
                  Possible values:
                  CLIENT_CREDENTIAL
                output: true
              - name: scopes
                type: Array
                description: The OAuth scopes to grant.
                output: true
                item_type:
                  type: String
              - name: tokenEndpoint
                type: String
                description: The token endpoint in the OAuth provider to exchange for an access token.
                output: true
          - name: serviceAccountAuthConfig
            type: NestedObject
            description: Configurations for authentication using a custom service account.
            output: true
            properties:
              - name: scopes
                type: Array
                description: The OAuth scopes to grant.
                output: true
                item_type:
                  type: String
              - name: serviceAccount
                type: String
                description: |-
                  The email address of the service account used for authenticatation. CES
                  uses this service account to exchange an access token and the access token
                  is then sent in the `Authorization` header of the request.
                  The service account must have the
                  `roles/iam.serviceAccountTokenCreator` role granted to the
                  CES service agent
                  `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                output: true
          - name: serviceAgentIdTokenAuthConfig
            type: NestedObject
            description: |-
              Configurations for authentication with [ID
              token](https://cloud.google.com/docs/authentication/token-types#id) generated
              from service agent.
            output: true
            properties: []
      - name: tlsConfig
        type: NestedObject
        description: The TLS configuration. Includes the custom server certificates that the client should trust.
        output: true
        properties:
          - name: caCerts
            type: Array
            description: Specifies a list of allowed custom CA certificates for HTTPS verification.
            output: true
            item_type:
              type: NestedObject
              properties:
                - name: cert
                  type: String
                  description: |-
                    The allowed custom CA certificates (in DER format) for
                    HTTPS verification. This overrides the default SSL trust store. If this
                    is empty or unspecified, CES will use Google's default trust
                    store to verify certificates. N.B. Make sure the HTTPS server
                    certificates are signed with "subject alt name". For instance a
                    certificate can be self-signed using the following command,
                    openssl x509 -req -days 200 -in example.com.csr \
                    -signkey example.com.key \
                    -out example.com.crt \
                    -extfile <(printf "\nsubjectAltName='DNS:www.example.com'")
                  output: true
                - name: displayName
                  type: String
                  description: The name of the allowed custom CA certificates. This can be used to disambiguate the custom CA certificates.
                  output: true
      - name: serviceDirectoryConfig
        type: NestedObject
        description: Service Directory configuration for VPC-SC, used to resolve service names within a perimeter.
        output: true
        properties:
          - name: service
            type: String
            description: |-
              The name of [Service
              Directory](https://cloud.google.com/service-directory) service.
              Format:
              `projects/{project}/locations/{location}/namespaces/{namespace}/services/{service}`.
              Location of the service directory must be the same as the location of the
              app.
            output: true
      - name: customHeaders
        type: KeyValuePairs
        description: |-
          The custom headers to send in the request to the MCP server. The values must be in the format `$context.variables.<name_of_variable>` and can be set in the session variables.
        output: true
      - name: state
        type: String
        description: |-
          The state of the MCP tool.
          Possible values:
          STATE_UNSPECIFIED
          ACTIVE
          INACTIVE
          STALE
        output: true
  - name: name
    type: String
    description: |-
      Identifier. The unique identifier of the tool.
      Format:
      `projects/{project}/locations/{location}/apps/{app}/tools/{tool}`
    output: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
  - name: openApiTool
    type: NestedObject
    description: A remote API tool defined by an OpenAPI schema.
    output: true
    properties:
      - name: apiAuthentication
        type: NestedObject
        description: Authentication information required for API calls.
        output: true
        properties:
          - name: apiKeyConfig
            type: NestedObject
            description: Configurations for authentication with API key.
            output: true
            properties:
              - name: apiKeySecretVersion
                type: String
                description: |-
                  The name of the SecretManager secret version resource storing the API key.
                  Format: `projects/{project}/secrets/{secret}/versions/{version}`
                  Note: You should grant `roles/secretmanager.secretAccessor` role to the CES
                  service agent
                  `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                output: true
              - name: keyName
                type: String
                description: |-
                  The parameter name or the header name of the API key.
                  E.g., If the API request is "https://example.com/act?X-Api-Key=", "X-Api-Key" would be the parameter name.
                output: true
              - name: requestLocation
                type: String
                description: |-
                  Key location in the request.
                  Possible values:
                  HEADER
                  QUERY_STRING
                output: true
          - name: bearerTokenConfig
            type: NestedObject
            description: Configurations for authentication with a bearer token.
            output: true
            properties:
              - name: token
                type: String
                description: The bearer token. Must be in the format $context.variables.<name_of_variable>.
                output: true
          - name: oauthConfig
            type: NestedObject
            description: Configurations for authentication with OAuth.
            output: true
            properties:
              - name: clientId
                type: String
                description: The client ID from the OAuth provider.
                output: true
              - name: clientSecretVersion
                type: String
                description: |-
                  The name of the SecretManager secret version resource storing the
                  client secret.
                  Format: `projects/{project}/secrets/{secret}/versions/{version}`
                  Note: You should grant `roles/secretmanager.secretAccessor` role to the CES
                  service agent
                  `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                output: true
              - name: oauthGrantType
                type: String
                description: |-
                  OAuth grant types.
                  Possible values:
                  CLIENT_CREDENTIAL
                output: true
              - name: scopes
                type: Array
                description: The OAuth scopes to grant.
                output: true
                item_type:
                  type: String
              - name: tokenEndpoint
                type: String
                description: The token endpoint in the OAuth provider to exchange for an access token.
                output: true
          - name: serviceAccountAuthConfig
            type: NestedObject
            description: Configurations for authentication using a custom service account.
            output: true
            properties:
              - name: scopes
                type: Array
                description: The OAuth scopes to grant.
                output: true
                item_type:
                  type: String
              - name: serviceAccount
                type: String
                description: |-
                  The email address of the service account used for authenticatation. CES
                  uses this service account to exchange an access token and the access token
                  is then sent in the `Authorization` header of the request.
                  The service account must have the
                  `roles/iam.serviceAccountTokenCreator` role granted to the
                  CES service agent
                  `service-<PROJECT-NUMBER>@gcp-sa-ces.iam.gserviceaccount.com`.
                output: true
          - name: serviceAgentIdTokenAuthConfig
            type: NestedObject
            description: |-
              Configurations for authentication with [ID
              token](https://cloud.google.com/docs/authentication/token-types#id) generated
              from service agent.
            allow_empty_object: true
            send_empty_value: true
            output: true
            properties: [] # Explicitly show no properties
      - name: description
        type: String
        description: |-
          The description of the tool. If not provided, the description of the tool
          will be derived from the OpenAPI schema, from `operation.description` or
          `operation.summary`.
        output: true
      - name: ignoreUnknownFields
        type: Boolean
        description: If true, the agent will ignore unknown fields in the API response.
        output: true
      - name: name
        type: String
        description: |-
          The name of the tool. If not provided, the name of the tool will be
          derived from the OpenAPI schema, from `operation.operationId`.
        output: true
      - name: openApiSchema
        type: String
        description: The OpenAPI schema in JSON or YAML format.
        output: true
      - name: serviceDirectoryConfig
        type: NestedObject
        description: Configuration for tools using Service Directory.
        output: true
        properties:
          - name: service
            type: String
            description: |-
              The name of [Service
              Directory](https://cloud.google.com/service-directory) service.
              Format:
              `projects/{project}/locations/{location}/namespaces/{namespace}/services/{service}`.
              Location of the service directory must be the same as the location of the
              app.
            output: true
      - name: tlsConfig
        type: NestedObject
        description: The TLS configuration.
        output: true
        properties:
          - name: caCerts
            type: Array
            description: |-
              Specifies a list of allowed custom CA certificates for HTTPS
              verification.
            output: true
            item_type:
              type: NestedObject
              properties:
                - name: cert
                  type: String
                  description: |-
                    The allowed custom CA certificates (in DER format) for
                    HTTPS verification. This overrides the default SSL trust store. If this
                    is empty or unspecified, CES will use Google's default trust
                    store to verify certificates. N.B. Make sure the HTTPS server
                    certificates are signed with "subject alt name". For instance a
                    certificate can be self-signed using the following command,
                    openssl x509 -req -days 200 -in example.com.csr \
                    -signkey example.com.key \
                    -out example.com.crt \
                    -extfile <(printf "\nsubjectAltName='DNS:www.example.com'")

                    A base64-encoded string.
                  output: true
                - name: displayName
                  type: String
                  description: |-
                    The name of the allowed custom CA certificates. This
                    can be used to disambiguate the custom CA certificates.
                  output: true
      - name: url
        type: String
        description: |-
          The server URL of the Open API schema. This field is only set in tools in the
          environment dependencies during the export process if the schema contains a
          server url. During the import process, if this url is present in the environment
          dependencies and the schema has the $env_var placeholder, it will replace the
          placeholder in the schema.
        output: true
  - name: pythonFunction
    type: NestedObject
    description: A Python function tool.
    properties:
      - name: description
        type: String
        description: |-
          The description of the Python function, parsed from the python code's
          docstring.
        output: true
      - name: name
        type: String
        description: |-
          The name of the Python function to execute. Must match a Python function
          name defined in the python code. Case sensitive. If the name is not
          provided, the first function defined in the python code will be used.
      - name: pythonCode
        type: String
        description: The Python code to execute for the tool.
      - name: serviceDirectoryConfig
        type: NestedObject
        description: Service Directory configuration for VPC-SC, used to resolve service names within a perimeter.
        properties:
          - name: service
            type: String
            description: |-
              The name of [Service Directory](https://cloud.google.com/service-directory) service.
              Format: projects/{project}/locations/{location}/namespaces/{namespace}/services/{service}
            required: true
  - name: updateTime
    type: String
    description: Timestamp when the tool was last updated.
    output: true
  - name: remoteAgentTool
    type: NestedObject
    description: Represents a tool that allows the agent to call another remote agent.
    output: true
    properties:
      - name: name
        type: String
        description: The name of the tool.
        output: true
      - name: description
        type: String
        description: The description of the tool.
        output: true
      - name: agentCard
        type: NestedObject
        description: The agent card of the remote agent that this tool invokes.
        output: true
        properties:
          - name: name
            type: String
            description: A human-readable name for the agent.
            output: true
          - name: description
            type: String
            description: A description of the agent's domain of action/solution space.
            output: true
          - name: version
            type: String
            description: The version of the agent.
            output: true
          - name: supportedInterfaces
            type: Array
            description: Ordered list of supported interfaces. The first entry is preferred.
            output: true
            item_type:
              type: NestedObject
              properties:
                - name: url
                  type: String
                  description: |-
                    The URL where this interface is available. Must be a valid absolute
                    HTTPS URL in production.
                  output: true
                - name: protocolBinding
                  type: String
                  description: |-
                    The protocol binding supported at this URL. The core ones officially
                    supported are JSONRPC, GRPC and HTTP+JSON.
                  output: true
                - name: tenant
                  type: String
                  description: Tenant ID to be used in the request when calling the agent.
                  output: true
                - name: protocolVersion
                  type: String
                  description: |-
                    The version of the A2A protocol this interface exposes.
                    Examples: "0.3", "1.0"
                  output: true
          - name: skills
            type: Array
            description: |-
              Skills represent a unit of ability an agent can perform. This may
              somewhat abstract but represents a more focused set of actions that the agent is highly
              likely to succeed at.
            output: true
            item_type:
              type: NestedObject
              properties:
                - name: id
                  type: String
                  description: A unique identifier for the agent's skill.
                  output: true
                - name: name
                  type: String
                  description: A human-readable name for the skill.
                  output: true
                - name: description
                  type: String
                  description: A detailed description of the skill.
                  output: true
                - name: tags
                  type: Array
                  description: A set of keywords describing the skill's capabilities.
                  output: true
                  item_type:
                    type: String
                - name: examples
                  type: Array
                  description: Example prompts or scenarios that this skill can handle.
                  output: true
                  item_type:
                    type: String
                - name: inputModes
                  type: Array
                  description: |-
                    The set of supported input media types for this skill, overriding the agent's
                    defaults.
                  output: true
                  item_type:
                    type: String
                - name: outputModes
                  type: Array
                  description: |-
                    The set of supported output media types for this skill, overriding the agent's
                    defaults.
                  output: true
                  item_type:
                    type: String
  - name: systemTool
    type: NestedObject
    description: The system tool.
    output: true
    properties:
      - name: description
        type: String
        description: |-
          The description of the system tool.
        output: true
      - name: name
        type: String
        description: |-
          The name of the system tool.
        output: true
  - name: timeout
    type: String
    description: |-
      The timeout for the tool execution. If not set, the default timeout is 30
      seconds for SYNCHRONOUS tools and 60 seconds for ASYNCHRONOUS tools.
  - name: toolFakeConfig
    type: NestedObject
    description: Configuration for tool behavior in fake mode.
    properties:
      - name: enableFakeMode
        type: Boolean
        description: Whether the tool is using fake mode.
      - name: codeBlock
        type: NestedObject
        description: Code block which will be executed instead of a real tool call.
        properties:
          - name: pythonCode
            type: String
            required: true
            description: Python code which will be invoked in tool fake mode.
  - name: widgetTool
    type: NestedObject
    description: Represents a widget tool that the agent can invoke.
    properties:
      - name: name
        type: String
        description: Required. The display name of the widget tool.
        required: true
      - name: description
        type: String
        description: Optional. The description of the widget tool.
      - name: widgetType
        type: Enum
        description: |-
          Optional. The type of the widget tool. If not specified, the default type will be CUSTOMIZED.
          Possible values:
          WIDGET_TYPE_UNSPECIFIED
          CUSTOM
          PRODUCT_CAROUSEL
          PRODUCT_DETAILS
          QUICK_ACTIONS
          PRODUCT_COMPARISON
          ADVANCED_PRODUCT_DETAILS
          SHORT_FORM
          OVERALL_SATISFACTION
          ORDER_SUMMARY
          APPOINTMENT_DETAILS
          APPOINTMENT_SCHEDULER
          CONTACT_FORM
        enum_values:
          - 'WIDGET_TYPE_UNSPECIFIED'
          - 'CUSTOM'
          - 'PRODUCT_CAROUSEL'
          - 'PRODUCT_DETAILS'
          - 'QUICK_ACTIONS'
          - 'PRODUCT_COMPARISON'
          - 'ADVANCED_PRODUCT_DETAILS'
          - 'SHORT_FORM'
          - 'OVERALL_SATISFACTION'
          - 'ORDER_SUMMARY'
          - 'APPOINTMENT_DETAILS'
          - 'APPOINTMENT_SCHEDULER'
          - 'CONTACT_FORM'
      - name: uiConfig
        type: String
        description: Optional. Configuration for rendering the widget. Represents a JSON object.
        state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
        validation:
          function: 'validation.StringIsJSON'
        custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
        custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
      - name: dataMapping
        type: NestedObject
        description: |-
          Optional. The mapping that defines how data from a source tool is mapped to the
          widget's input parameters.
        properties:
          - name: sourceToolName
            type: String
            description: |-
              Optional. The resource name of the tool that provides the data for the widget (e.g., a search tool or a custom function).
              Format: projects/{project}/locations/{location}/agents/{agent}/tools/{tool}
          - name: fieldMappings
            type: KeyValuePairs
            description: |-
              Optional. A map of widget input parameter fields to the corresponding output fields of the source tool.
              An object containing a list of "key": value pairs. Example: { "name": "wrench", "mass": "1.3kg", "count": "3" }.
          - name: pythonFunction
            type: NestedObject
            description: |-
              Optional. Configuration for a Python function used to transform the source tool's
              output into the widget's input format.
            properties:
              - name: name
                type: String
                description: |-
                  Optional. The name of the Python function to execute. Must match a Python function
                  name defined in the python code. Case sensitive. If the name is not
                  provided, the first function defined in the python code will be used.
              - name: pythonCode
                type: String
                description: Optional. The Python code to execute for the tool.
              - name: serviceDirectoryConfig
                type: NestedObject
                description: Service Directory configuration for VPC-SC, used to resolve service names within a perimeter.
                properties:
                  - name: service
                    type: String
                    description: |-
                      The name of [Service Directory](https://cloud.google.com/service-directory) service.
                      Format: projects/{project}/locations/{location}/namespaces/{namespace}/services/{service}
                    required: true
              - name: description
                type: String
                description: |-
                  The description of the Python function, parsed from the python code's
                  docstring.
                output: true
          - name: mode
            type: Enum
            description: |-
              Optional. The mode of the data mapping.
              Possible values:
              MODE_UNSPECIFIED
              FIELD_MAPPING
              PYTHON_SCRIPT
            enum_values:
              - 'MODE_UNSPECIFIED'
              - 'FIELD_MAPPING'
              - 'PYTHON_SCRIPT'
      - name: textResponseConfig
        type: NestedObject
        description: Optional. Configuration for always-included text responses.
        properties:
          - name: type
            type: Enum
            description: |-
              Optional. The strategy for providing the text response.
              Possible values:
              TYPE_UNSPECIFIED
              NONE
              LLM_GENERATED
              STATIC
            enum_values:
              - 'TYPE_UNSPECIFIED'
              - 'NONE'
              - 'LLM_GENERATED'
              - 'STATIC'
          - name: staticText
            type: String
            description: Optional. The static text response to return when type is STATIC.
          - name: textResponseInstruction
            type: String
            description: |-
              Optional. Instruction for the LLM on how to generate the text response. Used as
              the description for the text response parameter if type is LLM_GENERATED.
      - name: parameters
        type: NestedObject
        description: Optional. The input parameters of the widget tool. Represents a Schema object.
        properties:
          - name: additionalProperties
            type: String
            description: |-
              Defines the schema for additional properties allowed in an object.
              The value must be a valid JSON string representing the Schema object.
              (Note: OpenAPI also allows a boolean, this definition expects a Schema JSON).
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: anyOf
            type: String
            description: The instance value should be valid against at least one of the schemas in this list.
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: default
            type: String
            description: |-
              Default value of the data. Represents a dynamically typed value
              which can be either null, a number, a string, a boolean, a struct,
              or a list of values. The provided default value must be compatible
              with the defined 'type' and other schema constraints.
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: defs
            type: String
            description: A map of definitions for use by ref. Only allowed at the root of the schema.
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: description
            type: String
            description: The description of the data.
          - name: enum
            type: Array
            description: |-
              Possible values of the element of primitive type with enum format.
              Examples:
              1. We can define direction as :
              {type:STRING, format:enum, enum:["EAST", NORTH", "SOUTH", "WEST"]}
              2. We can define apartment number as :
              {type:INTEGER, format:enum, enum:["101", "201", "301"]}
            item_type:
              type: String
          - name: items
            type: String
            description: Schema of the elements of Type.ARRAY.
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: maxItems
            type: Integer
            description: Maximum number of the elements for Type.ARRAY. (int64 format)
          - name: maximum
            type: Double
            description: Maximum value for Type.INTEGER and Type.NUMBER.
          - name: minItems
            type: Integer
            description: Minimum number of the elements for Type.ARRAY. (int64 format)
          - name: minimum
            type: Double
            description: Minimum value for Type.INTEGER and Type.NUMBER.
          - name: nullable
            type: Boolean
            description: Indicates if the value may be null.
          - name: prefixItems
            type: String
            description: Schemas of initial elements of Type.ARRAY.
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: properties
            type: String
            description: Properties of Type.OBJECT.
            state_func: 'func(v interface{}) string { s, _ := structure.NormalizeJsonString(v); return s }'
            custom_flatten: 'templates/terraform/custom_flatten/json_schema.tmpl'
            custom_expand: 'templates/terraform/custom_expand/json_value.tmpl'
            validation:
              function: 'validation.StringIsJSON'
          - name: ref
            type: String
            description: |-
              Allows indirect references between schema nodes. The value should be a
              valid reference to a child of the root `defs`.
              For example, the following schema defines a reference to a schema node
              named "Pet":
              type: object
              properties:
                pet:
                  ref: #/defs/Pet
              defs:
                Pet:
                  type: object
                  properties:
                    name:
                      type: string
              The value of the "pet" property is a reference to the schema node
              named "Pet".
              See details in
              https://json-schema.org/understanding-json-schema/structuring.
          - name: required
            type: Array
            description: Required properties of Type.OBJECT.
            item_type:
              type: String
          - name: title
            type: String
            description: The title of the schema.
          - name: type
            type: String
            description: |-
              The type of the data.
              Possible values:
              STRING
              INTEGER
              NUMBER
              BOOLEAN
              OBJECT
              ARRAY
            required: true
          - name: uniqueItems
            type: Boolean
            description: Indicate the items in the array must be unique. Only applies to TYPE.ARRAY.
