---
name: Deployment
description: Description
base_url: projects/{{project}}/locations/{{location}}/apps/{{app}}/deployments
self_link: projects/{{project}}/locations/{{location}}/apps/{{app}}/deployments/{{name}}
create_url: projects/{{project}}/locations/{{location}}/apps/{{app}}/deployments
update_verb: PATCH
update_mask: true
import_format:
  - projects/{{project}}/locations/{{location}}/apps/{{app}}/deployments/{{name}}
samples:
  - name: ces_deployment_basic
    primary_resource_id: my-deployment
    steps:
      - name: ces_deployment_basic
        resource_id_vars:
          app_display_name: my-app
          app_id: app-id
          deployment_display_name: my-deployment
  - name: ces_deployment_full
    primary_resource_id: my-deployment
    steps:
      - name: ces_deployment_full
        resource_id_vars:
          app_display_name: my-app
          app_id: app-id
          deployment_display_name: my-deployment
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: app
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
properties:
  - name: appVersion
    type: String
    required: true
    description: |-
      The resource name of the app version to deploy.
      Format:
      projects/{project}/locations/{location}/apps/{app}/versions/{version}
    ignore_read: true
  - name: channelProfile
    type: NestedObject
    required: true
    description: |-
      A ChannelProfile configures the agent's behavior for a specific communication
      channel, such as web UI or telephony.
    properties:
      - name: channelType
        type: String
        description: |-
          The type of the channel profile.
          Possible values:
          UNKNOWN
          WEB_UI
          API
          TWILIO
          GOOGLE_TELEPHONY_PLATFORM
          CONTACT_CENTER_AS_A_SERVICE
          FIVE9
          CONTACT_CENTER_INTEGRATION
      - name: disableBargeInControl
        type: Boolean
        description: |-
          Whether to disable user barge-in control in the conversation.
          - **true**: User interruptions are disabled while the agent is speaking.
          - **false**: The agent retains automatic control over when the user can
          interrupt.
      - name: disableDtmf
        type: Boolean
        description: Whether to disable DTMF (dual-tone multi-frequency).
      - name: personaProperty
        type: NestedObject
        description: Represents the persona property of a channel.
        properties:
          - name: persona
            type: String
            description: |-
              The persona of the channel.
              Possible values:
              UNKNOWN
              CONCISE
              CHATTY
      - name: profileId
        type: String
        description: The unique identifier of the channel profile.
      - name: webWidgetConfig
        type: NestedObject
        description: Message for configuration for the web widget.
        properties:
          - name: modality
            type: String
            description: |-
              The modality of the web widget.
              Possible values:
              MODALITY_UNSPECIFIED
              CHAT_AND_VOICE
              VOICE_ONLY
              CHAT_ONLY
              CHAT_VOICE_AND_VIDEO
          - name: theme
            type: String
            description: |-
              The theme of the web widget.
              Possible values:
              THEME_UNSPECIFIED
              LIGHT
              DARK
          - name: webWidgetTitle
            type: String
            description: The title of the web widget.
          - name: securitySettings
            type: NestedObject
            description: The security settings of the web widget.
            properties:
              - name: enablePublicAccess
                type: Boolean
                description: Indicates whether public access to the web widget is enabled. If true, the web widget will be publicly accessible. If false, the web widget must be integrated with your own authentication and authorization system to return valid credentials for accessing the CES agent.
                send_empty_value: true
              - name: enableOriginCheck
                type: Boolean
                description: Indicates whether origin check for the web widget is enabled. If true, the web widget will check the origin of the website that loads the web widget and only allow it to be loaded in the same origin or any of the allowed origins.
                send_empty_value: true
              - name: allowedOrigins
                type: Array
                description: 'The origins that are allowed to host the web widget. An origin is defined by RFC 6454. If empty, all origins are allowed. A maximum of 100 origins is allowed. Example: "https://example.com"'
                item_type:
                  type: String
              - name: enableRecaptcha
                type: Boolean
                description: Indicates whether reCAPTCHA verification for the web widget is enabled.
                send_empty_value: true
  - name: createTime
    type: String
    description: Timestamp when this deployment was created.
    output: true
  - name: displayName
    type: String
    required: true
    description: Display name of the deployment.
  - name: etag
    type: String
    description: |-
      Etag used to ensure the object hasn't changed during a read-modify-write
      operation. If the etag is empty, the update will overwrite any concurrent
      changes.
    output: true
  - name: name
    type: String
    description: |-
      Identifier. The resource name of the deployment.
      Format:
      projects/{project}/locations/{location}/apps/{app}/deployments/{deployment}
    output: true
    custom_flatten: templates/terraform/custom_flatten/name_from_self_link.tmpl
  - name: updateTime
    type: String
    description: Timestamp when this deployment was last updated.
    output: true
