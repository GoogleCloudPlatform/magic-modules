---
name: QaScorecardRevision
description: Description
base_url: projects/{{project}}/locations/{{location}}/qaScorecards/{{qascorecard}}/revisions
immutable: true
self_link: projects/{{project}}/locations/{{location}}/qaScorecards/{{qascorecard}}/revisions/{{qa_scorecard_revision_id}}
create_url: projects/{{project}}/locations/{{location}}/qaScorecards/{{qascorecard}}/revisions?qaScorecardRevisionId={{qa_scorecard_revision_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/qaScorecards/{{qascorecard}}/revisions/{{qa_scorecard_revision_id}}
autogen_status: UWFTY29yZWNhcmRSZXZpc2lvbg==
examples:
  - name: contact_center_insights_qa_scorecard_revision_basic
    primary_resource_id: default
    vars:
      scorecard_id: qa-scorecard
      revision_id: qa-revision
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: qascorecard
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: qaScorecardRevisionId
    type: String
    required: true
    description: |-
      A unique ID for the new QaScorecardRevision. This ID will become the final
      component of the QaScorecardRevision's resource name. If no ID is
      specified, a server-generated ID will be used.

      This value should be 4-64 characters and must match the regular
      expression `^[a-z0-9-]{4,64}$`. Valid characters are `a-z-`.
    immutable: true
    url_param_only: true
properties:
  - name: alternateIds
    type: Array
    description: Alternative IDs for this revision of the scorecard, e.g., `latest`.
    output: true
    item_type:
      type: String
  - name: createTime
    type: String
    description: The timestamp that the revision was created.
    output: true
  - name: name
    type: String
    description: |-
      Identifier. The name of the scorecard revision.
      Format:
      projects/{project}/locations/{location}/qaScorecards/{qa_scorecard}/revisions/{revision}
    output: true
  - name: snapshot
    type: NestedObject
    description: |-
      A QaScorecard represents a collection of questions to be scored during
      analysis.
    properties:
      - name: createTime
        type: String
        description: The time at which this scorecard was created.
        output: true
      - name: description
        type: String
        description: A text description explaining the intent of the scorecard.
      - name: displayName
        type: String
        description: The user-specified display name of the scorecard.
      - name: isDefault
        type: Boolean
        description: |-
          Whether the scorecard is the default one for the project.
          A default scorecard cannot be deleted and will always appear first in
          scorecard selector.
      - name: name
        type: String
        description: |-
          Identifier. The scorecard name.
          Format:
          projects/{project}/locations/{location}/qaScorecards/{qa_scorecard}
        output: true
      - name: source
        type: String
        description: |-
          Possible values:
          QA_SCORECARD_SOURCE_CUSTOMER_DEFINED
          QA_SCORECARD_SOURCE_DISCOVERY_ENGINE
      - name: updateTime
        type: String
        description: The most recent time at which the scorecard was updated.
        output: true
  - name: state
    type: String
    description: |-
      State of the scorecard revision, indicating whether it's ready to
      be used in analysis.
      Possible values:
      EDITABLE
      TRAINING
      TRAINING_FAILED
      READY
      DELETING
      TRAINING_CANCELLED
    output: true
