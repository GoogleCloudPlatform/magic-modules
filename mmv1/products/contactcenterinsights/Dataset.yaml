---
name: Dataset
description: Dataset for evaluation and training in Contact Center Insights.
base_url: projects/{{project}}/locations/{{location}}/datasets
self_link: projects/{{project}}/locations/{{location}}/datasets/{{dataset_id}}
create_url: projects/{{project}}/locations/{{location}}/datasets?datasetId={{dataset_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/datasets/{{dataset_id}}
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - delete
  result:
    resource_inside_response: true
autogen_status: RGF0YXNldA==
autogen_async: true
examples:
  - name: contact_center_insights_dataset_basic
    primary_resource_id: default
    vars:
      dataset_id: dataset
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: datasetId
    type: String
    required: true
    description: The ID to use for the dataset.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: Dataset create time.
    output: true
  - name: description
    type: String
    description: Dataset description.
  - name: displayName
    type: String
    description: Display name for the dataaset
  - name: name
    type: String
    description: |-
      Identifier. Resource name of the dataset.
      Format: projects/{project}/locations/{location}/datasets/{dataset}
    output: true
    immutable: true
  - name: ttl
    type: String
    description: Option TTL for the dataset.
    ignore_read: true
  - name: type
    type: String
    ignore_read: true
    description: |-
      Dataset usage type.
      Possible values:
      EVAL
      LIVE
  - name: updateTime
    type: String
    description: Dataset update time.
    output: true
