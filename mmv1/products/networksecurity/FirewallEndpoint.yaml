---
name: FirewallEndpoint
description: |
  A Firewall endpoint is a Cloud Firewall resource that enables
  layer 7 advanced protection capabilities, such as intrusion prevention,
  in your network.
references:
  guides:
    Firewall endpoint overview: https://cloud.google.com/firewall/docs/about-firewall-endpoints
    Create and associate firewall endpoints: https://cloud.google.com/firewall/docs/configure-firewall-endpoints
  api: https://cloud.google.com/firewall/docs/reference/network-security/rest/v1/organizations.locations.firewallEndpoints
docs:
  warning: |
    If you are using User ADCs (Application Default Credentials) with this resource,
    you must specify a `billing_project_id` and set `user_project_override` to true
    in the provider configuration. Otherwise the ACM API will return a 403 error.
    Your account must have the `serviceusage.services.use` permission on the
    `billing_project_id` you defined.
base_url: '{{parent}}/locations/{{location}}/firewallEndpoints'
self_link: '{{parent}}/locations/{{location}}/firewallEndpoints/{{name}}'
create_url: '{{parent}}/locations/{{location}}/firewallEndpoints?firewallEndpointId={{name}}'
update_mask: true
update_verb: PATCH
import_format:
  - '{{%parent}}/locations/{{location}}/firewallEndpoints/{{name}}'
timeouts:
  insert_minutes: 60
  update_minutes: 60
  delete_minutes: 60
async:
  type: OpAsync
  operation:
    base_url: '{{op_id}}'
  actions: [create, delete, update]
  result:
    resource_inside_response: false
  include_project: true
autogen_async: true
include_in_tgc_next: true
custom_code:
samples:
  - name: network_security_firewall_endpoint_basic
    primary_resource_id: default
    # update tests will take care of create and update. Firewall endpoint creation is too long.
    exclude_test: true
    steps:
      - name: network_security_firewall_endpoint_basic
        resource_id_vars:
          resource_name: my-firewall-endpoint
        test_env_vars:
          org_id: ORG_ID
          project: PROJECT_NAME
  - name: network_security_firewall_endpoint_project
    primary_resource_id: default
    # update tests will take care of create and update. Firewall endpoint creation is too long.
    exclude_test: true
    steps:
      - name: network_security_firewall_endpoint_project
        resource_id_vars:
          resource_name: my-firewall-endpoint
        test_env_vars:
          project: PROJECT_NAME
  - name: "network_security_firewall_endpoint_wildfire"
    primary_resource_id: "default"
    # update tests will take care of create and update. Firewall endpoint creation is too long.
    exclude_test: true
    min_version: "beta"
    steps:
      - name: "network_security_firewall_endpoint_wildfire_basic"
        resource_id_vars:
          network_name: "fw-network"
          subnet_name: "fw-subnet"
          endpoint_name: "fw-endpoint"
        vars:
          lookup_timeout_action: "ALLOW"
          max_analysis_duration: "10s"
          inline_timeout_action: "ALLOW"
        test_env_vars:
          project: "PROJECT_NAME"
          org_id: "ORG_ID"
      - name: "network_security_firewall_endpoint_wildfire_basic"
        resource_id_vars:
          network_name: "fw-network"
          subnet_name: "fw-subnet"
          endpoint_name: "fw-endpoint"
        vars:
          lookup_timeout_action: "DENY"
          max_analysis_duration: "20s"
          inline_timeout_action: "DENY"
        test_env_vars:
          project: "PROJECT_NAME"
          org_id: "ORG_ID"
parameters:
  - name: name
    type: String
    description: |
      The name of the firewall endpoint resource.
    url_param_only: true
    required: true
    immutable: true
  - name: location
    type: String
    description: |
      The location (zone) of the firewall endpoint.
    url_param_only: true
    required: true
    immutable: true
  - name: parent
    type: String
    description: |
      The name of the parent this firewall endpoint belongs to.
      Format: `organizations/{organization_id}` or `projects/{project_id}`.
    url_param_only: true
    required: true
    immutable: true
properties:
  - name: labels
    type: KeyValueLabels
    description: |
      A map of key/value label pairs to assign to the resource.
  - name: selfLink
    type: String
    description: |
      Server-defined URL of this resource.
    output: true
  - name: createTime
    type: Time
    description: Time the firewall endpoint was created in UTC.
    output: true
  - name: updateTime
    type: Time
    description: Time the firewall endpoint was updated in UTC.
    output: true
  - name: reconciling
    type: Boolean
    description: |
      Whether reconciling is in progress, recommended per https://google.aip.dev/128.
    output: true
  - name: associatedNetworks
    type: Array
    description: |
      List of networks that are associated with this endpoint in the local zone.
      This is a projection of the FirewallEndpointAssociations pointing at this
      endpoint. A network will only appear in this list after traffic routing is
      fully configured. Format: projects/{project}/global/networks/{name}.
    output: true
    item_type:
      type: String
  - name: state
    type: String
    description: The current state of the endpoint.
    output: true
  - name: billingProjectId
    type: String
    description: |
      Project to charge for the deployed firewall endpoint.
      This field is required for organization-scoped endpoints.
      For project-scoped endpoints, it is optional but must match the
      endpoint's project if specified.
    default_from_api: true
  - name: endpointSettings
    type: NestedObject
    description: |
      Settings for the endpoint.
    properties:
      - name: jumboFramesEnabled
        type: Boolean
        send_empty_value: true
        immutable: true
        description: |
          Indicates whether Jumbo Frames are enabled for the firewall endpoint.
  - name: 'wildfireSettings'
    type: 'NestedObject'
    min_version: beta
    description: 'Settings for WildFire analysis.'
    properties:
      - name: 'enabled'
        type: 'Boolean'
        description: 'Optional. Indicates whether WildFire analysis is enabled. Default value is false.'
      - name: 'wildfireRegion'
        type: 'Enum'
        enum_values:
          - 'WILDFIRE_REGION_UNSPECIFIED'
          - 'CANADA'
          - 'UNITED_STATES'
          - 'JAPAN'
          - 'SINGAPORE'
          - 'UNITED_KINGDOM'
          - 'AUSTRALIA'
          - 'GERMANY'
          - 'INDIA'
          - 'SWITZERLAND'
          - 'POLAND'
          - 'INDONESIA'
          - 'TAIWAN'
          - 'FRANCE'
          - 'QATAR'
          - 'SOUTH_KOREA'
          - 'ISRAEL'
          - 'SAUDI_ARABIA'
          - 'SPAIN'
        description: 'Optional. The region where WildFire analysis will be performed.'
      - name: 'wildfireRealtimeLookupDuration'
        type: 'String'
        description: 'Optional. Duration on a file being held while the WildFire real time signature cloud performs a signature lookup.'
      - name: 'wildfireRealtimeLookupTimeoutAction'
        type: 'Enum'
        enum_values:
          - 'WILDFIRE_REALTIME_SIGNATURE_LOOKUP_TIMEOUT_ACTION_UNSPECIFIED'
          - 'ALLOW'
          - 'DENY'
        description: 'Optional. Action to take on WildFire real time signature lookup timeout. Default value is ALLOW.'
      - name: 'wildfireInlineCloudAnalysisSettings'
        type: 'NestedObject'
        description: 'Optional. Settings for WildFire inline cloud analysis.'
        properties:
          - name: 'maxAnalysisDuration'
            type: 'String'
            description: 'The maximum duration for inline analysis.'
          - name: 'timeoutAction'
            type: 'Enum'
            enum_values:
              - 'ALLOW'
              - 'DENY'
            description: 'Action to take on timeout.'
