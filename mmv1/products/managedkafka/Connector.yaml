---
name: Connector
description: A Managed Service for Kafka Connect Connectors.
base_url: projects/{{project}}/locations/{{location}}/connectClusters/{{connect_cluster}}/connectors
self_link: projects/{{project}}/locations/{{location}}/connectClusters/{{connect_cluster}}/connectors/{{connector_id}}
create_url: projects/{{project}}/locations/{{location}}/connectClusters/{{connect_cluster}}/connectors?connectorId={{connector_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/connectClusters/{{connect_cluster}}/connectors/{{connector_id}}
timeouts:
  insert_minutes: 60
  update_minutes: 30
  delete_minutes: 30
examples:
  - name: managedkafka_connector_basic
    primary_resource_id: example
    vars:
      cluster_id: my-cluster
      connect_cluster_id: my-connect-cluster
      connector_id: my-connector
      cps_topic_name: my-cps-topic
      secondary_subnet_id: my-secondary-subnetwork-00
      topic_id: my-topic
    test_env_vars:
      billing_account: BILLING_ACCT
      org_id: ORG_ID
    external_providers:
      - time
parameters:
  - name: location
    type: String
    required: true
    description: ID of the location of the Kafka Connect resource. See https://cloud.google.com/managed-kafka/docs/locations for a list of supported locations.
    immutable: true
    url_param_only: true
  - name: connectCluster
    type: String
    required: true
    description: The connect cluster name.
    immutable: true
    url_param_only: true
  - name: connectorId
    type: String
    required: true
    description: 'The ID to use for the connector, which will become the final component of the connector''s name. This value is structured like: `my-connector-id`.'
    immutable: true
    url_param_only: true
properties:
  - name: name
    type: String
    description: 'The name of the connector. The `connector` segment is used when connecting directly to the connect cluster. Structured like: `projects/PROJECT_ID/locations/LOCATION/connectClusters/CONNECT_CLUSTER/connectors/CONNECTOR_ID`.'
    output: true
  - name: configs
    type: KeyValuePairs
    description: 'Connector config as keys/values. The keys of the map are connector property names, for example: `connector.class`, `tasks.max`, `key.converter`.'
  - name: state
    type: String
    description: 'The current state of the connect. Possible values: `STATE_UNSPECIFIED`, `UNASSIGNED`, `RUNNING`, `PAUSED`, `FAILED`, `RESTARTING`, and `STOPPED`.'
    output: true
  - name: taskRestartPolicy
    type: NestedObject
    description: A policy that specifies how to restart the failed connectors/tasks in a Cluster resource. If not set, the failed connectors/tasks won't be restarted.
    properties:
      - name: minimumBackoff
        type: String
        description: |
          The minimum amount of time to wait before retrying a failed task. This sets a lower bound for the backoff delay.
          A duration in seconds with up to nine fractional digits, terminated by 's'. Example: "3.5s".
      - name: maximumBackoff
        type: String
        description: |
          The maximum amount of time to wait before retrying a failed task. This sets an upper bound for the backoff delay.
          A duration in seconds with up to nine fractional digits, terminated by 's'. Example: "3.5s".
