---
name: ConnectivityTest
description: Description
base_url: projects/{{project}}/locations/global/connectivityTests
self_link: projects/{{project}}/locations/global/connectivityTests/{{}}
create_url: projects/{{project}}/locations/global/connectivityTests?={{}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/global/connectivityTests/{{}}
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - update
    - delete
  result:
    resource_inside_response: true
autogen_status: Q29ubmVjdGl2aXR5VGVzdA==
autogen_async: true
examples:
  - name: network_management_connectivity_test_instances
    primary_resource_id: instance-test
    vars:
      dest_instance: dest-vm
      network_name: conn-test-net
      primary_resource_name: conn-test-instances
      source_instance: source-vm
  - name: network_management_connectivity_test_addresses
    primary_resource_id: address-test
    vars:
      dest_addr: dest-addr
      network: connectivity-vpc
      primary_resource_name: conn-test-addr
      source_addr: src-addr
  - name: network_management_connectivity_test_endpoints
    primary_resource_id: endpoints-test
    vars:
      primary_resource_name: conn-test-endpoints
parameters:
  - name: testId
    type: String
    required: true
    description: |-
      The logical name of the Connectivity Test in your project
      with the following restrictions:

      * Must contain only lowercase letters, numbers, and hyphens.
      * Must start with a letter.
      * Must be between 1-40 characters.
      * Must end with a number or a letter.
      * Must be unique within the customer project
    immutable: true
    url_param_only: true
properties:
  - name: bypassFirewallChecks
    type: Boolean
    description: Whether the analysis should skip firewall checking. Default value is false.
  - name: createTime
    type: String
    description: The time the test was created.
    output: true
  - name: description
    type: String
    description: |-
      The user-supplied description of the Connectivity Test.
      Maximum of 512 characters.
  - name: destination
    type: NestedObject
    required: true
    description: Source or destination of the Connectivity Test.
    properties:
      - name: appEngineVersion
        type: NestedObject
        description: Wrapper for the App Engine service version attributes.
        properties:
          - name: uri
            type: String
            description: |-
              An [App Engine](https://cloud.google.com/appengine) [service
              version](https://cloud.google.com/appengine/docs/admin-api/reference/rest/v1/apps.services.versions)
              name.
      - name: cloudFunction
        type: NestedObject
        description: Wrapper for Cloud Function attributes.
        properties:
          - name: uri
            type: String
            description: A [Cloud Function](https://cloud.google.com/functions) name.
      - name: cloudRunRevision
        type: NestedObject
        description: Wrapper for Cloud Run revision attributes.
        properties:
          - name: serviceUri
            type: String
            description: |-
              The URI of the Cloud Run service that the revision belongs to. The format
              is: projects/{project}/locations/{location}/services/{service}
            output: true
          - name: uri
            type: String
            description: |-
              A [Cloud Run](https://cloud.google.com/run)
              [revision](https://cloud.google.com/run/docs/reference/rest/v1/namespaces.revisions/get)
              URI. The format is:
              projects/{project}/locations/{location}/revisions/{revision}
      - name: cloudSqlInstance
        type: String
        description: A [Cloud SQL](https://cloud.google.com/sql) instance URI.
      - name: forwardingRule
        type: String
        description: |-
          A forwarding rule and its corresponding IP address represent the frontend
          configuration of a Google Cloud load balancer. Forwarding rules are also
          used for protocol forwarding, Private Service Connect and other network
          services to provide forwarding information in the control plane. Applicable
          only to destination endpoint. Format:
          `projects/{project}/global/forwardingRules/{id}` or
          `projects/{project}/regions/{region}/forwardingRules/{id}`
      - name: forwardingRuleTarget
        type: String
        description: |-
          Specifies the type of the target of the forwarding rule.
          Possible values:
          INSTANCE
          LOAD_BALANCER
          VPN_GATEWAY
          PSC
        output: true
      - name: fqdn
        type: String
        description: |-
          DNS endpoint of [Google Kubernetes Engine cluster control
          plane](https://cloud.google.com/kubernetes-engine/docs/concepts/cluster-architecture).
          Requires gke_master_cluster to be set, can't be used simultaneoulsly with
          ip_address or network. Applicable only to destination endpoint.
      - name: gkeMasterCluster
        type: String
        description: |-
          A cluster URI for [Google Kubernetes Engine cluster control
          plane](https://cloud.google.com/kubernetes-engine/docs/concepts/cluster-architecture).
      - name: gkePod
        type: String
        description: |-
          A [GKE Pod](https://cloud.google.com/kubernetes-engine/docs/concepts/pod)
          URI.
      - name: instance
        type: String
        description: A Compute Engine instance URI.
      - name: ipAddress
        type: String
        description: The IP address of the endpoint, which can be an external or internal IP.
      - name: loadBalancerId
        type: String
        description: |-
          ID of the load balancer the forwarding rule points to. Empty for forwarding
          rules not related to load balancers.
        output: true
      - name: loadBalancerType
        type: String
        description: |-
          Possible values:
          HTTPS_ADVANCED_LOAD_BALANCER
          HTTPS_LOAD_BALANCER
          REGIONAL_HTTPS_LOAD_BALANCER
          INTERNAL_HTTPS_LOAD_BALANCER
          SSL_PROXY_LOAD_BALANCER
          TCP_PROXY_LOAD_BALANCER
          INTERNAL_TCP_PROXY_LOAD_BALANCER
          NETWORK_LOAD_BALANCER
          LEGACY_NETWORK_LOAD_BALANCER
          TCP_UDP_INTERNAL_LOAD_BALANCER
      - name: network
        type: String
        description: |-
          A VPC network URI. For source endpoints, used according to the
          `network_type`. For destination endpoints, used only when the source is an
          external IP address endpoint, and the destination is an internal IP address
          endpoint.
      - name: networkType
        type: String
        description: |-
          For source endpoints, type of the network where the endpoint is located.
          Not relevant for destination endpoints.
          Possible values:
          GCP_NETWORK
          NON_GCP_NETWORK
          INTERNET
      - name: port
        type: Integer
        description: |-
          The IP protocol port of the endpoint.
          Only applicable when protocol is TCP or UDP.
      - name: projectId
        type: String
        description: |-
          For source endpoints, endpoint project ID. Used according to the
          `network_type`. Not relevant for destination endpoints.
      - name: redisCluster
        type: String
        description: |-
          A [Redis Cluster](https://cloud.google.com/memorystore/docs/cluster) URI.
          Applicable only to destination endpoint.
      - name: redisInstance
        type: String
        description: |-
          A [Redis Instance](https://cloud.google.com/memorystore/docs/redis) URI.
          Applicable only to destination endpoint.
  - name: displayName
    type: String
    description: The display name of a Connectivity Test.
    output: true
  - name: labels
    type: KeyValueLabels
    description: Resource labels to represent user-provided metadata.
  - name: name
    type: String
    description: |-
      Identifier. Unique name of the resource using the form:
      `projects/{project_id}/locations/global/connectivityTests/{test_id}`
    output: true
  - name: probingDetails
    type: NestedObject
    description: Results of active probing from the last run of the test.
    properties:
      - name: abortCause
        type: String
        description: |-
          The reason probing was aborted.
          Possible values:
          PERMISSION_DENIED
          NO_SOURCE_LOCATION
      - name: destinationEgressLocation
        type: NestedObject
        description: |-
          Representation of a network edge location as per
          https://cloud.google.com/vpc/docs/edge-locations.
        properties:
          - name: metropolitanArea
            type: String
            description: Name of the metropolitan area.
      - name: edgeResponses
        type: Array
        description: Probing results for all edge devices.
        item_type:
          type: NestedObject
          properties:
            - name: destinationEgressLocation
              type: NestedObject
              description: |-
                Representation of a network edge location as per
                https://cloud.google.com/vpc/docs/edge-locations.
              properties:
                - name: metropolitanArea
                  type: String
                  description: Name of the metropolitan area.
            - name: destinationRouter
              type: String
              description: |-
                Router name in the format '{router}.{metroshard}'. For example:
                pf01.aaa01, pr02.aaa01.
            - name: probingLatency
              type: NestedObject
              description: Describes measured latency distribution.
              properties:
                - name: latencyPercentiles
                  type: Array
                  description: Representative latency percentiles.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: latencyMicros
                        type: String
                        description: |-
                          percent-th percentile of latency observed, in microseconds.
                          Fraction of percent/100 of samples have latency lower or
                          equal to the value of this field.
                      - name: percent
                        type: Integer
                        description: Percentage of samples this data point applies to.
            - name: result
              type: String
              description: |-
                The overall result of active probing for this egress device.
                Possible values:
                REACHABLE
                UNREACHABLE
                REACHABILITY_INCONSISTENT
                UNDETERMINED
            - name: sentProbeCount
              type: Integer
              description: Number of probes sent.
            - name: successfulProbeCount
              type: Integer
              description: Number of probes that reached the destination.
      - name: endpointInfo
        type: NestedObject
        description: |-
          For display only. The specification of the endpoints for the test.
          EndpointInfo is derived from source and destination Endpoint and validated
          by the backend data plane model.
        properties:
          - name: destinationIp
            type: String
            description: Destination IP address.
          - name: destinationNetworkUri
            type: String
            description: URI of the network where this packet is sent to.
          - name: destinationPort
            type: Integer
            description: Destination port. Only valid when protocol is TCP or UDP.
          - name: protocol
            type: String
            description: 'IP protocol in string format, for example: "TCP", "UDP", "ICMP".'
          - name: sourceAgentUri
            type: String
            description: URI of the source telemetry agent this packet originates from.
          - name: sourceIp
            type: String
            description: Source IP address.
          - name: sourceNetworkUri
            type: String
            description: URI of the network where this packet originates from.
          - name: sourcePort
            type: Integer
            description: Source port. Only valid when protocol is TCP or UDP.
      - name: error
        type: NestedObject
        description: |-
          The `Status` type defines a logical error model that is suitable for
          different programming environments, including REST APIs and RPC APIs. It is
          used by [gRPC](https://github.com/grpc). Each `Status` message contains
          three pieces of data: error code, error message, and error details.

          You can find out more about this error model and how to work with it in the
          [API Design Guide](https://cloud.google.com/apis/design/errors).
        properties:
          - name: code
            type: Integer
            description: The status code, which should be an enum value of google.rpc.Code.
          - name: details
            type: Array
            description: |-
              A list of messages that carry the error details.  There is a common set of
              message types for APIs to use.
            item_type:
              type: NestedObject
              properties: []
          - name: message
            type: String
            description: |-
              A developer-facing error message, which should be in English. Any
              user-facing error message should be localized and sent in the
              google.rpc.Status.details field, or localized by the client.
      - name: probedAllDevices
        type: Boolean
        description: Whether all relevant edge devices were probed.
      - name: probingLatency
        type: NestedObject
        description: Describes measured latency distribution.
        properties:
          - name: latencyPercentiles
            type: Array
            description: Representative latency percentiles.
            item_type:
              type: NestedObject
              properties:
                - name: latencyMicros
                  type: String
                  description: |-
                    percent-th percentile of latency observed, in microseconds.
                    Fraction of percent/100 of samples have latency lower or
                    equal to the value of this field.
                - name: percent
                  type: Integer
                  description: Percentage of samples this data point applies to.
      - name: result
        type: String
        description: |-
          The overall result of active probing.
          Possible values:
          REACHABLE
          UNREACHABLE
          REACHABILITY_INCONSISTENT
          UNDETERMINED
      - name: sentProbeCount
        type: Integer
        description: Number of probes sent.
      - name: successfulProbeCount
        type: Integer
        description: Number of probes that reached the destination.
      - name: verifyTime
        type: String
        description: The time that reachability was assessed through active probing.
  - name: protocol
    type: String
    description: IP Protocol of the test. When not provided, "TCP" is assumed.
  - name: reachabilityDetails
    type: NestedObject
    description: Results of the configuration analysis from the last run of the test.
    properties:
      - name: error
        type: NestedObject
        description: |-
          The `Status` type defines a logical error model that is suitable for
          different programming environments, including REST APIs and RPC APIs. It is
          used by [gRPC](https://github.com/grpc). Each `Status` message contains
          three pieces of data: error code, error message, and error details.

          You can find out more about this error model and how to work with it in the
          [API Design Guide](https://cloud.google.com/apis/design/errors).
        properties:
          - name: code
            type: Integer
            description: The status code, which should be an enum value of google.rpc.Code.
          - name: details
            type: Array
            description: |-
              A list of messages that carry the error details.  There is a common set of
              message types for APIs to use.
            item_type:
              type: NestedObject
              properties: []
          - name: message
            type: String
            description: |-
              A developer-facing error message, which should be in English. Any
              user-facing error message should be localized and sent in the
              google.rpc.Status.details field, or localized by the client.
      - name: result
        type: String
        description: |-
          The overall result of the test's configuration analysis.
          Possible values:
          REACHABLE
          UNREACHABLE
          AMBIGUOUS
          UNDETERMINED
      - name: traces
        type: Array
        description: |-
          Result may contain a list of traces if a test has multiple possible
          paths in the network, such as when destination endpoint is a load balancer
          with multiple backends.
        item_type:
          type: NestedObject
          properties:
            - name: endpointInfo
              type: NestedObject
              description: |-
                For display only. The specification of the endpoints for the test.
                EndpointInfo is derived from source and destination Endpoint and validated
                by the backend data plane model.
              properties:
                - name: destinationIp
                  type: String
                  description: Destination IP address.
                - name: destinationNetworkUri
                  type: String
                  description: URI of the network where this packet is sent to.
                - name: destinationPort
                  type: Integer
                  description: Destination port. Only valid when protocol is TCP or UDP.
                - name: protocol
                  type: String
                  description: 'IP protocol in string format, for example: "TCP", "UDP", "ICMP".'
                - name: sourceAgentUri
                  type: String
                  description: URI of the source telemetry agent this packet originates from.
                - name: sourceIp
                  type: String
                  description: Source IP address.
                - name: sourceNetworkUri
                  type: String
                  description: URI of the network where this packet originates from.
                - name: sourcePort
                  type: Integer
                  description: Source port. Only valid when protocol is TCP or UDP.
            - name: forwardTraceId
              type: Integer
              description: |-
                ID of trace. For forward traces, this ID is unique for each trace. For
                return traces, it matches ID of associated forward trace. A single forward
                trace can be associated with none, one or more than one return trace.
            - name: steps
              type: Array
              description: |-
                A trace of a test contains multiple steps from the initial state to the
                final state (delivered, dropped, forwarded, or aborted).

                The steps are ordered by the processing sequence within the simulated
                network state machine. It is critical to preserve the order of the steps
                and avoid reordering or sorting them.
              item_type:
                type: NestedObject
                properties:
                  - name: abort
                    type: NestedObject
                    description: Details of the final state "abort" and associated resource.
                    properties:
                      - name: cause
                        type: String
                        description: |-
                          Causes that the analysis is aborted.
                          Possible values:
                          UNKNOWN_NETWORK
                          UNKNOWN_PROJECT
                          NO_EXTERNAL_IP
                          UNINTENDED_DESTINATION
                          SOURCE_ENDPOINT_NOT_FOUND
                          MISMATCHED_SOURCE_NETWORK
                          DESTINATION_ENDPOINT_NOT_FOUND
                          MISMATCHED_DESTINATION_NETWORK
                          UNKNOWN_IP
                          GOOGLE_MANAGED_SERVICE_UNKNOWN_IP
                          SOURCE_IP_ADDRESS_NOT_IN_SOURCE_NETWORK
                          PERMISSION_DENIED
                          PERMISSION_DENIED_NO_CLOUD_NAT_CONFIGS
                          PERMISSION_DENIED_NO_NEG_ENDPOINT_CONFIGS
                          PERMISSION_DENIED_NO_CLOUD_ROUTER_CONFIGS
                          NO_SOURCE_LOCATION
                          NO_SOURCE_GCP_NETWORK_LOCATION
                          NO_SOURCE_NON_GCP_NETWORK_LOCATION
                          NO_SOURCE_INTERNET_LOCATION
                          INVALID_ARGUMENT
                          TRACE_TOO_LONG
                          INTERNAL_ERROR
                          UNSUPPORTED
                          MISMATCHED_IP_VERSION
                          GKE_KONNECTIVITY_PROXY_UNSUPPORTED
                          RESOURCE_CONFIG_NOT_FOUND
                          VM_INSTANCE_CONFIG_NOT_FOUND
                          NETWORK_CONFIG_NOT_FOUND
                          FIREWALL_CONFIG_NOT_FOUND
                          ROUTE_CONFIG_NOT_FOUND
                          GOOGLE_MANAGED_SERVICE_AMBIGUOUS_PSC_ENDPOINT
                          GOOGLE_MANAGED_SERVICE_AMBIGUOUS_ENDPOINT
                          SOURCE_PSC_CLOUD_SQL_UNSUPPORTED
                          SOURCE_EXTERNAL_CLOUD_SQL_UNSUPPORTED
                          SOURCE_REDIS_CLUSTER_UNSUPPORTED
                          SOURCE_REDIS_INSTANCE_UNSUPPORTED
                          SOURCE_FORWARDING_RULE_UNSUPPORTED
                          NON_ROUTABLE_IP_ADDRESS
                          UNKNOWN_ISSUE_IN_GOOGLE_MANAGED_PROJECT
                          UNSUPPORTED_GOOGLE_MANAGED_PROJECT_CONFIG
                          NO_SERVERLESS_IP_RANGES
                          IP_VERSION_PROTOCOL_MISMATCH
                          GKE_POD_UNKNOWN_ENDPOINT_LOCATION
                      - name: ipAddress
                        type: String
                        description: IP address that caused the abort.
                      - name: projectsMissingPermission
                        type: Array
                        description: |-
                          List of project IDs the user specified in the request but lacks access to.
                          In this case, analysis is aborted with the PERMISSION_DENIED cause.
                        item_type:
                          type: String
                      - name: resourceUri
                        type: String
                        description: URI of the resource that caused the abort.
                  - name: appEngineVersion
                    type: NestedObject
                    description: For display only. Metadata associated with an App Engine version.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of an App Engine version.
                      - name: environment
                        type: String
                        description: App Engine execution environment for a version.
                      - name: runtime
                        type: String
                        description: Runtime of the App Engine version.
                      - name: uri
                        type: String
                        description: URI of an App Engine version.
                  - name: causesDrop
                    type: Boolean
                    description: This is a step that leads to the final state Drop.
                  - name: cloudFunction
                    type: NestedObject
                    description: For display only. Metadata associated with a Cloud Function.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a Cloud Function.
                      - name: location
                        type: String
                        description: Location in which the Cloud Function is deployed.
                      - name: uri
                        type: String
                        description: URI of a Cloud Function.
                      - name: versionId
                        type: String
                        description: Latest successfully deployed version id of the Cloud Function.
                  - name: cloudRunRevision
                    type: NestedObject
                    description: For display only. Metadata associated with a Cloud Run revision.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a Cloud Run revision.
                      - name: location
                        type: String
                        description: Location in which this revision is deployed.
                      - name: serviceUri
                        type: String
                        description: URI of Cloud Run service this revision belongs to.
                      - name: uri
                        type: String
                        description: URI of a Cloud Run revision.
                  - name: cloudSqlInstance
                    type: NestedObject
                    description: For display only. Metadata associated with a Cloud SQL instance.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a Cloud SQL instance.
                      - name: externalIp
                        type: String
                        description: External IP address of a Cloud SQL instance.
                      - name: internalIp
                        type: String
                        description: Internal IP address of a Cloud SQL instance.
                      - name: networkUri
                        type: String
                        description: |-
                          URI of a Cloud SQL instance network or empty string if the instance does
                          not have one.
                      - name: region
                        type: String
                        description: Region in which the Cloud SQL instance is running.
                      - name: uri
                        type: String
                        description: URI of a Cloud SQL instance.
                  - name: deliver
                    type: NestedObject
                    description: Details of the final state "deliver" and associated resource.
                    properties:
                      - name: googleServiceType
                        type: String
                        description: |-
                          Recognized type of a Google Service the packet is delivered to (if
                          applicable).
                          Possible values:
                          IAP
                          GFE_PROXY_OR_HEALTH_CHECK_PROBER
                          CLOUD_DNS
                          PRIVATE_GOOGLE_ACCESS
                          SERVERLESS_VPC_ACCESS
                      - name: ipAddress
                        type: String
                        description: IP address of the target (if applicable).
                      - name: pscGoogleApiTarget
                        type: String
                        description: PSC Google API target the packet is delivered to (if applicable).
                      - name: resourceUri
                        type: String
                        description: URI of the resource that the packet is delivered to.
                      - name: storageBucket
                        type: String
                        description: |-
                          Name of the Cloud Storage Bucket the packet is delivered to (if
                          applicable).
                      - name: target
                        type: String
                        description: |-
                          Target type where the packet is delivered to.
                          Possible values:
                          INSTANCE
                          INTERNET
                          GOOGLE_API
                          GKE_MASTER
                          CLOUD_SQL_INSTANCE
                          PSC_PUBLISHED_SERVICE
                          PSC_GOOGLE_API
                          PSC_VPC_SC
                          SERVERLESS_NEG
                          STORAGE_BUCKET
                          PRIVATE_NETWORK
                          CLOUD_FUNCTION
                          APP_ENGINE_VERSION
                          CLOUD_RUN_REVISION
                          GOOGLE_MANAGED_SERVICE
                          REDIS_INSTANCE
                          REDIS_CLUSTER
                          GKE_POD
                  - name: description
                    type: String
                    description: A description of the step. Usually this is a summary of the state.
                  - name: directVpcEgressConnection
                    type: NestedObject
                    description: |-
                      For display only. Metadata associated with a serverless direct VPC egress
                      connection.
                    properties:
                      - name: networkUri
                        type: String
                        description: URI of direct access network.
                      - name: region
                        type: String
                        description: Region in which the Direct VPC egress is deployed.
                      - name: selectedIpAddress
                        type: String
                        description: Selected starting IP address, from the selected IP range.
                      - name: selectedIpRange
                        type: String
                        description: Selected IP range.
                      - name: subnetworkUri
                        type: String
                        description: URI of direct access subnetwork.
                  - name: drop
                    type: NestedObject
                    description: Details of the final state "drop" and associated resource.
                    properties:
                      - name: cause
                        type: String
                        description: |-
                          Cause that the packet is dropped.
                          Possible values:
                          UNKNOWN_EXTERNAL_ADDRESS
                          FOREIGN_IP_DISALLOWED
                          FIREWALL_RULE
                          NO_ROUTE
                          ROUTE_BLACKHOLE
                          ROUTE_WRONG_NETWORK
                          ROUTE_NEXT_HOP_IP_ADDRESS_NOT_RESOLVED
                          ROUTE_NEXT_HOP_RESOURCE_NOT_FOUND
                          ROUTE_NEXT_HOP_INSTANCE_WRONG_NETWORK
                          ROUTE_NEXT_HOP_INSTANCE_NON_PRIMARY_IP
                          ROUTE_NEXT_HOP_FORWARDING_RULE_IP_MISMATCH
                          ROUTE_NEXT_HOP_VPN_TUNNEL_NOT_ESTABLISHED
                          ROUTE_NEXT_HOP_FORWARDING_RULE_TYPE_INVALID
                          NO_ROUTE_FROM_INTERNET_TO_PRIVATE_IPV6_ADDRESS
                          NO_ROUTE_FROM_INTERNET_TO_PRIVATE_IPV4_ADDRESS
                          NO_ROUTE_FROM_EXTERNAL_IPV6_SOURCE_TO_PRIVATE_IPV6_ADDRESS
                          VPN_TUNNEL_LOCAL_SELECTOR_MISMATCH
                          VPN_TUNNEL_REMOTE_SELECTOR_MISMATCH
                          PRIVATE_TRAFFIC_TO_INTERNET
                          PRIVATE_GOOGLE_ACCESS_DISALLOWED
                          PRIVATE_GOOGLE_ACCESS_VIA_VPN_TUNNEL_UNSUPPORTED
                          NO_EXTERNAL_ADDRESS
                          UNKNOWN_INTERNAL_ADDRESS
                          FORWARDING_RULE_MISMATCH
                          FORWARDING_RULE_NO_INSTANCES
                          FIREWALL_BLOCKING_LOAD_BALANCER_BACKEND_HEALTH_CHECK
                          INGRESS_FIREWALL_TAGS_UNSUPPORTED_BY_DIRECT_VPC_EGRESS
                          INSTANCE_NOT_RUNNING
                          GKE_CLUSTER_NOT_RUNNING
                          GKE_POD_NOT_RUNNING
                          CLOUD_SQL_INSTANCE_NOT_RUNNING
                          REDIS_INSTANCE_NOT_RUNNING
                          REDIS_CLUSTER_NOT_RUNNING
                          TRAFFIC_TYPE_BLOCKED
                          GKE_MASTER_UNAUTHORIZED_ACCESS
