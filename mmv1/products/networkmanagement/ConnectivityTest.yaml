                        description: 'IP protocol in string format, for example: "TCP", "UDP", "ICMP".'
                      - name: subnetUri
                        type: String
                        description: Uri of proxy subnet.
                  - name: redisCluster
                    type: NestedObject
                    description: For display only. Metadata associated with a Redis Cluster.
                    properties:
                      - name: discoveryEndpointIpAddress
                        type: String
                        description: Discovery endpoint IP address of a Redis Cluster.
                      - name: displayName
                        type: String
                        description: Name of a Redis Cluster.
                      - name: location
                        type: String
                        description: |-
                          Name of the region in which the Redis Cluster is defined. For example,
                          "us-central1".
                      - name: networkUri
                        type: String
                        description: |-
                          URI of the network containing the Redis Cluster endpoints in format
                          "projects/{project_id}/global/networks/{network_id}".
                      - name: secondaryEndpointIpAddress
                        type: String
                        description: Secondary endpoint IP address of a Redis Cluster.
                      - name: uri
                        type: String
                        description: |-
                          URI of a Redis Cluster in format
                          "projects/{project_id}/locations/{location}/clusters/{cluster_id}"
                  - name: redisInstance
                    type: NestedObject
                    description: For display only. Metadata associated with a Cloud Redis Instance.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a Cloud Redis Instance.
                      - name: networkUri
                        type: String
                        description: URI of a Cloud Redis Instance network.
                      - name: primaryEndpointIp
                        type: String
                        description: Primary endpoint IP address of a Cloud Redis Instance.
                      - name: readEndpointIp
                        type: String
                        description: Read endpoint IP address of a Cloud Redis Instance (if applicable).
                      - name: region
                        type: String
                        description: Region in which the Cloud Redis Instance is defined.
                      - name: uri
                        type: String
                        description: URI of a Cloud Redis Instance.
                  - name: route
                    type: NestedObject
                    description: For display only. Metadata associated with a Compute Engine route.
                    properties:
                      - name: advertisedRouteNextHopUri
                        type: String
                        description: |-
                          For ADVERTISED routes, the URI of their next hop, i.e. the URI of the
                          hybrid endpoint (VPN tunnel, Interconnect attachment, NCC router appliance)
                          the advertised prefix is advertised through, or URI of the source peered
                          network. Deprecated in favor of the next_hop_uri field, not used in new
                          tests.
                      - name: advertisedRouteSourceRouterUri
                        type: String
                        description: |-
                          For ADVERTISED dynamic routes, the URI of the Cloud Router that advertised
                          the corresponding IP prefix.
                      - name: destIpRange
                        type: String
                        description: Destination IP range of the route.
                      - name: destPortRanges
                        type: Array
                        description: Destination port ranges of the route. POLICY_BASED routes only.
                        item_type:
                          type: String
                      - name: displayName
                        type: String
                        description: Name of a route.
                      - name: instanceTags
                        type: Array
                        description: Instance tags of the route.
                        item_type:
                          type: String
                      - name: nccHubRouteUri
                        type: String
                        description: |-
                          For PEERING_SUBNET and PEERING_DYNAMIC routes that are advertised by NCC
                          Hub, the URI of the corresponding route in NCC Hub's routing table.
                      - name: nccHubUri
                        type: String
                        description: |-
                          URI of the NCC Hub the route is advertised by. PEERING_SUBNET and
                          PEERING_DYNAMIC routes that are advertised by NCC Hub only.
                      - name: nccSpokeUri
                        type: String
                        description: |-
                          URI of the destination NCC Spoke. PEERING_SUBNET and PEERING_DYNAMIC routes
                          that are advertised by NCC Hub only.
                      - name: networkUri
                        type: String
                        description: URI of a VPC network where route is located.
                      - name: nextHop
                        type: String
                        description: |-
                          String type of the next hop of the route (for example, "VPN tunnel").
                          Deprecated in favor of the next_hop_type and next_hop_uri fields, not used
                          in new tests.
                      - name: nextHopNetworkUri
                        type: String
                        description: URI of a VPC network where the next hop resource is located.
                      - name: nextHopType
                        type: String
                        description: |-
                          Type of next hop.
                          Possible values:
                          NEXT_HOP_IP
                          NEXT_HOP_INSTANCE
                          NEXT_HOP_NETWORK
                          NEXT_HOP_PEERING
                          NEXT_HOP_INTERCONNECT
                          NEXT_HOP_VPN_TUNNEL
                          NEXT_HOP_VPN_GATEWAY
                          NEXT_HOP_INTERNET_GATEWAY
                          NEXT_HOP_BLACKHOLE
                          NEXT_HOP_ILB
                          NEXT_HOP_ROUTER_APPLIANCE
                          NEXT_HOP_NCC_HUB
                          SECURE_WEB_PROXY_GATEWAY
                      - name: nextHopUri
                        type: String
                        description: URI of the next hop resource.
                      - name: originatingRouteDisplayName
                        type: String
                        description: |-
                          For PEERING_SUBNET, PEERING_STATIC and PEERING_DYNAMIC routes, the name of
                          the originating SUBNET/STATIC/DYNAMIC route.
                      - name: originatingRouteUri
                        type: String
                        description: |-
                          For PEERING_SUBNET and PEERING_STATIC routes, the URI of the originating
                          SUBNET/STATIC route.
                      - name: priority
                        type: Integer
                        description: Priority of the route.
                      - name: protocols
                        type: Array
                        description: Protocols of the route. POLICY_BASED routes only.
                        item_type:
                          type: String
                      - name: region
                        type: String
                        description: |-
                          Region of the route. DYNAMIC, PEERING_DYNAMIC, POLICY_BASED and ADVERTISED
                          routes only. If set for POLICY_BASED route, this is a region of VLAN
                          attachments for Cloud Interconnect the route applies to.
                      - name: routeScope
                        type: String
                        description: |-
                          Indicates where route is applicable. Deprecated, routes with NCC_HUB scope
                          are not included in the trace in new tests.
                          Possible values:
                          NETWORK
                          NCC_HUB
                      - name: routeType
                        type: String
                        description: |-
                          Type of route.
                          Possible values:
                          SUBNET
                          STATIC
                          DYNAMIC
                          PEERING_SUBNET
                          PEERING_STATIC
                          PEERING_DYNAMIC
                          POLICY_BASED
                          ADVERTISED
                      - name: srcIpRange
                        type: String
                        description: Source IP address range of the route. POLICY_BASED routes only.
                      - name: srcPortRanges
                        type: Array
                        description: Source port ranges of the route. POLICY_BASED routes only.
                        item_type:
                          type: String
                      - name: uri
                        type: String
                        description: |-
                          URI of a route. SUBNET, STATIC, PEERING_SUBNET (only for peering network)
                          and POLICY_BASED routes only.
                  - name: serverlessExternalConnection
                    type: NestedObject
                    description: For display only. Metadata associated with a serverless public connection.
                    properties:
                      - name: selectedIpAddress
                        type: String
                        description: Selected starting IP address, from the Google dynamic address pool.
                  - name: serverlessNeg
                    type: NestedObject
                    description: |-
                      For display only. Metadata associated with the serverless network endpoint
                      group backend.
                    properties:
                      - name: negUri
                        type: String
                        description: URI of the serverless network endpoint group.
                  - name: state
                    type: String
                    description: |-
                      Each step is in one of the pre-defined states.
                      Possible values:
                      START_FROM_INSTANCE
                      START_FROM_INTERNET
                      START_FROM_GOOGLE_SERVICE
                      START_FROM_PRIVATE_NETWORK
                      START_FROM_GKE_MASTER
                      START_FROM_CLOUD_SQL_INSTANCE
                      START_FROM_GKE_POD
                      START_FROM_REDIS_INSTANCE
                      START_FROM_REDIS_CLUSTER
                      START_FROM_CLOUD_FUNCTION
                      START_FROM_APP_ENGINE_VERSION
                      START_FROM_CLOUD_RUN_REVISION
                      START_FROM_STORAGE_BUCKET
                      START_FROM_PSC_PUBLISHED_SERVICE
                      START_FROM_SERVERLESS_NEG
                      APPLY_INGRESS_FIREWALL_RULE
                      APPLY_EGRESS_FIREWALL_RULE
                      APPLY_ROUTE
                      APPLY_FORWARDING_RULE
                      ANALYZE_LOAD_BALANCER_BACKEND
                      SPOOFING_APPROVED
                      ARRIVE_AT_INSTANCE
                      ARRIVE_AT_INTERNAL_LOAD_BALANCER
                      ARRIVE_AT_EXTERNAL_LOAD_BALANCER
                      ARRIVE_AT_HYBRID_SUBNET
                      ARRIVE_AT_VPN_GATEWAY
                      ARRIVE_AT_VPN_TUNNEL
                      ARRIVE_AT_INTERCONNECT_ATTACHMENT
                      ARRIVE_AT_VPC_CONNECTOR
                      ARRIVE_AT_GKE_POD
                      DIRECT_VPC_EGRESS_CONNECTION
                      SERVERLESS_EXTERNAL_CONNECTION
                      NGFW_PACKET_INSPECTION
                      NAT
                      SKIP_GKE_POD_IP_MASQUERADING
                      SKIP_GKE_INGRESS_NETWORK_POLICY
                      SKIP_GKE_EGRESS_NETWORK_POLICY
                      APPLY_INGRESS_GKE_NETWORK_POLICY
                      APPLY_EGRESS_GKE_NETWORK_POLICY
                      PROXY_CONNECTION
                      DELIVER
                      DROP
                      FORWARD
                      ABORT
                      VIEWER_PERMISSION_MISSING
                  - name: storageBucket
                    type: NestedObject
                    description: For display only. Metadata associated with Storage Bucket.
                    properties:
                      - name: bucket
                        type: String
                        description: Cloud Storage Bucket name.
                  - name: vpcConnector
                    type: NestedObject
                    description: For display only. Metadata associated with a VPC connector.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a VPC connector.
                      - name: location
                        type: String
                        description: Location in which the VPC connector is deployed.
                      - name: uri
                        type: String
                        description: URI of a VPC connector.
                  - name: vpnGateway
                    type: NestedObject
                    description: For display only. Metadata associated with a Compute Engine VPN gateway.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a VPN gateway.
                      - name: ipAddress
                        type: String
                        description: IP address of the VPN gateway.
                      - name: networkUri
                        type: String
                        description: URI of a Compute Engine network where the VPN gateway is configured.
                      - name: region
                        type: String
                        description: Name of a Google Cloud region where this VPN gateway is configured.
                      - name: uri
                        type: String
                        description: URI of a VPN gateway.
                      - name: vpnTunnelUri
                        type: String
                        description: |-
                          A VPN tunnel that is associated with this VPN gateway.
                          There may be multiple VPN tunnels configured on a VPN gateway, and only
                          the one relevant to the test is displayed.
                  - name: vpnTunnel
                    type: NestedObject
                    description: For display only. Metadata associated with a Compute Engine VPN tunnel.
                    properties:
                      - name: displayName
                        type: String
                        description: Name of a VPN tunnel.
                      - name: networkUri
                        type: String
                        description: URI of a Compute Engine network where the VPN tunnel is configured.
                      - name: region
                        type: String
                        description: Name of a Google Cloud region where this VPN tunnel is configured.
                      - name: remoteGateway
                        type: String
                        description: URI of a VPN gateway at remote end of the tunnel.
                      - name: remoteGatewayIp
                        type: String
                        description: Remote VPN gateway's IP address.
                      - name: routingType
                        type: String
                        description: |-
                          Type of the routing policy.
                          Possible values:
                          ROUTE_BASED
                          POLICY_BASED
                          DYNAMIC
                      - name: sourceGateway
                        type: String
                        description: URI of the VPN gateway at local end of the tunnel.
                      - name: sourceGatewayIp
                        type: String
                        description: Local VPN gateway's IP address.
                      - name: uri
                        type: String
                        description: URI of a VPN tunnel.
      - name: verifyTime
        type: String
        description: The time of the configuration analysis.
  - name: roundTrip
    type: Boolean
    description: |-
      Whether run analysis for the return path from destination to source.
      Default value is false.
  - name: source
    type: NestedObject
    required: true
    description: Source or destination of the Connectivity Test.
    properties:
      - name: appEngineVersion
        type: NestedObject
        description: Wrapper for the App Engine service version attributes.
        properties:
          - name: uri
            type: String
            description: |-
              An [App Engine](https://cloud.google.com/appengine) [service
              version](https://cloud.google.com/appengine/docs/admin-api/reference/rest/v1/apps.services.versions)
              name.
      - name: cloudFunction
        type: NestedObject
        description: Wrapper for Cloud Function attributes.
        properties:
          - name: uri
            type: String
            description: A [Cloud Function](https://cloud.google.com/functions) name.
      - name: cloudRunRevision
        type: NestedObject
        description: Wrapper for Cloud Run revision attributes.
        properties:
          - name: serviceUri
            type: String
            description: |-
              The URI of the Cloud Run service that the revision belongs to. The format
              is: projects/{project}/locations/{location}/services/{service}
            output: true
          - name: uri
            type: String
            description: |-
              A [Cloud Run](https://cloud.google.com/run)
              [revision](https://cloud.google.com/run/docs/reference/rest/v1/namespaces.revisions/get)
              URI. The format is:
              projects/{project}/locations/{location}/revisions/{revision}
      - name: cloudSqlInstance
        type: String
        description: A [Cloud SQL](https://cloud.google.com/sql) instance URI.
      - name: forwardingRule
        type: String
        description: |-
          A forwarding rule and its corresponding IP address represent the frontend
          configuration of a Google Cloud load balancer. Forwarding rules are also
          used for protocol forwarding, Private Service Connect and other network
          services to provide forwarding information in the control plane. Applicable
          only to destination endpoint. Format:
          `projects/{project}/global/forwardingRules/{id}` or
          `projects/{project}/regions/{region}/forwardingRules/{id}`
      - name: forwardingRuleTarget
        type: String
        description: |-
          Specifies the type of the target of the forwarding rule.
          Possible values:
          INSTANCE
          LOAD_BALANCER
          VPN_GATEWAY
          PSC
        output: true
      - name: fqdn
        type: String
        description: |-
          DNS endpoint of [Google Kubernetes Engine cluster control
          plane](https://cloud.google.com/kubernetes-engine/docs/concepts/cluster-architecture).
          Requires gke_master_cluster to be set, can't be used simultaneoulsly with
          ip_address or network. Applicable only to destination endpoint.
      - name: gkeMasterCluster
        type: String
        description: |-
          A cluster URI for [Google Kubernetes Engine cluster control
          plane](https://cloud.google.com/kubernetes-engine/docs/concepts/cluster-architecture).
      - name: gkePod
        type: String
        description: |-
          A [GKE Pod](https://cloud.google.com/kubernetes-engine/docs/concepts/pod)
          URI.
      - name: instance
        type: String
        description: A Compute Engine instance URI.
      - name: ipAddress
        type: String
        description: The IP address of the endpoint, which can be an external or internal IP.
      - name: loadBalancerId
        type: String
        description: |-
          ID of the load balancer the forwarding rule points to. Empty for forwarding
          rules not related to load balancers.
        output: true
      - name: loadBalancerType
        type: String
        description: |-
          Possible values:
          HTTPS_ADVANCED_LOAD_BALANCER
          HTTPS_LOAD_BALANCER
          REGIONAL_HTTPS_LOAD_BALANCER
          INTERNAL_HTTPS_LOAD_BALANCER
          SSL_PROXY_LOAD_BALANCER
          TCP_PROXY_LOAD_BALANCER
          INTERNAL_TCP_PROXY_LOAD_BALANCER
          NETWORK_LOAD_BALANCER
          LEGACY_NETWORK_LOAD_BALANCER
          TCP_UDP_INTERNAL_LOAD_BALANCER
      - name: network
        type: String
        description: |-
          A VPC network URI. For source endpoints, used according to the
          `network_type`. For destination endpoints, used only when the source is an
          external IP address endpoint, and the destination is an internal IP address
          endpoint.
      - name: networkType
        type: String
        description: |-
          For source endpoints, type of the network where the endpoint is located.
          Not relevant for destination endpoints.
          Possible values:
          GCP_NETWORK
          NON_GCP_NETWORK
          INTERNET
      - name: port
        type: Integer
        description: |-
          The IP protocol port of the endpoint.
          Only applicable when protocol is TCP or UDP.
      - name: projectId
        type: String
        description: |-
          For source endpoints, endpoint project ID. Used according to the
          `network_type`. Not relevant for destination endpoints.
      - name: redisCluster
        type: String
        description: |-
          A [Redis Cluster](https://cloud.google.com/memorystore/docs/cluster) URI.
          Applicable only to destination endpoint.
      - name: redisInstance
        type: String
        description: |-
          A [Redis Instance](https://cloud.google.com/memorystore/docs/redis) URI.
          Applicable only to destination endpoint.
  - name: updateTime
    type: String
    description: The time the test's configuration was updated.
    output: true
