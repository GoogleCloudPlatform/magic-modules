  - name: returnReachabilityDetails
    type: NestedObject
    description: Results of the configuration analysis from the last run of the test.
    properties:
      - name: error
        type: NestedObject
        description: |-
          The `Status` type defines a logical error model that is suitable for
          different programming environments, including REST APIs and RPC APIs. It is
          used by [gRPC](https://github.com/grpc). Each `Status` message contains
          three pieces of data: error code, error message, and error details.

          You can find out more about this error model and how to work with it in the
          [API Design Guide](https://cloud.google.com/apis/design/errors).
        properties:
          - name: code
            type: Integer
            description: The status code, which should be an enum value of google.rpc.Code.
          - name: details
            type: Array
            description: |-
              A list of messages that carry the error details.  There is a common set of
              message types for APIs to use.
            item_type:
              type: NestedObject
              properties: []
          - name: message
            type: String
            description: |-
              A developer-facing error message, which should be in English. Any
              user-facing error message should be localized and sent in the
              google.rpc.Status.details field, or localized by the client.
      - name: result
        type: String
        description: |-
          The overall result of the test's configuration analysis.
          Possible values:
          REACHABLE
          UNREACHABLE
          AMBIGUOUS
          UNDETERMINED
      - name: traces
        type: Array
        description: |-
          Result may contain a list of traces if a test has multiple possible
          paths in the network, such as when destination endpoint is a load balancer
          with multiple backends.
        item_type:
          type: NestedObject
          properties:
            - name: endpointInfo
              type: NestedObject
              description: |-
                For display only. The specification of the endpoints for the test.
                EndpointInfo is derived from source and destination Endpoint and validated
                by the backend data plane model.
              properties:
                - name: destinationIp
                  type: String
                  description: Destination IP address.
                - name: destinationNetworkUri
                  type: String
                  description: URI of the network where this packet is sent to.
                - name: destinationPort
                  type: Integer
                  description: Destination port. Only valid when protocol is TCP or UDP.
                - name: protocol
                  type: String
                  description: 'IP protocol in string format, for example: "TCP", "UDP", "ICMP".'
                - name: sourceAgentUri
                  type: String
                  description: URI of the source telemetry agent this packet originates from.
                - name: sourceIp
                  type: String
                  description: Source IP address.
                - name: sourceNetworkUri
                  type: String
                  description: URI of the network where this packet originates from.
                - name: sourcePort
                  type: Integer
                  description: Source port. Only valid when protocol is TCP or UDP.
            - name: forwardTraceId
              type: Integer
              description: |-
                ID of trace. For forward traces, this ID is unique for each trace. For
                return traces, it matches ID of associated forward trace. A single forward
                trace can be associated with none, one or more than one return trace.
            - name: steps
              type: Array
              description: |-
                A trace of a test contains multiple steps from the initial state to the
                final state (delivered, dropped, forwarded, or aborted).

                The steps are ordered by the processing sequence within the simulated
                network state machine. It is critical to preserve the order of the steps
                and avoid reordering or sorting them.
              item_type:
                type: NestedObject
                properties:
                  - name: abort
                    type: NestedObject
                    description: Details of the final state "abort" and associated resource.
                    properties:
                      - name: cause
                        type: String
                        description: |-
                          Causes that the analysis is aborted.
                          Possible values:
                          UNKNOWN_NETWORK
                          UNKNOWN_PROJECT
                          NO_EXTERNAL_IP
                          UNINTENDED_DESTINATION
                          SOURCE_ENDPOINT_NOT_FOUND
                          MISMATCHED_SOURCE_NETWORK
                          DESTINATION_ENDPOINT_NOT_FOUND
                          MISMATCHED_DESTINATION_NETWORK
                          UNKNOWN_IP
                          GOOGLE_MANAGED_SERVICE_UNKNOWN_IP
                          SOURCE_IP_ADDRESS_NOT_IN_SOURCE_NETWORK
                          PERMISSION_DENIED
                          PERMISSION_DENIED_NO_CLOUD_NAT_CONFIGS
                          PERMISSION_DENIED_NO_NEG_ENDPOINT_CONFIGS
                          PERMISSION_DENIED_NO_CLOUD_ROUTER_CONFIGS
                          NO_SOURCE_LOCATION
                          NO_SOURCE_GCP_NETWORK_LOCATION
                          NO_SOURCE_NON_GCP_NETWORK_LOCATION
                          NO_SOURCE_INTERNET_LOCATION
                          INVALID_ARGUMENT
                          TRACE_TOO_LONG
                          INTERNAL_ERROR
                          UNSUPPORTED
                          MISMATCHED_IP_VERSION
                          GKE_KONNECTIVITY_PROXY_UNSUPPORTED
                          RESOURCE_CONFIG_NOT_FOUND
                          VM_INSTANCE_CONFIG_NOT_FOUND
                          NETWORK_CONFIG_NOT_FOUND
                          FIREWALL_CONFIG_NOT_FOUND
                          ROUTE_CONFIG_NOT_FOUND
                          GOOGLE_MANAGED_SERVICE_AMBIGUOUS_PSC_ENDPOINT
                          GOOGLE_MANAGED_SERVICE_AMBIGUOUS_ENDPOINT
                          SOURCE_PSC_CLOUD_SQL_UNSUPPORTED
                          SOURCE_EXTERNAL_CLOUD_SQL_UNSUPPORTED
                          SOURCE_REDIS_CLUSTER_UNSUPPORTED
                          SOURCE_REDIS_INSTANCE_UNSUPPORTED
                          SOURCE_FORWARDING_RULE_UNSUPPORTED
                          NON_ROUTABLE_IP_ADDRESS
                          UNKNOWN_ISSUE_IN_GOOGLE_MANAGED_PROJECT
                          UNSUPPORTED_GOOGLE_MANAGED_PROJECT_CONFIG
                          NO_SERVERLESS_IP_RANGES
                          IP_VERSION_PROTOCOL_MISMATCH
                          GKE_POD_UNKNOWN_ENDPOINT_LOCATION
                      - name: ipAddress
                        type: String
                        description: IP address that caused the abort.
                      - name: projectsMissingPermission
                        type: Array
                        description: |-
                          List of project IDs the user specified in the request but lacks access to.
                          In this case, analysis is aborted with the PERMISSION_DENIED cause.
                        item_type:
                          type: String
                      - name: resourceUri
