---
name: DataExport
description: |
  DataExport resource represents a request to export data from Chronicle to a GCS bucket.
references:
  guides:
    'Data Export Overview': 'https://cloud.google.com/chronicle/docs/secops/data-export-overview'
  api: 'https://cloud.google.com/chronicle/docs/reference/rest/v1beta/projects.locations.instances.dataExports'
base_url: projects/{{project}}/locations/{{location}}/instances/{{instance}}/dataExports
self_link: projects/{{project}}/locations/{{location}}/instances/{{instance}}/dataExports/{{data_export_id}}
create_url: projects/{{project}}/locations/{{location}}/instances/{{instance}}/dataExports
id_format: projects/{{project}}/locations/{{location}}/instances/{{instance}}/dataExports/{{data_export_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/instances/{{instance}}/dataExports/{{data_export_id}}
immutable: true
exclude_delete: true
autogen_status: RGF0YUV4cG9ydA==

samples:
  - name: 'chronicle_data_export_basic'
    primary_resource_id: 'example'
    bootstrap_iam:
      - member: "serviceAccount:service-{project_number}@gcp-sa-chronicle.iam.gserviceaccount.com"
        role: "roles/storage.admin"
    steps:
      - name: 'chronicle_data_export_basic'
        vars:
          location: 'us'
          start_time: '2025-01-01T00:00:00Z'
          end_time: '2025-01-01T12:00:00Z'
        test_env_vars:
          chronicle_id: 'CHRONICLE_ID'
          project_name: 'PROJECT_NAME'
  - name: 'chronicle_data_export_full'
    primary_resource_id: 'example'
    bootstrap_iam:
      - member: "serviceAccount:service-{project_number}@gcp-sa-chronicle.iam.gserviceaccount.com"
        role: "roles/storage.admin"
    steps:
      - name: 'chronicle_data_export_full'
        vars:
          location: 'us'
          start_time: '2025-01-01T00:00:00Z'
          end_time: '2025-01-01T12:00:00Z'
        test_env_vars:
          chronicle_id: 'CHRONICLE_ID'
          project_name: 'PROJECT_NAME'

parameters:
  - name: location
    type: String
    description: The location of the resource.
    url_param_only: true
    required: true
    immutable: true
  - name: instance
    type: String
    description: The unique identifier for the Chronicle instance.
    url_param_only: true
    required: true
    immutable: true
properties:
  - name: name
    type: String
    description: The resource name of the data export.
    output: true
  - name: dataExportId
    type: String
    description: The unique identifier for the data export.
    output: true
    custom_flatten: 'templates/terraform/custom_flatten/id_from_name.tmpl'
  - name: startTime
    type: String
    required: true
    description: Start, inclusive time from the range.
  - name: endTime
    type: String
    required: true
    description: Last, exclusive time from the range.
  - name: gcsBucket
    type: String
    required: true
    description: Link to the destination Cloud Storage bucket.
  - name: includeLogTypes
    type: Array
    default_from_api: true
    item_type:
      type: String
      diff_suppress_func: 'tpgresource.ProjectNumberDiffSuppress'
    description: The specific log types to include in the Data Export request.
  - name: estimatedVolume
    type: Integer
    description: The estimated export volume in bytes.
    output: true
  - name: exportedVolume
    type: Integer
    description: Actual volume of data exported.
    output: true
  - name: createTime
    type: String
    description: Timestamp indicating when the DataExport resource was created.
    output: true
  - name: updateTime
    type: String
    description: Timestamp indicating the last time the DataExport resource was updated.
    output: true
  - name: namespaces
    type: Array
    item_type:
      type: String
    description: The namespaces used to filter the export.
  - name: ingestionLabels
    type: Array
    description: The ingestion labels used to filter the export.
    item_type:
      type: NestedObject
      properties:
        - name: key
          type: String
          required: true
          description: The key.
        - name: value
          type: String
          required: true
          description: The value.
  - name: dataExportStatus
    type: NestedObject
    description: Status of the current export.
    output: true
    properties:
      - name: stage
        type: String
        description: The stage/status of a given data export request.
        output: true
      - name: dataRbacFiltered
        type: Boolean
        description: Indicates whether the data export is filtered by RBAC.
        output: true
      - name: error
        type: String
        description: The error message if the stage is FINISHED_FAILURE.
        output: true
      - name: exportedGlobPatterns
        type: Array
        item_type:
          type: String
        description: List of exported glob patterns.
        output: true
