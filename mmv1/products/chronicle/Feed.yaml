          error_action contains the user action prescribed for remediation of feed
          error.
        output: true
      - name: errorCause
        type: String
        description: error_cause contains the information regarding the failure cause.
        output: true
      - name: errorCode
        type: String
        description: |-
          error_code contains the error code for the feed. The field is populated for
          the feeds with failed status.
        output: true
      - name: httpErrorCode
        type: Integer
        description: |-
          http_error_code contains the HTTP error code for the feed failure.
          feed transfer failure may or may not result in http error code.
        output: true
  - name: failureMsg
    type: String
    description: Details about the most recent failure when feed state is FAILED.
    output: true
  - name: lastFeedInitiationTime
    type: String
    description: Latest timestamp when the transfer was successful for the feed.
    output: true
  - name: name
    type: String
    output: true
    description: |-
      The resource name of the feed.
      Format:
      projects/{project}/locations/{location}/instances/{instance}/feeds/{feed}
  - name: readOnly
    type: Boolean
    description: Whether this feed can be updated or deleted.
    output: true
  - name: referenceId
    type: String
    description: Reference ID, this field will contain the legacy id of the feed.
    output: true
  - name: uid
    type: String
    description: Unique identifier for the feed.
    output: true
