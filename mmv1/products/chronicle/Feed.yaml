---
name: Feed
description: The FeedsService is responsible for configuring and managing the ingestion of third-party security data and logs into Google Security Operations through various feed creation, updates, and lifecycle management, and schema validation.
min_version: 'beta'
references:
  guides:
    'Feed management overview': 'https://docs.cloud.google.com/chronicle/docs/administration/feed-management-overview'
  api: 'https://docs.cloud.google.com/chronicle/docs/reference/rest/v1beta/projects.locations.instances.feeds'
base_url: projects/{{project}}/locations/{{location}}/instances/{{instance}}/feeds
self_link: projects/{{project}}/locations/{{location}}/instances/{{instance}}/feeds/{{feed}}
create_url: projects/{{project}}/locations/{{location}}/instances/{{instance}}/feeds
update_verb: PATCH
update_mask: true
import_format:
  - projects/{{project}}/locations/{{location}}/instances/{{instance}}/feeds/{{feed}}
delete_url: projects/{{project}}/locations/{{location}}/instances/{{instance}}/feeds/{{feed}}

examples:
  - name: 'chronicle_feed_basic'
    primary_resource_id: 'example_feed'
    vars:
      resource_name: test-feeds
    test_env_vars:
      chronicle_id: 'CHRONICLE_ID'
      project_name: 'PROJECT_NAME'
  - name: 'chronicle_feed_gcs'
    primary_resource_id: 'example_feed'
    vars:
      resource_name: test-feeds
      description: test-feeds-description
    test_env_vars:
      chronicle_id: 'CHRONICLE_ID'
      project_name: 'PROJECT_NAME'
      project_number: 'PROJECT_NUMBER'
    ignore_read_extra:
      - 'feed_service_account'
  - name: 'chronicle_feed_https_push'
    primary_resource_id: 'example_feed'
    vars:
      resource_name: test-feeds
      description: test-feeds-description
    test_env_vars:
      chronicle_id: 'CHRONICLE_ID'
      project_name: 'PROJECT_NAME'
    exclude_import_test: true

custom_code:
  update_encoder: 'templates/terraform/encoders/chronicle_feed_update.go.tmpl'
  post_update: 'templates/terraform/post_update/chronicle_feed_state.go.tmpl'
  pre_create: 'templates/terraform/pre_create/chronicle_feed_service_account.go.tmpl'
  post_create: 'templates/terraform/post_create/chronicle_feed_generate_secret.go.tmpl'
virtual_fields:
  - name: 'secret'
    type: String
    description: |
      Output only. The secret generated for the feed. This is only available when the feed source type is HTTPS_PUSH_AMAZON_KINESIS_FIREHOSE.
    output: true
    sensitive: true
  - name: 'feed_service_account'
    type: String
    description: |
      Output only. The service account used by Chronicle to ingest data from Cloud Storage. This is only available when the feed source type is GOOGLE_CLOUD_STORAGE_EVENT_DRIVEN or GOOGLE_CLOUD_STORAGE.
    output: true
    ignore_read: true
autogen_status: RmVlZA==
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: instance
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: feed
    type: String
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    default_from_api: true
    custom_flatten: 'templates/terraform/custom_flatten/id_from_name.tmpl'
properties:
  - name: state
    type: String
    description: 'The state of the feed (e.g., ACTIVE, INACTIVE).'
    # Mark as output if the API only allows changing it via custom endpoints
    output: true
  - name: enabled
    type: Boolean
    description: 'Whether the feed is enabled.'
    # Use a virtual/client-side field to trigger enable/disable calls
  - name: details
    type: NestedObject
    description: |-
      Additional details of the feed, these details are dynamic and will be
      different for each of the feeds.
    properties:
      - name: amazonKinesisFirehoseSettings
        type: NestedObject
        description: Settings required by Amazon Kinesis Firehose Feeds(HTTP-Push).
        exactly_one_of: &all_feed_settings
          - details.0.anomali_settings
          - details.0.azure_ad_context_settings
          - details.0.cloud_passage_settings
          - details.0.cortex_xdr_settings
          - details.0.duo_auth_settings
          - details.0.duo_user_context_settings
          - details.0.microsoft_graph_alert_settings
          - details.0.microsoft_security_center_alert_settings
          - details.0.mimecast_mail_settings
          - details.0.office365_settings
          - details.0.proofpoint_mail_settings
          - details.0.recorded_future_ioc_settings
          - details.0.workday_settings
          - details.0.pan_ioc_settings
          - details.0.okta_settings
          - details.0.okta_user_context_settings
          - details.0.fox_it_stix_settings
          - details.0.threat_connect_ioc_settings
          - details.0.service_now_cmdb_settings
          - details.0.imperva_waf_settings
          - details.0.thinkst_canary_settings
          - details.0.rh_isac_ioc_settings
          - details.0.rapid7_insight_settings
          - details.0.salesforce_settings
          - details.0.netskope_alert_settings
          - details.0.azure_mdm_intune_settings
          - details.0.azure_ad_settings
          - details.0.proofpoint_on_demand_settings
          - details.0.workspace_users_settings
          - details.0.workspace_activity_settings
          - details.0.workspace_alerts_settings
          - details.0.workspace_privileges_settings
          - details.0.workspace_mobile_settings
          - details.0.workspace_chrome_os_settings
          - details.0.workspace_groups_settings
          - details.0.azure_ad_audit_settings
          - details.0.symantec_event_export_settings
          - details.0.qualys_vm_settings
          - details.0.pan_prisma_cloud_settings
          - details.0.gcs_settings
          - details.0.http_settings
          - details.0.sftp_settings
          - details.0.amazon_s3_settings
          - details.0.azure_blob_store_settings
          - details.0.amazon_sqs_settings
          - details.0.google_cloud_identity_devices_settings
          - details.0.google_cloud_identity_device_users_settings
          - details.0.crowdstrike_detects_settings
          - details.0.mandiant_ioc_settings
          - details.0.sentinelone_alert_settings
          - details.0.qualys_scan_settings
          - details.0.pubsub_settings
          - details.0.amazon_kinesis_firehose_settings
          - details.0.webhook_settings
          - details.0.dummy_log_type_settings
          - details.0.https_push_google_cloud_pubsub_settings
          - details.0.https_push_amazon_kinesis_firehose_settings
          - details.0.https_push_webhook_settings
          - details.0.aws_ec2_hosts_settings
          - details.0.aws_ec2_instances_settings
          - details.0.aws_ec2_vpcs_settings
          - details.0.aws_iam_settings
          - details.0.netskope_alert_v2_settings
          - details.0.gcs_v2_settings
          - details.0.amazon_s3_v2_settings
          - details.0.amazon_sqs_v2_settings
          - details.0.azure_event_hub_settings
          - details.0.trellix_hx_hosts_settings
          - details.0.azure_blob_store_v2_settings
          - details.0.trellix_hx_alerts_settings
          - details.0.google_cloud_storage_event_driven_settings
          - details.0.crowdstrike_alerts_settings
          - details.0.trellix_hx_bulk_acqs_settings
          - details.0.mimecast_mail_v2_settings
          - details.0.threat_connect_ioc_v3_settings
        properties: []
      - name: amazonS3Settings
        type: NestedObject
        description: Amazon S3 settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Amazon S3 auth.
            properties:
              - name: accessKeyId
                type: String
                description: Access key ID. Used when using access key auth.
              - name: clientId
                type: String
                description: Client ID. Used when using OAuth auth.
              - name: clientSecret
                type: String
                description: Client secret. Used when using OAuth auth.
              - name: refreshUri
                type: String
                sensitive: true
                description: Refresh URI. Used when using OAuth auth.
              - name: region
                type: String
                required: true
                description: |-
                  Possible values:
                  US_EAST_1
                  US_EAST_2
                  US_WEST_1
                  US_WEST_2
                  US_GOV_CLOUD
                  US_GOV_EAST_1
                  EU_WEST_1
                  EU_WEST_2
                  EU_WEST_3
                  EU_CENTRAL_1
                  EU_NORTH_1
                  EU_SOUTH_1
                  AP_SOUTH_1
                  AP_SOUTHEAST_1
                  AP_SOUTHEAST_2
                  AP_SOUTHEAST_3
                  AP_NORTHEAST_1
                  AP_NORTHEAST_2
                  AP_NORTHEAST_3
                  AP_EAST_1
                  SA_EAST_1
                  CN_NORTH_1
                  CN_NORTHWEST_1
                  CA_CENTRAL_1
                  AF_SOUTH_1
                  ME_SOUTH_1
                  AP_SOUTH_2
                  AP_SOUTHEAST_4
                  CA_WEST_1
                  EU_SOUTH_2
                  EU_CENTRAL_2
                  IL_CENTRAL_1
                  ME_CENTRAL_1
              - name: secretAccessKey
                type: String
                description: Secret access key. Used when using access key auth.
          - name: s3Uri
            type: String
            required: true
            description: S3 URI.
          - name: sourceDeletionOption
            type: String
            required: true
            description: |-
              Possible values:
              SOURCE_DELETION_NEVER
              SOURCE_DELETION_ON_SUCCESS
              SOURCE_DELETION_ON_SUCCESS_FILES_ONLY
          - name: sourceType
            type: String
            required: true
            description: |-
              Possible values:
              FILES
              FOLDERS
              FOLDERS_RECURSIVE
      - name: amazonS3V2Settings
        type: NestedObject
        description: |-
          AmazonS3V2Settings is the settings proto for Omniflow S3 feeds.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            required: true
            description: A message containing fields used to authenticate with Amazon S3.
            properties:
              - name: accessKeySecretAuth
                type: NestedObject
                description: S3 V2 access key and secret auth.
                properties:
                  - name: accessKeyId
                    type: String
                    required: true
                    description: Access Key ID for an AWS account (a 20-character, alphanumeric string).
                  - name: secretAccessKey
                    type: String
                    required: true
                    sensitive: true
                    description: Secret Access Key for an AWS account (a 40-character string).
              - name: awsIamRoleAuth
                type: NestedObject
                description: AWS IAM Role Auth for S3 V2.
                properties:
                  - name: awsIamRoleArn
                    type: String
                    description: AWS IAM Role for Identity Federation.
                  - name: subjectId
                    type: String
                    description: Subject ID to use for S3.
          - name: chronicleServiceAccount
            type: String
            description: |-
              SA that will read data, this is Storage Transfer Service SA of Customer's
              Tenancy Project.
            output: true
          - name: maxLookbackDays
            type: Integer
            description: Maximum File Age to ingest in days.
          - name: s3Uri
            type: String
            required: true
            description: S3 URI.
          - name: sourceDeletionOption
            type: String
            description: |-
              Possible values:
              NEVER
              ON_SUCCESS
      - name: amazonSqsSettings
        type: NestedObject
        description: Amazon SQS settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: accountNumber
            type: String
            description: Account number of the owner of the queue.
          - name: authentication
            type: NestedObject
            description: Amazon SQS auth.
            properties:
              - name: additionalS3AccessKeySecretAuth
                type: NestedObject
                description: Additional S3 access key secret auth.
                properties:
                  - name: accessKeyId
                    type: String
                    description: Access key ID.
                  - name: secretAccessKey
                    type: String
                    sensitive: true
                    description: Secret access key.
              - name: sqsAccessKeySecretAuth
                type: NestedObject
                description: Amazon SQS access key and secret auth.
                properties:
                  - name: accessKeyId
                    type: String
                    description: Access key ID.
                  - name: secretAccessKey
                    type: String
                    sensitive: true
                    description: Secret access key.
          - name: queue
            type: String
            description: Name of the queue.
          - name: region
            type: String
            description: |-
              Possible values:
              US_EAST_1
              US_EAST_2
              US_WEST_1
              US_WEST_2
              US_GOV_CLOUD
              US_GOV_EAST_1
              EU_WEST_1
              EU_WEST_2
              EU_WEST_3
              EU_CENTRAL_1
              EU_NORTH_1
              EU_SOUTH_1
              AP_SOUTH_1
              AP_SOUTHEAST_1
              AP_SOUTHEAST_2
              AP_SOUTHEAST_3
              AP_NORTHEAST_1
              AP_NORTHEAST_2
              AP_NORTHEAST_3
              AP_EAST_1
              SA_EAST_1
              CN_NORTH_1
              CN_NORTHWEST_1
              CA_CENTRAL_1
              AF_SOUTH_1
              ME_SOUTH_1
              AP_SOUTH_2
              AP_SOUTHEAST_4
              CA_WEST_1
              EU_SOUTH_2
              EU_CENTRAL_2
              IL_CENTRAL_1
              ME_CENTRAL_1
          - name: sourceDeletionOption
            type: String
            description: |-
              Possible values:
              SOURCE_DELETION_NEVER
              SOURCE_DELETION_ON_SUCCESS
              SOURCE_DELETION_ON_SUCCESS_FILES_ONLY
      - name: amazonSqsV2Settings
        type: NestedObject
        description: |-
          AmazonSQSV2Settings is the settings proto for Omniflow SQS feeds.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            required: true
            description: A message containing fields used to authenticate with Amazon SQS.
            properties:
              - name: awsIamRoleAuth
                type: NestedObject
                required: true
                description: AWS IAM Role Auth for SQS V2.
                properties:
                  - name: awsIamRoleArn
                    type: String
                    description: AWS IAM Role for Identity Federation.
                  - name: subjectId
                    type: String
                    description: Subject ID to use for SQS.
              - name: sqsV2AccessKeySecretAuth
                type: NestedObject
                required: true
                description: SQS V2 access key and secret auth.
                properties:
                  - name: accessKeyId
                    type: String
                    description: 'Access key ID of the S3 bucket.  Ex: AKIABCDEFGHIJKL.'
                  - name: secretAccessKey
                    type: String
                    sensitive: true
                    description: Secret access key to access the S3 bucket.
          - name: chronicleServiceAccount
            type: String
            description: |-
              SA that will read data, this is Storage Transfer Service SA of Customer's
              Tenancy Project.
            output: true
          - name: maxLookbackDays
            type: Integer
            description: Maximum File Age to ingest in days.
          - name: queue
            type: String
            required: true
            description: Amazon Resource Name(ARN) of the queue.
          - name: s3Uri
            type: String
            required: true
            description: S3 URI.
          - name: sourceDeletionOption
            type: String
            description: |-
              Possible values:
              NEVER
              ON_SUCCESS
      - name: anomaliSettings
        type: NestedObject
        description: Anomali IOC settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Info for username and secret based authentication.
            properties:
              - name: secret
                type: String
                sensitive: true
                description: Secret of the account identified by user_name.
              - name: user
                type: String
                description: Username of an identity used for authentication.
      - name: assetNamespace
        type: String
        description: The asset namespace to apply to all logs ingested through this feed.
      - name: awsEc2HostsSettings
        type: NestedObject
        description: AWS EC2 Hosts Settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Info for username and secret based authentication.
            properties:
              - name: secret
                type: String
                sensitive: true
                description: Secret of the account identified by user_name.
              - name: user
                type: String
                description: Username of an identity used for authentication.
      - name: awsEc2InstancesSettings
        type: NestedObject
        description: AWS EC2 Instances Settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Info for username and secret based authentication.
            properties:
              - name: secret
                type: String
                sensitive: true
                description: Secret of the account identified by user_name.
              - name: user
                type: String
                description: Username of an identity used for authentication.
      - name: awsEc2VpcsSettings
        type: NestedObject
        description: AWS EC2 Vpcs Settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Info for username and secret based authentication.
            properties:
              - name: secret
                type: String
                sensitive: true
                description: Secret of the account identified by user_name.
              - name: user
                type: String
                description: Username of an identity used for authentication.
      - name: awsIamSettings
        type: NestedObject
        description: AWSIAMSettings contains details needed for creating an AWS IAM feed.
        exactly_one_of: *all_feed_settings
        properties:
          - name: apiType
            type: String
            description: |-
              Supported AWS IAM api type.
              Possible values:
              USERS
              ROLES
              GROUPS
          - name: authentication
            type: NestedObject
            description: Info for username and secret based authentication.
            properties:
              - name: secret
                type: String
                sensitive: true
                description: Secret of the account identified by user_name.
              - name: user
                type: String
                description: Username of an identity used for authentication.
      - name: azureAdAuditSettings
        type: NestedObject
        description: Azure AD Audit settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authEndpoint
            type: String
            description: API Auth Endpoint.
          - name: authentication
            type: NestedObject
            description: Microsoft OAuth 2.0 client credentials grant.
            properties:
              - name: clientId
                type: String
                description: Client ID.
              - name: clientSecret
                type: String
                sensitive: true
                description: Client secret.
          - name: hostname
            type: String
            description: API Hostname.
          - name: tenantId
            type: String
            description: Tenant ID.
      - name: azureAdContextSettings
        type: NestedObject
        description: Azure AD Context settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authEndpoint
            type: String
            description: API Auth Endpoint.
          - name: authentication
            type: NestedObject
            description: Microsoft OAuth 2.0 client credentials grant.
            properties:
              - name: clientId
                type: String
                description: Client ID.
              - name: clientSecret
                type: String
                sensitive: true
                description: Client secret.
          - name: hostname
            type: String
            description: API Hostname.
          - name: retrieveDevices
            type: Boolean
            description: Whether to retrieve device information in user context.
          - name: retrieveGroups
            type: Boolean
            description: Whether to retrieve group information in user context.
          - name: tenantId
            type: String
            description: Tenant ID.
      - name: azureAdSettings
        type: NestedObject
        description: Azure AD settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authEndpoint
            type: String
            description: API Auth Endpoint.
          - name: authentication
            type: NestedObject
            description: Microsoft OAuth 2.0 client credentials grant.
            properties:
              - name: clientId
                type: String
                description: Client ID.
              - name: clientSecret
                type: String
                sensitive: true
                description: Client secret.
          - name: hostname
            type: String
            description: API Hostname.
          - name: tenantId
            type: String
            description: Tenant ID.
      - name: azureBlobStoreSettings
        type: NestedObject
        description: Azure Blob Storage settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Azure auth.
            properties:
              - name: sasToken
                type: String
                sensitive: true
                description: SAS Token.
              - name: sharedKey
                type: String
                sensitive: true
                description: Shared Key.
          - name: azureUri
            type: String
            description: Azure URI.
          - name: sourceDeletionOption
            type: String
            description: |-
              Possible values:
              SOURCE_DELETION_NEVER
              SOURCE_DELETION_ON_SUCCESS
              SOURCE_DELETION_ON_SUCCESS_FILES_ONLY
          - name: sourceType
            type: String
            description: |-
              Possible values:
              FILES
              FOLDERS
              FOLDERS_RECURSIVE
      - name: azureBlobStoreV2Settings
        type: NestedObject
        description: |-
          AzureBlobStoreV2Settings is the settings proto for Azure Blob Storage feeds.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            required: true
            description: A message containing fields used to authenticate with Azure Blob Storage.
            properties:
              - name: accessKey
                type: String
                required: true
                sensitive: true
                description: Access Key also known as shared key.
              - name: azureV2WorkloadIdentityFederation
                type: NestedObject
                required: true
                description: Azure V2 Workload Identity Federation.
                properties:
                  - name: clientId
                    type: String
                    required: true
                    description: OAuth client ID.
                  - name: subjectId
                    type: String
                    required: true
                    description: Subject ID of the Azure subscription.
                  - name: tenantId
                    type: String
                    required: true
                    description: Tenant ID.
              - name: sasToken
                type: String
                required: true
                sensitive: true
                description: SAS Token.
          - name: azureUri
            type: String
            required: true
            description: Azure URI.
          - name: chronicleServiceAccount
            type: String
            description: |-
              SA that will read data, this is Storage Transfer Service SA of Customer's
              Tenancy Project.
            output: true
          - name: maxLookbackDays
            type: Integer
            description: Maximum File Age to ingest in days.
          - name: sourceDeletionOption
            type: String
            description: |-
              Possible values:
              NEVER
              ON_SUCCESS
      - name: azureEventHubSettings
        type: NestedObject
        description: Settings required by Azure Event Hub Feeds.
        exactly_one_of: *all_feed_settings
        properties:
          - name: azureSasToken
            type: String
            sensitive: true
            description: SAS token
          - name: azureStorageConnectionString
            type: String
            description: Blob store connection string for authentication.
          - name: azureStorageContainer
            type: String
            description: Blob storage container name.
          - name: consumerGroup
            type: String
            required: true
            description: Event hub consumer group to read from.
          - name: eventHubConnectionString
            type: String
            required: true
            description: Event hub connection string for authentication.
          - name: eventHubNamespace
            type: String
            description: Event hub namespace
            output: true
          - name: name
            type: String
            required: true
            description: Event hub to read from.
      - name: azureMdmIntuneSettings
        type: NestedObject
        description: Azure MDM Intune settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authEndpoint
            type: String
            description: API Auth Endpoint.
          - name: authentication
            type: NestedObject
            description: Microsoft OAuth 2.0 client credentials grant.
            properties:
              - name: clientId
                type: String
                description: Client ID.
              - name: clientSecret
                type: String
                sensitive: true
                description: Client secret.
          - name: hostname
            type: String
            description: API Hostname.
          - name: tenantId
            type: String
            description: Tenant ID.
      - name: cloudPassageSettings
        type: NestedObject
        description: CloudPassage settings.
        exactly_one_of: *all_feed_settings
        properties:
          - name: authentication
            type: NestedObject
            description: Info for username and secret based authentication.
            properties:
              - name: secret
                type: String
                sensitive: true
                description: Secret of the account identified by user_name.
              - name: user
                type: String
                description: Username of an identity used for authentication.
          - name: eventTypes
            type: Array
            description: Event types filter for the events API.
            item_type:
              type: String
      - name: cortexXdrSettings
