    primary_resource_id: instance
    min_version: beta
    steps:
      - name: network_connectivity_custom_hardware_instance_basic
        resource_id_vars:
          resource_name: ch-test-instance
        vars:
          env_label: "test"
      - name: network_connectivity_custom_hardware_instance_basic
        resource_id_vars:
          resource_name: ch-test-instance
        vars:
          env_label: "prod"
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - update
    - delete
  result:
    resource_inside_response: true
autogen_status: Q3VzdG9tSGFyZHdhcmVJbnN0YW5jZQ==
autogen_async: true
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: customHardwareInstanceId
    type: String
    required: true
    description: |-
      Unique id of the CustomHardwareInstance.
      This is restricted to letters, numbers and with the first
      character being a letter, the last a letter or a number. Matching the regex
      `^[a-zA-Z0-9-]*[a-zA-Z0-9]$`.
    immutable: true
    url_param_only: true
properties:
