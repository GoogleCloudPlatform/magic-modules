    output: true
  - name: labels
    type: KeyValueLabels
    description: User-defined labels.
  - name: name
    type: String
    description: |-
      Identifier. The name of a CustomHardwareInstance.
      This is populated by the service.
    output: true
  - name: updateTime
    type: String
    description: Time when the CustomHardwareInstance was updated.
    output: true
min_version: beta
