name: CustomHardwareInstance
description: Description
base_url: projects/{{project}}/locations/{{location}}/customHardwareInstances
self_link: projects/{{project}}/locations/{{location}}/customHardwareInstances/{{custom_hardware_instance_id}}
create_url: projects/{{project}}/locations/{{location}}/customHardwareInstances?customHardwareInstanceId={{custom_hardware_instance_id}}
update_mask: true
update_verb: PATCH
import_format:
