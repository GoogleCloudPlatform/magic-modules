---
name: CustomHardwareLinkConnectPair
description: Description
base_url: projects/{{project}}/locations/{{location}}/customHardwareLinkConnectPairs
self_link: projects/{{project}}/locations/{{location}}/customHardwareLinkConnectPairs/{{custom_hardware_link_connect_pair_id}}
create_url: projects/{{project}}/locations/{{location}}/customHardwareLinkConnectPairs?customHardwareLinkConnectPairId={{custom_hardware_link_connect_pair_id}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/customHardwareLinkConnectPairs/{{custom_hardware_link_connect_pair_id}}
samples:
  - name: network_connectivity_custom_hardware_link_connect_pair_basic
    primary_resource_id: pair
    min_version: beta
    steps:
      - name: network_connectivity_custom_hardware_link_connect_pair_basic
        resource_id_vars:
          resource_name: ch-test-lcp
        vars:
          env_label: "test"
      - name: network_connectivity_custom_hardware_link_connect_pair_basic
        resource_id_vars:
          resource_name: ch-test-lcp
        vars:
          env_label: "prod"
  - name: network_connectivity_custom_hardware_link_connect_pair_ull
    primary_resource_id: pair
    min_version: beta
    steps:
      - name: network_connectivity_custom_hardware_link_connect_pair_ull
        resource_id_vars:
          resource_name: ch-test-ull-lcp
        vars:
          env_label: "test"
      - name: network_connectivity_custom_hardware_link_connect_pair_ull
        resource_id_vars:
          resource_name: ch-test-ull-lcp
        vars:
          env_label: "prod"
async:
  operation:
    base_url: '{{op_id}}'
  actions:
    - create
    - update
    - delete
  result:
    resource_inside_response: true
autogen_status: Q3VzdG9tSGFyZHdhcmVMaW5rQ29ubmVjdFBhaXI=
autogen_async: true
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: customHardwareLinkConnectPairId
    type: String
    required: true
    description: |-
      Unique id of the CustomHardwareLinkConnectPair.
      This is restricted to letters, numbers and with the first
      character being a letter, the last a letter or a number. Matching the regex
      `^[a-zA-Z0-9-]*[a-zA-Z0-9]$`.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: Time when the CustomHardwareLinkConnectPair was created.
    output: true
  - name: customHardwareInstance
    type: String
    required: true
    description: |-
      The name of the associated CustomHardwareInstance resource. For example:
      `projects/{project}/locations/{location}/customHardwareInstances/{custom_hardware_instance_id}`.
  - name: fullDiversityDisabled
    type: Boolean
    description: |-
      Whether to configure the CustomHardwareLinkConnectPair without full
      diversification across the CustomHardwareInstance. Defaults to false if not
      specified (i.e. full diversity is enabled by default).
  - name: labels
    type: KeyValueLabels
    description: User-defined labels.
  - name: linkSpeed
    type: String
    required: true
    description: |-
      Possible values:
      LINK_SPEED10_G
      LINK_SPEED100_G
  - name: linkType
    type: String
    required: true
    description: |-
      Possible values:
      LINK_TYPE_REGULAR
      LINK_TYPE_ULL
  - name: name
    type: String
    description: |-
      Identifier. The name of a CustomHardwareLinkConnectPair.
      // This is populated by the service.
    output: true
  - name: updateTime
    type: String
    description: Time when the CustomHardwareLinkConnectPair was updated.
    output: true
min_version: beta
