---
name: 'Rule'
description: A rule defines the deny or allow action of the operation it applies to and the conditions required for the rule to apply. You can set one rule for an entire repository and one rule for each package within.
references:
  guides:
    'Official Documentation': 'https://docs.cloud.google.com/sdk/gcloud/reference/artifacts/rules'
  api: 'https://cloud.google.com/artifact-registry/docs/reference/rest/v1/projects.locations.repositories.rules'
docs:
id_format: 'projects/{{project}}/locations/{{location}}/repositories/{{repository_id}}/rules/{{rule_id}}'
base_url: 'projects/{{project}}/locations/{{location}}/repositories/{{repository_id}}/rules'
self_link: 'projects/{{project}}/locations/{{location}}/repositories/{{repository_id}}/rules/{{rule_id}}'
create_url: 'projects/{{project}}/locations/{{location}}/repositories/{{repository_id}}/rules?ruleId={{rule_id}}'
update_verb: 'PATCH'
update_mask: true
async:
  # The API is not async, returns result directly in body instead of an operation that needs to be polled
  actions: ['']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: false
import_format:
  - 'projects/{{project}}/locations/{{location}}/repositories/{{repository_id}}/rules/{{rule_id}}'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
examples:
  - name: "artifact_registry_rule_basic"
    primary_resource_id: 'my-rule'
    vars:
      repository_id: 'my-repository'
      desc: 'example docker repository'
      rule_id: 'my-repo-rule-id'
      name: 'my-repo-rule-name'
  - name: "artifact_registry_rule_full"
    primary_resource_id: 'my-rule'
    exclude_from_docs: true
    vars:
      repository_id: 'my-repository'
      desc: 'example docker repository'
      rule_id: 'my-repo-rule-full-id'
      name: 'my-repo-rule-name'
parameters:
  - name: 'repository_id'
    type: String
    description: |-
      The last part of the repository name, for example:
      "repo1"
    url_param_only: true
    required: true
    immutable: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
  - name: 'location'
    type: String
    description: |-
      The name of the repository's location. In addition to specific regions,
      special values for multi-region locations are `asia`, `europe`, and `us`.
      See [here](https://cloud.google.com/artifact-registry/docs/repositories/repo-locations),
      or use the
      [google_artifact_registry_locations](https://registry.terraform.io/providers/hashicorp/google/latest/docs/data-sources/artifact_registry_locations)
      data source for possible values.
    url_param_only: true
    required: false
    immutable: true
    default_from_api: true
  - name: 'rule_id'
    type: String
    description: |-
      The rule id to use for this repository.
    url_param_only: true
    required: true
    immutable: true
properties:
  - name: 'name'
    type: String
    description: |-
      The name of the rule, for example:
      "projects/p1/locations/us-central1/repositories/repo1/rules/rule1".
    output: true
  - name: 'action'
    type: Enum
    description: |-
      The action this rule takes.
    enum_values:
      - 'ACTION_UNSPECIFIED'
      - 'ALLOW'
      - 'DENY'
  - name: 'operation'
    type: Enum
    description: |-
      The operation the rule applies to.
    enum_values:
      - 'OPERATION_UNSPECIFIED'
      - 'DOWNLOAD'
  - name: 'condition'
    type: NestedObject
    description: |-
      Optional. A CEL expression for conditions that must be met in order for the
      rule to apply. If not provided, the rule matches all objects.
    properties:
      - name: 'expression'
        type: String
        description: |-
          Textual representation of an expression in Common Expression Language syntax.
        required: true
      - name: 'title'
        type: String
        description: |-
          Optional. Title for the expression, i.e. a short string describing its purpose.
      - name: 'description'
        type: String
        description: |-
          Optional. Description of the expression. This is a longer text which
          describes the expression, e.g. when hovered over it in a UI.
      - name: 'location'
        type: String
        description: |-
          Optional. String indicating the location of the expression for error
          reporting, e.g. a file name and a position in the file.
  - name: 'packageId'
    type: String
    description: |-
      The package ID the rule applies to. If empty, this rule applies to all
      packages inside the repository.
