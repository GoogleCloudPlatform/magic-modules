---
name: Sink
description: |
  Describes a sink used to export traces to a BigQuery dataset. The sink must
  be created within a project.

  ~> **Note:** The Cloud Trace API identifies a sink by its canonical resource
  name, which references the project by its project **number**. The exported
  `name` attribute and the resource `id` therefore use the project number, and
  the BigQuery `destination` must also reference the project by number.
references:
  guides:
    'Trace data exports overview': 'https://cloud.google.com/trace/docs/trace-export-overview'
  api: 'https://cloud.google.com/trace/docs/reference/rest/v2beta1/projects.traceSinks'
min_version: beta
base_url: projects/{{project}}/traceSinks
self_link: '{{name}}'
create_url: projects/{{project}}/traceSinks
update_verb: PATCH
update_mask: true
id_format: '{{name}}'
import_format:
  - projects/{{project}}/traceSinks/{{sink_id}}
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
custom_code:
  encoder: templates/terraform/encoders/cloud_trace_sink.go.tmpl
  custom_import: templates/terraform/custom_import/cloud_trace_sink.go.tmpl
examples:
  - name: cloud_trace_sink_basic
    primary_resource_id: example
    min_version: beta
    vars:
      sink_name: my-trace-sink
      dataset_id: trace_sink_dataset
parameters:
  - name: sinkId
    type: String
    description: |
      The client-assigned sink identifier, unique within the project. Becomes the
      final component of the sink's resource name. Sink identifiers are limited to
      256 characters and can include only alphanumeric characters, underscores,
      hyphens, and periods.
    required: true
    immutable: true
    url_param_only: true
properties:
  - name: name
    type: String
    description: |
      The canonical sink resource name, using the project number, of the form
      `projects/{{project_number}}/traceSinks/{{sink_id}}`.
    output: true
  - name: outputConfig
    type: NestedObject
    description: The export destination.
    required: true
    properties:
      - name: destination
        type: String
        description: |
          The destination for writing trace data. Currently only BigQuery is
          supported. The project in the destination must be referenced by its
          project **number**, not its project ID, e.g.:
          `bigquery.googleapis.com/projects/[PROJECT_NUMBER]/datasets/[DATASET]`.
          The referenced dataset must already exist.
        required: true
  - name: writerIdentity
    type: String
    description: |
      A service account name for exporting the data. This field is set by
      sinks.create and sinks.update. The service account will need to be granted
      write access to the destination specified in the output configuration; see
      Granting access for a resource. To create tables and write data, this
      account needs the `dataEditor` role. E.g.:
      `export-00000001@12345.iam.gserviceaccount.com`
    output: true
