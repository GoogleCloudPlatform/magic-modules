---
name: TelemetryPolicy
description: |
  Provides a configuration for telemetry.
references:
  guides:
    api: https://cloud.google.com/network-services/docs/reference/network-services/rest/v1/projects.locations.telemetryPolicies
docs:
base_url: projects/{{project}}/locations/{{location}}/telemetryPolicies
self_link: projects/{{project}}/locations/{{location}}/telemetryPolicies/{{name}}
create_url: projects/{{project}}/locations/{{location}}/telemetryPolicies?telemetryPolicyId={{name}}
update_mask: true
update_verb: PATCH
import_format:
  - projects/{{project}}/locations/{{location}}/telemetryPolicies/{{name}}
timeouts:
  insert_minutes: 30
  update_minutes: 30
  delete_minutes: 30
async:
  type: OpAsync
  operation:
    base_url: '{{op_id}}'
  actions: [create, delete, update]
  result:
    resource_inside_response: true
autogen_async: true
samples:
  - name: network_services_telemetry_policy_basic
    primary_resource_id: default
    steps:
      - name: network_services_telemetry_policy_basic
        resource_id_vars:
          name: my-telemetry-policy
          mesh_name: my-mesh
  - name: network_services_telemetry_policy_full
    primary_resource_id: default
    steps:
      - name: network_services_telemetry_policy_full
        resource_id_vars:
          name: my-telemetry-policy
          mesh_name: my-mesh
parameters:
  - name: name
    type: String
    description: |
      Name of the TelemetryPolicy resource.
    required: true
    ignore_read: true
  - name: location
    type: String
    description: |
      The location of the telemetry policy.
    url_param_only: true
    required: true
properties:
  - name: createTime
    type: Time
    description: |
      The timestamp when the resource was created.
    output: true
  - name: updateTime
    type: Time
    description: |
      The timestamp when the resource was updated.
    output: true
  - name: labels
    type: KeyValueLabels
    description: |
      Set of label tags associated with the TelemetryPolicy resource.
  - name: etag
    type: Fingerprint
    description: |
      Etag of the resource.
      If this is provided, it must match the server's etag. If the provided etag
      does not match the server's etag, the request will fail with a 409 ABORTED
      error.
  - name: displayName
    type: String
    description: |
      Provides a human-readable name for the policy.
  - name: uid
    type: String
    description: |
      Specifies the server-assigned unique identifier for the policy.
    output: true
  - name: telemetryTarget
    type: NestedObject
    required: true
    description: |
      Specifies the set of targets to which this telemetry policy applies.
    properties:
      - name: resources
        type: Array
        required: true
        description: |
          Lists references to the resources that are targeted by the policy.
        item_type:
          type: String
          diff_suppress_func: tpgresource.CompareSelfLinkOrResourceName
  - name: tracingConfiguration
    type: NestedObject
    description: |
      Specifies the top-level configuration block within the telemetry
      policy that contains all the settings for how tracing will be applied to
      the target resources.
    properties:
      - name: samplingRate
        type: Double
        description: |
          Specifies the tracing sampling rate.
      - name: customSpanAttributes
        type: Array
        description: |
          Provides key-value pairs for adding context to spans.
        item_type:
          type: NestedObject
          properties:
            - name: attributeName
              type: String
              required: true
              description: |
                The attribute name.
            - name: literalValue
              type: String
              exactly_one_of:
                - literal_value
                - from_header_value
              description: |
                The literal value of the attribute.
            - name: fromHeaderValue
              type: String
              exactly_one_of:
                - literal_value
                - from_header_value
              description: |
                The from header value of the attribute.
      - name: parentBasedSampling
        type: NestedObject
        description: |
          Configures honoring a sampled bit in downstream traceparentID headers.
        properties:
          - name: enabled
            type: Boolean
            description: |
              Indicates whether parent based sampling is enabled.
          - name: samplingRate
            type: Double
            description: |
              Specifies the sampling rate for parent based sampling.
  - name: metricsConfiguration
    type: NestedObject
    description: |
      Specifies the top-level configuration block within the telemetry
      policy that contains all the settings for how metrics will be applied to
      the target resources.
    properties:
      - name: enabled
        type: Boolean
        description: |
          Indicates whether metrics are enabled or disabled.
