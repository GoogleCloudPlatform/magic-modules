---
name: 'DataAgent'
min_version: beta
description: |-
  A DataAgent lets users interact with configured data sources by using natural language.
references:
  guides:
    'Conversational Analytics API overview': 'https://cloud.google.com/gemini/docs/conversational-analytics-api/overview'
  api: 'https://cloud.google.com/gemini/data-agents/reference/rest/v1beta/projects.locations.dataAgents'
base_url: 'projects/{{project}}/locations/{{location}}/dataAgents'
self_link: 'projects/{{project}}/locations/{{location}}/dataAgents/{{data_agent_id}}'
create_url: 'projects/{{project}}/locations/{{location}}/dataAgents:createSync?dataAgentId={{data_agent_id}}'
update_url: 'projects/{{project}}/locations/{{location}}/dataAgents/{{data_agent_id}}:updateSync'
delete_url: 'projects/{{project}}/locations/{{location}}/dataAgents/{{data_agent_id}}:deleteSync'
update_verb: 'PATCH'
update_mask: true
id_format: 'projects/{{project}}/locations/{{location}}/dataAgents/{{data_agent_id}}'
import_format:
  - 'projects/{{project}}/locations/{{location}}/dataAgents/{{data_agent_id}}'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
examples:
  - name: 'gemini_data_analytics_data_agent_basic'
    primary_resource_id: 'example'
    min_version: beta
    vars:
      data_agent_id: 'data-agent'
  - name: 'gemini_data_analytics_data_agent_bigquery'
    primary_resource_id: 'example'
    min_version: beta
    vars:
      data_agent_id: 'data-agent-bq'
      dataset_id: 'data_agent'
      table_id: 'sales'
  - name: 'gemini_data_analytics_data_agent_cmek'
    primary_resource_id: 'example'
    min_version: beta
    vars:
      data_agent_id: 'data-agent-cmek'
      key_ring_id: 'data-agent-keyring'
      crypto_key_id: 'data-agent-key'
iam_policy:
  parent_resource_attribute: 'data_agent_id'
  method_name_separator: ':'
  fetch_iam_policy_verb: 'POST'
  set_iam_policy_verb: 'POST'
  iam_conditions_request_type: 'REQUEST_BODY'
  min_version: beta
  example_config_body: 'templates/terraform/iam/example_config_body/gemini_data_analytics_data_agent.tf.tmpl'
  import_format:
    - 'projects/{{project}}/locations/{{location}}/dataAgents/{{data_agent_id}}'
    - '{{data_agent_id}}'
  allowed_iam_role: 'roles/geminidataanalytics.dataAgentUser'
parameters:
  - name: 'location'
    type: String
    description: |-
      The location of the DataAgent.
    required: true
    immutable: true
    url_param_only: true
  - name: 'dataAgentId'
    type: String
    description: |-
      Required. The ID to use for the DataAgent, which becomes the final component
      of the resource name. The ID must be 63 characters or fewer and must match
      the resource ID requirements in https://google.aip.dev/122#resource-id-segments.
    required: true
    immutable: true
    url_param_only: true
properties:
  - name: 'name'
    type: String
    description: |-
      Output only. Identifier. The unique resource name of a DataAgent.
      Format: projects/{project}/locations/{location}/dataAgents/{dataAgentId}
    output: true
    custom_flatten: 'templates/terraform/custom_flatten/name_from_self_link.tmpl'
  - name: 'displayName'
    type: String
    description: |-
      Optional. User friendly display name. Must be between 1 and 256 characters.
  - name: 'description'
    type: String
    description: |-
      Optional. Description of the agent. Must be between 1 and 1024 characters.
  - name: 'labels'
    type: KeyValueLabels
    description: |-
      Optional. Labels to help users filter related agents.
  - name: 'dataAnalyticsAgent'
    type: NestedObject
    description: |-
      Data analytics agent configuration.
    properties:
      - name: 'stagingContext'
        type: NestedObject
        description: |-
          Optional. The staging context for the agent. This context is used to
          test and validate changes before publishing.
        properties:
          - name: 'systemInstruction'
            type: String
            description: |-
              Optional. The basic entry point for data owners creating domain
              knowledge for the agent.
          - name: 'datasourceReferences'
            type: NestedObject
            description: |-
              Required. Data sources that are available for answering questions.
              This Terraform resource currently supports BigQuery table references.
            required: true
            properties:
              - name: 'bq'
                type: NestedObject
                description: |-
                  References to BigQuery tables.
                required: true
                properties:
                  - name: 'tableReferences'
                    type: Array
                    description: |-
                      Optional. References to BigQuery tables.
                    item_type:
                      type: NestedObject
                      properties:
                        - name: 'projectId'
                          type: String
                          description: |-
                            Required. The project that the table belongs to.
                          required: true
                        - name: 'datasetId'
                          type: String
                          description: |-
                            Required. The dataset that the table belongs to.
                          required: true
                        - name: 'tableId'
                          type: String
                          description: |-
                            Required. The table ID.
                          required: true
          - name: 'options'
            type: NestedObject
            description: |-
              Optional. Additional options for the conversation.
            properties:
              - name: 'analysis'
                type: NestedObject
                description: |-
                  Optional. Options for analysis.
                properties:
                  - name: 'python'
                    type: NestedObject
                    description: |-
                      Optional. Options for Python analysis.
                    properties:
                      - name: 'enabled'
                        type: Boolean
                        description: |-
                          Optional. Whether to enable Python analysis. Defaults to false.
              - name: 'datasource'
                type: NestedObject
                description: |-
                  Optional. Options for datasource configuration.
                properties:
                  - name: 'bigQueryMaxBilledBytes'
                    type: String
                    description: |-
                      Optional. Limits the bytes billed for each BigQuery query job.
          - name: 'exampleQueries'
            type: Array
            description: |-
              Optional. A list of example queries for BigQuery data sources.
            item_type:
              type: NestedObject
              properties:
                - name: 'naturalLanguageQuestion'
                  type: String
                  description: |-
                    Optional. A natural language question that a user might ask.
                - name: 'sqlQuery'
                  type: String
                  description: |-
                    Optional. The SQL query that should be generated to answer
                    the natural language question.
          - name: 'glossaryTerms'
            type: Array
            description: |-
              Optional. Term definitions for the agent's domain.
            item_type:
              type: NestedObject
              properties:
                - name: 'displayName'
                  type: String
                  description: |-
                    Required. User friendly display name of the glossary term.
                  required: true
                - name: 'description'
                  type: String
                  description: |-
                    Required. The description or meaning of the term.
                  required: true
                - name: 'labels'
                  type: Array
                  description: |-
                    Optional. A list of general purpose labels associated with this term.
                  item_type:
                    type: String
          - name: 'schemaRelationships'
            type: Array
            description: |-
              Optional. Relationships between table schemas, including referencing
              and referenced columns.
            item_type:
              type: NestedObject
              properties:
                - name: 'leftSchemaPaths'
                  type: NestedObject
                  description: |-
                    Required. An ordered list of fields for the left side of the join.
                  required: true
                  properties:
                    - name: 'tableFqn'
                      type: String
                      description: |-
                        Required. The service-qualified full resource name of the table.
                      required: true
                    - name: 'paths'
                      type: Array
                      description: |-
                        Required. The ordered list of paths within the table schema.
                      required: true
                      item_type:
                        type: String
                - name: 'rightSchemaPaths'
                  type: NestedObject
                  description: |-
                    Required. An ordered list of fields for the right side of the join.
                  required: true
                  properties:
                    - name: 'tableFqn'
                      type: String
                      description: |-
                        Required. The service-qualified full resource name of the table.
                      required: true
                    - name: 'paths'
                      type: Array
                      description: |-
                        Required. The ordered list of paths within the table schema.
                      required: true
                      item_type:
                        type: String
                - name: 'sources'
                  type: Array
                  description: |-
                    Optional. Sources which generated the schema relation edge.
                  item_type:
                    type: Enum
                    enum_values:
                      - 'SOURCE_UNSPECIFIED'
                      - 'BIGQUERY_JOB_HISTORY'
                      - 'LLM_SUGGESTED'
                      - 'BIGQUERY_TABLE_CONSTRAINTS'
                - name: 'confidenceScore'
                  type: Double
                  description: |-
                    Optional. A confidence score for the suggested relationship.
      - name: 'publishedContext'
        type: NestedObject
        description: |-
          Optional. The published context for the agent. This context is used by
          the Chat API in production.
        properties:
          - name: 'systemInstruction'
            type: String
            description: |-
              Optional. The basic entry point for data owners creating domain
              knowledge for the agent.
          - name: 'datasourceReferences'
            type: NestedObject
            description: |-
              Required. Data sources that are available for answering questions.
              This Terraform resource currently supports BigQuery table references.
            required: true
            properties:
              - name: 'bq'
                type: NestedObject
                description: |-
                  References to BigQuery tables.
                required: true
                properties:
                  - name: 'tableReferences'
                    type: Array
                    description: |-
                      Optional. References to BigQuery tables.
                    item_type:
                      type: NestedObject
                      properties:
                        - name: 'projectId'
                          type: String
                          description: |-
                            Required. The project that the table belongs to.
                          required: true
                        - name: 'datasetId'
                          type: String
                          description: |-
                            Required. The dataset that the table belongs to.
                          required: true
                        - name: 'tableId'
                          type: String
                          description: |-
                            Required. The table ID.
                          required: true
          - name: 'options'
            type: NestedObject
            description: |-
              Optional. Additional options for the conversation.
            properties:
              - name: 'analysis'
                type: NestedObject
                description: |-
                  Optional. Options for analysis.
                properties:
                  - name: 'python'
                    type: NestedObject
                    description: |-
                      Optional. Options for Python analysis.
                    properties:
                      - name: 'enabled'
                        type: Boolean
                        description: |-
                          Optional. Whether to enable Python analysis. Defaults to false.
              - name: 'datasource'
                type: NestedObject
                description: |-
                  Optional. Options for datasource configuration.
                properties:
                  - name: 'bigQueryMaxBilledBytes'
                    type: String
                    description: |-
                      Optional. Limits the bytes billed for each BigQuery query job.
          - name: 'exampleQueries'
            type: Array
            description: |-
              Optional. A list of example queries for BigQuery data sources.
            item_type:
              type: NestedObject
              properties:
                - name: 'naturalLanguageQuestion'
                  type: String
                  description: |-
                    Optional. A natural language question that a user might ask.
                - name: 'sqlQuery'
                  type: String
                  description: |-
                    Optional. The SQL query that should be generated to answer
                    the natural language question.
          - name: 'glossaryTerms'
            type: Array
            description: |-
              Optional. Term definitions for the agent's domain.
            item_type:
              type: NestedObject
              properties:
                - name: 'displayName'
                  type: String
                  description: |-
                    Required. User friendly display name of the glossary term.
                  required: true
                - name: 'description'
                  type: String
                  description: |-
                    Required. The description or meaning of the term.
                  required: true
                - name: 'labels'
                  type: Array
                  description: |-
                    Optional. A list of general purpose labels associated with this term.
                  item_type:
                    type: String
          - name: 'schemaRelationships'
            type: Array
            description: |-
              Optional. Relationships between table schemas, including referencing
              and referenced columns.
            item_type:
              type: NestedObject
              properties:
                - name: 'leftSchemaPaths'
                  type: NestedObject
                  description: |-
                    Required. An ordered list of fields for the left side of the join.
                  required: true
                  properties:
                    - name: 'tableFqn'
                      type: String
                      description: |-
                        Required. The service-qualified full resource name of the table.
                      required: true
                    - name: 'paths'
                      type: Array
                      description: |-
                        Required. The ordered list of paths within the table schema.
                      required: true
                      item_type:
                        type: String
                - name: 'rightSchemaPaths'
                  type: NestedObject
                  description: |-
                    Required. An ordered list of fields for the right side of the join.
                  required: true
                  properties:
                    - name: 'tableFqn'
                      type: String
                      description: |-
                        Required. The service-qualified full resource name of the table.
                      required: true
                    - name: 'paths'
                      type: Array
                      description: |-
                        Required. The ordered list of paths within the table schema.
                      required: true
                      item_type:
                        type: String
                - name: 'sources'
                  type: Array
                  description: |-
                    Optional. Sources which generated the schema relation edge.
                  item_type:
                    type: Enum
                    enum_values:
                      - 'SOURCE_UNSPECIFIED'
                      - 'BIGQUERY_JOB_HISTORY'
                      - 'LLM_SUGGESTED'
                      - 'BIGQUERY_TABLE_CONSTRAINTS'
                - name: 'confidenceScore'
                  type: Double
                  description: |-
                    Optional. A confidence score for the suggested relationship.
      - name: 'lastPublishedContext'
        type: NestedObject
        description: |-
          Output only. The last published context for the agent.
        output: true
        properties:
          - name: 'systemInstruction'
            type: String
            description: |-
              Output only. The basic entry point for data owners creating domain
              knowledge for the agent.
          - name: 'datasourceReferences'
            type: NestedObject
            description: |-
              Output only. Data sources that are available for answering questions.
            properties:
              - name: 'bq'
                type: NestedObject
                description: |-
                  References to BigQuery tables.
                properties:
                  - name: 'tableReferences'
                    type: Array
                    description: |-
                      References to BigQuery tables.
                    item_type:
                      type: NestedObject
                      properties:
                        - name: 'projectId'
                          type: String
                          description: |-
                            The project that the table belongs to.
                        - name: 'datasetId'
                          type: String
                          description: |-
                            The dataset that the table belongs to.
                        - name: 'tableId'
                          type: String
                          description: |-
                            The table ID.
  - name: 'kmsKey'
    type: String
    description: |-
      Optional. Customer managed encryption key (CMEK) to use for encrypting the
      DataAgent resources. Cloud KMS CryptoKeys must reside in the same location
      as the DataAgent. The expected format is
      projects/*/locations/*/keyRings/*/cryptoKeys/*.
    immutable: true
  - name: 'createTime'
    type: String
    description: |-
      Output only. The time when the data agent was created.
    output: true
  - name: 'updateTime'
    type: String
    description: |-
      Output only. The time when the data agent was last updated.
    output: true
  - name: 'deleteTime'
    type: String
    description: |-
      Output only. The time the data agent was soft deleted.
    output: true
  - name: 'purgeTime'
    type: String
    description: |-
      Output only. Timestamp in UTC of when this data agent is considered expired.
    output: true
