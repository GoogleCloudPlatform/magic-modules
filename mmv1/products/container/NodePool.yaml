---
name: 'NodePool'
include_in_tgc_next: true
exclude_resource: true
description: 'NodePool'
tgc_tests:
  - name: 'TestAccContainerNodePool_withUpgradeSettings'
    skip: 'data issue'
  - name: 'TestAccContainerNodePool_withTaintsUpdate'
    skip: 'data issue'
  - name: 'TestAccContainerNodePool_regionalAutoscaling'
    skip: 'data issue'
properties:
  - name: 'name'
    type: 'String'
    description: 'The name of the node pool.'
  - name: 'nodeCount'
    type: 'Integer'
    description: 'The initial node count for the pool.'
    ignore_read: true
  - name: 'NamePrefix'
    type: 'String'
    description: 'The prefix of the node pool name.'
    ignore_read: true
  - name: 'nodeConfig'
    type: 'NestedObject'
    description: 'Configuration for the nodes in the pool.'
    properties:
      - name: 'guest_accelerator'
        type: 'Array'
        api_name: 'accelerators'
        description: 'A list of hardware accelerators to be attached to each node.'
        ignore_read: true
        item_type:
          type: 'NestedObject'
          properties:
            - name: 'count'
              type: 'Integer'
              description: 'The number of the accelerator cards exposed to an instance.'
              ignore_read: true
            - name: 'type'
              type: 'String'
              description: 'The accelerator type resource to expose to this instance. E.g. nvidia-tesla-k80.'
              ignore_read: true
            - name: 'gpuPartitionSize'
              type: 'String'
              description: 'Size of partitions to create on the GPU. Supported values are described in the NVIDIA mig user guide.'
              ignore_read: true
            - name: 'gpuDriverInstallationConfig'
              type: 'NestedObject'
              description: 'Configuration for GPU driver installation.'
              ignore_read: true
              properties:
                - name: 'gpuDriverVersion'
                  type: 'String'
                  description: 'Mode for how the GPU driver is installed.'
      - name: 'bootDisk'
        type: 'NestedObject'
        description: 'Configuration for the boot disk.'
        properties:
          - name: 'provisioned_iops'
            api_name: 'provisionedIops'
            type: 'Integer'
            is_missing_in_cai: true
          - name: 'provisioned_throughput'
            api_name: 'provisionedThroughput'
            type: 'Integer'
            is_missing_in_cai: true
  - name: 'networkConfig'
    type: 'NestedObject'
    description: 'Networking configuration for this NodePool.'
    properties:
      - name: 'createPodRange'
        type: 'Boolean'
        description: 'Whether to create a new range for pod IPs in this node pool.'
        ignore_read: true
