---
name: ServiceAgent
description: A Service Agent resource within the Workload Identity API.
base_url: '{{parent}}'
create_url: '{{parent}}:generateServiceAgents'
create_verb: POST

custom_code:
  post_create: 'templates/terraform/post_create/workload_identity_service_agent.go.tmpl'

exclude_read: true
exclude_delete: true
exclude_import: true
exclude_sweeper: true

immutable: true

autogen_async: true
async:
  actions: ['create']
  type: 'OpAsync'
  operation:
    base_url: '{{op_id}}'
  result:
    resource_inside_response: true

parameters:
  - name: parent
    type: String
    description: 'The parent resource path.'
    required: true

properties:
  - name: serviceAgents
    type: Array
    description: 'The list of ServiceAgents generated by the API call.'
    output: true
    item_type:
      type: NestedObject
      properties:
        - name: name
          type: String
          output: true
        - name: principal
          type: String
          output: true
        - name: role
          type: String
          output: true
        - name: container
          type: String
          output: true
        - name: serviceProducer
          type: String
          output: true

min_version: beta

examples:
  - name: "workload_identity_service_agent_basic"
    primary_resource_id: "primary"
    exclude_import_test: true
    min_version: beta
