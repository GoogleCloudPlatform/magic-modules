---
name: IcebergCatalog
description: |
  IcebergCatalogs are top-level containers for Apache Iceberg REST Catalog served Namespaces and Tables.
references:
  guides:
    Use the BigLake metastore Iceberg REST catalog: https://docs.cloud.google.com/biglake/docs/blms-rest-catalog
docs:
  warning: |
    If you are using User ADCs (Application Default Credentials) with this resource's IAM,
    you must specify a `billing_project` and set `user_project_override` to true
    in the provider configuration. Otherwise the IAM API will return 403s.
    Your account must have the `serviceusage.services.use` permission on the
    `billing_project` you defined.
base_url: iceberg/v1/restcatalog/extensions/projects/{{project}}/catalogs
immutable: false
self_link: iceberg/v1/restcatalog/extensions/projects/{{project}}/catalogs/{{name}}
create_url: iceberg/v1/restcatalog/extensions/projects/{{project}}/catalogs?iceberg-catalog-id={{name}}&primary_location={{primary_location}}
iam_policy:
  method_name_separator: ':'
  fetch_iam_policy_verb: GET
  allowed_iam_role: roles/biglake.editor
  parent_resource_attribute: name
  base_url: v1/projects/{{project}}/catalogs/{{name}}
  import_format:
    - projects/{{project}}/catalogs/{{name}}
    - '{{name}}'
supports_indirect_user_project_override: true
custom_code:
  custom_update: templates/terraform/custom_update/biglake_iceberg_catalog_update.go.tmpl
samples:
  - name: biglake_iceberg_catalog
    primary_resource_id: my_iceberg_catalog
    steps:
      - name: biglake_iceberg_catalog
        resource_id_vars:
          name: my_iceberg_catalog
        test_env_vars:
          GOOGLE_BILLING_PROJECT: PROJECT
          USER_PROJECT_OVERRIDE: "true"
  - name: biglake_iceberg_catalog_primary_location
    primary_resource_id: my_iceberg_catalog
    steps:
      - name: biglake_iceberg_catalog_primary_location
        resource_id_vars:
          name: my_iceberg_catalog
        test_env_vars:
          GOOGLE_BILLING_PROJECT: PROJECT
          USER_PROJECT_OVERRIDE: "true"
  - name: biglake_iceberg_catalog_biglake
    primary_resource_id: my_iceberg_catalog
    steps:
      - name: biglake_iceberg_catalog_biglake
        resource_id_vars:
          name: my_iceberg_catalog
        test_env_vars:
          GOOGLE_BILLING_PROJECT: PROJECT
          USER_PROJECT_OVERRIDE: "true"
  - name: biglake_iceberg_catalog_federated_unity
    primary_resource_id: my_iceberg_catalog
    steps:
      - name: biglake_iceberg_catalog_federated_unity
        resource_id_vars:
          name: my_iceberg_catalog
        test_env_vars:
          GOOGLE_BILLING_PROJECT: PROJECT
          USER_PROJECT_OVERRIDE: "true"
  - name: biglake_iceberg_catalog_federated_glue
    primary_resource_id: my_iceberg_catalog
    steps:
      - name: biglake_iceberg_catalog_federated_glue
        resource_id_vars:
          name: my_iceberg_catalog
        test_env_vars:
          GOOGLE_BILLING_PROJECT: PROJECT
          USER_PROJECT_OVERRIDE: "true"
parameters:
  - name: name
    type: String
    required: true
    immutable: true
    url_param_only: true
    description: |
      The name of the IcebergCatalog.
      For CATALOG_TYPE_GCS_BUCKET typed catalogs, the name needs to be the
      exact same value of the GCS bucket's name. For example, for a bucket:
      gs://bucket-name, the catalog name will be exactly "bucket-name".
  - name: primaryLocation
    type: String
    url_param_only: true
    immutable: true
    description: |
      The primary location for mirroring the remote catalog metadata. It must be
      a BigLake-supported location, and it should be proximate to the remote
      catalog's location.
properties:
  - name: credential_mode
    api_name: credential-mode
    type: Enum
    description: The credential mode used for the catalog. CREDENTIAL_MODE_END_USER - End user credentials, default. The authenticating user must have access to the catalog resources and the corresponding Google Cloud Storage files. CREDENTIAL_MODE_VENDED_CREDENTIALS - Use credential vending. The authenticating user must have access to the catalog resources and the system will provide the caller with downscoped credentials to access the Google Cloud Storage files. All table operations in this mode would require `X-Iceberg-Access-Delegation` header with `vended-credentials` value included. System will generate a service account and the catalog administrator must grant the service account appropriate permissions.
    required: false
    immutable: false
    output: false
    enum_values:
      - CREDENTIAL_MODE_END_USER
      - CREDENTIAL_MODE_VENDED_CREDENTIALS
    default_from_api: true
  - name: biglake_service_account
    api_name: biglake-service-account
    type: String
    description: Output only. The service account used for credential vending. It might be empty if credential vending was never enabled for the catalog.
    output: true
  - name: biglake_service_account_id
    api_name: biglake-service-account-id
    type: String
    description: Output only. The unique ID of the service account used for credential vending. Used for federation scenarios.
    output: true
  - name: catalog_type
    api_name: catalog-type
    type: Enum
    description: |
      The catalog type of the IcebergCatalog.
      * `CATALOG_TYPE_GCS_BUCKET`: Google Cloud Storage bucket catalog type.
      * `CATALOG_TYPE_BIGLAKE`: BigLake catalog type.
      * `CATALOG_TYPE_FEDERATED`: Federated catalog type, for integrating with external Iceberg REST Catalogs such as Databricks Unity Catalog or AWS Glue.
    required: true
    immutable: true
    output: false
    enum_values:
      - CATALOG_TYPE_GCS_BUCKET
      - CATALOG_TYPE_BIGLAKE
      - CATALOG_TYPE_FEDERATED
  - name: default_location
    api_name: default-location
    type: String
    description: |
      The default storage location for the catalog, e.g., `gs://my-bucket`.
      Output only when the catalog type is CATALOG_TYPE_GCS_BUCKET.
      Required when the catalog type is CATALOG_TYPE_BIGLAKE.
    required: false
    default_from_api: true
  - name: storage_regions
    api_name: storage-regions
    type: Array
    item_type:
      type: String
    description: Output only. The GCP region(s) where the physical metadata for the tables is stored, e.g. `us-central1`, `nam4` or `us`. This will contain one value for all locations, except for the catalogs that are configured to use custom dual region buckets.
    output: true
  - name: create_time
    api_name: create-time
    type: String
    description: Output only. The creation time of the IcebergCatalog.
    output: true
  - name: update_time
    api_name: update-time
    type: String
    description: Output only. The last modification time of the IcebergCatalog.
    output: true
  - name: description
    type: String
    description: A user-provided description of the catalog. Maximum 1024 UTF-8 characters.
  - name: replicas
    type: Array
    item_type:
      type: NestedObject
      properties:
        - name: region
          type: String
          description: The region of the replica, e.g., `us-east1`.
          output: true
        - name: state
          type: Enum
          description: If the IcebergCatalog is replicated to multiple regions, this describes the current state of the replica. STATE_UNKNOWN - The replica state is unknown. STATE_PRIMARY - The replica is the writable primary. STATE_PRIMARY_IN_PROGRESS - The replica has been recently assigned as the primary, but not all namespaces are writeable yet. STATE_SECONDARY - The replica is a read-only secondary replica.
          output: true
          enum_values:
            - STATE_UNKNOWN
            - STATE_PRIMARY
            - STATE_PRIMARY_IN_PROGRESS
            - STATE_SECONDARY
    description: Output only. The replicas for the catalog metadata.
    output: true
  - name: restricted_locations_config
    api_name: restricted-locations-config
    type: NestedObject
    description: |
      Configuration for the additional GCS locations that are permitted for use
      by resources within this catalog.
    default_from_api: true
    properties:
      - name: restricted_locations
        api_name: restricted-locations
        type: Array
        item_type:
          type: String
        description: |
          A list of GCS locations (e.g., `gs://my-other-bucket/...`) that are
          permitted for use by resources within this catalog. Each entry can be
          either a GCS bucket or a path within it.
  - name: federated_catalog_options
    api_name: federated-catalog-options
    type: NestedObject
    description: |
      Options for a CATALOG_TYPE_FEDERATED catalog. Required when catalog_type
      is CATALOG_TYPE_FEDERATED.
    properties:
      - name: secret_name
        api_name: secret-name
        type: String
        description: |
          The secret resource name in Secret Manager, in the format
          `projects/{projectId}/locations/{location}/secrets/{secret_id}`.
          Used to store credentials for authenticating with the remote catalog.
      - name: service_directory_name
        api_name: service-directory-name
        type: String
        description: |
          The Service Directory service name for private network connectivity
          through Cross-Cloud Interconnect.
      - name: refresh_options
        api_name: refresh-options
        type: NestedObject
        description: Configuration for metadata synchronization from the remote catalog.
        properties:
          - name: refresh_schedule
            api_name: refresh-schedule
            type: NestedObject
            description: Schedule for periodic metadata refresh.
            properties:
              - name: refresh_interval
                api_name: refresh-interval
                type: String
                description: |
                  The interval between metadata refreshes, expressed as a duration
                  string (e.g., `300s`).
                  The value must be at least 300s or 0s to disable refresh.
          - name: refresh_scope
            api_name: refresh-scope
            type: NestedObject
            description: Scope of metadata to synchronize from the remote catalog.
            properties:
              - name: namespace_filters
                api_name: namespace-filters
                type: Array
                item_type:
                  type: String
                description: |
                  A list of namespace filters to limit which namespaces are
                  synchronized from the remote catalog.
      - name: refresh_status
        api_name: refresh-status
        type: NestedObject
        description: Output only. The status of the most recent metadata refresh.
        output: true
        properties:
          - name: start_time
            api_name: start-time
            type: String
            description: Output only. The start time of the most recent refresh.
            output: true
          - name: end_time
            api_name: end-time
            type: String
            description: Output only. The end time of the most recent refresh.
            output: true
          - name: status
            type: NestedObject
            description: Output only. The error result of the last failed refresh, if any.
            output: true
            properties:
              - name: code
                type: Integer
                description: Output only. The status code, which should be an enum value of google.rpc.Code.
                output: true
              - name: message
                type: String
                description: Output only. A developer-facing error message in English.
                output: true
      - name: unity_catalog_info
        api_name: unity-catalog-info
        type: NestedObject
        description: |
          Configuration for a Databricks Unity Catalog remote catalog. Exactly
          one of unity_catalog_info or glue_catalog_info must be specified.
        properties:
          - name: instance_name
            api_name: instance-name
            type: String
            description: The Databricks workspace instance name.
            required: true
            immutable: true
          - name: catalog_name
            api_name: catalog-name
            type: String
            description: The name of the catalog within the Unity Catalog instance.
            required: true
            immutable: true
          - name: service_principal_application_id
            api_name: service-principal-application-id
            type: String
            description: The application ID of the Databricks service principal for OIDC authentication.
      - name: glue_catalog_info
        api_name: glue-catalog-info
        type: NestedObject
        description: |
          Configuration for an AWS Glue remote catalog. Exactly one of
          unity_catalog_info or glue_catalog_info must be specified.
        properties:
          - name: warehouse
            api_name: warehouse
            type: String
            description: The AWS Glue warehouse identifier (account ID or S3 table bucket).
            required: true
            immutable: true
          - name: aws_region
            api_name: aws-region
            type: String
            description: The AWS region where the Glue catalog is located.
            required: true
            immutable: true
          - name: aws_role_arn
            api_name: aws-role-arn
            type: String
            description: The ARN of the AWS IAM role to assume for accessing the Glue catalog.
            required: true
