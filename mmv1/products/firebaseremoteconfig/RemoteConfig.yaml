---
name: RemoteConfig
description: A RemoteConfig represents a Remote Config template.
base_url: projects/{{project}}/remoteConfig
self_link: projects/{{project}}/remoteConfig
create_url: projects/{{project}}/remoteConfig
create_verb: PUT
import_format:
  - projects/{{project}}/remoteConfig
exclude_delete: true
autogen_status: UmVtb3RlQ29uZmln
references:
  guides:
    'Remote Config Introduction': 'https://firebase.google.com/docs/remote-config'
  api: 'https://firebase.google.com/docs/reference/remote-config/rest/v1/projects/getRemoteConfig'
examples:
  - name: firebase_remote_config_basic
    primary_resource_id: basic
  - name: firebase_remote_config_empty
    primary_resource_id: empty
    exclude_docs: true
  - name: firebase_remote_config_full
    primary_resource_id: full
    exclude_docs: true
custom_code:
  pre_create: templates/terraform/pre_update/firebase_remote_config_remote_config.go.tmpl
  pre_update: templates/terraform/pre_update/firebase_remote_config_remote_config.go.tmpl
properties:
  - name: name
    type: String
    output: true
    description: |-
      The name of the RemoteConfig.
      Format: projects/{project}/namespaces/{namespace}/remoteConfig
      Project is a Firebase project ID or project number.
      Namespace is the namespace ID (e.g.: firebase or firebase-server)
  - name: conditions
    type: Array
    description: |-
      A list of conditions in descending order by priority.

      The values of the condition names must be unique.
    item_type:
      type: NestedObject
      properties:
        - name: expression
          type: String
          description: |-
            The logic of this condition.

            See the documentation regarding
            [Condition
            Expressions](https://firebase.google.com/docs/remote-config/condition-reference)
            for the expected syntax of this field.
          required: true
        - name: name
          type: String
          description: A non-empty and unique name of this condition.
          required: true
        - name: tagColor
          type: Enum
          description: |
            The color associated with this condition for display purposes in the Firebase Console.
            Not specifying this value results in the Console picking an arbitrary color to associate with the condition.
          enum_values:
            - BLUE
            - BROWN
            - CYAN
            - DEEP_ORANGE
            - GREEN
            - INDIGO
            - LIME
            - ORANGE
            - PINK
            - PURPLE
            - TEAL
  - name: parameterGroups
    type: Map
    key_name: key
    description: |-
      Map of parameter group names to their descriptions and grouped parameters.
      A group's name is mutable but must be unique among groups in the config.
      The name is limited to 256 characters and intended to be human-readable.
      Any Unicode characters are allowed.

      Groups have a list of parameters which allows users of the API to group
      parameters that are associated with the same feature or theme together for
      easy organizational access.

      For example, a parameter group with the name "Search V2" may have the
      `description` "New mobile search view" and contain parameters for the new
      search's layout and font.
    value_type:
      type: NestedObject
      properties:
        - name: description
          type: String
          description: |-
            A description for the group. Its length must be less than or equal to 256
            characters. A description may contain any Unicode characters.
        - name: parameters
          type: Map
          key_name: key
          description: |-
            Map of parameter keys to their optional default values and optional
            conditional values for parameters that belong to this group.
            A parameter only appears once per RemoteConfig: an ungrouped parameter
            appears at the top level; a parameter organized within a group appears
            within its group's map of parameters.
          value_type:
            type: NestedObject
            properties:
              - name: conditionalValues
                type: Map
                key_name: condition_name
                description: |-
                  The condition_name of the highest priority
                  (the one listed first in the RemoteConfig's conditions list) determines
                  the value of this parameter.
                  Only one of use_in_app_default or value may be specified.
                value_type:
                  type: NestedObject
                  properties:
                    - name: useInAppDefault
                      type: Boolean
                      default_value: false
                      description: |-
                        If true, the parameter is omitted from the parameter values returned
                        to a client.
                    - name: value
                      type: String
                      description: The string value that the parameter is set to.
              - name: defaultValue
                type: NestedObject
                description: |-
                  Value to set the parameter to, when none of the named conditions evaluate to true.
                  Only one of use_in_app_default or value may be specified.
                properties:
                  - name: useInAppDefault
                    type: Boolean
                    default_value: false
                    description: |-
                      If true, the parameter is omitted from the parameter values returned
                      to a client.
                  - name: value
                    type: String
                    description: The string value that the parameter is set to.
              - name: description
                type: String
                description: |-
                  A description for this Parameter. Its length must be less than or equal to
                  256 characters . A description may contain any Unicode characters.
              - name: valueType
                type: Enum
                default_value: STRING
                description: |-
                  The data type for all values of this parameter in the current version of
                  the template.
                enum_values:
                  - STRING
                  - BOOLEAN
                  - NUMBER
                  - JSON
  - name: parameters
    type: Map
    key_name: key
    description: |-
      Map of parameter keys to their optional default values and optional
      conditional values.
    value_type:
      type: NestedObject
      properties:
        - name: conditionalValues
          type: Map
          key_name: condition_name
          description: |-
            The condition_name of the highest priority
            (the one listed first in the RemoteConfig's conditions list) determines
            the value of this parameter.
            Only one of use_in_app_default or value may be specified.
          value_type:
            type: NestedObject
            properties:
              - name: useInAppDefault
                type: Boolean
                default_value: false
                description: |-
                  If true, the parameter is omitted from the parameter values returned
                  to a client.
              - name: value
                type: String
                description: The string value that the parameter is set to.
        - name: defaultValue
          type: NestedObject
          description: |-
            Value to set the parameter to, when none of the named conditions evaluate to true.
            Only one of use_in_app_default or value may be specified.
          properties:
            - name: useInAppDefault
              type: Boolean
              default_value: false
              description: |-
                If true, the parameter is omitted from the parameter values returned
                to a client.
            - name: value
              type: String
              description: The string value that the parameter is set to.
        - name: description
          type: String
          description: |-
            A description for this Parameter. Its length must be less than or equal to
            256 characters . A description may contain any Unicode characters.
        - name: valueType
          type: Enum
          default_value: STRING
          description: |-
            The data type for all values of this parameter in the current version of
            the template.
          enum_values:
            - STRING
            - BOOLEAN
            - NUMBER
            - JSON
  - name: version
    type: NestedObject
    output: true
    description: |-
      Contains all metadata about a particular version of the Remote Config
      template.

      All fields are set at the time the specified Remote Config template was
      written.
    properties:
      - name: isLegacy
        type: Boolean
        output: true
        description: |-
          `True` if this Remote Config template was published before
          version history was supported.
      - name: rollbackSource
        type: String
        output: true
        description: |-
          Only present if this version is the result of a rollback, and
          will be the version number of the Remote Config template that was
          rolled-back to.
      - name: updateOrigin
        type: String
        output: true
        description: |-
          Where the update action originated.
          For possible values, see the [API docs](https://firebase.google.com/docs/reference/remote-config/rest/v1/Version#remoteconfigupdateorigin).
      - name: updateTime
        type: String
        output: true
        description: |-
          When the Remote Config template was written to the Remote
          Config server.
      - name: updateType
        type: String
        output: true
        description: |-
          What type of update was made.
          For possible values, see the [API docs](https://firebase.google.com/docs/reference/remote-config/rest/v1/Version#remoteconfigupdatetype).
      - name: updateUser
        type: NestedObject
        output: true
        description: |-
          All the fields associated with the person/service account that wrote a
          Remote Config template.
        properties:
          - name: email
            type: String
            output: true
            description: Email address.
          - name: imageUrl
            type: String
            output: true
            description: Image URL.
          - name: name
            type: String
            output: true
            description: Display name.
      - name: versionNumber
        type: String
        output: true
        description: |-
          The version number of the version's corresponding
          Remote Config template.
