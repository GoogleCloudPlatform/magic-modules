---
name: RemoteConfig
description: A RemoteConfig represents a Remote Config template.
base_url: projects/{{project}}/remoteConfig
self_link: projects/{{project}}/remoteConfig
create_url: projects/{{project}}/remoteConfig=?updateMask=*
update_mask: true
create_verb: PUT
import_format:
  - projects/{{project}}/remoteConfig
exclude_delete: true
autogen_status: UmVtb3RlQ29uZmln
references:
  guides:
    'Remote Config Introduction': 'https://firebase.google.com/docs/remote-config'
  api: 'https://firebase.google.com/docs/reference/remote-config/rest/v1/projects/getRemoteConfig'
examples:
  - name: firebase_remote_config_basic
    primary_resource_id: basic
    test_env_vars:
      project_id: PROJECT_ID
parameters:
  - name: name
    type: String
    required: true
    description: |-
      The name of the RemoteConfig to update.
      Format: projects/{project}/namespaces/{namespace}/remoteConfig
      Project is a Firebase project ID or project number.
      Namespace is the namespace ID (e.g.: firebase or firebase-server)
    immutable: true
    url_param_only: true
properties:
  - name: conditions
    type: Array
    description: |-
      A list of conditions in descending order by priority.

      The values of the condition names must be unique.
    item_type:
      type: NestedObject
      properties:
        - name: expression
          type: String
          description: |-
            The logic of this condition.

            See the documentation regarding
            [Condition
            Expressions](/docs/remote-config/condition-reference)
            for the expected syntax of this field.
          required: true
        - name: name
          type: String
          description: A non-empty and unique name of this condition.
          required: true
        - name: tagColor
          type: Enum
          description: |
            The color associated with this condition for display purposes in the Firebase Console.
            Not specifying this value results in the Console picking an arbitrary color to associate with the condition.
          values:
            - BLUE
            - BROWN
            - CYAN
            - DEEP_ORANGE
            - GREEN
            - INDIGO
            - LIME
            - ORANGE
            - PINK
            - PURPLE
            - TEAL
  - name: parameterGroups
    type: Map
    key_name: parameter_group
    description: |-
      Map of parameter group names to their descriptions and grouped parameters.
      A group's name is mutable but must be unique among groups in the config.
      The name is limited to 256 characters and intended to be human-readable.
      Any Unicode characters are allowed.

      Groups have a list of parameters which allows users of the API to group
      parameters that are associated with the same feature or theme together for
      easy organizational access.

      For example, a parameter group with the name "Search V2" may have the
      `description` "New mobile search view" and contain parameters for the new
      search's layout and font.
    value_type:
      type: NestedObject
      properties:
        - name: description
          type: String
          description: |-
            A description for the group. Its length must be less than or equal to 256
            characters. A description may contain any Unicode characters.
        - name: parameters
          type: Map
          key_name: parameter
          description: |-
            Map of parameter keys to their optional default values and optional
            conditional values for parameters that belong to this group.
            A parameter only appears once per RemoteConfig: an ungrouped parameter
            appears at the top level; a parameter organized within a group appears
            within its group's map of parameters.
          value_type:
            type: NestedObject
            properties:
              - name: conditionalValues
                type: Map
                key_name: conditional_value
                description: |-
                  A (condition name, value) map. The condition_name of the highest priority
                  (the one listed first in the RemoteConfig's conditions list) determines
                  the value of this parameter.
                value_type:
                  type: NestedObject
                  properties:
                    - name: experimentValue
                      type: NestedObject
                      description: Information related to a parameter value managed by Firebase ABT.
                      properties:
                        - name: experimentId
                          type: String
                          description: |-
                            The identifier that associates a parameter value to an Experiment in
                            Firebase ABT.
                        - name: exposurePercent
                          type: Double
                          description: |-
                            Represents the server-side exposure evaluation. This value represents the
                            fraction of users exposed to the experiment, ranging from 0 (0% exposure)
                            to 100 (100% exposure), inclusive.
                        - name: variantValue
                          type: Array
                          description: A repeated of variants associated with the Experiment.
                          item_type:
                            type: NestedObject
                            properties:
                              - name: noChange
                                type: Boolean
                                description: |-
                                  If this boolean is set, then fallback to the next parameter in the
                                  Template condition chain
                              - name: value
                                type: String
                                description: The user-specified value for this variant. Can be empty string.
                              - name: variantId
                                type: String
                                description: The variant identifier for the Experiment.
                    - name: personalizationValue
                      type: NestedObject
                      description: Contains the necessary information to fetch a personalized value.
                      properties:
                        - name: personalizationId
                          type: String
                          description: |-
                            Identifier that represents a personalization definition. This definition is
                            used to resolve the value at config fetch time. This system-generated value
                            should not be modified.
                    - name: rolloutValue
                      type: NestedObject
                      description: Information related to a Rollout.
                      properties:
                        - name: percent
                          type: Double
                          description: The percentage of users that will receive the rollout value.
                        - name: rolloutId
                          type: String
                          description: The identifier that associates a parameter value to a Rollout experiment.
                        - name: value
                          type: String
                          description: The user-specified value to be rolled out.
                    - name: useInAppDefault
                      type: Boolean
                      description: |-
                        If true, the parameter is omitted from the parameter values returned
                        to a client.
                    - name: value
                      type: String
                      description: The string value that the parameter is set to.
              - name: defaultValue
                type: NestedObject
                description: |-
                  A RemoteConfigParameterValue resource contains the value that a parameter may
                  have.
                properties:
                  - name: experimentValue
                    type: NestedObject
                    description: Information related to a parameter value managed by Firebase ABT.
                    properties:
                      - name: experimentId
                        type: String
                        description: |-
                          The identifier that associates a parameter value to an Experiment in
                          Firebase ABT.
                      - name: exposurePercent
                        type: Double
                        description: |-
                          Represents the server-side exposure evaluation. This value represents the
                          fraction of users exposed to the experiment, ranging from 0 (0% exposure)
                          to 100 (100% exposure), inclusive.
                      - name: variantValue
                        type: Array
                        description: A repeated of variants associated with the Experiment.
                        item_type:
                          type: NestedObject
                          properties:
                            - name: noChange
                              type: Boolean
                              description: |-
                                If this boolean is set, then fallback to the next parameter in the
                                Template condition chain
                            - name: value
                              type: String
                              description: The user-specified value for this variant. Can be empty string.
                            - name: variantId
                              type: String
                              description: The variant identifier for the Experiment.
                  - name: personalizationValue
                    type: NestedObject
                    description: Contains the necessary information to fetch a personalized value.
                    properties:
                      - name: personalizationId
                        type: String
                        description: |-
                          Identifier that represents a personalization definition. This definition is
                          used to resolve the value at config fetch time. This system-generated value
                          should not be modified.
                  - name: rolloutValue
                    type: NestedObject
                    description: Information related to a Rollout.
                    properties:
                      - name: percent
                        type: Double
                        description: The percentage of users that will receive the rollout value.
                      - name: rolloutId
                        type: String
                        description: The identifier that associates a parameter value to a Rollout experiment.
                      - name: value
                        type: String
                        description: The user-specified value to be rolled out.
                  - name: useInAppDefault
                    type: Boolean
                    description: |-
                      If true, the parameter is omitted from the parameter values returned
                      to a client.
                  - name: value
                    type: String
                    description: The string value that the parameter is set to.
              - name: description
                type: String
                description: |-
                  A description for this Parameter. Its length must be less than or equal to
                  256 characters . A description may contain any Unicode characters.
              - name: valueType
                type: Enum
                default_value: STRING
                description: |-
                  The data type for all values of this parameter in the current version of
                  the template.
                values:
                  - STRING
                  - BOOLEAN
                  - NUMBER
                  - JSON
  - name: parameters
    type: Map
    key_name: parameter
    description: |-
      Map of parameter keys to their optional default values and optional
      conditional values.
    value_type:
      type: NestedObject
      properties:
        - name: conditionalValues
          type: Map
          key_name: conditional_value
          description: |-
            A (condition name, value) map. The condition_name of the highest priority
            (the one listed first in the RemoteConfig's conditions list) determines
            the value of this parameter.
          value_type:
            type: NestedObject
            properties:
              - name: experimentValue
                type: NestedObject
                description: Information related to a parameter value managed by Firebase ABT.
                properties:
                  - name: experimentId
                    type: String
                    description: |-
                      The identifier that associates a parameter value to an Experiment in
                      Firebase ABT.
                  - name: exposurePercent
                    type: Double
                    description: |-
                      Represents the server-side exposure evaluation. This value represents the
                      fraction of users exposed to the experiment, ranging from 0 (0% exposure)
                      to 100 (100% exposure), inclusive.
                  - name: variantValue
                    type: Array
                    description: A repeated of variants associated with the Experiment.
                    item_type:
                      type: NestedObject
                      properties:
                        - name: noChange
                          type: Boolean
                          description: |-
                            If this boolean is set, then fallback to the next parameter in the
                            Template condition chain
                        - name: value
                          type: String
                          description: The user-specified value for this variant. Can be empty string.
                        - name: variantId
                          type: String
                          description: The variant identifier for the Experiment.
              - name: personalizationValue
                type: NestedObject
                description: Contains the necessary information to fetch a personalized value.
                properties:
                  - name: personalizationId
                    type: String
                    description: |-
                      Identifier that represents a personalization definition. This definition is
                      used to resolve the value at config fetch time. This system-generated value
                      should not be modified.
              - name: rolloutValue
                type: NestedObject
                description: Information related to a Rollout.
                properties:
                  - name: percent
                    type: Double
                    description: The percentage of users that will receive the rollout value.
                  - name: rolloutId
                    type: String
                    description: The identifier that associates a parameter value to a Rollout experiment.
                  - name: value
                    type: String
                    description: The user-specified value to be rolled out.
              - name: useInAppDefault
                type: Boolean
                description: |-
                  If true, the parameter is omitted from the parameter values returned
                  to a client.
              - name: value
                type: String
                description: The string value that the parameter is set to.
        - name: defaultValue
          type: NestedObject
          description: |-
            A RemoteConfigParameterValue resource contains the value that a parameter may
            have.
          properties:
            - name: experimentValue
              type: NestedObject
              description: Information related to a parameter value managed by Firebase ABT.
              properties:
                - name: experimentId
                  type: String
                  description: |-
                    The identifier that associates a parameter value to an Experiment in
                    Firebase ABT.
                - name: exposurePercent
                  type: Double
                  description: |-
                    Represents the server-side exposure evaluation. This value represents the
                    fraction of users exposed to the experiment, ranging from 0 (0% exposure)
                    to 100 (100% exposure), inclusive.
                - name: variantValue
                  type: Array
                  description: A repeated of variants associated with the Experiment.
                  item_type:
                    type: NestedObject
                    properties:
                      - name: noChange
                        type: Boolean
                        description: |-
                          If this boolean is set, then fallback to the next parameter in the
                          Template condition chain
                      - name: value
                        type: String
                        description: The user-specified value for this variant. Can be empty string.
                      - name: variantId
                        type: String
                        description: The variant identifier for the Experiment.
            - name: personalizationValue
              type: NestedObject
              description: Contains the necessary information to fetch a personalized value.
              properties:
                - name: personalizationId
                  type: String
                  description: |-
                    Identifier that represents a personalization definition. This definition is
                    used to resolve the value at config fetch time. This system-generated value
                    should not be modified.
            - name: rolloutValue
              type: NestedObject
              description: Information related to a Rollout.
              properties:
                - name: percent
                  type: Double
                  description: The percentage of users that will receive the rollout value.
                - name: rolloutId
                  type: String
                  description: The identifier that associates a parameter value to a Rollout experiment.
                - name: value
                  type: String
                  description: The user-specified value to be rolled out.
            - name: useInAppDefault
              type: Boolean
              description: |-
                If true, the parameter is omitted from the parameter values returned
                to a client.
            - name: value
              type: String
              description: The string value that the parameter is set to.
        - name: description
          type: String
          description: |-
            A description for this Parameter. Its length must be less than or equal to
            256 characters . A description may contain any Unicode characters.
        - name: valueType
          type: Enum
          default_value: STRING
          description: |-
            The data type for all values of this parameter in the current version of
            the template.
          values:
            - STRING
            - BOOLEAN
            - NUMBER
            - JSON
  - name: version
    type: NestedObject
    description: |-
      Contains all metadata about a particular version of the Remote Config
      template.

      All fields are set at the time the specified Remote Config template was
      written.
    properties:
      - name: description
        type: String
        description: |-
          The user-provided description of the corresponding Remote Config
          template
      - name: isLegacy
        type: Boolean
        output: true
        description: |-
          `True` if this Remote Config template was published before
          version history was supported.
      - name: rollbackSource
        type: String
        output: true
        description: |-
          Only present if this version is the result of a rollback, and
          will be the version number of the Remote Config template that was
          rolled-back to.
      - name: updateOrigin
        type: String
        output: true
        description: |-
          Where the update action originated.
          For possible values, see the [API docs](https://firebase.google.com/docs/reference/remote-config/rest/v1/Version#remoteconfigupdateorigin).
      - name: updateTime
        type: String
        output: true
        description: |-
          When the Remote Config template was written to the Remote
          Config server.
      - name: updateType
        type: String
        output: true
        description: |-
          What type of update was made.
          For possible values, see the [API docs](https://firebase.google.com/docs/reference/remote-config/rest/v1/Version#remoteconfigupdatetype).
      - name: updateUser
        type: NestedObject
        output: true
        description: |-
          All the fields associated with the person/service account that wrote a
          Remote Config template.
        properties:
          - name: email
            type: String
            output: true
            description: Email address.
          - name: imageUrl
            type: String
            output: true
            description: Image URL.
          - name: name
            type: String
            output: true
            description: Display name.
      - name: versionNumber
        type: String
        output: true
        description: |-
          The version number of the version's corresponding
          Remote Config template.
