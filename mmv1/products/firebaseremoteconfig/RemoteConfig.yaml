---
name: 'RemoteConfig'
description: |
  Firebase Remote Config template
min_version: 'ga'
references:
  guides:
    'Firebase Remote Config Overview': 'https://firebase.google.com/docs/remote-config'
  api: 'https://firebase.google.com/docs/reference/remote-config/rest'
docs:
id_format: 'projects/{{project}}/remoteConfig'
base_url: 'projects/{{project}}/remoteConfig'
self_link: 'projects/{{project}}/remoteConfig'
create_verb: 'PUT'
update_verb: 'PUT'
exclude_delete: true
exclude_sweeper: true
import_format:
  - 'projects/{{project}}/remoteConfig'
timeouts:
  insert_minutes: 20
  update_minutes: 20
  delete_minutes: 20
properties:
  - name: 'conditions'
    type: Array
    description: |
      A list of conditions in descending order by priority. The condition names must be unique.
    item_type:
      type: NestedObject
      properties:
        - name: 'name'
          type: String
          description: 'A non-empty and unique name of this condition.'
          required: true
        - name: 'expression'
          type: String
          description: |
            The logic of this condition.

            See the documentation regarding [Condition Expressions](https://firebase.google.com/docs/remote-config/condition-reference) for the expected syntax of this field.
          required: true
        - name: 'tagColor'
          type: Enum
          description: |
            The color associated with this condition for display purposes in the Firebase Console.
            Not specifying this value results in the Console picking an arbitrary color to
            associate with the condition.
          values:
            - BLUE
            - BROWN
            - CYAN
            - DEEP_ORANGE
            - GREEN
            - INDIGO
            - LIME
            - ORANGE
            - PINK
            - PURPLE
            - TEAL
  - name: 'parameters'
    type: KeyValuePairs
    description: |
      Map of parameter keys to their optional default values and optional conditional values.
  - name: 'parameterGroups'
    type: KeyValuePairs
    description: |
      Map of parameter group names to their descriptions and grouped parameters.
  - name: 'version'
    type: NestedObject
    description: |
      Metadata associated with a particular version of a template.
    properties:
      - name: 'description'
        type: String
        description: "A version's description field may be specified in projects.updateRemoteConfig calls."
      - name: 'versionNumber'
        type: String

        description: 'The version number.'
        output: true
      - name: 'updateTime'
        type: String
        description: 'The update time.'
        output: true
      - name: 'updateUser'
        type: NestedObject
        description: 'The user who performed the update.'
        output: true
        properties:
          - name: 'email'
            type: String
            description: 'Email address.'
          - name: 'name'
            type: String
            description: 'Name of user.'
      - name: 'updateOrigin'
        type: String
        description: 'The origin of the update.'
        output: true
      - name: 'updateType'
        type: String
        description: 'The update type.'
        output: true
      - name: 'rollbackSource'
        type: String
        description: 'The rollback source.'
        output: true
examples:
  - name: 'firebase_remote_config_basic'
    primary_resource_id: 'basic'
    min_version: 'ga'
    test_env_vars:
      project_id: 'PROJECT_NAME'
