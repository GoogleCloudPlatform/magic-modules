---
name: GoldengateConnection
description: GoldengateConnection is a resource that represents metadata to establish a connection to a source or target data.
base_url: projects/{{project}}/locations/{{location}}/goldengateConnections
immutable: true
self_link: projects/{{project}}/locations/{{location}}/goldengateConnections/{{goldengate_connection_id}}
create_url: projects/{{project}}/locations/{{location}}/goldengateConnections?goldengateConnectionId={{goldengate_connection_id}}
id_format: projects/{{project}}/locations/{{location}}/goldengateConnections/{{goldengate_connection_id}}
import_format:
  - projects/{{project}}/locations/{{location}}/goldengateConnections/{{goldengate_connection_id}}
timeouts:
  insert_minutes: 30
  update_minutes: 30
  delete_minutes: 30
async:
  type: OpAsync
  operation:
    timeouts:
      insert_minutes: 30
      update_minutes: 30
      delete_minutes: 30
    base_url: '{{op_id}}'
  actions:
    - create
    - delete
  result:
    resource_inside_response: true
  include_project: false
autogen_status: R29sZGVuZ2F0ZUNvbm5lY3Rpb24=
autogen_async: true
custom_code:
  pre_delete: templates/terraform/pre_delete/oracledatabase_goldengate_connection.go.tmpl
samples:
  - name: oracledatabase_goldengate_connection_basic
    primary_resource_id: connection
    steps:
      - name: oracledatabase_goldengate_connection_basic
        resource_id_vars:
          project: my-project
          goldengate_connection_id: my-connection
          deletion_protection: true
        ignore_read_extra:
          - deletion_protection
        test_vars_overrides:
          project: '"oci-terraform-testing-prod"'
          deletion_protection: false
          goldengate_connection_id: fmt.Sprintf("tf-conn-basic-%s", acctest.RandString(t, 10))
  - name: oracledatabase_goldengate_connection_full
    primary_resource_id: connection
    steps:
      - name: oracledatabase_goldengate_connection_full
        resource_id_vars:
          project: my-project
          goldengate_connection_id: my-connection
          odb_network: projects/my-project/locations/us-east4/odbNetworks/my-network
          odb_subnet: projects/my-project/locations/us-east4/odbNetworks/my-network/odbSubnets/my-subnet
          autonomous_database_id: my-autonomous-database
          deletion_protection: true
        ignore_read_extra:
          - deletion_protection
        test_vars_overrides:
          deletion_protection: false
          project: '"oci-terraform-testing-prod"'
          goldengate_connection_id: fmt.Sprintf("tf-conn-full-%s", acctest.RandString(t, 10))
          odb_network: '"projects/oci-terraform-testing-prod/locations/us-east4/odbNetworks/tf-test-permanent-odbnetwork"'
          odb_subnet: '"projects/oci-terraform-testing-prod/locations/us-east4/odbNetworks/tf-test-permanent-odbnetwork/odbSubnets/tf-test-permanent-client-odbsubnet"'
          autonomous_database_id: '"do-not-delete-tf-adb"'
  - name: oracledatabase_goldengate_connection_mysql
    primary_resource_id: connection
    steps:
      - name: oracledatabase_goldengate_connection_mysql
        resource_id_vars:
