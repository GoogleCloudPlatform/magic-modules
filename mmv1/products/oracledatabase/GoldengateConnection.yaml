            description: The name of the database.
          - name: dbSystemId
            type: String
            description: The OCID of the database system being referenced.
          - name: host
            type: String
            description: The name or address of a host.
          - name: password
            type: String
            description: |-
              Input only. The password Oracle Goldengate uses for PostgreSQL connection in plain
              text.
            ignore_read: true
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses for PostgreSQL connection.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
            ignore_read: true
          - name: port
            type: Integer
            description: The port of an endpoint usually specified for a connection.
          - name: securityProtocol
            type: String
            description: |-
              Security protocol for PostgreSQL.
              Possible values:
              PLAIN
              TLS
              MTLS
          - name: sslCaFile
            type: String
            description: |-
              The certificate of the trusted certificate authorities
              (Trusted CA) for PostgreSQL.
          - name: sslCertFile
            type: String
            description: The certificate of the PostgreSQL server.
          - name: sslCrlFile
            type: String
            description: |-
              The list of certificates revoked by the trusted
              certificate authorities (Trusted CA).
          - name: sslKeyFile
            type: String
            description: The private key of the PostgreSQL server.
          - name: sslMode
            type: String
            description: |-
              SSL modes for PostgreSQL.
              Possible values:
              PREFER
              REQUIRE
              VERIFY_CA
              VERIFY_FULL
          - name: technologyType
            type: String
            description: The technology type of PostgresqlConnection.
          - name: username
            type: String
            description: |-
              The username Oracle Goldengate uses to connect the associated system of
              the given technology.
      - name: redisConnectionProperties
        type: NestedObject
        description: The properties of GoldengateRedisConnection.
        properties:
          - name: authenticationType
            type: String
            description: |-
              Authentication type for Redis.
              Possible values:
              NONE
              BASIC
          - name: keyStoreFile
            type: String
            description: The content of the KeyStore file.
          - name: keyStorePassword
            type: String
            description: Input only. The KeyStore password in plain text.
          - name: keyStorePasswordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the KeyStore password.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: password
            type: String
            description: Input only. The password Oracle Goldengate uses for Redis connection in plain text.
            ignore_read: true
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses for Redis connection.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
            ignore_read: true
          - name: redisClusterId
            type: String
            description: The OCID of the Redis cluster.
          - name: securityProtocol
            type: String
            description: |-
              Security protocol for Redis.
              Possible values:
              PLAIN
              TLS
              MTLS
          - name: servers
            type: String
            description: |-
              Comma separated list of Redis server addresses, specified as host:port
              entries, where :port is optional. If port is not specified, it defaults
              to 6379. Example: "server1.example.com:6379,server2.example.com:6379"
          - name: technologyType
            type: String
            description: The technology type of RedisConnection.
          - name: trustStoreFile
            type: String
            description: The content of the TrustStore file.
          - name: trustStorePassword
            type: String
            description: Input only. The TrustStore password in plain text.
          - name: trustStorePasswordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the TrustStore password.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: username
            type: String
            description: |-
              The username Oracle Goldengate uses to connect the associated system of
              the given technology.
      - name: routingMethod
        type: String
        description: |-
          The routing method for the GoldengateConnection.
          Possible values:
          SHARED_DEPLOYMENT_ENDPOINT
          DEDICATED_ENDPOINT
        default_from_api: true
      - name: snowflakeConnectionProperties
        type: NestedObject
        description: The properties of GoldengateSnowflakeConnection.
        properties:
          - name: authenticationType
            type: String
            description: |-
              Used authentication mechanism to access Snowflake.
              Possible values:
              BASIC
              KEY_PAIR
          - name: connectionUrl
            type: String
            description: |-
              JDBC connection URL.
              e.g.:
              'jdbc:snowflake://.snowflakecomputing.com/?warehouse=&db='
          - name: password
            type: String
            description: |-
              Input only. The password Oracle Goldengate uses to connect to Snowflake platform
              in plain text.
            ignore_read: true
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses to connect to Snowflake platform.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
            ignore_read: true
          - name: privateKeyFile
            type: String
            description: The content of private key file in PEM format.
            ignore_read: true
          - name: privateKeyPassphraseSecret
            type: String
            description: Password if the private key file is encrypted.
            ignore_read: true
          - name: technologyType
            type: String
            description: The technology type of SnowflakeConnection.
          - name: username
            type: String
            description: The username Oracle Goldengate uses to connect to Snowflake.
      - name: updateTime
        type: String
        description: The time the resource was last updated.
        output: true
