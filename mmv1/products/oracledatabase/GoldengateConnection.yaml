virtual_fields:
  - name: deletion_protection
    type: Boolean
    default_value: true
    description: Whether or not to allow Terraform to destroy the instance. Unless this field is set to false in Terraform state, a terraform destroy or terraform apply that would delete the instance will fail.
parameters:
  - name: location
    type: String
    required: true
    description: Resource ID segment making up resource `name`. It identifies the resource within its parent collection as described in https://google.aip.dev/122.
    immutable: true
    url_param_only: true
  - name: goldengateConnectionId
    type: String
    required: true
    description: |-
      The ID of the GoldengateConnection to create. This value is
      restricted to (^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$) and must be a maximum of
      63 characters in length. The value must start with a letter and end with a
      letter or a number.
    immutable: true
    url_param_only: true
properties:
  - name: createTime
    type: String
    description: The date and time that the GoldengateConnection was created.
    output: true
  - name: entitlementId
    type: String
    description: |-
      The ID of the subscription entitlement associated with the
      GoldengateConnection.
    output: true
  - name: gcpOracleZone
    type: String
    description: |-
      The GCP Oracle zone where Oracle GoldengateConnection is hosted.
      Example: us-east4-b-r2.
      If not specified, the system will pick a zone based on availability.
    default_from_api: true
  - name: labels
    type: KeyValueLabels
    description: The labels or tags associated with the GoldengateConnection.
  - name: name
    type: String
    description: |-
      Identifier. The name of the GoldengateConnection resource in the following format:
      projects/{project}/locations/{region}/goldengateConnections/{goldengate_connection}
    output: true
  - name: ociUrl
    type: String
    description: HTTPS link to OCI resources exposed to Customer via UI Interface.
    output: true
  - name: odbNetwork
    type: String
    description: |-
      The name of the OdbNetwork associated with the GoldengateConnection.
      The format is
      projects/{project}/locations/{location}/odbNetworks/{odb_network}.
      It is optional but if specified, this should match the parent ODBNetwork
      of the OdbSubnet.
  - name: odbSubnet
    type: String
    description: |-
      The name of the OdbSubnet associated with the GoldengateConnection for IP
      allocation.
      Format:
      projects/{project}/locations/{location}/odbNetworks/{odb_network}/odbSubnets/{odb_subnet}
  - name: properties
    type: NestedObject
    required: true
    description: The properties of a GoldengateConnection.
    properties:
      - name: amazonKinesisConnectionProperties
        type: NestedObject
        description: The properties of GoldengateAmazonKinesisConnection.
        properties:
          - name: accessKeyId
            type: String
            description: Access key ID to access the Amazon Kinesis.
          - name: awsRegion
            type: String
            description: |-
              The name of the AWS region.
              If not provided, Goldengate will default to 'us-west-1'.
            default_from_api: true
          - name: endpoint
            type: String
            description: |-
              The endpoint URL of the Amazon Kinesis service.
              e.g.: 'https://kinesis.us-east-1.amazonaws.com'
              If not provided, Goldengate will default to
              'https://kinesis..amazonaws.com'.
            default_from_api: true
          - name: secretAccessKeySecret
            type: String
            description: Secret access key to access the Amazon Kinesis.
          - name: technologyType
            type: String
            description: The technology type of AmazonKinesisConnection.
      - name: amazonRedshiftConnectionProperties
        type: NestedObject
        description: The properties of GoldengateAmazonRedshiftConnection.
        properties:
          - name: connectionUrl
            type: String
            description: |-
              Connection URL.
              e.g.:
              'jdbc:redshift://aws-redshift-instance.aaaaaaaaaaaa.us-east-2.redshift.amazonaws.com:5439/mydb'
          - name: password
            type: String
            description: |-
              Input only. The password Oracle Goldengate uses for Amazon Redshift connection
              in plain text.
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses for Amazon Redshift connection.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: technologyType
            type: String
            description: The technology type of AmazonRedshiftConnection.
          - name: username
            type: String
            description: |-
              The username Oracle Goldengate uses to connect the associated system of
              the given technology.
      - name: amazonS3ConnectionProperties
        type: NestedObject
        description: The properties of GoldengateAmazonS3Connection.
        properties:
          - name: accessKeyId
            type: String
            description: Access key ID to access the Amazon S3 bucket.
          - name: endpoint
            type: String
            description: The Amazon Endpoint for S3.
          - name: region
            type: String
            description: The name of the AWS region where the bucket is created.
            default_from_api: true
          - name: secretAccessKeySecret
            type: String
            description: Secret access key to access the Amazon S3 bucket.
          - name: technologyType
            type: String
            description: The technology type of AmazonS3Connection.
      - name: azureDataLakeStorageConnectionProperties
        type: NestedObject
        description: The properties of GoldengateAzureDataLakeStorageConnection.
        properties:
          - name: account
            type: String
            description: Sets the Azure storage account name.
          - name: accountKeySecret
            type: String
            description: |-
              Azure storage account key. This property is required when
              'authentication_type' is set to 'SHARED_KEY'.
          - name: authenticationType
            type: String
            description: |-
              Authentication mechanism to access Azure Data Lake Storage.
              Possible values:
              SHARED_KEY
              SHARED_ACCESS_SIGNATURE
              AZURE_ACTIVE_DIRECTORY
          - name: azureAuthorityHost
            type: String
            description: |-
              The endpoint used for authentication with Microsoft Entra ID (formerly
              Azure Active Directory). Default value:
              https://login.microsoftonline.com
            default_from_api: true
          - name: azureTenantId
            type: String
            description: |-
              Azure tenant ID of the application. This property is required when
              'authentication_type' is set to 'AZURE_ACTIVE_DIRECTORY'.
          - name: clientId
            type: String
            description: |-
              Azure client ID of the application. This property is required when
              'authentication_type' is set to 'AZURE_ACTIVE_DIRECTORY'.
          - name: clientSecret
            type: String
            description: Azure client secret (aka application password) for authentication.
          - name: endpoint
            type: String
            description: |-
              Azure Storage service endpoint.
              e.g: https://test.blob.core.windows.net
          - name: sasTokenSecret
            type: String
            description: |-
              Credential that uses a shared access signature (SAS) to authenticate to
              an Azure Service.
          - name: technologyType
            type: String
            description: The technology type of AzureDataLakeStorageConnection.
      - name: azureSynapseAnalyticsConnectionProperties
        type: NestedObject
        description: The properties of GoldengateAzureSynapseAnalyticsConnection.
        properties:
          - name: connectionString
            type: String
            description: |-
              JDBC connection string.
              e.g.:
              'jdbc:sqlserver://.sql.azuresynapse.net:1433;database=;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.sql.azuresynapse.net;loginTimeout=300;'
          - name: password
            type: String
            description: |-
              Input only. The password Oracle Goldengate uses for Azure Synapse Analytics
              connection in plain text.
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses for Azure Synapse Analytics
              connection.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: technologyType
            type: String
            description: The technology type of AzureSynapseAnalyticsConnection.
          - name: username
            type: String
            description: |-
              The username Oracle Goldengate uses to connect the associated system of
              the given technology.
      - name: connectionType
        type: String
        required: true
        description: |-
          The connection type.
          Possible values:
          GOLDENGATE
          KAFKA
          KAFKA_SCHEMA_REGISTRY
          MYSQL
          JAVA_MESSAGE_SERVICE
          MICROSOFT_SQLSERVER
          OCI_OBJECT_STORAGE
          ORACLE
          AZURE_DATA_LAKE_STORAGE
          POSTGRESQL
          AZURE_SYNAPSE_ANALYTICS
          SNOWFLAKE
          AMAZON_S3
          HDFS
          ORACLE_AI_DATA_PLATFORM
          ORACLE_NOSQL
          MONGODB
          AMAZON_KINESIS
          AMAZON_REDSHIFT
          DB2
          REDIS
          ELASTICSEARCH
          GENERIC
          GOOGLE_CLOUD_STORAGE
          GOOGLE_BIGQUERY
          DATABRICKS
          GOOGLE_PUBSUB
          MICROSOFT_FABRIC
          ICEBERG
      - name: databricksConnectionProperties
        type: NestedObject
        description: The properties of GoldengateDatabricksConnection.
        properties:
          - name: authenticationType
            type: String
            description: |-
              Authentication type for Databricks.
              Possible values:
              PERSONAL_ACCESS_TOKEN
              OAUTH_M2M
          - name: clientId
            type: String
            description: OAuth client id, only applicable for authentication_type == OAUTH_M2M
          - name: clientSecret
            type: String
            description: OAuth client secret, only applicable for authentication_type == OAUTH_M2M
          - name: connectionUrl
            type: String
            description: |-
              Connection URL.
              e.g.:
              'jdbc:databricks://adb-33934.4.azuredatabricks.net:443/default;transportMode=http;ssl=1;httpPath=sql/protocolv1/o/3393########44/0##3-7-hlrb'
          - name: password
            type: String
            description: Input only. The password used to connect to Databricks in plain text.
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password used to connect to Databricks.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: storageCredential
            type: String
            description: |-
              External storage credential name to access files on object
              storage such as ADLS Gen2, S3 or Cloud Storage.
          - name: technologyType
            type: String
            description: The technology type of DatabricksConnection.
      - name: db2ConnectionProperties
        type: NestedObject
        description: The properties of GoldengateDb2Connection.
        properties:
          - name: additionalAttributes
            type: Array
            description: |-
              An array of name-value pair attribute entries.
              Used as additional parameters in connection string.
            item_type:
              type: NestedObject
              properties:
                - name: key
                  type: String
                  required: true
                  description: The name of the property entry.
                - name: value
                  type: String
                  required: true
                  description: The value of the property entry.
          - name: database
            type: String
            description: The name of the database.
          - name: host
            type: String
            description: The name or address of a host.
          - name: password
            type: String
            description: Input only. The password Oracle Goldengate uses for Db2 connection in plain text.
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses for Db2 connection.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: port
            type: Integer
            description: The port of an endpoint usually specified for a connection.
          - name: securityProtocol
            type: String
            description: |-
              Security protocol for the DB2 database.
              Possible values:
              PLAIN
              TLS
          - name: sslClientKeystashFile
            type: String
            description: |-
              The keystash file which contains the encrypted password to
              the key database file. Not supported for IBM Db2 for i.
          - name: sslClientKeystoredbFile
            type: String
            description: |-
              The keystore file created at the client containing the
              server certificate / CA root certificate. Not supported for IBM Db2 for i.
          - name: sslServerCertificateFile
            type: String
            description: |-
              The file which contains the self-signed server certificate
              / Certificate Authority (CA) certificate.
          - name: technologyType
            type: String
            description: The technology type of Db2Connection.
          - name: username
            type: String
            description: The username Oracle Goldengate uses to connect to the DB2 database.
      - name: description
        type: String
        description: Metadata about this specific object.
      - name: displayName
        type: String
        required: true
        description: An object's Display Name.
      - name: elasticsearchConnectionProperties
        type: NestedObject
        description: The properties of GoldengateElasticsearchConnection.
        properties:
          - name: authenticationType
            type: String
            description: |-
              Authentication type for Elasticsearch.
              Possible values:
              NONE
              BASIC
          - name: fingerprint
            type: String
            description: |-
              Fingerprint required by TLS security protocol.
              Eg.: '6152b2dfbff200f973c5074a5b91d06ab3b472c07c09a1ea57bb7fd406cdce9c'
          - name: password
            type: String
            description: |-
              Input only. The password Oracle Goldengate uses for Elastic Search connection
              in plain text.
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password Oracle Goldengate uses for Elastic Search connection.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: securityProtocol
            type: String
            description: |-
              Security protocol for Elasticsearch.
              Possible values:
              PLAIN
              TLS
          - name: servers
            type: String
            description: |-
              Comma separated list of Elasticsearch server addresses, specified as
              host:port entries, where :port is optional. If port is not specified, it
              defaults to 9200. Example:
              "server1.example.com:4000,server2.example.com:4000"
          - name: technologyType
            type: String
            description: The technology type of ElasticsearchConnection.
          - name: username
            type: String
            description: |-
              The username Oracle Goldengate uses to connect the associated system of
              the given technology.
      - name: genericConnectionProperties
        type: NestedObject
        description: The properties of GoldengateGenericConnectionProperties.
        properties:
          - name: host
            type: String
            description: The host of the GenericConnection.
          - name: technologyType
            type: String
            description: The technology type.
      - name: goldengateConnectionProperties
        type: NestedObject
        description: The properties of GoldengateGoldengateConnectionProperties.
        properties:
          - name: goldengateDeploymentId
            type: String
            description: |-
              The name of the GoldengateDeployment associated with the
              GoldengateConnection.
              Format:
              projects/{project}/locations/{location}/goldengateDeployments/{goldengate_deployment}
          - name: host
            type: String
            description: The host of the GoldengateConnection.
          - name: password
            type: String
            description: Input only. The password used to connect to the Oracle Goldengate in plain text.
          - name: passwordSecretVersion
            type: String
            description: |-
              Input only. The resource name of a secret version in Secret Manager which contains
              the password used to connect to the Oracle Goldengate.
              Format: projects/{project}/secrets/{secret}/versions/{version}.
          - name: port
            type: Integer
            description: The port of the GoldengateConnection.
          - name: technologyType
            type: String
            description: The technology type.
          - name: username
            type: String
            description: The username credential.
      - name: googleBigQueryConnectionProperties
        type: NestedObject
        description: The properties of GoldengateGoogleBigQueryConnectionProperties.
        properties:
          - name: serviceAccountKeyFile
            type: String
            description: |-
              The service account key file Cloud Storage containing the
              credentials required to use Google BigQuery.
          - name: technologyType
            type: String
            description: The technology type.
      - name: googleCloudStorageConnectionProperties
        type: NestedObject
        description: The properties of GoldengateGoogleCloudStorageConnectionProperties.
        properties:
          - name: serviceAccountKeyFile
            type: String
            description: |-
              The service account key Cloud Storage file containing the
              credentials required to use Google Cloud Storage.
          - name: technologyType
            type: String
            description: The technology type.
      - name: googlePubsubConnectionProperties
        type: NestedObject
        description: The properties of GoldengateGooglePubsubConnection.
        properties:
          - name: serviceAccountKeyFile
            type: String
            description: |-
              The content of the service account key file containing the
              credentials required to use Google Pub/Sub.
          - name: technologyType
            type: String
            description: The technology type of GooglePubsubConnection.
      - name: hdfsConnectionProperties
        type: NestedObject
        description: The properties of GoldengateHdfsConnection.
        properties:
          - name: coreSiteXml
            type: String
            description: |-
              The content of the Hadoop Distributed File System
              configuration file (core-site.xml).
          - name: technologyType
            type: String
            description: The technology type of HdfsConnection.
      - name: icebergConnectionProperties
        type: NestedObject
        description: The properties of GoldengateIcebergConnection.
        properties:
          - name: catalog
            type: NestedObject
            required: true
            description: The Iceberg catalog details.
            properties:
              - name: catalogType
                type: String
                required: true
                description: |-
                  The type of Iceberg catalog.
                  Possible values:
                  GLUE
                  HADOOP
                  NESSIE
                  POLARIS
                  REST
              - name: glueIcebergCatalog
                type: NestedObject
                description: The Glue Iceberg catalog.
                properties:
                  - name: glueId
                    type: String
                    required: true
                    description: The catalog ID of Glue.
              - name: nessieIcebergCatalog
                type: NestedObject
                description: The Nessie Iceberg catalog.
                properties:
                  - name: branch
                    type: String
                    required: true
                    description: The Nessie branch.
                  - name: uri
                    type: String
                    required: true
                    description: The Nessie uri.
              - name: polarisIcebergCatalog
                type: NestedObject
                description: The Polaris Iceberg catalog.
                properties:
                  - name: clientId
                    type: String
                    required: true
                    description: The Polaris client ID.
                  - name: clientSecret
                    type: String
                    description: The Polaris client secret.
                  - name: polarisCatalog
                    type: String
                    required: true
                    description: The catalog name within Polaris.
                  - name: principalRole
                    type: String
                    required: true
                    description: The Polaris principal role.
                  - name: uri
                    type: String
                    required: true
                    description: The Polaris uri.
              - name: restIcebergCatalog
