---
name: 'ListingSubscription'
api_resource_type_kind: Subscription
description: A Bigquery Analytics Hub listing subscription
references:
  guides:
    'Official Documentation': 'https://cloud.google.com/bigquery/docs/analytics-hub-introduction'
  api: 'https://cloud.google.com/bigquery/docs/reference/analytics-hub/rest/v1/projects.locations.subscriptions'
docs:
  note: |-
    When importing the resource with `terraform import`, provide the destination project and location
    in the format projects/{{destination_project}}/locations/{{destination_location}}/subscriptions/{{subscription_id}}
base_url: 'projects/{{project}}/locations/{{location}}/subscriptions'
self_link: 'projects/{{project}}/locations/{{location}}/subscriptions/{{subscription_id}}'
create_url: 'projects/{{project}}/locations/{{location}}/dataExchanges/{{data_exchange_id}}/listings/{{listing_id}}:subscribe'
immutable: true
import_format:
  - 'projects/{{project}}/locations/{{location}}/subscriptions/{{subscription_id}}'
custom_code:
  decoder: 'templates/terraform/decoders/bigqueryanalyticshub_listing_subscription.go.tmpl'
  pre_read: 'templates/terraform/pre_read/bigqueryanalyticshub_listing_subscription.tmpl'
  post_read: 'templates/terraform/post_read/bigqueryanalyticshub_listing_subscription.go.tmpl'
  pre_delete: 'templates/terraform/pre_read/bigqueryanalyticshub_listing_subscription.tmpl'
  post_import: templates/terraform/post_import/analytics_hub_subscription.go.tmpl
sweeper:
  url_substitutions:
    - region: "US"
examples:
  - name: 'bigquery_analyticshub_listing_subscription_basic'
    primary_resource_id: 'subscription'
    region_override: 'US'
    vars:
      data_exchange_id: 'my_data_exchange'
      listing_id: 'my_listing'
      destination_dataset_id: 'destination_dataset'
      description: 'example data exchange'
    test_vars_overrides:
      # for backward compatible
      description: '"example data exchange" + randomSuffix'
  - name: 'bigquery_analyticshub_listing_subscription_multiregion'
    primary_resource_id: 'subscription'
    exclude_test: true
    vars:
      data_exchange_id: 'my_data_exchange'
      listing_id: 'my_listing'
      destination_dataset_id: 'destination_dataset'
      description: 'example listing multiregion subscription'
    test_vars_overrides:
      # for backward compatible
      description: '"example listing multiregion subscription" + randomSuffix'
  - name: 'bigquery_analyticshub_listing_subscription_pubsub'
    primary_resource_id: 'subscription'
    region_override: 'US'
    vars:
      data_exchange_id: 'my_data_exchange'
      listing_id: 'my_listing'
      pubsub_topic_name: 'my_pubsub_topic'
      pubsub_subscription_name: 'my_pubsub_subscription'
      description: 'example pubsub listing subscription'
parameters:
  - name: 'dataExchangeId'
    type: String
    description: |-
      The ID of the data exchange. Must contain only Unicode letters, numbers (0-9), underscores (_). Should not use characters that require URL-escaping, or characters outside of ASCII, spaces.
    url_param_only: true
    required: true
  - name: 'listingId'
    type: String
    description: |-
      The ID of the listing. Must contain only Unicode letters, numbers (0-9), underscores (_). Should not use characters that require URL-escaping, or characters outside of ASCII, spaces.
    url_param_only: true
    required: true
  - name: 'location'
    type: String
    description: |
      The name of the location of the data exchange. Distinct from the location of the destination data set.
    url_param_only: true
    required: true
    custom_flatten: 'templates/terraform/custom_flatten/bigquery_dataset_location.go.tmpl'
    diff_suppress_func: 'tpgresource.CaseDiffSuppress'
properties:
  - name: 'destinationDataset'
    type: NestedObject
    description:
      The destination dataset for this subscription.
    exactly_one_of:
      - 'destination_dataset'
      - 'destination_pubsub_subscription'
    properties:
      - name: 'location'
        type: String
        description: |
          The geographic location where the dataset should reside.
          See https://cloud.google.com/bigquery/docs/locations for supported locations.
        required: true
        custom_flatten: 'templates/terraform/custom_flatten/bigquery_dataset_location.go.tmpl'
        diff_suppress_func: 'tpgresource.CaseDiffSuppress'
      - name: 'datasetReference'
        type: NestedObject
        required: true
        description: A reference that identifies the destination dataset.
        properties:
          - name: 'datasetId'
            type: String
            description: A unique ID for this dataset, without the project name. The ID must contain only letters (a-z, A-Z), numbers (0-9), or underscores (_). The maximum length is 1,024 characters.
            required: true
          - name: 'projectId'
            type: String
            description: The ID of the project containing this dataset.
            required: true
      - name: 'friendlyName'
        type: String
        description: A descriptive name for the dataset.
      - name: 'description'
        type: String
        description: A user-friendly description of the dataset.
      - name: 'labels'
        type: KeyValuePairs
        description: |
          The labels associated with this dataset. You can use these to
          organize and group your datasets.
      - name: 'replicaLocations'
        is_set: true
        type: Array
        set_hash_func: 'tpgresource.CaseInsensitiveHash'
        description: |
          List of regions where the subscriber wants dataset replicas.
        item_type:
          type: String
        diff_suppress_func: 'tpgresource.CaseDiffSuppress'
  - name: 'destinationPubsubSubscription'
    type: NestedObject
    description: |
      The destination Pub/Sub subscription for this Analytics Hub subscription.
      Required when subscribing to a Pub/Sub topic listing.
    exactly_one_of:
      - 'destination_dataset'
      - 'destination_pubsub_subscription'
    properties:
      - name: 'pubsubSubscription'
        type: NestedObject
        required: true
        description: Destination Pub/Sub subscription resource.
        properties:
          - name: 'name'
            type: String
            required: true
            description: |
              Name of the subscription. Format is `projects/{project}/subscriptions/{sub}`.
          - name: 'pushConfig'
            type: NestedObject
            description: If push delivery is used with this subscription, this field is used to configure it.
            properties:
              - name: 'pushEndpoint'
                type: String
                description: |
                  A URL locating the endpoint to which messages should be pushed.
                  For example, a Webhook endpoint might use `https://example.com/push`.
              - name: 'attributes'
                type: KeyValuePairs
                description: |
                  Endpoint configuration attributes that can be used to control different
                  aspects of the message delivery.
              - name: 'oidcToken'
                type: NestedObject
                description: |
                  If specified, Pub/Sub will generate and attach an OIDC JWT token as an
                  Authorization header in the HTTP request for every pushed message.
                properties:
                  - name: 'serviceAccountEmail'
                    type: String
                    description: Service account email used for generating the OIDC token.
                  - name: 'audience'
                    type: String
                    description: |
                      Audience to be used when generating OIDC token. The audience claim
                      identifies the recipients that the JWT is intended for.
              - name: 'noWrapper'
                type: NestedObject
                description: When set, the payload to the push endpoint is not wrapped.
                properties:
                  - name: 'writeMetadata'
                    type: Boolean
                    description: |
                      When true, writes the Pub/Sub message metadata to
                      `x-goog-pubsub-:` headers of the HTTP request.
          - name: 'bigqueryConfig'
            type: NestedObject
            description: If delivery to BigQuery is used with this subscription, this field is used to configure it.
            properties:
              - name: 'table'
                type: String
                description: |
                  The name of the table to which to write data, of the form
                  {projectId}.{datasetId}.{tableId}
              - name: 'useTopicSchema'
                type: Boolean
                description: |
                  When true, use the topic's schema as the columns to write to in BigQuery,
                  if it exists.
              - name: 'writeMetadata'
                type: Boolean
                description: |
                  When true, write the subscription name, message_id, publish_time,
                  attributes, and ordering_key to additional columns in the table.
              - name: 'dropUnknownFields'
                type: Boolean
                description: |
                  When true and use_topic_schema is true, any fields that are a part of the
                  topic schema that are not part of the BigQuery table schema are dropped
                  when writing to BigQuery.
              - name: 'useTableSchema'
                type: Boolean
                description: |
                  When true, use the BigQuery table's schema as the columns to write to
                  in BigQuery.
              - name: 'serviceAccountEmail'
                type: String
                description: |
                  The service account to use to write to BigQuery.
          - name: 'cloudStorageConfig'
            type: NestedObject
            description: If delivery to Google Cloud Storage is used with this subscription, this field is used to configure it.
            properties:
              - name: 'bucket'
                type: String
                description: |
                  User-provided name for the Cloud Storage bucket.
                  The bucket must be created by the user. The bucket name must be
                  without any prefix like "gs://".
              - name: 'filenamePrefix'
                type: String
                description: User-provided prefix for Cloud Storage filename.
              - name: 'filenameSuffix'
                type: String
                description: |
                  User-provided suffix for Cloud Storage filename.
                  Must not end in "/".
              - name: 'filenameDatetimeFormat'
                type: String
                description: |
                  User-provided format string specifying how to represent datetimes
                  in Cloud Storage filenames.
              - name: 'maxDuration'
                type: String
                description: |
                  The maximum duration that can elapse before a new Cloud Storage file
                  is created. Min 1 minute, max 10 minutes, default 5 minutes.
              - name: 'maxBytes'
                type: String
                description: |
                  The maximum bytes that can be written to a Cloud Storage file before
                  a new file is created. Min 1 KB, max 10 GiB.
              - name: 'maxMessages'
                type: String
                description: |
                  The maximum number of messages that can be written to a Cloud Storage
                  file before a new file is created. Min 1000 messages.
              - name: 'serviceAccountEmail'
                type: String
                description: |
                  The service account to use to write to Cloud Storage.
              - name: 'avroConfig'
                type: NestedObject
                description: If set, message data will be written to Cloud Storage in Avro format.
                properties:
                  - name: 'writeMetadata'
                    type: Boolean
                    description: |
                      When true, write the subscription name, message_id, publish_time,
                      attributes, and ordering_key as additional fields in the output.
                  - name: 'useTopicSchema'
                    type: Boolean
                    description: |
                      When true, the output Cloud Storage file will be serialized using
                      the topic schema, if it exists.
          - name: 'ackDeadlineSeconds'
            type: Integer
            description: |
              The approximate amount of time (on a best-effort basis) Pub/Sub waits for
              the subscriber to acknowledge receipt before resending the message.
              The minimum custom deadline you can specify is 10 seconds.
              The maximum custom deadline you can specify is 600 seconds (10 minutes).
              If this parameter is 0, a default value of 10 seconds is used.
          - name: 'retainAckedMessages'
            type: Boolean
            description: |
              Indicates whether to retain acknowledged messages. If true, then
              messages are not expunged from the subscription's backlog, even if
              they are acknowledged, until they fall out of the
              `message_retention_duration` window.
          - name: 'messageRetentionDuration'
            type: String
            description: |
              How long to retain unacknowledged messages in the subscription's backlog,
              from the moment a message is published. If `retain_acked_messages` is true,
              then this also configures the retention of acknowledged messages.
              Defaults to 7 days. Cannot be more than 31 days or less than 10 minutes.
          - name: 'labels'
            type: KeyValuePairs
            description: |
              See [Creating and managing labels](https://cloud.google.com/pubsub/docs/labels).
          - name: 'enableMessageOrdering'
            type: Boolean
            description: |
              If true, messages published with the same `ordering_key` in `PubsubMessage`
              will be delivered to the subscribers in the order in which they are received
              by the Pub/Sub system. Otherwise, they may be delivered in any order.
          - name: 'expirationPolicy'
            type: NestedObject
            description: |
              A policy that specifies the conditions for this subscription's expiration.
              If `expiration_policy` is not set, a default policy with `ttl` of 31 days
              will be used.
            properties:
              - name: 'ttl'
                type: String
                description: |
                  Specifies the "time-to-live" duration for an associated resource.
                  The resource expires if it is not active for a period of `ttl`.
                  The minimum allowed value for `expiration_policy.ttl` is 1 day.
                  If `expiration_policy` is set, but `ttl` is not set, the subscription
                  never expires.
          - name: 'deadLetterPolicy'
            type: NestedObject
            description: |
              A policy that specifies the conditions for dead lettering messages in
              this subscription.
            properties:
              - name: 'deadLetterTopic'
                type: String
                description: |
                  The name of the topic to which dead letter messages should be published.
                  Format is `projects/{project}/topics/{topic}`.
              - name: 'maxDeliveryAttempts'
                type: Integer
                description: |
                  The maximum number of delivery attempts for any message.
                  The value must be between 5 and 100.
          - name: 'retryPolicy'
            type: NestedObject
            description: |
              A policy that specifies how Pub/Sub retries message delivery for this
              subscription. If not set, the default retry policy is applied.
            properties:
              - name: 'minimumBackoff'
                type: String
                description: |
                  The minimum delay between consecutive deliveries of a given message.
                  Value should be between 0 and 600 seconds. Defaults to 10 seconds.
              - name: 'maximumBackoff'
                type: String
                description: |
                  The maximum delay between consecutive deliveries of a given message.
                  Value should be between 0 and 600 seconds. Defaults to 600 seconds.
          - name: 'filter'
            type: String
            description: |
              An expression written in the Pub/Sub filter language. If non-empty,
              then only `PubsubMessage`s whose `attributes` field matches the filter
              are delivered on this subscription.
          - name: 'enableExactlyOnceDelivery'
            type: Boolean
            description: |
              If true, Pub/Sub provides the following guarantees for the delivery of
              a message with a given value of `message_id` on this subscription:
              The message sent to a subscriber is guaranteed not to be resent before
              the message's acknowledgement deadline expires.
          - name: 'detached'
            type: Boolean
            description: |
              Indicates whether the subscription is detached from its topic.
              Detached subscriptions don't receive messages from their topic
              and don't retain any backlog.
  - name: 'name'
    type: String
    description: |-
      The resource name of the subscription. e.g. "projects/myproject/locations/US/subscriptions/123"
    output: true
  - name: 'subscriptionId'
    type: String
    description: |-
      The subscription id used to reference the subscription.
    output: true
    custom_flatten: 'templates/terraform/custom_flatten/id_from_name.tmpl'
  - name: 'creationTime'
    type: Time
    description: |-
      Timestamp when the subscription was created.
    output: true
  - name: 'lastModifyTime'
    type: Time
    description: |-
      Timestamp when the subscription was last modified.
    output: true
  - name: 'organizationId'
    type: String
    description: |-
      Organization of the project this subscription belongs to.
    output: true
  - name: 'organizationDisplayName'
    type: String
    description: |-
      Display name of the project of this subscription.
    output: true
  - name: 'state'
    type: String
    description: |-
      Current state of the subscription.
    output: true
  - name: 'subscriberContact'
    type: String
    description: |-
      Email of the subscriber.
    output: true
  - name: 'resourceType'
    type: String
    description: |-
      Listing shared asset type.
    output: true
  - name: 'linkedDatasetMap'
    output: true
    type: Map
    description: |-
      Output only. Map of listing resource names to associated linked resource,
      e.g. projects/123/locations/US/dataExchanges/456/listings/789 -> projects/123/datasets/my_dataset
    key_name: resource_name
    value_type:
      type: NestedObject
      properties:
        - name: listing
          type: String
          description: Output only. Listing for which linked resource is created.
          output: true
        - name: linkedDataset
          type: String
          description: Output only. Name of the linked dataset, e.g. projects/subscriberproject/datasets/linkedDataset
          output: true
        - name: linkedPubsubSubscription
          type: String
          description: Output only. Name of the Pub/Sub subscription, e.g. projects/subscriberproject/subscriptions/sub_id
          output: true
  - name: linkedResources
    type: Array
    description: |
      Output only. Linked resources created in the subscription. Only contains values if state = STATE_ACTIVE.
    output: true
    item_type:
      type: NestedObject
      properties:
        - name: listing
          type: String
          description: Output only. Listing for which linked resource is created.
          output: true
        - name: linkedDataset
          type: String
          description: Output only. Name of the linked dataset, e.g. projects/subscriberproject/datasets/linkedDataset
          output: true
        - name: linkedPubsubSubscription
          type: String
          description: Output only. Name of the Pub/Sub subscription, e.g. projects/subscriberproject/subscriptions/sub_id
          output: true
  - name: 'logLinkedDatasetQueryUserEmail'
    type: Boolean
    description: 'Output only. By default, false. If true, the Subscriber agreed to the email sharing mandate that is enabled for Listing.'
    output: true
  - name: 'commercialInfo'
    type: NestedObject
    description: |
      Commercial info metadata for this subscription. This is set if this is a commercial subscription i.e. if this subscription was created from subscribing to a commercial listing.
    output: true
    properties:
      - name: 'cloudMarketplace'
        type: NestedObject
        description: Cloud Marketplace commercial metadata for this subscription.
        output: true
        properties:
          - name: 'order'
            type: String
            description: |
              Resource name of the Marketplace Order.
            output: true
